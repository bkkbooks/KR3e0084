body:
  text: 神農本草經疏卷二明繆希雍撰諸病應忌藥總例補氣人參黄耆二术人胞紅鉛溫補人胞紅鉛白膠鹿茸巴㦸天人參黄耆二术淫羊藿肉蓯蓉補骨脂當歸狗隂莖菟絲子蛇床子大熱附子肉桂仙茅陽起石烏頭硫黄海狗腎羊肉雀肉天雄葫蘆芭破氣青皮枳實枳殼檳榔厚朴牽牛閉氣銀杏米麫食猪脂油二术黄耆降氣降真香蘇子鬱金枇杷葉橘紅沈香烏藥破血桃仁紅花蘇方木延胡索乾漆五靈脂花蕋石乳香没藥薑黄三稜蓬茂水蛭蝱蟲􅟟蟲肉桂桃梟穿山甲騏驎竭升提發散升麻柴胡川芎紫蘇麻黄乾葛羌活獨活防風白芷生薑細辛荆芥前胡藁本葱白薄荷辛溫辛熱發散吳茱萸乾薑桂枝麻黄細辛羌活獨活防風藁本川芎白芷葱白吐𤓰蔕梔子豉皂莢藜蘆常山人參蘆鰕汁鹽湯下大黄芒硝巴豆牽牛𤣥明粉枳實厚朴降泄山梔知母天門冬𤣥參利水猪苓澤瀉木通瞿麥車前子葶藶滑石海金沙商陸茯苓扁蓄烏桕根皮琥珀芫花甘遂大㦸續隨子漢防己郁李仁損津液郁李仁白礬礬紅半夏歛攝白芍藥五味子醋烏梅白梅酸棗仁固澀龍骨牡蠣粟殼訶黎勒益智子山茱萸桑螵蛸蛇床子肉果蓮鬚阿芙蓉金櫻子原蠶蛾消導山查麥芽草果檳榔三稜蓬茂神麴枳殼枳實緑礬萊菔子紅麴橘紅砂仁開竅龍腦香麝香蘇合香檀香安息香香燥沈香麝香龍腦香縮砂蜜豆䓻藿香香附丁香烏藥木香辛燥火酒蒜半夏南星二术辛熱乾薑吳茱萸胡椒蒜蘹香生薑巴豆龍腦香濕潤地黄當歸肉蓯蓉天門冬知母猪脂油麻仁栝樓仁滯膩猪羊犬肉鵞地黄南麫油膩炙煿滑利冬葵子榆皮牛乳椿根白皮柿瓜李桃棃蜜青菜蓴菜酥茄子發濕鱖魚南麫苦寒傷胃山梔黄檗黄芩黄連大黄苦參𤣥參知母盧㑹補命門相火鹿茸巴㦸天附子人胞紅鉛白膠肉桂仙茅陽起石膃肭臍淫羊藿補骨脂狗隂莖菟絲子原蠶蛾補腎水苦寒黄檗天門冬𤣥參知母酸寒白芍藥牛膝烏梅鹹寒童便芒硝𤣥參秋石生冷菱棃菜李甘甘草飴糖大棗蜜鹹食鹽商陸堿水鹿茸蛤蜊蠣黄蟶續序例下隂陽表裏虚實門陽虚即真氣虚其證惡寒或發熱自汗汗多亡陽陽虚不發熱單惡寒者居多忌破氣降泄利水苦寒又忌酸辛熱發散青皮枳殼厚朴牽牛㯽榔以上破氣大黄石膏山梔知母天門冬生地黄栝樓以上降泄澤瀉木通瞿麥木桕根皮漢防己葶藶猪苓滑石海金沙商陸以上利水黄芩黄連黄檗𤣥參槐花以上苦寒芍藥烏梅醋以上酸吳茱萸麻黄羌活獨活前胡防風荆芥以上辛熱發散宜補甘溫熱人參黄耆二术炙甘草當歸白膠淫羊藿人胞紅鉛補骨脂巴㦸天桂附子仙茅鹿茸大蘹香陽起石羊肉雀肉隂虚即精血虚其證為欬嗽多痰吐血咯血嗽血鼻衂齒衂盜汗自汗發熱寒熱潮熱骨乏無力不眠氣急腰背痛忌補氣復忌破氣燥熱辛溫又忌大寒大苦傷胃并升提發散利水人參黄耆二术人胞以上補氣南星半夏附子官桂桂枝仙茅鹿茸乾薑硫黄陽起石海狗腎丁香胡椒烏頭火酒吳茱萸烏藥生薑以上燥熱辛温山梔黄芩黄連大黄芒硝𤣥明粉以上大寒大苦傷胃麻黄升麻柴胡羌活獨活藁本川芎防風以上升提發散破氣利水藥見前宜生精補血兼清虚熱斂攝酸寒甘寒甘平鹹寒畧兼苦寒地黄栢子仁人乳沙苑蒺藜枸杞子牛膝麋角膠阿膠沙參酸棗仁白芍藥五味子山茱萸石斛麥門冬薯蕷牡丹皮續斷地骨皮車前子溺白垽鼈甲黄檗知母青蒿表虚其證自汗惡風洒淅寒熱喜就溫煖脈浮無力忌破氣升發辛熱麻黄升麻防風柴胡羌活獨活前胡乾葛紫蘇薄荷白芷生薑荆芥以上升發吳茱萸桂枝表虚而中寒者不忌乾薑以上辛熱破氣藥見前宜補斂益氣實表甘酸人參黄耆白芍藥甘草桂枝有熱者勿用五味子裏虚其證洞泄或完穀不化心腹痛按之即止或腹脹或傷寒下後痞滿忌破氣下苦寒大黄芒硝巴豆𤣥明粉牽牛以上下黄芩黄連山梔知母黄檗天門冬茗以上苦寒破氣藥見前宜溫補甘佐以辛熱人參炙甘草术大棗糯米肉桂附子有熱者勿用乾薑陽實即表邪熱盛其證頭痛寒熱遍身骨痛無汗忌補斂下大熱黄耆人參二术桂枝芍藥五味子米麪食猪羊犬肉醋以上補斂附子胡椒乾薑肉桂蒜吳茱萸以上大熱下藥見前宜辛寒發散天寒畧加辛熱辛溫佐之石膏知母葛根麥門冬前胡柴胡黄芩紫蘇薄荷升麻防風葱白荆芥羌活麻黄冬月可用春夏忌之隂實即裏實外感證屬邪熱内結者其證胸腹鞕痛手不可近大便七八日不行或挾熱下痢忌辛溫發散補斂諸藥俱見前宜下苦寒鹹寒甘辛大黄厚朴枳實滑石山梔黄芩黄連藍茵陳芒硝桃仁陽厥即熱厥其證四肢厥逆身熱面赤唇燥大渴口乾舌苦目閉或不閉小便赤澀短少大便燥結不省人事忌升發補斂燥熱辛溫諸藥俱見前宜下清熱甘寒苦寒鹹寒大黄芒硝石膏黄芩黄連山梔知母童便如挾虚有痰者宜麥門冬竹瀝蘆根汁棃汁牛黄童便如婦人熱入血室因而厥者藥中以童便為君加赤芍藥生地黄牛膝牡丹皮桃仁甚者大便結燥加芒硝大黄下之通即止勿盡劑隂厥即寒厥其證四肢厥逆身冷面青踡卧手指爪青黯腹痛大便溏或完穀不化小便自利不渴不省人事忌下破氣苦寒鹹寒酸寒食鹽太隂𤣥精石童便以上鹹寒芍藥醋以上酸寒下破氣苦寒諸藥俱見前宜補氣溫中甘溫辛熱人參乾薑附子桂吳茱萸上盛下虚屬陽盛隂虚忌升散下助陽補氣復忌破氣燥熱辛諸藥俱見隂虚條下宜降益隂甘寒酸寒佐以鹹寒苦寒蘇子枇杷葉麥門冬枸杞子生地沙參白芍藥山茱萸五味子牛膝童便𤣥參黄檗天門冬五臟六腑虚實門心虚八證忌升發破氣苦寒辛燥大熱諸藥俱見前宜補血甘溫酸斂佐以鹹寒鎮墜生地黄龍眼肉人參炙甘草石斛酸棗仁五味子柏子仁丹參茯神逺志鹿茸炒鹽丹砂驚邪屬心氣虚忌升破氣諸藥俱見前宜降清熱豁痰平經曰驚者平之犀角丹砂琥珀真珠龍齒金箔牛黄代赭石羚羊角麥門冬石斛桔梗膽星麝香竹瀝天竺黄逺志鬼臼癲癎屬心氣虚有熱忌補斂升諸藥俱見前宜降清熱豁痰諸藥見驚邪條加貝母丹參釣藤鈎鬱金鉛丹神水白礬不得眠屬心血虚有熱忌升辛燥熱諸藥俱見前宜斂養隂血清熱酸棗仁五味子龍眼肉丹參芍藥人參石斛竹葉生地黄茯神逺志黄連𤣥參麥門冬辰砂六一散竹茹木通生甘草心煩屬心家有熱忌升破氣燥熱諸藥俱見前宜清熱生津液甘寒甘平辛酸叅用不得眠中諸藥竹葉麥門冬生甘草石斛丹參龍眼肉生地黄𤣥參沙參茯神逺志知母酸棗仁怔忡屬心血不足忌宜俱同心虚心澹澹動忌宜俱同心虚盜汗屬心血虚汗者心之液也忌破氣辛散燥熱諸藥俱見前宜補斂清虚熱甘酸甘平甘寒苦寒鹹寒生地黄當歸茯神龍眼肉黄耆五味子白芍藥酸棗仁黄芩黄檗黄連牡蠣伏梁屬心經氣血虚以致邪留不去忌破血汗下三稜蓬茂薑黄蝱蟲􅟟蟲紅藍花水蛭桃仁以上破血汗下諸藥俱見前宜活血涼血散熱通結辛鹹鬱金五靈脂乳香没藥當歸延胡索赤芍藥逺志菖蒲茯神牡蠣叅用東垣伏梁丸治之肝虚十證忌收斂破氣升散苦寒下諸藥俱見前宜辛散甘緩當歸陳皮生薑地黄甘菊甘草胡麻穀精草決明子刺蒺藜羊牛兔肝因鬱而虚者加細辛木香縮砂蜜沈水香川芎香附胸脇痛屬肝血虚肝氣實因而上逆忌斂補氣破血諸藥俱見前宜降氣養血和肝辛甘平緩蘇子鬱金番降香川通草當歸生地黄橘皮甘草白芍藥續斷鹿角膠轉筋屬血虚忌下復忌升燥熱閉氣苦寒破氣二术黄耆銀杏猪脂羊肉麪以上閉氣餘忌藥俱見前宜酸辛甘平木𤓰牛膝當歸身白芍藥石斛續斷炙甘草陳皮縮砂蜜目光短屬肝血虚及腎水真隂不足忌破氣升燥熱諸藥俱見前宜補肝兼滋腎甘溫益血甘寒除熱甘枸杞生地黄甘菊花沙苑蒺藜穀精草五味子決明子天門冬麥門冬目昏屬肝血虚有熱兼腎水真隂不足忌同前目光短宜同目光短加黄檗羚羊角目翳屬肝熱兼腎水不足忌破氣升燥熱苦寒諸藥俱見前宜補肝血除熱退翳甘菊花生地黄決明子石決明沙苑蒺藜女貞實青羊膽羚羊角犀角空青黄連天龍伏翼糞木賊穀精草蜜蒙花人爪蟬蛻瑪瑙石蟹珊瑚真珠琥珀馬目毒公貝子亡血過多角弓反張屬肝血虚有熱忌風燥升破氣下諸藥俱見前宜補血清熱甘寒甘溫酸寒鹹寒辛潤當歸生地黄白芍藥炙甘草牛膝麥門冬牡丹皮甘菊花童便有汗加人參黄耆五味子酸棗仁少腹連隂作痛按之則止屬足厥隂經血虚忌同角弓反張宜同角弓反張加白膠偏頭痛屬血虚肝家有熱不急治乆之必損目忌升燥熱苦寒諸藥俱見前宜養血清虚熱甘寒酸寒辛寒生地黄天門冬甘菊花白芍藥當歸川芎烏梅炙甘草土茯苓金銀藤黑豆有實火者可加黄芩酒炒大黄酒蒸芎藭雨前茶石膏目黑暗眩暈屬血虚兼腎水真隂不足忌破氣燥熱辛溫諸藥俱見前宜養血補肝清熱甘寒甘平酸寒苦寒生地黄枸杞子甘菊花當歸薯蕷五味子白蒺藜甘草山茱萸白芍藥天門冬黄檗肥氣屬氣血兩虚肝氣不和逆氣與瘀血相併而成忌破氣下苦寒諸藥俱見前宜和肝散結氣兼行氣血凝滯甘溫甘平川芎當歸沈香乾薑肉桂橘皮紅花鬱金延胡索香附山查赤芍藥紅麴砂仁叅用東垣肥氣丸治之脾虚十二證忌下降泄破氣苦寒諸藥俱見前宜甘溫佐以辛香酸平人參大棗黄耆薯蕷炙甘草蓮肉白茯苓白藊豆縮砂蜜橘紅白豆蔲藿香木瓜白芍藥酸棗仁飲食勞倦傷脾發熱忌破氣發散下苦寒諸藥俱見前宜補中益氣甘溫升酸人參黄耆术炙甘草大棗柴胡升麻石斛麥門冬橘紅白芍藥酸棗仁飲食不消化屬脾氣虚忌破氣消導尅伐苦寒復忌燥草果枳實㯽榔蓬茂三稜綠礬以上消導餘忌藥俱見前宜益真氣香甘溫甘辛同脾虚加穀糵麥糵肉豆蔲傷食必惡食忌潤濕苦寒當歸肉蓯蓉瑣陽天門冬地黄知母𤣥參猪脂茄子酒糟麪食以上潤濕苦寒諸藥見前宜健脾消導甘溫辛香橘皮薯蕷蓮肉白藊豆白芍藥白茯苓草果山查麥芽草豆蔲縮砂蜜穀糵如腹痛大便不通宜下之枳實㯽榔厚朴大黄元氣虚人不可下宜加參术傷肉食輕者宜蒜山查兼黄連重者宜礬紅棗肉為丸服二錢不可過終身忌蕎麥傷麪食宜炒萊菔子停飲為恣飲湯水或冷茶冷酒所致忌下酸斂濕潤滯膩諸藥俱見前加忌栝樓根及仁桃仁郁李仁宜健脾利水淡滲兼辛散人參白术半夏茯苓橘皮澤瀉猪苓木通桑白皮旋覆花紫蘇白豆蔲水腫屬脾氣虚忌破氣下泄濕潤鹹苦寒食鹽商陸以上鹹餘忌藥俱見前宜補脾益氣燥濕利水辛香甘溫佐以淡滲人參二术橘皮薯蕷木瓜薏苡仁桑白皮茯苓赤小豆香薷烏蠡魚車前子猪苓澤瀉薑皮烏芋縮砂蜜通草脾虚中滿屬脾氣虚兼脾隂虚忌破氣下消導利水甘飴糖大棗蜜甘草以上甘餘忌藥俱見前晝劇夜靜屬脾氣虚宜補氣健脾甘溫淡滲佐以辛香人參二术白芍藥桑白皮茯苓車前子橘紅薑皮藿香縮砂蜜無熱證者佐以桂夜劇晝靜屬脾隂虚宜補脾隂兼制肝清熱甘平酸寒淡滲酸棗仁白芍藥石斛白藊豆蓮肉橘皮山藥蘇子五味子木瓜桑白皮車前子茯苓噎膈屬氣血兩虚由於血液衰少而非痰氣壅逆所成忌破氣升復忌下消導燥苦寒辛熱諸藥俱見前宜降清熱潤燥甘溫甘平以益血畧佐辛香以順氣蘇子橘紅枇杷葉人參白芍藥酸棗仁龍眼肉人乳牛乳蔗漿梨汁韭汁蘆根汁薑汁白豆蔲仁脾泄屬氣虚忌破氣下消導苦寒諸藥俱見前宜溫中補氣升清甘溫甘平佐以辛香人參术炙甘草薯蕷蓮肉白藊豆茯苓車前子白芍藥升