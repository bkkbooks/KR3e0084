於氣血兩虚忌同産後發熱宜補氣血潤肺下降人參橘紅生地黄天門冬麥門冬蘇子枇杷葉栝樓仁栝樓根童便五味子竹茹産後惡寒由於氣血兩虚忌同産後發熱宜補氣血溫中甘溫佐以辛溫人參黄耆炙甘草乾地黄龍眼肉當歸炮乾薑産後小便不利或短赤由於腎水真隂不足忌利小便餘忌同産後發熱諸藥俱見前宜生津液益隂補血涼血清熱甘溫甘寒酸寒天門冬麥門冬生地黄枸杞子山茱萸白芍藥車前子牛膝五味子青蒿子鼈甲竹葉産後大便閉結由於血枯内熱忌補氣行血辛熱燥下升苦寒諸藥俱見前宜益血涼血潤燥滋肝腎生津液生地黄熟地黄天門冬麥門冬五味子蔗漿牡丹皮肉蓯蓉當歸麻仁人乳蜜産後不得眠忌同産後大便閉結宜補心降心火補肝補脾隂兼清内熱生地黄麥門冬茯神丹參沙參酸棗仁白芍藥竹葉遠志蓮肉龍眼肉産後腹脹由於隂血虚脾隂虚忌破氣寛中升提發散消導吐下甘苦寒鹹寒大熱溫燥滯膩諸藥俱見前宜益脾隂補脾和肝酸寒收斂甘溫白芍藥酸棗仁人參茯苓石斛橘皮薯蕷五味子木瓜蓮實車前子芡實産後惡心欲嘔或吐由於胃虚忌升提發散濕潤滯膩苦寒生冷燥熱諸藥俱見前宜降氣補氣安胃酸寒佐以辛溫蘇子枇杷葉竹茹人參橘紅麥門冬白芍藥藿香石斛木瓜白豆蔲生薑由於寒倍生薑白豆蔲藿香由於熱倍竹茹去生薑白豆蔲藿香下乳汁漏蘆狗四足猪四足麥門冬人參栝樓仁土瓜根葵子猪胰木通小兒門痘瘡血熱證忌溫補燥熱天靈蓋雞冠血桑蠧鯪鯉甲人齒官桂附子丁香木香冰片以上燥熱餘忌藥俱見前宜涼血活血解毒甘寒苦寒犀角生地黄人中黄紫草黄連麥門冬牡丹皮白芍藥童溺連翹金銀花𤣥參貝母蟬蛻鼠黏子虚寒證忌汗吐下苦寒酸寒諸藥俱見前宜辛甘發散補氣溫瘡密者佐以解毒人參紅鉛黄耆甘草桂枝丁香當歸胃弱大便不閉者禁用蓮肉糯米大棗龍眼肉乾葛木香忍冬藤痧疹此證多有嘔吐者勿治嘔吐但治痧毒則嘔自止况嘔中便有發散之義忌破氣溫補酸斂燥熱辛溫滯膩諸藥俱見前宜清熱透肌辛寒甘寒苦寒石膏鼠黏子赤檉木即西河柳知母甘草𤣥參麥門冬連翹薄荷竹葉黄連黄芩葛根黄檗蟬蛻栝樓根青黛蔗漿貝母如冬月佐之以辛散荆芥麻黄去節沫蜜酒炒只可用一劑痧疹者手太隂肺足陽明胃二經之火熱發而為病者也小兒居多大人亦時有之殆時氣瘟疫之類歟其證類多欬嗽多啑眼中如淚多泄瀉多痰多熱多渴多煩悶甚則躁亂咽痛唇焦神昏是其候也治法當以清涼發散為主藥用辛寒甘寒苦寒以升發之惟忌酸收最宜辛散誤施溫補禍不旋踵辛散如荆芥西河栁乾葛石膏鼠黏子麻黄清涼如𤣥參竹葉栝樓根青黛薄荷甘寒如麥門冬生甘草蔗漿苦寒如黄芩黄連黄檗貝母連翹隨證輕重制劑大小中病則已毋太過焉痧疹乃肺胃邪熱所致初發時必欬嗽宜清熱透毒不得止嗽疹後欬嗽但用貝母苦梗甘草薄荷栝樓根𤣥參麥門冬以清餘熱消痰壅則自愈慎勿用五味子等收斂之劑多喘喘者邪熱壅於肺故也慎勿用定喘藥惟應大劑竹葉石膏湯如西河栁兩許𤣥參薄荷各二錢如冬天寒甚痧毒鬱於内不得透出者加蜜酒炒麻黄一劑立止凡熱勢盛者即用白虎湯加西河栁忌用升麻服之必喘多泄瀉慎勿止瀉惟用黄連乾葛升麻甘草則瀉自止疹家不忌瀉瀉則陽明之邪熱得解是亦表裏分消之義也疹後泄瀉及便膿血皆由熱邪内陷故也大忌止澀惟宜升散仍用升麻甘草乾葛黄連白芍藥白藊豆便膿血則加滑石末必自愈疹後牙疳最危外用牡黄牛糞尖煅存性研極細加真片腦一分研勻吹之内用連翹乾葛荆芥穗升麻𤣥參黄連甘草生地黄水煎加生犀角汁二三十匙調服緩則不可救藥痧後元氣不復脾胃薄弱者宜用白芍藥炙甘草為君蓮肉山藥白藊豆麥門冬青黛龍眼肉為臣多服必漸强慎勿輕用參术痧後生瘡不已餘熱未盡故也宜用金銀花荆芥穗連翹𤣥參甘草懷生地鼈虱胡麻黄連木通濃煎飲之良痧疹不宜依證施治惟當治本本者手太隂足陽明二經之邪熱也解其邪熱則諸證自退矣嘔吐因傷乳食者忌升苦寒諸藥俱見前宜溫中消導橘皮縮砂蜜枳實厚朴穀麥糵草果山查紅麴半夏人參因寒者忌破氣升苦寒諸藥俱見前宜辛熱溫中藿香橘皮丁香人參白术生薑半夏白豆蔲因暑者忌升破氣溫熱諸藥俱見前宜清暑補氣安胃兼利小便黄連香薷人參木瓜茯苓竹茹石斛橘皮甘草白藊豆麥門冬白梅滑石木通澤瀉有蟲者忌升甘諸藥俱見前宜酸斂佐以苦寒白芍藥五味子木瓜黄連楝根烏梅㯽榔榧子肉木香使君子總之數嘔吐宜安胃久則宜補氣泄瀉總忌破氣下滑利滯膩諸藥俱見前因食者宜和胃消食橘皮草果紅麴穀麥糵白豆蔲白术山查白茯苓肉豆蔲縮砂蜜因濕者宜燥脾利水二术橘皮木瓜茯苓澤瀉車前子石斛黄連薯蕷猪苓升麻葛根因暑者前藥中加人參蓮肉白藊豆總之當補脾胃兼升兼利小便急驚忌補斂升燥熱諸藥俱見前宜降清熱鎮墜豁痰和肝丹砂琥珀牛黄天竺黄貝母竹瀝釣藤鈎殭蠶茯神犀角金箔膽星真珠全蝎龍腦麝香白檀香慢驚多因久吐瀉大病後隂陽兩虚而成忌破氣下升苦寒及治急驚藥諸藥俱見前宜補脾健胃和肝益氣甘溫酸平佐以辛熱人參黄耆茯苓白芍藥甘草龍眼肉酸棗仁石菖蒲遠志麥門冬茯神冬瓜仁橘紅疳積忌破氣酸斂燥熱諸藥俱見前宜除疳熱兼消導苦寒甘寒佐以辛寒辛溫胡黄連川黄連肉豆蔲穀麥糵神麴山查木香橘皮白蕪荑使君子蘆會白术白芙蓉花五穀蟲雷丸青黛厚朴諸蟲忌升甘諸藥俱見前宜殺蟲酸寒苦寒佐以辛寒㯽榔雷丸使君子苦楝根錫灰鶴虱盧會芍藥烏梅黄連黄芩牽牛胎毒忌補斂燥熱辛溫諸藥俱見前宜涼血清熱解毒兼發散於外勿從外治以致熱毒内攻生地黄𤣥參牡丹皮黄檗黄連忍冬藤甘草連翹麥門冬貝母犀角荆芥鼠黏子牛黄外科癘風忌破氣酸斂燥熱下諸藥俱見前宜涼血殺蟲祛風苦寒佐以辛寒辛平狶薟天門冬甘菊花生地黄青黛漆葉苦參何首烏鼈虱胡麻仁白芷荆芥天麻續斷羌獨活半枝蓮白花蛇烏梢蛇皂角刺癰疽先後發渴忌升破氣辛溫燥熱吐下諸藥俱見前宜活血涼血解毒散結生地黄連翹忍冬藤白芷白芨白斂茜草紫花地丁夏枯草甘菊花地榆貝母鼠黏子黄檗栝樓根乳香没藥芍藥生菉豆半枝蓮白藥子紅藥子黄蠟明礬已潰者加人參黄耆麥門冬五味子腫瘍忌宜俱同癰疽先後發渴更忌當歸癰疽毒氣攻心發譫語宜以生菉豆粉丹砂乳香為丸服之潰瘍忌閉氣苦寒破氣又忌燥諸藥俱見前宜補氣血甘酸溫佐以解毒人參紅鉛胎骨黄耆當歸地黄芍藥甘草白芨白斂忍冬藤甘菊花貝母薯蕷大棗五味子麥門冬散毒外傅雄黄雌黄粉錫礬石龍腦香松脂地榆水銀粉鐵鏽白芨白斂漏蘆檗木青葙子楝實䕡茹石灰鐵漿苦參菖蒲槲皮葵根栁華五加皮梓葉苧根紫草馬鞭草艾灸止痛排膿外傅白芨白斂大黄乳香没藥丹砂紅藥子龍腦金華白藥子麥飯石米醋蜜去瘀肉外傅巴豆膏輕粉粉霜烏梅肉灰蝕膿外傅蛀竹屑䕡茹雄黄白芷大黄巴豆地榆枯礬長肉收口外傅仙人杖燒油人參金華白蠟黄蠟血竭蛀竹屑枯礬末黄芩末珠末象牙末鉛丹紅粉霜胡粉芝麻油猪蹄湯疔瘡忌補斂溫熱諸藥俱見前宜涼血活血解毒祛風汗下生甘草辟虺雷茜草生地黄貝母紫花地丁白藥子大黄金銀花蒼耳草連翹夏枯草鼠黏子礬石以上内半枝蓮牛黄蟾酥紅藥子白芨白斂以上内外龍腦鐵鏽桑磠銅青雄黄以上外瘰癧馬刀瘡附同屬少陽膽經治法亦同忌補氣辛熱酸斂諸藥俱見前宜清熱散結和肝涼膽苦寒甘寒鹹寒佐以辛寒連翹𤣥參忍冬藤紫背天葵乳香麝香夏枯草鼠黏子貝母天明精没藥薄荷肥皂莢皂角子何首烏柴胡黄芩甘草昆布牡蠣鼈甲栝樓根惡實漏蘆守宫煅猫頭天荷葉映山紅海藻海蛤蘇合油雄黄礬石斑猫蟾酥鼈虱胡麻囘燕窩泥癭瘤忌宜俱同瘰癧兼宜薜荔半夏文蛤南星通草生薑痔有内外二證忌破氣降燥熱辛溫諸藥俱見前宜涼血活血除大腸熱兼升去血過多者宜補血甘寒苦寒酸寒佐以辛寒生地黄五倍子黄連黄芩白芍藥地榆蝟皮大小薊黄檗側柏葉槐實皂莢灰熊膽升麻鼈甲紅藍花龍腦香茜草黄耆赤石脂猪懸蹄蛇蛻榧實白礬金銀花青黛象牙末蛀竹屑牛角䚡白蠟通腸漏忌破氣下發散溫燥辛熱諸藥俱見前宜涼血清利濕熱解毒消漏管補氣血長肉槐實黄連黄芩青黛地榆白芨忍冬藤半枝蓮生地黄以上涼血解毒猪懸蹄黄牛角䚡刺蝟皮蛀竹屑明礬金頭蜈蚣以上消漏管黄耆熟地黄當歸人參白芍藥五味子牛膝山藥枯礬黄蠟白蠟麻皮灰鉛華月經布没食子以上補氣血長肉天明精地骨皮俱要鮮者皮硝文蛤以上煎濃湯熏洗乳巖乳癰内外吹忌補氣升溫補辛熱燥酸斂諸藥俱見前宜散結氣和肝涼血活血清熱解毒貝母橘葉連翹栝樓根山慈菇山豆根蒲公英紫花地丁黄連甘草柴胡白芷青皮橘皮牡鼠糞王不留行乳香没藥漏蘆夏枯草忍冬藤栝樓仁頭垢人爪鯪鯉甲半枝蓮茜根隂蝕即下部􅉶瘡忌同乳巖宜涼血活血除熱散毒苦寒辛寒青黛茜草苦參鮮地骨皮黄檗小薊艾葉馬鞭草木瓜牛膝木通全蝎外蛇床子外橄欖核外蛀竹屑外猪脊髓外青葙子外膩粉外官粉外杏仁外珠末外皂角末外鉛丹外象牙末外龍腦香外白殭蠶外粉霜外煙膏外天靈蓋外滴乳石外白蠟外金瘡忌破氣閉氣升散酸斂苦寒冷利燥酸寒諸藥俱見前宜止血和血涼血甘溫甘寒佐以辛溫地黄􅟟蟲當歸續斷牛膝甘草麥門冬地榆半夏茜草白膠杜仲芎藭乳香没藥艾葉水楊花釣樟根黄荆子炒黑王不留行古錢自然銅狗頭骨黄麻皮灰蘆竹籜韭大小薊内外劉寄奴内外花蕋石内外騏驎竭内外古石灰外白蠟外降香外海螵蛸外桑柴灰外人骨灰外紫檀末外三七外破傷風忌同金瘡宜同金瘡佐以祛風藥如白芷荆芥防風柴胡之屬跌撲傷損忌同金瘡宜同金瘡有瘀血停滯者宜加行血藥如桃仁紅花蘇木自然銅􅟟蟲千年灰古文錢之屬踒折挫閃忌宜俱同金瘡跌撲火灼忌燥熱及寒物塗罨井泥冰涼水芭蕉根醋以上寒物塗罨餘忌藥俱見前宜拔散火毒辛散潤甘寒辛寒苦寒柴胡葛根甘草升麻黄連麥門冬連翹栝樓根石膏黄檗雞子油柏白皮生胡麻食鹽豆醬黄芩地榆山梔外用好酒滿浸傷處溫即易之如遍體被傷用酒滿浸時時易之即不死一方用蜜水潤之一方石灰水和生芝麻油敷治已爛臭甚者神驗一方用黏米炒黑為末將菜汁調敷神效漆瘡宜蟹茱萸皮雞子白杉材石蟹漆姑草韭菜炒熱罨上井中苔萍神農本草經疏卷二
