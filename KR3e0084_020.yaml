body:
  text: 神農本草經疏卷二十明繆希雍撰蟲魚部上品總五十種今疏其要者十三種石蜜蜜蠟牡蠣龜甲珍珠瑇瑁桑螵蛸石決明文蛤蠡魚鯽魚鱓鯉魚膽肉鱗附石蜜味甘平無毒微温主心腹邪氣諸驚癎痓安五藏諸不足益氣補中止痛解毒除衆病和百藥養脾氣除心煩食飲不下止腸澼肌中疼痛口瘡明耳目乆服强志輕身不饑不老延年神仙庢作痙疏石蜜蜂採百花釀成故本經味甘氣平别錄㣲温無毒得草木羣英之精華合露氣以釀成故其氣清和其味純甘施之精神氣血虚實寒熱隂陽内外諸病罔不相宜經曰裏不足者以甘補之甘為土化土為萬物之母石蜜具天地間至甘之味故能安五藏諸不足及益氣補中除衆病也心經有熱則為諸驚癎痙得甘緩之氣則心火降煩熱除諸驚癎痙平矣諸痛癢瘡瘍皆屬心火故又能止肌中疼痛及口瘡也甘主解毒故能和百藥甘主入脾故能養脾氣脾氣得所養而飲食自下腸澼止矣五臟足氣血充則耳目聰明不饑不老輕身强志延年神仙所自來矣主治㕘互同蘆根汁梨汁人乳牛羊乳童便治噎膈大便燥結用此潤之有痰加竹瀝煉熟和諸丸藥及膏子主潤五藏益血脈調脾胃通三焦塗火灼瘡能緩痛仲景方蜜導煎治陽明病自汗小便反利大便鞭者用蜜二合銅器中㣲火熬之候凝如飴狀至可丸乘熱捻作挺令頭鋭大如指長寸半許候冷納穀道中少頃即通也一法加皂角細末二分攪匀尤速産書産後口渴用熟蜜不計多少熟水調服即止全幼心鑑痘疹作癢難忍􅎲成瘡及痂欲落不落百花膏主之用上等石蜜不拘多少湯和時時以翎刷之効肘後方天行膚瘡頭面及身須臾周匝狀如火瘡皆戴白漿隨決隨生不即療數日必死差後瘡瘢黯色一嵗方㓕此惡毒之氣深入也用蜜入升麻煎過數數拭之簡誤石蜜雖稱補五藏益脾胃然而生者性寒滑能作泄大腸氣虚脘榖不化者不宜用嘔家酒家不宜用中滿蠱脹不宜用溼熱脚氣不宜用生者有小毒尤不宜食青赤酸者食之令人心煩不可與生葱同食害人若與萵苣同食令人利下食蜜飽後不可食鮓令人暴亡蜜蠟味甘㣲温無毒主下痢膿血補中續絶傷金瘡益氣不饑耐老白蠟療乆洩澼後重見白膿補絶傷利小兒乆服輕身不饑疏蠟石蜜之凝結於底者也蜜性緩質柔故主潤臟腑經絡蠟性濇質堅故能療乆痢洩澼後重下膿血也甘能益血補中温能通行經脈故主續絶傷及金瘡也中得補則氣自益故乆服能不饑輕身耐老也男子女人大小内外皆可施而别録獨云利小兒者非也主治㕘互得象牙末等能去漏管長肉見象牙條下得膩粉珍珠末黄檗末龍腦香鉛丹蛀竹屑葱白猪脊髓治隂蝕惡瘡同孩兒茶鉛丹胡粉水龍骨粉霜龍骨黄檗猪膽汁炙猪脂作膏治内外臁瘡乆不愈金匱方調氣飲治赤白痢少腹痛不可忍後重或面青手足俱變者用黄蠟三錢阿膠三錢同溶化入黄連末五錢攪匀分三次熱服神効千金方膠蠟湯治熱痢及婦人産後下痢用蠟二碁子大阿膠二錢當歸二錢半黄連三錢黄檗一錢陳廩米半升水三升煮至一升去米入藥煎至一鍾温服神効簡誤火熱暴痢不宜用牡蠣味鹹平微寒無毒主傷寒寒熱温瘧洒洒驚恚怒氣除拘緩䑕瘻女子帶下赤白除留熱在闗節榮衛虚熱去來不定煩滿止汗心痛氣結止渴除老血濇大小腸止大小便療洩精喉痺咳嗽心脇下痞熱乆服强骨節殺邪鬼延年貝母為之使得甘草牛膝逺志蛇牀子良惡麻黄細辛呉茱茰疏牡蠣得海氣結成故其味鹹平氣㣲寒無毒氣薄味厚隂也降也入足少隂厥隂少陽經其主傷寒寒熱温瘧洒洒驚恚怒氣留熱在闗節去來不定煩滿氣結心痛心脇下痞熱等證皆肝膽二經為病二經冬受寒邪則為傷寒寒熱夏傷於暑則為温瘧洒洒邪伏不出則熱在闗節去來不定二經邪鬱不散則心脇下痞熱邪熱甚則驚恚怒氣煩滿氣結心痛此藥味鹹氣寒入二經而除寒熱邪氣則榮衛通拘緩和而諸證無不瘳矣少隂有熱則女子為帶下赤白男子為洩精解少隂之熱而能斂濇精氣故主之也鹹屬水屬隂而潤下善除一切火熱為病故又能止汗止渴及䑕瘻喉痺咳嗽也老血者宿血也鹹走血而軟堅所以主之其性收斂故能濇大小腸止大小便利也腎主骨入腎益精則骨節自强邪本因虚而入肝腎足則鬼邪自去人以腎為根本根本固則年自延矣更能止心脾氣痛消疝瘕積塊癭瘤結核脇下堅滿等證皆寒能除熱鹹能軟堅之功也主治㕘互同生地黄黄耆龍眼五味子酸棗仁麥門冬白芍藥伏神黄蘖當歸治心腎虚盜汗同黄蘖五味子地黄山茱茰枸杞子車前子沙苑蒺藜蓮鬚杜仲治夢遺泄精加牛膝則兼治赤白濁同地黄黄蘖阿膠木耳炒黑香附白芍藥地榆麥門冬續斷青蒿鼈甲蒲黄止婦人崩中下血及赤白帶下仲景方同龍骨入柴胡桂枝各湯内取其收斂浮越之陽氣固脱而鎮驚更能除胸脇中痞硬藏器方同麻黄根蛇牀子為粉去隂汗本事方虚勞盜汗牡蠣粉麻黄根黄耆等分為末每服二錢水煎服仲景金匱玉函方傷寒傳成百合病如寒無寒如熱無熱欲卧不卧欲行不行欲食不食口苦小便赤色得藥則吐變成渴疾乆不瘥者用牡蠣煅二兩栝樓根二兩為細末每服方寸匕用米飲調下日三服古今錄驗方水病囊腫牡蠣粉二兩乾姜炮一兩研細冷水調稠掃上須臾囊熱如火乾則再上小便利即愈一方用葱汁白麵同調小兒不用乾姜經驗方男女瘰癧用牡蠣粉四兩𤣥參末三兩甘草一兩麵糊丸梧子大每三十丸酒下日三服服盡除根不拘已破未破皆効普濟方月水不止牡蠣煅研細米醋搜成團再煅研末以米醋調艾葉末熬膏丸梧子大每用醋湯下四五十丸簡誤凡病虚而多熱者宜用虚而有寒者忌之腎虚無火精寒自出者非宜龜甲味鹹甘平有毒主漏下赤白破癥瘕痎瘧五痔隂蝕溼痺四肢重弱小兒顖不合頭瘡難燥女子隂瘡驚恚氣心腹痛不可乆立骨中寒熱傷寒勞復或肌體寒熱欲死以作湯良乆服輕身不饑益氣資智亦使人能食勿令中溼中溼即有毒疏介蟲三百六十而龜為之長稟金水之氣故味鹹而甘氣平其性神靈能變化凡入藥勿令中溼中溼則遂其變化之性而成癥瘕於腹中故言有毒也氣味俱隂入足少隂經方家多入補心藥用以心藏神而龜性有神借其氣以相通且得水火既濟之義實非補心之正藥也其主骨中寒熱及傷寒勞復肌體寒熱欲死痎瘧者皆隂虚而邪熱為病經曰傷於溼者下先受之溼痺四肢重弱亦腎隂虚而邪氣易犯腎主骨腎虚則小兒顖門不合腎為五臟隂中之隂隂虚則火熱偏至而為驚恚氣心腹痛此藥補腎家之真隂則火氣自降而寒熱邪氣俱除矣益隂除熱軟堅故主漏下赤白癥瘕五痔隂蝕隂瘡及小兒頭瘡也經曰邪熱不殺穀熱去故令人能食能食則脾胃得所養而能思思作睿故資智乆服益氣輕身不饑者除熱益隂之功也主治㕘互丹溪方補隂丸用龜下甲酒炙熟地黄蒸曬各六兩黄蘖知母各四兩為末以猪脊髓和丸梧子大每百丸空心温酒下摘𤣥方治産三五日不下垂死及短小女子交骨不開者用乾龜殻一箇酥炙頭髮一握燒灰川芎當歸各一兩為末和匀每服七錢水煎服如人行五里許再一服生胎死胎俱下簡誤按龜鼈二甲本經所主大畧相似今人有喜用鼈甲惡用龜甲者有喜用龜甲惡用鼈甲者皆一偏之見也二者咸至隂之物鼈甲走肝益腎以除熱龜甲通心入腎以滋隂第鼈甲無毒可多用龜甲非千年自死者則有毒故方書所用曰敗龜板者取其長年則得隂氣多故有益隂之功用耳若今新剖之甲斷乎有毒不宜頻使用者不可不詳辨也妊婦不宜用病人虚而無熱者不宜用凡入藥須研極細不爾留滯腸胃能變癥瘕也珍珠寒無毒主手足皮膚逆臚鎮心綿裹塞耳主聾傅面令人潤澤好顔色粉㸃目中主膚瞖障膜疏珠稟太隂之精氣而結故中秋無月則蚌無胎其體光明其性堅硬大小無定要以新完未經鎖綴者為上味甘㣲鹹氣寒無毒入手少隂足厥隂經心虚有熱則神氣浮越肝虚有熱則目生膚瞖障膜除二經之熱故能鎮心去目中障瞖也耳聾本屬腎虚有熱所以主之逆臚者臚脹也胸腹脹滿氣逆以及於手足皮膚皆腫也經云諸溼腫滿屬脾土又云諸腹脹大皆屬於熱此因脾虚有熱兼有積滯所致珍珠味甘亦能益脾氣寒能除熱體堅能磨積消滯故主手足皮膚逆臚也古人未發斯義所以方書叙論不詳亦為闕畧也珠藏於澤則川自媚况塗面寧不令人潤澤好顔色乎凡小兒驚熱風癎為必須之藥主治㕘互同丹砂牛黄犀角天竺黄茯神遠志鈎藤鈎琥珀金箔治小兒驚癎風熱大人失志癲狂等證同爐甘石龍腦香白硼砂空青人爪㸃目能去瞖障同鍾乳石象牙末牛黄氷片白殭蠶紅鉛天靈葢蛀竹屑樺皮灰没藥明礬治廣瘡結毒及隂蝕瘡有奇効同人中白黄檗青黛硼砂和氷片少許治口疳加入雞内金膩粉治下疳格古論灰塵迷目用大珠挹之則消千金方婦人難産或胞衣不下珍珠末一兩酒服立出聖惠方肝虚目暗珍珠末一兩白蜜二合鯉魚膽二枚和合銅器煎至減半新綿濾過瓶盛頻㸃取瘥痘瘡發疔毒方見穀部豌豆下簡誤珍珠體最堅硬研如飛麵方堪服食不細能傷人臟腑病不由火熱者勿用瑇瑁寒無毒主解嶺南百藥毒一名玳瑁疏瑇瑁龜類也得水中至隂之氣故氣寒無毒而解一切熱毒其性最靈凡遇飲食有毒則必自搖動然須用生者乃靈死者則不能矣嶺南人善以諸毒藥造成蠱人中之則昏憒悶亂九竅流血而死惟用活瑇瑁刺其血飲或生者磨濃汁服之可解日華子主破癥結消癰腫止驚癎陳士良主心風解煩熱行氣血利大小腸以其性稟純隂氣味至寒故治如是等病也又能解痘毒神効主治㕘互楊氏産乳方解一切蠱毒生玳瑁磨濃汁服一盞即消靈苑方預解痘毒遇時行痘疹服此未發内消已發稀少用生玳瑁生犀角各磨濃汁一合和匀温服半合日三最良聞人規痘疹論痘疹黑陷乃心熱血凝也法同上加入猪心血少許紫草汁五匙和匀温服鴻飛集迎風目淚乃肝腎虚熱也用生玳瑁羚羊角各一兩石燕一雙為末每一錢薄荷湯下日三服簡誤痘瘡虚寒不起發者不宜服桑螵蛸味鹹甘平無毒主傷中疝瘕隂痿益精生子女子血閉腰痛通五淋利小便水道又療男子虚損五臟氣㣲夢寐失精遺溺乆服益氣養神二月三月採蒸之當火炙不爾令人洩疏桑螵蛸桑樹上螳蜋子也禀秋金之隂氣兼得桑木之津液本經味鹹氣平别錄甘無毒氣薄味厚隂也入足少隂太陽經人以腎為根本男子腎經虚損則五臟氣㣲或隂痿夢寐失精遺溺鹹味屬水内合於腎腎得之而隂氣生長故能愈諸疾及益精生子也腎與膀胱為表裏腎得所養則膀胱自固氣化則能出故利水道通五淋也女子屬隂肝腎用事疝瘕血閉腰痛皆二經為病鹹能益隂入血軟堅是以主之甘能補中故主傷中益氣腎足則水自上升克與心交故能養神也主治㕘互外臺祕要虚勞盜汗遺精白濁桑螵蛸炙白龍骨等分為細末每服二錢空心鹽湯下寇宗奭方桑螵蛸散治男子房勞小便日數十次如稠米泔心神恍惚痩瘁食減其藥安神魂定心志治健忘補心氣止小便數用桑螵蛸逺志龍骨菖蒲人參茯神當歸龜甲各如法製各一兩為末卧時人參湯調下二錢千金翼婦人遺尿桑螵蛸酒炒為末白湯服二錢兼治胎前産後遺尿不禁簡誤桑螵蛸氣味雖鹹平走腎利水道然得秋時收斂之氣凡失精遺溺火氣太盛者宜少少用之石決明味鹹平無毒主目障瞖痛青盲乆服益精輕身凡用以麵裹煨熟磨去粗皮搗細如飛麵方堪入藥一名千里光得龍骨療洩精畏旋覆花疏石決明得水中之隂氣以生故其味鹹氣應寒無毒乃足厥隂經藥也足厥隂開竅於目目得血而能視血虚有熱則青盲赤痛障瞖生焉鹹寒入血除熱所以能主諸目疾也鹹寒又能入腎補隂故乆服益精輕身也研細水飛主㸃外障翳主治參互得甘菊花生地黄木賊草穀精草羚羊角人爪蟬蜕空青蜜蒙花決明子夜明沙治青盲障瞖明目集驗方羞明怕日用千里光甘菊花甘草各二錢水煎冷服鴻飛集痘後目瞖用石決明火煅研榖精草各等分為細末以猪肝蘸食目疾外他用甚稀故無簡誤文蛤味鹹平無毒主惡瘡蝕五痔欬逆胸痺腰痛脇急䑕瘻大孔出血崩中漏下疏文蛤即花蛤大小背上有斑文得隂水之氣故其味鹹氣平無毒經曰硬則氣堅鹹以軟之文蛤之鹹能消散上下結氣故主欬逆胸痺腰痛脇急也惡瘡蝕五痔䑕瘻大孔出血崩中漏下皆血熱為病鹹平入血除熱故主之也更能止煩渴化痰利小便主治㕘互仲景方傷寒在陽當以汗解反以冷水噀之或灌之其熱被却不得去更益煩熱皮上粟起欲飲水反不渴者文蛤散主之文蛤五兩為末每服方寸匕沸湯下甚効千金翼疳蝕口鼻數日欲盡文蛤燒灰以臘猪脂和塗之簡誤病屬邪熱痰結者宜之氣虚有寒者不得用蠡魚味甘寒無毒主溼痺面目浮腫下大水療五痔有瘡者不可食令人瘢白疏蠡魚禀北方𤣥水之精得中央隂土之氣故其色黑味甘氣寒無毒乃益脾除水之要藥也土虚則水泛濫土堅則水自清凡治浮腫之藥或専於利水或専於補脾其性各自為用惟蠡魚色黑象水能從其類以導横流之勢味甘上化能補其不足以遂敦阜之性補㵼兼施故主下大小及溼痺面目浮腫有神効也五痔因溼熱所生水去則溼氣自除今世俗小兒痘後咸食之然而早食多食能令皮膚瘢痕皆黑本草獨云有瘡者食之令人瘢白非也孟詵主下大小便壅塞氣作鱠與脚氣風氣人食良蘇頌主妊娠有水氣竝取其除溼下水益脾之功也主治㕘互同白术茯苓橘皮姜皮煑食下水腫大効與蒜作鱠食能去溼下水食醫心鏡治十種水氣垂死蠡魚一斤重者煑汁和冬𤓰葱白作羮食靈苑方喉痺將死者以蠡魚膽㸃入少許即差病深者水調灌之諸魚膽皆苦惟此膽甘可食為異耳簡誤蠡魚其功専於去溼下水他闕無所長且多食能發痼疾不可不知也鯽魚合蓴作羮主胃弱不下食作鱠主乆赤白痢燒灰塗諸瘡或取猪脂煎用又主腸癰疏鯽魚稟土氣以生故其味甘其氣温無毒是以能入胃治胃弱不下食入大腸治赤白乆痢腸癰脾胃主肌肉甘温能益脾主肌故主諸瘡乆不瘥也藏器主虚羸大明主温中下氣孟詵云調中益五臟表其益脾和胃之功也主治㕘互百一選方腸風下血用活鯽魚一大尾去腸留鱗入五倍子末填滿泥固煅存性為末酒服一錢一方入白礬末二錢外以㯶包更以紙裹煨存性研末每二錢米飲下經驗方膈氣吐食用大鯽魚去腸留鱗切大蒜片填滿腹紙包十重泥固曬半乾炭火煨熟單取肉用和平胃散一兩杵丸梧子大密藏每服三十丸米飲下簡誤鯽魚調胃實腸與病無礙諸魚之中惟此可常食但不宜與沙糖同食生疳蟲同芥菜食成腫疾同猪肝雞肉雉肉鹿肉食生癰疽同麥門冬食害人鱓味甘大温無毒主補中益血療瀋唇疏鱓魚得土中之陽氣以生故其味甘氣大温甘温俱足所以能補中益血甘溫能通經脈療風邪故又主瀋唇及今人用之以治口眼喎斜也主治㕘互與黄耆同食能益氣力治火丹赤腫生鱓血塗之効簡誤性熱而補凡病屬虚熱者不宜食時行病後食之多復過食動風氣兼令人霍亂鯉魚膽味苦寒無毒主目熱赤痛青盲明目乆服强悍益志氣疏凡膽皆苦寒走厥隂故鯉魚膽亦主明目及目熱赤痛青盲也肝為將軍之官腎為作强之官二經有熱則虚怯志氣衰苦寒除二經之熱故乆服强悍益志氣也鯉魚肉味甘主欬逆上氣黄疸止渴生者主水腫脚滿下氣疏鯉魚稟隂極之氣故其鱗三十六隂極則陽復故素問言魚熱中其氣味雖甘平然多食能令人發風熱也甘可以緩故主欬逆上氣止渴隂中有陽能從其類以導之故能利小便使黄疸水腫脚氣俱消也河間云鯉之治水因其氣以相感者是矣主治㕘互外臺祕要治水腫用大鯉一尾赤小豆一升水二斗煑可二升餘濾去滓頓服盡當下利利盡即瘥并治妊娠水腫有神効鱗主産婦腹痛燒灰酒服亦治血氣雜諸藥用之疏魚鱗得水中之陽氣而鯉魚鱗則又稟隂極生陽之數性能入血散滯入血者隂之用也散滯者陽之用也故主婦人産後腹痛及血氣不和等證主治㕘互和劑局方烏金散治産後血迷血暈敗血不止淋瀝不斷臍腹疼痛及崩中下血過多不止鯉魚鱗燒血竭百草霜亂髮灰松墨煅酢淬延胡索當歸赤芍藥等分為末每二錢温酒下外臺祕要古今錄療魚鯁骨横喉中六七日不出取鯉魚鱗皮燒作屑以水服之即出未出再服簡誤六隂已極陽氣初生故能發熱動風風熱病者不宜食天行病後下痢及有宿癥者俱不可食不宜合犬肉葵菜食服天門冬硃砂人不可食凡炙鯉魚不可使烟入目損目光三日内必驗也前和劑局方烏金散方内有肉桂當歸延胡索赤芍藥皆行血之藥而其所主病内開載崩中下血闕不止用之則大誤矣慎之慎之神農本草經疏卷二十
