body:
  text: 神農本草經疏卷七明繆希雍撰草部上品之下總五十三種今疏其要者二十五種藍實芎藭黃連絡石木蓮附蒺藜黃耆肉蓯蓉防風蒲黃續斷漏蘆營實天名精決明子丹參茜根五味子蘭草忍冬蛇牀子景天茵蔯蒿沙參王不留行長松藍實味苦寒無毒主解諸毒殺蠱蚑疰鬼螯毒久服頭不白輕身其葉汁殺百藥毒解狼毒射罔毒疏藍實稟天地至隂之精故其味苦寒而無毒其用主解諸毒殺蠱蚑疰鬼螫毒久服頭不白頭白者血熱也藍能涼血而解熱故令髮不白也熱去而血得所養故身輕其葉汁解百藥毒解狼毒射罔毒藥性論云藍實味甘能填骨髓益心力汁止心煩躁由此觀之苦寒而兼甘可知矣日華子又云治天行熱狂疔瘡遊風熱毒腫毒風疹除煩止渴殺疳解毒藥毒箭金瘡血悶排膿小兒熱疳小兒丹熱最為要藥其功用之廣具如本草所載蓼藍最堪入藥甘藍人食去熱黃主治參互藍汁入麝香雄黃治蜘蛛咬有神乾藍為末同犬肉空腹食之主長肉內塞簡誤虛寒人及久泄畏寒腹中覺冷者勿服芎藭味辛溫無毒主中風入腦頭痛寒痺筋攣緩急金瘡婦人血閉無子除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒動宜作痛疏芎藭稟天之溫氣地之辛味辛甘發散為陽是則氣味俱陽而無毒陽主上升辛溫主散入足厥隂經血中氣藥扁鵲言酸以其入肝也故主中風入腦頭痛寒痺筋攣緩急金瘡婦人血閉無子别録除腦中冷動面上遊風去來目淚出多涕唾忽忽如醉諸寒冷氣心腹堅痛中惡卒急腫痛脅風痛溫中內寒已上諸病皆病在血分正以其性走竄而絶無隂凝黏滯之性故入血藥上行而不可多用耳主治參互同地黃當歸芍藥為四物湯通主入血分補益同荆芥白芷當歸地黃芍藥术甘草治破傷風冬月加桂枝同當歸地黃乾漆延胡索五靈脂芍藥牡蠣粉京三稜治血瘕同白芷茜根黃耆金銀花生地黃能排膿消瘀血同甘菊花當歸地黃天門冬白芍藥炙甘草専主血虛頭痛火盛者加童便服同當歸尾桂心牛膝治子死腹中同續斷懷熟地白膠杜仲山茱萸五味子人參黃耆酸棗仁治血崩久不止簡誤芎藭性陽味辛凡病人上盛下虛虛火炎上嘔吐咳嗽自汗易汗盜汗咽乾口燥發熱作渴煩躁法並忌之黃連味苦寒微寒無毒主熱氣目痛眥傷淚出明目腸澼腹痛下痢婦人隂中腫痛五藏冷熱久下泄澼膿血止消渴大驚除水利骨調胃厚腸益膽療口瘡久服令人不忘疏黃連稟天地清寒之氣以生故氣味苦寒而無毒味厚於氣味苦而厚隂也宜其下泄欲使上行須加引導入手少隂陽明足少陽厥隂足陽明太隂為病酒之仙藥滯下之神草六經所至各有殊功其主熱氣目痛眦傷淚出明目大驚益膽者涼心清肝膽也腸澼腹痛下痢别録兼主泄澼泄者瀉利也澼者大腸下血也俗呼為臟毒除水利骨厚腸胃療口瘡者滌除腸胃脾三家之溼熱也久服令人不忘者心家無火則清清則明故不忘禪家習定多飲苦茗亦此義爾主治參互同赤柳木葉入三黃石膏湯治痧疹已透而煩燥不止有神入當歸六黃湯加棗仁龍眼治盜汗有神同地黃甘菊荆芥穗甘草稍芎藭柴胡蟬蛻木通治風熱上攻目赤痛黃連末一兩同雄羊肝一具生搗勻衆手丸如梧子每服以滚漿水吞草一丸諸眼目疾及障翳青盲皆主之禁食猪肉雖油汁亦勿入口作六劑必效矣同當歸甘菊花人乳浸蒸入明礬銅緑各少許洗目甚效同芍藥蓮子藊豆升麻甘草滑石紅麴治一切滯下膿血同槐花枳殼乳香沒藥治滯下純血腹痛煮服神效同五穀蟲蘆薈白蕪荑青黛白槿花白芙蓉花治小兒一切疳熱如神同赤小豆為細末傅痔瘡妙同乾葛甘草升麻芍藥治痧疹後泄瀉同五味子麥門冬乾葛治酒病酒傷如神同五味子甘草煮濃汁漱口治口糜口瘡良同麥門冬五味子治卒消渴小便多良同人參蓮子治虛人患滯下及老人産婦滯下不止簡誤黃連味大苦氣大寒羣草中清肅之物其虛上經譬猶臯陶之在虞廷明刑執法以禁民邪是其職也稷契䕫龍之事則非其任矣故袪邪散熱蕩滌腸胃肅清神明是其性之所長而於補益精血溫養元氣則其功泊如也凡病人血少氣虛脾胃薄弱血不足以致驚悸不眠而兼煩熱躁渴及産後不眠血虛發熱泄瀉腹痛小兒痘瘡陽虛作泄行漿後泄瀉老人脾胃虛寒作瀉隂虛人天明溏泄病名腎泄真隂不足內熱煩躁諸證法咸忌之犯之使人危殆大忌猪肉絡石味苦溫微寒無毒主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫不通水漿不下大驚入腹除邪氣養腎主腰髖痛堅筋骨利關節久服輕身明目潤澤好顔色不老延年傷宜作瘍疏絡石稟少陽之令兼得地之隂氣其味苦其氣溫微寒而無毒入足陽明手足少隂足厥隂少陽經故主風熱死肌癰傷口乾舌焦癰腫不消喉舌腫水漿不下皆苦溫通氣血血屬隂隂寒入血而除熱之效也又能除邪氣養腎主腰髖痛堅筋骨利關節療蛇毒心悶刀斧傷搗封立差皆涼血除熱之功也本經久服輕身明目潤澤好顔色不老延年陳藏器以為能變白亦指益隂涼血而言也生石上者良主治參互絡石搗汁入諸解毒藥治發背癰疽神驗外臺祕要治喉痺喘息不通須臾欲絶以絡石二兩水一升煎取一大盞去滓細細喫須臾即通簡誤隂臟人畏寒易泄者勿服木蓮薜荔也附木而生得木氣故名木蓮俗呼鬼饅頭夤緣樹木牆壁三五十年漸大枝葉繁茂葉長二三寸厚若石韋生子似蓮房打破有白汁停久如漆六七月實內空而紅則滿腹細子大如稗子一子一鬚其味微澀其殼虛輕一年一熟子亦入藥頌曰薜荔絡石極相類莖葉粗大如藤狀木蓮更大於絡石四時不凋蓋稟天地隂寒之氣而生者也故其味酸寒辛平無毒用其葉研爛絞汁和蜜飲數升并傅癰上能消背癰下利即愈考木蓮無經文者為其與絡石相類也俱以杜仲牡丹為之使惡鐵落畏貝母菖蒲蒺藜子味苦辛溫微寒無毒主惡血破癥結積聚喉痺乳難身體風癢頭痛咳逆傷肺肺痿止煩下氣小兒頭瘡癰腫隂㿉可作摩粉其葉主風癢可煮以浴久服長肌肉明目輕身疏疾藜有二種一種同州沙苑白蒺藜一種秦州刺蒺藜白者感馬精所生刺者感地中陽氣所生本經苦溫别録加辛及微寒並無毒夫苦能泄溫能宣辛主散主潤故刺蒺藜主惡血破癥結積聚喉痺乳難身體風癢頭痛咳逆小兒頭瘡癰腫隂㿉葉主風癢可煮以浴辛入肝肝主風也藥性論云白蒺藜味甘微腥甘中必有辛辛能潤故主咳逆傷肺肺痿止煩下氣久服長肌肉明目輕身以其入腎益精故也専餌長年效可責矣單行雜療主治良多本草諸方咸堪選用形如羊腎圓而細色如菉豆嚼之作菉豆腥氣為末煮之則香同新茶者真主治參互刺蒺藜同何首烏􅭀蘞葉胡麻地黃木瓜荆芥穗天門冬黃檗治遍身風癢同州白蒺藜得蓮鬚山茱萸五味子蓮肉覆盆子魚膠龍骨白膠能固精益腎令人有子兼主小便遺瀝得甘菊花甘枸杞子決明子女貞實槐角子能明目外臺祕要單服能復明三十年目疾簡誤同州蒺藜性能固精命門火熾陽道數舉交媾精不得出者勿服黃耆味甘微溫無毒主癰疽久敗瘡排膿止痛大風癩疾五痔鼠瘻補虛小兒百病婦人子藏風邪氣逐五藏間惡血補丈夫虛損五勞羸瘦止渴腹痛泄痢益氣利隂氣生白水者冷補其莖葉療渴及筋攣癰腫疽瘡疏黃耆稟天之陽氣地之沖氣以生故味甘微溫而無毒氣厚於味可升可降陽也入手陽明太隂經甘乃土之正味故能解毒陽能達表故能運毒走表甘能益血脾主肌肉故主久敗瘡排膿止痛風為陽邪凡賊風虛邪之中人也則病癘風經曰邪之所凑其氣必虛性能實表則能逐邪驅風故主大風癩疾五痔鼠瘻補虛兼主小兒天行痘瘡之在陽分表虛氣不足者小兒胎毒生瘡癤别録又主婦人子藏風邪氣逐五藏惡血者血不自行隨氣而行參合血藥則能之矣補丈夫虛損五勞羸瘦者通指因勞陽氣乏絶所生病也甘溫益元氣甘溫除大熱故通主之氣旺則津液生故止渴血虛則腹痛中焦不治亦腹痛脾胃之氣不足則邪客之而泄痢補中氣則諸證自除矣益氣利隂氣者陽生隂長故也主治參互黃耆在補中益氣湯甘溫能除大熱為治勞倦發熱之要劑同生熟地黃黃檗黃芩黃連當歸加酸棗仁炒熟研為治隂虛盜汗之正法本方去三黃加人參五味子酸棗仁治表虛自汗同桂枝白芍藥防風炙甘草能實表治表虛畏風傷風自汗與茅山术生地黃等分牛膝黃檗減半作丸治積年溼毒臁瘡百藥不效外臺祕要主甲疽瘡腫爛生腳指甲邊赤肉出黃耆二兩䕡茹三兩苦酒漬一宿猪脂五合微火上煎取三合絞去滓以封瘡上日三度易其肉即消同白芷白芨甘草金銀花皂角刺排膿止痛同人參甘草治天行痘瘡陽虛無熱證簡誤黃耆功能實表有表邪者勿用能助氣氣實者勿用能內塞補不足胸膈氣閉悶腸胃有積滯者勿用能補陽陽盛隂虛者忌之上焦熱甚下焦虛寒者忌之病人多怒肝氣不和者勿服痘瘡血分熱盛者禁用肉蓯蓉味甘酸鹹微溫無毒主五勞七傷補中除莖中寒熱痛養五藏强隂益精氣多子婦人癥瘕除膀胱邪氣腰痛止痢久服輕身疏肉蓯容得地之隂氣天之陽氣以生故味甘酸鹹微溫無毒入腎入心包絡命門滋腎補精血之要藥氣本微溫相傳以為熱者誤也甘為土化酸為木化鹹為水化甘能除熱補中酸能入肝鹹能滋腎腎肝為隂隂氣滋長則五臟之勞熱自退隂莖中寒熱痛自愈腎肝足則精血日盛精血盛則多子婦人癥瘕病在血分血盛則行行則癥瘕自消矣膀胱虛則邪客之得補則邪氣自散腰痛自止久服則肥健而輕身益腎肝補精血之效也若曰治痢豈滑以導滯之意乎此亦必不能之說也軟而肥厚大如臂者良主治參互內蓯容得白膠杜仲地黃當歸麥門冬主婦人不孕同人參鹿茸牡狗隂莖白膠杜仲補骨脂主男子陽痿老人陽衰一切腎虛腰痛兼令人有子同地黃枸杞牛膝鱉甲天門冬麥門冬當歸白膠杜仲青蒿五味子黃檗山茱萸治五勞七傷莖中寒熱痛婦人癥瘕獨用數兩浸去鹹味并去鱗甲及中心膜淡白酒煮爛頓食治老人便燥閉結有神簡誤泄瀉禁用腎中有熱强陽易興而精不固者忌之防風味甘辛溫無毒主大風頭眩痛惡風風邪目盲無所見風行周身骨節疼痺煩滿脅痛脅風頭面去來四肢攣急下乳金瘡內痙久服輕身葉主中風熱汗出疏防風稟天地之陽氣以生故味甘溫别録兼辛而無毒氣厚味薄升也陽也入手陽明足少陽厥隂風藥也治風通用升發而能散故主大風頭眩痛惡風風邪周身骨節疼痺脅痛脅風頭面去來四肢攣急下乳金瘡因傷於風內痙其云主目無所見者因中風邪故不見也煩滿者亦風邪客於胸中故煩滿也風寒溼三者合而成痺袪風燥溼故主痺也發散之藥焉可久服其曰輕身亦溼去耳别録云乂頭者令人發狂乂尾者發痼疾子似胡荽而大調食用之香而療風更優也主治參互防風同黃耆芍藥則能實表止汗同荆芥穗白芷生地黃地榆黃耆治破傷風有神同甘草桔梗紫蘇桑根白皮杏仁細辛解利傷風去紫蘇換薄荷加石膏兼除風熱用麻黃易紫蘇治風寒鬱於腠理皮膚緻密無汗入羌活湯兼除太陽經傷風寒頭痛亦入治風痺藥用若入治大風厲風藥中須加殺蟲藥活血藥乃可不宜純用風藥也簡誤南方中風産後血虛發痙俗名角弓反張諸病血虛痙急頭痛不因於風寒溏泄不因於寒溼二便祕澀小兒脾虛發搐慢驚慢脾風氣升作嘔火升發嗽隂虛盜汗陽虛自汗等病法所同忌犯之者增劇蒲黃味甘平無毒主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力延年神仙疏蒲黃得地之隂氣兼得金之辛味其言甘平者是兼辛而言也非辛則何以能散邪又稟天之陽氣故曰微寒而無毒也如是則甘能和血辛能散結微寒能除熱入手少隂太陽太隂足陽明厥隂故主心腹膀胱寒熱利小便止血消瘀血久服輕身益氣力者是血熱瘀血傷損之病去而身輕力長也欲止血熟用欲消血生用産泰州主治參互得炒黑乾薑炒黑豆澤蘭當歸川芎牛膝生地黃治産後諸血病同車前子牛膝生地黃麥門冬治溺血同阿膠白膠人參麥門冬赤茯苓車前子杜仲川續斷治血崩血淋生納舌下數數易之消重舌治一切跌撲傷損瘀血停滯腹中生蒲黃煮濃和童便飲之良能破血故治癥結五勞七傷停積瘀血胸前痛即發吐衄悉和涼血行血藥主之簡誤一切勞傷發熱隂虛內熱無瘀血者禁用續斷味苦辛微溫無毒主傷中補不足金瘡癰傷折跌續筋骨婦人乳難崩中漏血金瘡血內漏止痛生肌肉及踠傷惡血腰痛關節緩急久服益氣力地黃為之使疏續斷得土金之氣而兼稟乎天之陽氣以生本經味苦微溫别録益之以辛曾得蜀中者嘗之其味帶甘應云味苦甘辛微溫無毒使非味甘焉能主傷中補不足非辛焉能主金瘡癰傷折跌續筋骨婦人乳難辛能潤苦溫能散甘能益血故别録又主崩中漏血金瘡血內漏止痛生肌肉及踠傷惡血腰痛關節緩急本經久服益氣力傷去血生之效也入足厥隂少隂為治胎産續絶傷補不足療金瘡理腰腎之要藥莖方葉似苧相對生主治參互欲行血理傷當以當歸牛膝肉桂延胡索同用欲止血補不足療崩中則與白膠阿膠地黃麥門冬杜仲五味子山茱萸人參枸杞子黃耆同用欲安胎則與涼血補血順氣藥同用欲療金瘡則與金瘡藥同用簡誤禁與苦寒藥同用以治血病及與大辛熱藥用於胎前雷公云草茆根真似續斷誤服之令人筋軟漏蘆味苦鹹寒大寒無毒主皮膚熱惡瘡疽痔溼痺下乳汁止遺溺熱氣瘡癢如麻豆可作浴湯久服輕身益氣耳目聰明不老延年疏漏蘆得地味之苦鹹稟天氣之大寒故無毒苦能下泄鹹能軟堅寒能除熱入足陽明少陽太陽手太隂陽明寒而通利之藥也故主皮膚熱惡瘡疽痔溼痺下乳汁别録又主止遺溺熱氣瘡癢如麻豆可作浴湯又經云久服輕身益氣耳目聰明不老延年者蓋亦通指熱散病除則臟腑自安精神自倍而臻乎壽考也主治參互漏蘆同貝母連翹甘草金銀花橘葉鼠糞白芷山豆根山茨菰夏枯草治乳巖乳癰同連翹生甘菊紫花地丁貝母金銀花甘草夏枯草治發背瘰癧排膿止痛同黃耆人參排膿長肉加狗蹄猪蹄汁能下乳簡誤妊娠禁用瘡瘍隂證平塌不起發者真氣虛也法當內塞漏蘆苦寒非所宜設營實味酸溫微寒無毒主癰疽惡瘡結肉跌筋敗瘡熱氣隂蝕不瘳利關節久服輕身益氣根止泄痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌疏營實華於春而實於夏味酸得木之化其氣芬芳宜其有溫之義别録微寒以其得春之氣也故無毒其主惡瘡結肉跌筋敗瘡熱氣隂蝕不瘳利關節别録止泄痢腹痛五臟客熱除邪逆氣疽癩諸惡瘡金瘡傷撻生肉復肌豈非酸能收斂溫能通暢微寒能除熱而兼主乎發生之用也俗名薔薇白花野者良主治參互葛洪治金瘡發熱用薔薇根灰一方寸匕日三外臺祕要治鯁薔薇根末水服方寸匕日三又方治少小睡中遺尿不自覺以薔薇根銼以酒飲之肘後方治口瘡以根煮濃汁溫含冷易神驗用之頗稀不著簡誤天名精味甘寒無毒主瘀血血瘕欲死下血止血利小便除小蟲去痺除胸中結熱止煩渴逐水大吐下久服輕身耐老垣衣為之使疏天名精稟天地清隂之氣故味甘辛氣寒而無毒隂入血甘亦入血辛能散結寒能除熱故主瘀血血瘕欲死下血止血小便不利由於內熱除熱則小便自利也小蟲者溼熱所生也辛寒能散溼袪熱則小蟲自除也除痺者去溼之功也除胸中結實止煩渴袪熱散結益隂之功也逐水者溼熱散則水自消也唐本注云即鹿活草也别録一名天蔓精南人呼為地菘非鶴蝨亦非狶蘞乃荔枝草也為消痔瘡之聖藥味甘辛故有薑稱其主破血生肌利小便殺三蟲除諸毒腫疔瘡瘻痔金瘡內射身癢病丙穩禾疹不止者揩之立已涼血除熱散結之力也簡誤脾胃寒薄性不喜食冷易泄無渴者勿服決明子味鹹苦甘平微寒無毒主青肓目淫膚赤白膜眼赤痛淚出療唇口青久服益精光輕身疏決明子得水土隂精之氣而兼稟乎清陽者也故其味鹹平别録益以苦甘微寒而無毒鹹得水氣甘得土氣苦可泄熱平合胃氣寒能益隂泄熱足厥隂肝家正藥也亦入膽腎肝開竅於目瞳子神光屬腎故主青盲目淫膚赤白膜眼赤痛淚出别録兼療唇口青本經久服益精光輕身益隂泄熱者大補肝腎之氣所致也亦可作枕治頭風明目主治參互得沙苑蒺藜甘菊花枸杞子生地黃女貞實槐實穀精草補肝明目益精除肝臟熱之要藥得生地黃甘菊花荆芥黃連甘草𤣥參連翹木通治暴赤風眼淚痛療目疾外無他用故無簡誤丹參味苦微寒無毒主心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕止煩滿益氣養血去心腹痼疾結氣腰脊强腳痺除風邪留熱久服利人畏鹹水反藜蘆疏丹參本經味苦微寒陶云性熱無毒觀其主心腹邪氣腸鳴幽幽如走水寒熱積聚破癥除瘕則似非寒藥止煩滿益氣及别録養血去心腹痼疾結氣腰脊强腳痺除風邪留熱久服利人又決非熱藥當是味苦平微溫入手足少隂足厥隂經心虛則邪氣客之為煩滿結氣久則成痼疾肝虛則熱甚風生肝家氣血凝滯則為癥瘕寒熱積聚腎虛而寒溼邪客之則腰脊强腳痺入三經而除所苦則上來諸證自除苦能泄溫能散故又主腸鳴幽幽如走水久服利人益氣養血之驗也北方産者勝俗名逐馬主治參互入天王補心丹則補心同牛膝地黃黃耆黃檗則健步同當歸牛膝細辛則下死胎同鱉甲牡蠣牡丹皮青蒿延胡索牛膝乾漆水赤蓼子主寒熱積聚破癥除瘕心腹痼疾結氣同麥門冬沙參五味子甘草青蒿栝樓止煩滿同人參麥門冬酸棗仁地黃益氣養血同牛膝萆薢木瓜狶蘞杜仲續斷主腰脊强腳痺除風邪留熱聖惠方獨用一兩為末熱酒每服二錢主寒疝少腹及隂相引痛自汗出欲死千金方治墮胎下血亦獨用丹參十二兩酒五升煮取三升溫服日三蕭炳云酒浸服之治風軟腳可逐奔馬故名奔馬草曾用有效梅師方治中熱油及火燒除外痛用丹參八兩細銼以水微調取羊脂二斤煎三上三下以傅瘡上簡誤妊娠無故勿服茜根味苦寒無毒主寒溼風痺黃疸補中止血內崩下血膀胱不足踒跌蠱毒久服益精氣輕身疏茜根稟土與水之氣而兼得天令少陽之氣以生本經味苦寒甄權云甘潔古微酸鹹溫無毒蓋盡之矣入足厥隂手足少隂行血涼血之要藥也非苦不足以泄熱非甘不足以和血非鹹不足以入血軟堅非溫少陽之氣不足以通行故主痺及疸疸有五此其為治蓋指蓄血發黃而不専於溼熱者也痺者血病行血軟堅則痺自愈甘能益血而補中病去血和補中可知已苦寒能下泄熱氣故止內崩及下血除熱故益膀胱踒跌則血瘀血行則踒跌自安涼無病之血行已傷之血故治蠱毒藥性論味甘主六極傷心肺吐血瀉血日華子味酸止鼻洪帶下産後血暈乳結月經不止腸風痔瘻排膿治瘡癤泄精尿血撲損瘀血皆取其涼血行血苦寒泄熱之功耳主治參互同地黃麥門冬當歸身阿膠茅根童便主吐血衄血諸血熱妄行溢出上竅同牛膝地黃黃耆地榆芍藥荆芥穗治腸風下血佐地榆治橫痃魚口有神同䗪蟲乳香沒藥桂心牛膝地黃主踒跌簡誤病人雖見血證若加泄瀉飲食不進者勿服五味子味酸溫無毒主益氣咳逆上氣勞傷羸瘦補不足强隂益男子精養五臟除熱生隂中肌蓯蓉為之使惡萎𬎼勝烏頭疏五味子得地之隂而兼乎天之陽氣故本經味酸氣溫味兼五而無毒王好古云味酸微苦鹹隂中微陽入足少隂手太隂血分足少隂氣分主益氣者肺主諸氣酸能收正入肺補肺故益氣也其主咳逆上氣者氣虛則上壅而不歸元酸以收之攝氣歸元則咳逆上氣自除矣勞傷羸瘦補不足强隂益男子精别録養五臟除熱生隂中肌者五味子専補腎兼補五臟腎藏精精盛則隂强收攝則真氣歸元而丹田暖腐熟水穀蒸糟粕而化精微則精自生精生則隂長故主如上諸疾也藥性論云五味子君能治中下氣止嘔逆補諸虛勞令人體悅澤除熱氣病人虛而有氣兼嗽者加而用之日華子云暖水臟下氣賁㹠冷氣消水腫反胃心腹氣脹止渴除煩熱解酒毒壯筋骨皆其極功也主治參互同人參麥門冬名生脈散能復脈通心入八味丸代附子能潤腎强隂同吳茱萸山茱萸肉豆蔲補骨脂人參治腎泄良同懷乾地黃甘枸杞子車前子覆盆子肉蓯容白膠麥門冬人參杜仲白蒺藜黃檗主令人有子同天麥二冬百部阿膠薄荷葉主肺虛久嗽君乾葛白藊豆解酒毒良簡誤痧疹初發及一切停飲肝家有動氣肺家有實熱應用黃芩瀉熱者皆禁用蘭草味辛平無毒主利水道殺蠱毒辟不祥除胸中痰癖久服益氣輕身不老通神明疏蘭草稟天地清芬之氣以生故其味辛氣平無毒入手太隂足陽明經肺主氣肺氣鬱結則上竅閉而下竅不通胃主納水穀胃氣鬱滯則水穀不以時化而為痰癖蠱毒不祥之氣亦胃中受病辛平能散結滯芬芳能除穢惡則上來諸證自瘳大都開胃除惡清肺消痰散鬱結之聖藥也久服等語亦言其效之極功主治參互同藿香枇杷葉石斛竹茹橘紅開胃氣之神品加入沈水香鬱金白豆蔲真蘇子蘆根汁下氣開鬱治噎膈之將成者同栝樓根麥冬黃連竹葉蘆根汁治消渴忍冬味甘溫無毒主寒熱身腫久服輕身長年益壽疏忍冬即金銀花藤一名鷺鷀藤感土之沖氣稟天之春氣故味甘微寒而無毒主寒熱身腫久服輕身長年益壽者甘能益血甘能和中微寒即生氣也氣味如斯所主宜矣主治參互同甘菊花紫花地丁夏枯草白及白蘝貝母連翹鼠黏子治一切腫毒加辟虺雷治一切疔瘡君地榆芍藥黃連甘草升麻治一切血痢單味熬膏小兒服之可稀痘肘後方忍冬藤熬膏治飛尸伏尸遁尸沈尸風尸尸疰蛇牀子味苦辛甘平無毒主婦人隂中腫痛男子隂痿溼癢除痺氣利關節癲癎惡瘡溫中下氣令婦人子藏熱男子隂强久服輕身好顔色令人有子疏蛇牀子味苦平别録辛甘無毒今詳其氣味當必兼溫燥陽也故主婦人隂中腫痛男子隂痿溼癢除痺氣利關節惡瘡别録溫中下氣令婦人子藏熱男子隂强久服輕身令人有子蓋以苦能除溼溫能散寒辛能潤腎甘能益脾故能除婦人男子一切虛寒溼所生病寒溼既除則病去身輕性能益陽故能已疾而又有補益也雷公云凡使須用濃藍汁并百部自然汁二味同浸三伏時漉出日乾却用生地汁拌蒸從午至亥日乾用此藥只令陽氣盛數號曰鬼考也主治參互蛇牀子同巴㦸天逺志牛膝何首烏陽起石治男子隂痿溼癢同巴㦸天牛膝杜仲續斷地黃黃檗白膠治婦人隂中腫痛同黃檗山茱萸肉五味子茯苓車前子香附川續斷補骨脂治一切帶下赤者加白膠阿膠簡誤蛇牀子性溫燥腎家有火及下部有熱者勿用景天味苦酸平無毒主大熱火瘡身熱煩邪惡氣諸蠱毒痂疕寒熱風痺諸不足花主女人漏下赤白輕身明目久服通神不老疏景天即慎火草也味苦平别録酸無毒今詳其功用當是大寒純隂之草也性能涼血解毒故主大熱火瘡身熱煩邪惡氣諸蠱毒痂疕寒熱風痺諸不足熱解則毒散血涼血涼則隂生故也花功用具如經說第大苦寒之藥而云輕身明目通神不老未可嘗試也主治參互治毒虺蛇傷取汁飲并敷傷處立效治一切赤遊風各種火丹之神藥也故知其性大寒其味大苦耳簡誤一切病得之寒溼惡寒喜熱者勿服茵蔯蒿味苦平微寒無毒主風溼寒熱邪氣熱結黃疸通身發黃小便不利除頭熱去伏瘕久服輕身益氣耐老面白悅長年疏茵蔯蒿感天地苦寒之味而兼得春之生氣以生者也其味苦平微寒無毒故主風溼寒熱邪氣熱結黃疸通身發黃小便不利及頭熱皆溼熱在陽眀太隂所生病也苦寒能燥溼除熱溼熱去則諸證自退矣去伏瘕及久服輕身益氣耐老面白悅長年未有修事者日華子云石茵蔯味苦涼無毒即山茵蔯也入足陽明太隂足太陽三經除溼散熱結之要藥也主治參互茵蔯性苦寒能除一切溼熱五疸雖各有其因然同為溼熱所成故得黃連乾葛黃檗苜蓿五味子治酒疸如神得二术茯苓澤瀉車前子木通橘皮神麴紅麴麥門冬治穀疸同生地黃仙人對坐草石斛木瓜牛膝黃檗治疸因酒色而得病名女勞疸仲景茵蔯湯治穀疸寒熱不食食即頭眩心胸不安茵蔯六兩梔子十四枚大黃二兩以水一斗先煮茵蔯減六升內二味煮取三升去滓分溫三服小便當利尿如皂角汁狀色正赤一宿腹減黃從小便去也又茵蔯五苓散總治諸疸簡誤蓄血發黃者禁用沙參味苦微寒無毒主血積驚氣除寒熱補中益肺氣療胸痺心腹痛結熱邪氣頭痛皮間邪熱安五藏補中久服利人疏沙參稟天地清和之氣本經味苦微寒無毒王好古謂甘而微苦苦者味之隂也寒者氣之隂也甘乃土之沖氣所化合斯三者故補五臟之隂故主血積驚氣除寒熱補中益肺氣别録又療胸痺心腹結熱邪氣頭痛皮間邪熱者苦能泄熱寒能除熱甘能緩急益血補中故療諸因熱所生病而其功用馴致安五臟補中久服利人也入手太隂經主治參互同天門冬麥門冬百部五味子桑白皮治肺痿肺熱同貝母枇杷葉栝樓甘草桑白皮百部天門冬􅍁冬花治久嗽葛洪治卒得諸疝少腹及隂中相引痛如絞自汗出欲死搗細末酒服方寸匕立差簡誤臟腑無實熱肺虛寒客之作嗽者勿服王不留行味苦甘平無毒主金瘡止血逐痛出刺除風痺內寒止心煩鼻衄癰疽惡瘡瘻乳婦人難産久服輕身耐老增壽疏王不留行稟土金火之氣故味苦甘平平者辛也其氣應溫而無毒苦能泄辛能散甘入血溫能行故主金瘡止血逐痛出刺除風痺內寒癰疽惡瘡瘻乳婦人難産入血活血之要藥也若夫心煩鼻衄應是血分熱病非同涼血藥用未見其可也入足厥隂經主治參互同漏蘆貝母鯪鯉甲青皮沒藥山茨菰山豆根栝樓根治乳巖乳癰同鯪鯉甲白芷通草猪蹄汁煮服下乳為末和蟾酥治疔瘡酒服取汗千金方有王不留行湯治癰疽妬乳月蝕白秃及面上瘡去蟲止痛王不留行東南桃枝東行吳茱萸根皮各五兩蛇牀子一升牡荆子苦竹葉刺蒺藜子各三升大麻子一升以水二斗半煮水一斗頻頻洗之簡誤孕婦勿服長松味甘溫無毒主風血冷氣宿疾溫中去風草似松葉上有脂山人服之疏長松生太行西北五臺諸山得天地溫和之氣而生故性味甘溫而無毒主風血冷氣宿疾溫中去風出陳藏器治大風惡疾睂髮墮落百骸腐潰每一兩入甘草少許水煎服旬日即愈又解諸蟲毒當是袪風之仙藥也神農本草經疏卷七
