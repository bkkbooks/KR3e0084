body:
  text: 神農本草經疏卷二十六明繆希雍撰總一十八種今疏其要者三種醋稻米醬醋味酸温無毒主消癰腫散水氣殺邪毒一名苦酒疏醋惟米造者入藥得温熱之氣故從木化其味酸氣温無毒酸入肝肝主血血逆熱壅則生癰腫酸能歛壅熱温能行逆血故主消癰腫其治産後血暈癥塊血積亦此意耳散水氣者水性泛濫得收歛而寧謐也殺邪毒者酸苦湧瀉能吐出一切邪氣毒物也日蕐子主下氣除煩婦人心痛血氣并産後及傷損金瘡出血迷悶殺一切魚肉菜毒取其酸收而又有散瘀解毒之功也故外科傅藥中多資用主治參互仲景方少隂病脈微細但欲寐咽中傷生瘡不能言語聲不出者苦酒湯主之用半夏十四枚雞子一枚去黄以苦酒半夏着雞子殻中置刀鐶中安火上令三沸去滓少少含嚥之不差更作三劑仲景金匱方黄耆芍藥苦酒湯治黄汗汗出沾衣正黄如藥汁因汗出時入水中浴水從汗孔入得之用黄耆五兩芍藥三兩桂枝三兩以苦酒一斗水七升相和煑取三升温服一升當心煩服至六七日乃解衍義云産婦房中常以火炭沃醋氣為佳酸氣能歛血使下也孟詵食療青木香以醋磨汁服止卒心痛浸黄檗含之治口瘡千金方身體卒腫醋和蚯蚓屎傅之又方舌腫不消以酢和釜底墨厚傅舌之上下脫則更傅須臾即消又方湯火傷灼即以酸酢淋洗并以酢泥塗之良亦無瘢痕喉痺咽痛以釅醋探吐之簡誤經曰酸走筋筋病毋多食酸凡筋攣偏痺手足屈伸不便皆忌之又曰味過於酸肝氣以津脾氣乃絶多食酸則肉皺而脣揭言能助肝賊脾凡脾病者亦不宜過食稻米味苦主温中令人多熱大便堅疏稻米即今之糯米也禀土中之陽氣其味應甘氣應温無毒造酒必用之者以其性近於熱也為補脾胃益肺氣之榖脾胃得補則中自温大便亦堅實温能養氣氣充則身自多熱大抵脾肺虛寒者宜之為其能益氣温中也故又有止泄利縮小便收自汗發痘瘡等用主治參互松篁經驗方乆洩食减以糯米一升水浸一宿瀝乾炒熟磨篩入懷山藥一兩毎日清晨用半盞入白砂餹二匙胡椒末少許以滚湯調食大有滋補久服更能令人精暖有子醫方大成顛犬咬傷糯米一合斑猫七枚同炒熬黄去之再入七枚再炒黄去之又入七枚待米出烟去猫為末水調服之小便利下佳亦可油調外傅又方虚勞不足糯米入猪肚内蒸熟日食簡誤糯米孟詵云發風動氣久食令人多睡藏器云久食令人身軟妊婦雜肉食之令子不利蕭炳云壅諸經絡氣使四肢不收發風昏昏陳士良云乆食發心悸及癰疽瘡癤中痛合酒食之醉難醒然愚意觀之其為害未必如此之甚蓋天生五榖以食人皆稟土中冲和之氣可常御而無害者苐糯米氣温性黏滯惟不和於上焦有痰熱及脾病不能轉運小兒難於尅化者餘皆無害諸家之言不可盡信也醬味鹹酸冷利主除熱止煩滿殺百藥熱湯及火毒疏按醬之品不一惟豆醬陳久者入藥其味鹹酸冷利故主除熱止煩滿及湯火傷毒也能殺一切魚肉菜蔬蕈毒本經云殺百藥毒者誤也聖人不得其醬不食朱子云食肉用醬各有所宜玩一宜字則不宜者必有傷害於人非特悅口而已如食蟹用橙醬或薑醬煑魚用茱萸醬取其能殺毒之義耳又有榆仁醬味辛美殺諸蟲利大小便心腹惡氣蕪荑醬主療相同茱萸醬作法不用麵豆鹽只以河水量茱萸多少稍稍加石灰摻入拌勻甕藏殺一切魚腥毒用時洗去石灰擂爛烹水族入之良神農本草經疏卷二十六
