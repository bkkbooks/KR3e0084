  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0084_WYG_029-1a, image: WYG0775/WYG0775-0844c.png}
body:
  text: 神農本草經疏卷二十九明繆希雍撰總二十二種今疏其要者四種葫馬齒莧茄子根附蕺葫蒜也味辛溫有毒主散癰腫䘌瘡除風邪殺毒氣獨子者亦佳歸五藏久食傷人損目明疏葫大蒜也稟火金之氣以生故其味辛氣溫辛溫太甚故其性有毒熏臭異常不宜多食入足陽明太隂厥隂經辛溫能辟惡散邪故主除風邪殺毒氣及外治散癰腫䘌瘡也辛溫走竄無處不到故主歸五藏脾胃之氣最喜芳香熏臭損神耗氣故久食則傷人肝開竅於目目得血而能視辛溫太過則血耗而目損矣總之其功長於通逹走竅去寒濕辟邪惡散癰腫化積聚暖脾胃行諸氣故蘇恭主下氣消穀化肉藏器主風濕破冷氣爛痃癖伏邪惡宣通溫補日華子主健脾胃治腎氣止霍亂轉筋腹痛除邪祟解溫疫等用也主治參互外臺祕要關格脹滿大小便不通獨頭蒜燒熟去皮綿裹納下部氣立通又方治金瘡中風角弓反張取蒜一大升破去心無灰酒四升煮令極爛并滓服一大升須臾得汗則瘥簡要濟衆治鼻血不止服藥不應用蒜一枚去皮細研如泥攤一餅子如錢大厚一豆許左鼻血出貼左腳心右鼻血出貼右腳心兩鼻俱出皆貼之立瘥血止急以溫水洗腳心外科精要背瘡灸法凡覺背上腫硬疼痛以濕紙貼尋瘡頭用大蒜十顆淡豆豉半合乳香一錢細研勻隨瘡頭大小用竹片竹圈圈定填藥於內二分厚著艾灸之痛灸至癢癢灸至痛以百壯為率效永類鈐方乾濕霍亂轉筋用大蒜搗塗足心立愈普濟方寒瘧冷痢端午日以獨頭蒜十箇黃丹二錢搗丸梧子大每服九丸長流水下妙衍義暴下血病用葫五七枚去皮研膏入豆豉搗丸梧子大每米飲下五六十丸無不愈者華他行道見車載一人病咽塞食不下呻吟他視曰餅店家蒜虀大酢三升飲之當自痊果吐大蛇一枚而愈簡誤蒜性溫屬火氣味臭烈凡肺胃有熱肝腎有火氣虛血弱之人切勿沾唇雖有暖脾胃袪寒濕之功亦宜暫用切勿過施過則生痰動火傷神散氣損目耗血切戒切戒馬齒莧主目盲白翳利大小便去寒熱殺諸蟲止渴破癥結癰瘡服之長年不白和梳垢封疔腫又燒為灰和多年醋滓先灸疔腫以封之即根出生搗絞汁服當下惡物去白蟲煎為膏塗白秃又主三十六種風結瘡以一釡煮澄清內蠟三兩重煎成膏塗瘡上亦服之疏馬齒莧稟天之隂寒兼得地中之金氣以生故葉節間有水銀以其得金氣多也味應辛苦氣寒無毒經云榮氣不從逆於肉裏乃生癰腫原病式云諸痛癢瘡瘍皆屬心火辛寒能凉血散熱故主癥結癰瘡疔腫白秃及三十六種風結瘡搗敷則腫散疔根拔絞汁服則惡物當下內外施之皆得也辛寒通利故寒熱去大小便利也苦能殺蟲寒能除熱故主殺諸蟲去寸白止渴辛寒能散肺家之熱故主目盲白翳也長年不白總言其凉血益血病去身輕之功耳方士多采取用以其亦有代砂結汞之能也主治參互崔元亮治赤白下不問老幼孕婦悉可服取馬齒莧搗絞汁三大合和雞子白一枚微溫頓服之不過再作則愈又方療多年惡瘡百方不瘥或痛焮走不已者竝爛搗馬齒莧敷上不過三兩遍即愈廣利方小兒火丹熱如火繞臍即損人馬齒莧搗塗之崔元亮方疔瘡腫毒馬齒莧二分石灰三分為末雞子白和傅之簡誤馬齒莧辛寒滑利凡脾胃虛寒腸滑作泄者勿用煎餌方中不得與鱉甲同入令化作小鱉傷人也茄子味甘寒久冷人不可多食損人動氣發瘡及痼疾根及枯莖葉主凍腳瘡可煮作湯漬之良疏茄內稟地中一隂之氣外受南方熱火之陽故其花實皆紫本經雖云甘寒必是濕中有火使非濕熱則不能動氣發瘡及痼疾也濕勝則久冷人多食有損熱勝故能主凍腳瘡也孟詵云主寒熱五藏勞大明治溫疾傳尸勞氣皆非正治惟腫毒家用之為當耳主治參互靈苑方腸風下血經霜茄連蒂燒存性為末每日空心溫酒服二錢匕丹溪方治乳頭裂用茄子老黃者燒灰傅之鮮茄蒂鮮何首鳥等分煮飲治對口瘡有神茄稈燒灰淋汁和入桑磠堿等藥諸癰腫疔瘡有效簡誤茄觀本經所說止是損人竝無利益後人雖有處治之法然終與本經相失凡有痼疾及虛冷人切不可食近世為茹菜中常用之物尊生者當慎之蕺味辛微溫主蠷螋溺瘡多食令人氣喘俗呼魚腥草疏蕺生於下濕之地得隂中之陽故其味辛氣溫入手太隂經能治痰熱壅肺發為肺癰吐膿血之要藥辛溫主散故能治蠷螋溺瘡肺主氣辛溫能散氣故多食令人氣喘肺與大腸為表裏大腸濕熱盛則為痔瘡得辛溫之氣則大腸清寧故又為痔瘡必須之藥主治參互單用搗汁入年久芥菜滷飲之治肺癰有神救急方痔瘡腫痛魚腥草一握煎湯熏洗仍以滓傅即愈簡誤蕺止能消肺癰治痔瘡餘非所長况多食令人氣喘發虛弱損陽氣發腳氣等害慎之慎之神農本草經疏卷二十九
