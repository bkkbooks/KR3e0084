body:
  text: 神農本草經疏卷二十七明繆希雍撰總三十種今疏其要者八種胡荽𤓰蔕白冬𤓰白芥芥萊菔苦菜苜蓿胡荽味辛温一云微寒微毒消榖治五藏補不足利大小腸通小腹氣㧞四胑熱止頭痛療沙疹豌豆瘡不出作酒歕之立出通心竅疏胡荽稟金氣多火氣少故味辛香氣温微毒入足太隂陽明經辛香走竄而入脾故主消榖利大小腸通少腹氣脾胃為邪熱所干則頭痛四肢熱辛温發散二經之邪則頭痛四肢熱自㧞痧疹痘瘡出不快者外為風寒所侵或穢氣所觸也辛温袪風寒香竄辟穢氣則腠理通暢而痧疹痘瘡皆出矣通心竅治五臟補不足者總言其辛香内通心脾外逹腸胃除一切不正之氣則真氣安和斯有補益之道耳子亦能發痘疹殺魚腥主治參互經驗後方疹痘出不快用胡荽二兩切以酒二大盞煎沸沃之以物盖定勿令洩氣候冷去滓微微含噴從項背至足令遍勿噀頭面子母祕錄肛門脫出胡荽一升切燒烟熏之即入外臺祕要牙齒疼痛胡荽子五升水五升煑取一升含𠻳簡誤胡荽辛香發散氣虛人不宜食疹痘出不快非風寒外侵及穢惡之氣觸犯者不冝用孟詵云多食損人精神蕐陀云胡臭口臭􅉶齒脚氣皆不可食令病加甚陳藏器云久食令人多忘發腋臭根發痼疾凡服一切補藥及藥中有白术牡丹者咸忌之𤓰蔕味苦寒有毒主大水身面四肢浮腫下水殺蠱毒欬逆上氣及食諸果病在胸腹中皆吐下之去鼻中息肉療黄疸疏𤓰蔕感時令之火熱稟地中之伏隂故其味苦氣寒有小毒氣薄味厚浮而升隂多於陽酸苦湧泄為隂故也入手太隂足陽明足太隂經其主大水身面四肢浮腫黄疸者皆脾胃虛水氣溼熱乘虛而客之也苦以湧泄使水溼之氣外散故能主之經曰在髙者因而越之病在胸膈則氣不得歸元而為欬逆上氣吐出胸中之邪則氣自順欬逆止矣殺蠱毒者亦取吐出之義去鼻中息肉者以其苦寒能除肺家之熱也日蕐子治腦塞熱齆眼昏吐痰好古得麝香細辛治鼻不聞香臭及吐風熱痰涎風眩頭痛癲癎喉痺頭面有溼氣傷寒客水胸中傷食脹滿下部無脉等證皆借其宣發湧泄引涎追淚之功耳主治參互仲景傷寒論病如桂枝證頭不痛項不强寸脉微浮胸中痞鞕氣上衝咽喉不得息者此胸中有寒也當吐之宜𤓰蔕散用𤓰蔕赤小豆等分為散取一錢以香豉一合用熱湯七合煑作稀糜去滓取汁和散頓服之不吐少少加得快吐乃止溼家病身上疼痛發熱面黄而喘頭痛鼻塞而煩其脉大自能飲食腹中和無病病在頭中寒溼故鼻塞内藥鼻中則愈𤓰蔕散主之太陽中暍身熱疼重而脉微弱此因夏月傷冷水水行皮中所致冝吐之𤓰蔕散病胸上諸實胸中鬱鬱而痛不能食欲使人按之而反有涎唾下利日十餘行其脉反微寸口脉微滑此可吐之吐之則利自止宿食在上脘者當吐之病人手足厥冷脈乍結以客氣在胸中心下滿而煩欲食不能食者當吐之懊憹煩躁不得眠未經汗下者謂之實煩當吐之已上悉用𤓰蔕散皆仲景法東垣曰難經云上部有脉下部無脉其人當吐不吐者死此飲食内傷填塞胸中食傷太隂則風木生發之氣伏于下宜𤓰蔕散吐之内經所謂木鬱達之也吐去上焦有形之物則木得舒暢天地交而萬物通矣諸亡血家不可與𤓰蔕散㓂氏衍義風涎暴作氣塞倒仆用𤓰蔕末二錢膩粉一錢匕以水半合調灌良乆涎自出不出含沙糖一塊下咽即涎出也千金翼熱病發黄𤓰蔕為末以大豆許吹鼻中取出黄水乃愈孟詵食療隂黄黄疸取𤓰蔕丁香赤小豆各七枚為末吹豆許鼻中少時黄水流出隔一日用瘥乃止并治身面浮腫活人書濕家頭痛𤓰蔕末一字㗜入鼻中口含冷水取出黄水愈聖惠方鼻中息肉𤓰蔕末白􅈨末各半錢綿裹塞之或以猪脂和挺子塞之日一換簡誤𤓰蔕極苦而性上湧能損胃傷血耗氣損神凡胸中無寒胃家無食皮中無水頭面無濕及胃虛氣弱諸亡血諸産后似中風倒仆心虛有熱癲癎女勞榖疸元氣尫羸脾虛浮腫切勿誤用誤用則為害非細傷生不淺戒之慎之白冬𤓰味甘微寒主除小腹水脹利小便止渴疏白冬𤓰内稟隂土之氣外受霜露之侵故其味甘氣微寒而性冷利無毒水屬隂𤓰性亦屬隂氣類相從故能利小便除小腹水脹也甘寒解胃中之熱故又能止渴也𢎞景止消渴煩悶解毒孟詵益氣耐老除心胸滿去頭面熱大明消熱毒癰腫切片摩疿子蘓頌利大小腸壓丹石毒皆得其㫖者也主治參互孟詵食療積熱消渴白冬𤓰去皮毎食後嚼二三兩五七度良古今錄驗産後痢渴久病津液枯竭四肢浮腫口舌乾燥用冬𤓰一枚黄土泥厚五寸煨熟絞汁飲良亦治傷寒痢渴楊氏家藏方十種水氣浮腫喘滿用大冬𤓰一枚切盖去瓤以赤小豆塡滿盖合簽定以紙筋泥固濟日乾用糯糠兩大籮入𤓰在内煨至火盡取出切片同赤豆焙乾為末水糊丸梧子大每服七十丸煎冬𤓰子湯下日三服小便利為度冬𤓰仁味甘寒能開胃醒脾同橘紅石斛竹茹枇杷葉白芍藥蘆根汁人參白茯苓治胃虛嘔吐同人參茯神竹瀝白茯苓黄耆甘草白芍藥酸棗仁治小兒慢脾風簡誤冬𤓰性冷利凢臟腑有熱者宜之若虛寒腎冷久病滑洩者不得食未經霜者不宜多食九月後食之乃佳白芥味辛温無毒主冷氣色白甚辛美子主射攻及疰氣上氣發汗胸膈痰冷面黄疏芥稟火金之氣以生而白芥則又得金氣之勝故味辛氣温無毒辛溫入肺而發散故有温中除冷發汗辟邪豁痰利氣之功朱震亨云痰在脇下及皮裏膜外非白芥子莫能逹古方控涎丹用之正此義爾主治參互韓􅐂醫通云凡老人苦于痰氣喘嗽胸滿懶食不可妄投燥利之藥反耗真氣因有人求治其親遂制三子養親湯治之隨試隨効用白芥子紫蘇子白萊菔子各微炒研破看所主為君毎劑不過三四錢用絹袋盛入湯煑飲之勿煎太過則味苦辣若大便素實者入蜜一匙冬月加薑一片蘇恭主疰氣發無常處及射攻毒以芥子丸服之或搗末醋和塗之隨手有驗簡誤白芥子味極辛氣温能搜剔内外痰結及胸膈寒痰冷涎壅者殊効然而肺經有熱與夫隂火虛炎咳嗽生痰者法在所忌其莖葉煑食動風動氣有瘡瘍痔疾便血者咸忌之芥味辛温無毒歸鼻主除腎邪氣利九竅明耳目安中久食温中疏芥所稟與白芥同今人以醋椒同芥心作辣虀食之則腦額酸楚淚涕俱出即歸鼻利竅明耳目之驗也辛温能利氣消痰開胃辟寒故主安中及久食温中也其主除腎邪氣者辛能潤腎温能煖水臓故也子功用與白芥子相同力稍不逮主治參互治肺癰用百年芥菜鹵久窨地中者飲數匙立効其義以芥菜辛温得鹽水久窨之氣變為辛寒辛寒能散痰熱芥菜主通肺氣所以治肺癰真良法也簡誤與白芥子同其主利九竅明耳目者蓋言辛散走竄豁痰引涎暫用一時使邪去而正自復非謂其真能利竅明耳目也用者詳之萊菔音蔔根味辛甘温無毒散服及炮煑服食大下氣消榖去痰癖肥健人生搗汁服主消渴試大有驗疏萊菔根稟土金之氣以生本經味辛甘氣温無毒孟詵云性冷大明云平詳其功用應是生者味辛性冷熟者味甘温平故本經下氣消榖去痰癖肥健人及温中補不足寛胸膈利大小便化痰消導者煑熟之用也止消渴制麵毒行風氣去邪熱氣治肺痿吐血肺熱痰嗽下痢者生食之用也大抵入手足太隂手足陽明經故所主皆脾肺腸胃之病子味辛過于根生研汁服吐風痰同醋研消腫毒炒熟下氣定喘消食除脹止氣痛以其性辛甚故升降之功亦烈于根也朱震亨云萊菔子治痰有推牆倒壁之功是矣主治參互醫學集成齁喘痰促遇厚味即發者用蔔子淘净蒸熟晒研薑汁浸蒸餅丸菉豆大毎服三十丸以口津嚥下日三服治年遠脾泄百藥不効单煑白萊終日啖之不輟必瘥簡誤萊菔根葉皆可食生熟皆宜乃蔬中之至賤而能止渴充飢者歉歲農人種之最有利益但性專下氣復能耗血故多食則髭髮早白服地黄何首鳥者不可食子消痰下氣更速凡虛弱人忌之苦菜味苦寒無毒主五藏邪氣厭伏也穀胃痺腸澼渴熱中疾惡瘡久服安心益氣聰察少臥輕身耐老耐饑寒髙氣不老疏苦菜與苦苣苦蕒一物而形稍異功用則相同也稟天地之隂氣故其味苦氣寒無毒入心脾胃三經其主五臟邪氣者邪熱客于心也胃痺渴熱中疾者熱在胃也腸澼者熱在大腸也惡瘡者熱瘀傷血也苦寒總除諸熱故主之也熱去則神自清故久服安心益氣聰察少卧也輕身耐老耐飢寒髙氣不老者總言其熱退隂生安心益氣之極功也主治參互㓂宗奭衍義治疔瘡以苦苣搗汁傅之殊騐青苖葉隂乾以備冬月需用為末水調傅之唐珤經騐方對口惡瘡野苦苣擂汁一鍾入姜汁一匙和酒服以渣傅一二次即愈肘後方中沙虱毒沙虱在水中人澡浴則着人身鑚入皮裏初得皮上正赤如小豆黍粟摩之痛如刺三日後發寒熱發瘡毒若入骨殺人嶺南多此即以茅葉刮去以苦菜汁塗之佳簡誤脾胃虛寒者忌之苜蓿味苦平無毒主安中利人可久食疏苜蓿草也嫰時可食處處田野中有之陜隴人亦有種者木經云苦平無毒主安中利人可久食然性頗凉多食動冷氣不益人根苦寒主熱病煩滿目黄赤小便黄酒疸搗汁一升服令人吐利即愈其性苦寒大能泄濕熱故耳以其葉煎汁多服專治酒疸大効神農本草經疏卷二十七
