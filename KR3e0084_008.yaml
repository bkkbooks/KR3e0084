body:
  text: 神農本草經疏卷八明繆希雍撰草部中品之上總六十二種今疏其要者三十種乾薑生薑葈耳實乾葛栝樓根及仁苦參當歸麻黄通草芍藥瞿麥𤣥參秦芁百合知母貝母白芷淫羊藿黄芩狗脊茅根紫菀紫草前胡白鮮紫參藁本萆薢白薇大青乾薑味辛温大熱無毒主胸滿欬逆上氣温中止血出汗逐風溼痺腸澼下痢寒冷腹痛中惡霍亂脹滿風邪諸毒皮膚間結氣止唾血生者尤良疏乾薑稟天地之陽氣故味辛而氣温雖熱而無毒辛可散邪理結温可除寒通氣故主胸滿欬逆上氣温中出汗逐風溼痺下痢因於寒冷止腹痛其言止血者葢血虚則發熱熱則血妄行乾薑炒黑能引諸補血藥入隂分血得補則隂生而熱退血不妄行矣治腸澼亦其義也生薑能通神明辟惡氣故主中惡霍亂脹滿風邪諸毒皮膚間結氣惟唾血定非寒證别録載之誤矣主治㕘互乾薑生用同橘皮烏藥白豆蔲除胸滿欬逆上氣同紫蘇桂枝能温中出汗加术則能逐風溼痺同术茯苓人參甘草治下利寒冷腹痛炒黑同生地黄白芍藥當歸牛膝治産後惡露不盡血虚發熱同地黄地榆芍藥麥門冬人參黄耆甘草升麻治腸澼下血同藿香縮砂橘皮紫蘇木香治中惡去木香加木𤓰則治霍亂脹滿加桂枝并治風邪諸毒皮膚間結氣同橘皮人參止胃虚嘔逆同橘皮术貝母茯苓治痰瘧久不愈同人參术桂枝橘皮治寒瘧同人參术甘草治虚寒泄瀉中寒作泄簡誤乾薑大辛辛能散氣走血久服損隂傷目隂虚内熱隂虚欬嗽吐血表虚有熱汗出自汗盜汗臟毒下血因熱嘔惡火熱腹痛法並忌之生薑味辛微温主傷寒頭痛鼻塞欬逆上氣止嘔吐久服去臭氣通神明疏生薑所稟與乾薑性氣無殊第消痰止嘔出汗散風袪寒止泄疎肝導滯則功優於乾者主治簡誤並與前同葈耳實味苦甘温葉味苦辛微寒有小毒主風寒頭痛風溼周痺四肢拘攣痛惡肉死肌膝痛溪毒久服益氣耳目聰明强志輕身疏葈耳蒼耳也得土之沖氣兼稟天之春氣故味甘温而别録益之以苦當是無毒葉味苦辛微寒有小毒苦以燥溼甘以和血温則通暢春氣發生而升故主風寒頭痛風溼周痺四肢拘攣惡肉死肌膝痛溪毒也袪風療溼之藥食療聖惠千金外臺秘要諸方咸堪選用亦無簡誤葛根味甘平無毒主消渇身大熱嘔吐諸痺起隂氣解諸毒療傷寒中風頭痛解肌發表出汗開腠理療金瘡止痛脇風痛生根汁大寒療消渇傷寒壯熱葛穀主下痢十嵗已上葉主金瘡止血花主消酒一名雞薺根一名鹿霍殺野葛巴豆百藥毒疏葛根稟天地清陽發生之氣其味甘平其性升而無毒入足陽明胃經解散陽明温病熱邪之要藥也故主消渇身大熱熱壅胸膈作嘔吐發散而升風藥之性也故主諸痺生氣升騰故起隂氣甘者土之沖氣春令少陽應兼微寒故解諸毒及别録療傷寒中風頭痛解肌發表出汗開腠理甘能和血而除熱故又主療金瘡止痛及脇風痛也主治㕘互葛根湯治陽明胃經温病邪熱頭疼發渇煩悶鼻乾不得眠如渇甚嘔甚則加石膏麥門冬知母竹葉葛根升麻湯治斑疹初發㸃粒未形同一切補腎益精藥作丸餌則起隂令人有子同升麻入升陽散火升陽除溼升陽益胃清暑益氣補中益氣等湯用簡誤傷寒頭痛兼項强腰脊痛及遍身骨疼者足太陽也邪猶未入陽明故無渇證不宜服五勞七傷上盛下虚之人暑月雖有脾胃病不宜服栝樓根味苦寒無毒主消渇身熱煩滿大熱補虚安中續絶傷除腸胃中痼熱八疸身面黄唇乾口燥短氣通月水止小便利實名黄𤓰主胸痺悦澤人面莖葉療中熱傷暑枸杞子為之使惡乾薑畏牛膝乾漆反烏頭疏栝樓根稟天地清寒之氣故味苦氣寒而無毒能止消渇身熱煩滿大熱熱散則氣復故又主補虚安中凉血則血和故主續絶傷并除腸胃中痼熱苦寒能除熱故主八疸身面黄唇乾口燥短氣血涼則不瘀故通月水膀胱熱解則小便不頻故能止小便利黄𤓰主胸痺及傷寒結胸悦澤人面栝樓仁主消痰莖葉療中熱傷暑者皆以其清寒散熱故也主治㕘互根同貝母竹瀝竹茹荆瀝天門冬消痰同金銀花連翹貝母白及甘草消一切腫毒實同黄連枳實為小陷胸湯治傷寒虚結胸簡誤脾胃虚寒作泄者勿服苦參味苦寒無毒主心腹結氣癥瘕積聚黄疸溺有餘瀝逐水除癰腫補中明目止淚養肝膽氣安五藏定志益精利九竅除伏熱腸澼止渇醒酒小便黄赤療惡瘡下部䘌平胃氣令人嗜食輕身𤣥參為之使惡貝母漏蘆菟絲子反藜蘆疏苦參稟天地隂寒之氣而生其味正苦其氣寒而沈純隂無毒足少隂腎經君藥也苦以燥脾胃之溼兼洩氣分之熱寒以除血分之熱熱則生風風溼合則生蟲故主心腹結氣癥瘕積聚黄疸溺有餘瀝逐水除癰腫明目止淚利九竅除伏熱腸澼止渇醒酒小便黄赤療惡瘡下部䘌瘡胃家溼熱盛則口淡不思食食亦不生肌肉溼熱散則胃氣平和而令人嗜食矣其曰補中養肝膽氣安五臟定志益精輕身者通指熱散溼除則臟腑氣血安和而致然也味既至苦性復隂寒善能殺蟲故藥性論治熱毒風皮肌煩燥生瘡赤癩睂脱主除大熱嗜睡主治㕘互臘月米醋漬入甕中封固主一切天行熱病頭疼口渇身熱甚者發狂飲碗許得吐則愈汗亦如之同胡麻刺蒺藜荆芥穗甘菊花狶薟白芷當歸川芎地黄天門冬何首烏牛膝漆葉秦芁龍膽草治大麻風同牡蠣粉白术青黛治童子胃熱羸瘦疳蚘同龍膽草為末牛膽和丸梧子大生大麥湯服五丸日三治穀疸食勞頭旋心怫鬱不安而發黄疸由失饑大食胃氣溼熱衝熏所致集驗方治熱毒足腫疼欲脱酒煮苦參以漬之簡誤苦參雖能洩血中之熱除溼熱生蟲為癘然以其味大苦氣大寒久服能損腎氣肝腎虚而無大熱者勿服當歸味甘辛温大温無毒主欬逆上氣温瘧寒熱洗洗在皮膚中婦人漏下絶子諸惡瘡瘍金瘡煮飲之温中止痛除客血内塞中風痓作痙汗不出溼痺中惡客氣虚冷補五臟生肌肉惡䕡茹麪畏菖蒲海藻牡蒙疏當歸稟土之甘味天之温氣别録兼辛大温無毒甘以緩之辛以散之潤之温以通之暢之入手少隂足厥隂亦入足太隂活血補血之要藥故主欬逆上氣也温瘧寒熱洗洗在皮膚中者邪在厥隂也行血則厥隂之邪自解故寒熱洗洗隨愈也婦人以血為主漏下絶子血枯故也諸惡瘡瘍其已潰者温補内塞則補血而生肌肉也金瘡以活血補血為要破傷風亦然並煮飲之内虚則中寒甘温益血故能温中血凝則痛活血故痛自止血溢出膜外或在腸胃曰客血得温得辛則客血自散也内塞者甘温益血之效也中風痙痙即角弓反張也汗不出者風邪乗虚客血分也得辛温則血行而和故痙自柔而汗自出也痺者血分為邪所客故拘攣而痛也風寒溼三者合而成痺血行則邪不能客故痺自除也中惡者内虚故猝中於邪也客氣者外來之寒氣也温中則寒氣自散矣虚冷者内虚血不榮於肉分故冷也補五臟生肌肉者臟皆屬隂隂者血也隂氣足則榮血旺而肌肉長也患人虚冷加而用之主治㕘互同川芎芍藥地黄名四物湯主婦人血分百病加炒黑乾薑炒黑豆澤蘭牛膝益母草蒲黄治婦人産後百病同桂枝术菊花牛膝主痺同牛膝鼈甲橘皮生薑治瘧在隂分久不止同酸棗仁逺志人參茯神治心血虚不得眠同黄耆生熟地黄黄芩黄連黄檗治盜汗同荆芥白芷芎藭地黄治破傷風同續斷牛膝杜仲地黄鹿角屑桂治一切折傷踠跌挫閃作疼同川芎人參治難産及倒生同益母草紅藍花蒲黄牛膝治産後血上薄心同白膠地黄芍藥續斷杜仲治婦人血閉無子同地榆金銀花滑石紅麴治滯下純血裏急後重簡誤當歸性辛温雖能活血補血終是行走之性故致滑腸又其氣與胃氣不相宜故腸胃薄弱洩瀉溏薄及一切脾胃病惡食不思食及食不消並禁用之即在産後胎前亦不得入麻黄味苦温微温無毒主中風傷寒頭痛温瘧發表出汗去邪熱氣止欬逆上氣除寒熱破癥堅積聚五臟邪氣緩急風脇痛字乳餘疾止好唾通腠理疎傷寒頭疼解肌洩邪惡氣消赤黑斑毒不可多服令人虛疏麻黄稟天地清陽剛烈之氣故本經味苦其氣温而無毒詳其主治應是大辛之藥藥性論加甘亦應有之氣味俱薄輕清而浮陽也升也手太隂之藥入足太陽經兼走手少隂陽明輕可去實故療傷寒為解肌第一専主中風傷寒頭痛温瘧發表出汗去邪熱氣者葢以風寒溼之外邪客於陽分皮毛之間則腠理閉拒榮衞氣血不能行故謂之實此藥輕清成象故能去其壅實使邪從表散也欬逆上氣者風寒鬱於手太隂也寒熱者邪在表也五臟邪氣緩急者五緩六急也風脇痛者風邪客於脇下也斯皆衞實之病也衞中風寒之邪既散則上來諸證自除矣其曰消赤黑斑毒者若在春夏非所宜也破癥堅積聚亦非發表所能潔古云去榮中寒邪洩衞中風熱乃確論也多服令人虚走散真元之氣故也主治㕘互仲景治傷寒有麻黄湯大小青龍湯治肺病上氣有射干麻黄湯厚朴麻黄湯同石膏杏仁桑白皮甘草治寒邪鬱於肺經以致喘滿欬嗽仲景治少隂病發熱脈沈有麻黄附子細辛湯及麻黄附子甘草湯同桂可治風痺冷痛蜜炒麻黄治冬月瘡疱為風寒所鬱以致倒靨喘悶一服立解簡誤麻黄輕揚發散故専治風寒之邪在表為入肺之要藥然其味大辛氣大熱性輕揚善散亦陽草也故發表最速若夫表虚自汗隂虚盜汗肺虚有熱多痰欬嗽以致鼻塞瘡疱熱甚不因寒邪所鬱而自倒靨虚人傷風氣虚發喘隂虛火炎以致眩暈頭痛南方中風癱瘓及平日陽虚腠理不密之人皆禁用汗多亡陽能損人壽戒之戒之自春深夏月以至初秋法所同禁通草味辛甘平無毒主去惡蟲除脾胃寒熱通利九竅血脈闗節令人不忘療脾疸常欲眠心煩噦出音聲療耳聾散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墮胎去三蟲疏通草者即木通也稟清秋之氣兼得土之甘淡故其味辛平别録加甘無毒又云微寒味甘而淡氣平味薄降也陽中隂也入足少隂太陽亦入手少隂太陽能助西方秋氣下降故利小便専瀉氣滯肺受熱邪津液氣化之源絶則寒水斷流膀胱受溼熱癃閉則約束小便不通宜此治之其證胸中煩熱口燥舌乾咽乾大渇引飲小便淋瀝或閉塞不通脛酸脚熱並宜此主之本經主除脾胃寒熱者以其通氣利溼熱也其曰通利九竅血脈闗節以其味淡滲而氣芬芳也令人不忘者心主記心家之熱去則心清而不忘矣溼熱生蟲故又主惡蟲療脾疸常欲眠心煩噦者脾家溼熱壅盛則成疸心脾之熱不清則昏昏欲眠而心煩噦音聲出於肺肺家之溼熱去則肺金之氣清而音聲出矣治耳聾者洩腎家之溼火也散癰腫諸結不消及金瘡惡瘡鼠瘻踒折齆鼻息肉墮胎又藥性論治五淋利小便開闗格下水排膿止痛及治人多睡水腫浮大陳士良主理溼熱小便數急疼少腹虚滿日華子主婦人血閉月候不勻乳結下乳者皆通竅之所致也主治㕘互同茯苓澤瀉燈心車前子猪苓治膀胱溼熱癃閉如疏中所引東垣所説入導赤散者以其能瀉丙丁之火則肺不受邪能通水道水源既清則津液自化而諸經之溼與熱得由小便洩去故也同牛膝生地黄天麥門冬五味子黄檗甘草治尿血同牛膝生地黄延胡索治婦人經閉及月事不調簡誤木通性通利凡精滑不夢自遺及陽虚氣弱内無溼熱者禁用妊娠忌之通脱木即今之通草也稟土之清氣兼得天之陽氣故味甘淡氣寒無毒東垣甘平陽中隂降也陽中之隂必下降故主利隂竅治五淋除水腫癃閉瀉肺解諸毒蟲痛明目退熱下乳催生以其色白體輕氣寒味淡故入手太隂經引熱下降以利小便故又入足陽明胃經通氣上達而下乳汁及除寒熱不通之氣以其氣寒而降也主治㕘互佐番降香紅麴鯪鯉甲山查沒藥治上部内傷簡誤虛脱人禁用孕婦勿服芍藥味苦酸平微寒有小毒主邪氣腹痛除血痺破堅積寒熱疝瘕止痛利小便益氣通順血脈緩中散惡血逐賊血去水氣利膀胱大小腸消癰腫時行寒熱中惡腹痛腰痛甄權主婦人血閉不通風日華子主女人一切病胎前産後諸疾治補勞退熱除煩益氣目赤腸風瀉血收元素主瀉肝安脾肺收胃氣止瀉利固腠理和血脈隂氣斂逆氣好古主理中氣治脾虚中滿心下痞脇下痛善噫肺急脹逆喘欬太陽􅍠衂目澀肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如坐水中後時珍止下利腹痛重疏芍藥稟天地之隂而兼得甲木之氣本經味苦平無毒别録加酸㣲寒氣薄味厚升而㣲降陽中隂也又可升可降隂也降也為手足太隂引經藥入肝脾血分圖經載有二種金芍藥色白木芍藥色赤赤者利小便散血白者止痛下氣赤行血白補血白補而赤瀉白收而赤散酸以收之甘以緩之甘酸相合用補隂血通氣而除肺燥故本經主邪氣腹痛除血痺破堅積寒熱疝瘕通順血脈散惡血逐賊血消癰腫婦人血閉不通目赤腸風瀉血赤所治也緩中去水氣利膀胱大小腸中惡腹痛腰痛女人一切病胎前産後諸病治風補勞退熱除煩益氣瀉肝安脾肺收胃氣止瀉利固腠理和血脈收隂氣斂逆氣理中氣治脾虚中滿心下痞脇下痛善噫肺急脹逆喘欬太陽􅍠衂目澀肝血不足陽維病苦寒熱帶脈病苦腹痛滿腰溶溶如坐水中止下痢腹痛後重白所治也詳味圖經以金木分赤白厥有深㫖芍藥味酸寒得木化金色白故白者兼金氣者也専入脾經血分能瀉肝家火邪故其所主收而補制肝補脾陡健脾經脾主中焦以其正補脾經故能緩中土虚則水泛濫脾實則水氣自去故去水氣土堅則水清故利膀胱大小腸中焦不治則惡氣乗虚而客之為腹痛補脾則中自和而邪不能留腹痛自止矣脾虚則溼氣下流客腎故腰痛得補則脾氣運而上行故腰痛自愈女人以血為主脾統血故治女人一切病胎前産後無非血分所闗酸寒能涼血補血故主胎産諸病土實則金肅而木氣自斂故治風除熱益血故能補勞退熱除煩脾統後天元氣得補則旺故益氣酸寒能瀉肝肝平則脾不為賊邪所干脾健則母能令子實故安脾肺胃氣屬土土虚則緩而散木化作酸故收胃氣脾虚則中氣下陷而成瀉利東垣以中焦用白芍藥則脾中升陽又使肝膽之邪不敢犯則瀉利自止矣肺主皮毛腠理脾主肌肉而為肺之母母能令子實故固腠理脾統血脾和則血脈自和酸斂入隂故收隂氣斂逆氣理中氣脾虚則中滿實則滿自消治中則心下不痞瀉肝則脇下不痛善噫者脾病也脾健則不噫肝脾之火上炎則肺急脹逆喘欬酸寒收斂以瀉肝補脾則肺自寧急脹逆喘欬之證自除涼血補血則太陽􅍠衂自愈脾虚則目澀得補則澀除肝家無火則肝血自足陽維病苦寒熱及帶脈病苦腹痛滿腰溶溶如坐水中皆血虚隂不足之候也肝脾和隂血旺則前證自瘳矣木芍藥色赤赤者主破散主通利専入肝家血分故主邪氣腹痛其主除血痺破堅積者血瘀則發寒熱行血則寒熱自止血痺疝瘕皆血凝滯而成破凝滯之血則痺和而疝瘕自消涼肝故通順血脈肝主血入肝行血故散惡血逐賊血榮氣不和則逆於肉裏結為癰腫行血凉血則癰腫自消婦人經行屬足厥隂肝經入肝行血故主經閉肝開竅於目目赤者肝熱也酸寒能涼肝故治目赤腸風下血者溼熱傷血也血涼則腸風自止矣主治㕘互白芍藥酒炒為君佐以炙甘草為健脾最勝之劑能治血虚腹痛同黄連滑石甘草升麻人參蓮肉藊豆紅麴乾葛為治滯下之神藥同人參白术茯苓炙甘草肉豆蔲橘皮車前子治脾虚洩瀉酒炒白芍藥二兩炙甘草二錢蓮子去心五十粒水煎治痘瘡有熱作洩熱甚加酒炒黄連一錢同荆芥防風生地黄黄耆炙甘草治腸風下血同當歸地黄牛膝炒黑乾薑續斷麥門冬五味子治産後血虚發熱君白芷炙甘草治痘瘡血虚發癢同黄耆防風治表虚傷風自汗赤芍藥同藿香橘皮木𤓰甘草治中惡腹痛同芎藭紅花生地黄當歸白芷荆芥治破傷風發熱疼痛同牛膝當歸地黄延胡索山查澤蘭紅藍花五靈脂治初産惡露不下腹痛冬月加肉桂同金銀花白芷鯪鯉甲紫花地丁夏枯草茜草生甘菊消一切癰腫同香附當歸地黄延胡索青皮治經阻腹痛加五靈脂蒲黄能散惡血逐敗血簡誤白芍藥酸寒凡中寒腹痛中寒作泄腹中冷痛腸胃中覺冷等證忌之赤芍藥破血故凡一切血虚病及泄瀉産後惡露已行少腹痛已止癰疽已潰並不宜服瞿麥味苦辛寒無毒主闗格諸癃結小便不通出刺決癰腫明目去翳破胎墮子下閉血養腎氣逐膀胱邪逆止霍亂長毛髮疏瞿麥稟隂寒之氣而生故味苦寒别録兼辛無毒苦辛能破血隂寒而降能通利下竅而行小便故主闗格諸癃結小便不通因於小腸熱甚者寒能散熱辛能散結故決癰腫除溼熱故明目去翳辛寒破血故破胎墮子而下閉血也去腎家溼熱故云養腎氣逐膀胱邪逆者亦洩溼熱故也溼熱客中焦則清濁不分而為霍亂通利溼熱則霍亂自解矣用蕋殼不用莖葉入藥先須以堇竹瀝浸一伏時漉出曬乾主治㕘互入八正散利小腸實熱結閉千金方立效散治下焦結熱小便淋閉或有血出或大小便出血瞿麥穗一兩炙甘草七錢五分山梔仁炒半兩為末每服七錢連鬚葱白七箇燈心五十莖生薑五片水二盞煎至七分時時温服簡誤瞿麥苦寒兼辛性猛利善下逐凡腎氣虚小腸無大熱者忌之胎前産後一切虚人患小水不利法並禁用水腫蠱脹脾虚者不得施𤣥參味苦鹹微寒無毒主腹中寒熱積聚女子産乳餘疾補腎氣令人明目主暴中風傷寒身熱支滿狂邪忽忽不知人温瘧洒洒血瘕下寒血除胸中氣下水止煩渇散頸下核癰腫心腹痛堅癥定五藏久服補虚明目强隂益精忌犯銅器解甄權殺瘤瘻瘰􅊓時珍斑毒利咽喉疏𤣥參正稟北方水氣而兼得春陽之和故味苦而微寒無毒别録兼鹹以其入腎也為足少隂經君藥黑乃水色苦能下氣寒能除熱鹹能潤下軟堅故主腹中寒熱積聚女子産乳餘疾補腎氣令人明目者益隂除熱故補腎而明目也熱則生風故主暴中風及療傷寒至春變為温病身熱支滿狂邪忽忽不知人主温瘧洒洒者邪熱在表也胸中氣亦邪熱也止煩渇散頸下核癰腫者解熱軟堅之效也心腹痛亦熱也堅癥者内熱血瘀而乾也益隂除熱故定五臟久服補虚强隂益精也散結氣而能軟堅故主瘰癧也散結涼血降火故解斑毒利咽喉也下寒血三字疑有誤主治㕘互同升麻甘草等分水煎治發斑咽痛出活人書同鼠黏子半生半炒各兩許為末新汲水服治急喉痺風同地黄甘菊花蒺藜枸杞子柴胡能明目同貝母連翹甘草栝樓根薄荷夏枯草治瘰癧同知母麥門冬竹葉治傷寒陽毒汗下後熱毒不散心下懊憹煩不得眠心神顛倒欲絶同黄連大黄等分蜜丸如梧子每三四十丸白湯下治三焦積熱經驗方治勞香𤣥參一斤甘松六兩為末煉蜜一斤和勻入瓶中封閉地中埋窨十日取出更用灰末六兩煉蜜六兩同和入瓶更窨五日取出燒之嘗令聞香其疾自愈簡誤血少目昏停飲寒熱支滿血虚腹痛脾虚泄瀉竝不宜服秦芁味苦辛平微温無毒主寒熱邪氣寒溼風痺肢節痛下水利小便療風無問久新通身攣急疏秦芁感秋金之氣故味苦平别録兼辛微温而無毒潔古氣微温味苦辛亦可云微寒隂中微陽可升可降降多於升入手足陽明經苦能洩辛能散微温能通利故主寒熱邪氣寒溼風痺肢節痛下水利小便性能袪風除溼故别録療風無問久新及通身攣急能燥溼散熱結故日華子治骨蒸及疳熱甄權治酒疸解酒毒元素除陽明風溼及手足不遂腸風瀉血養血榮筋好古泄熱益膽氣咸以其除溼散結清腸胃之功也雷公云左文列為秦即治病右文列為芁即發脚氣先以布拭上黄肉毛令盡用還元湯浸一宿曬乾用主治㕘互秦芁同乾葛山茵蔯五味子黄連白藊豆木通苜蓿治酒疸聖惠方治小便難腹滿不急治之殺人用秦芁一兩去苗細剉以水一大盞煎取七分去滓每於食前分為三服同薏苡仁木𤓰五加皮黄檗蒼术牛膝治下部溼熱作疼或生溼瘡孫真人治黄疸皮膚眼睛如金色小便赤取秦芁五兩牛乳三升煮取一升去滓納芒硝一兩分作三服正元廣利方療黄疸心煩煩熱口乾皮肉皆黄以秦芁三兩牛乳一大升同煮取七合去滓分温再服差此方出許仁則崔元亮集騐方凡發背疑似者須便服秦芁牛膝煎當即快利三五行即差簡誤下部虚寒人及小便不禁者勿服百合味甘平無毒主邪氣腹脹心痛利大小便補中益氣除浮腫臚脹痞滿寒熱通身疼痛及乳難喉痺止涕淚疏百合得土金之氣而兼天之清和故味甘平亦應微寒無毒入手太隂陽明亦入手少隂故主邪氣腹脹所謂邪氣者即邪熱也邪熱在腹故腹脹清其邪熱則脹消矣解利心家之邪熱則心痛自瘳腎主二便腎與大腸二經有熱邪則不通利清二經之邪熱則大小便自利甘能補中熱清則氣生故補中益氣清熱利小便故除浮腫臚脹痞滿寒熱通身疼痛乳難足陽明熱也喉痺者手少陽三焦手少隂心家熱也涕淚肺肝熱也清陽明三焦心部之熱則上來諸病自除主治㕘互仲景治傷寒病百合證有柴胡百合湯同知母貝母天門冬麥門冬百部桑根白皮薏苡仁枇杷葉治肺熱欬嗽及吐膿血同麥門冬白芍藥甘草通脱木利大小便同知母柴胡竹葉治寒熱邪氣通身疼痛同白芍藥炙甘草麥門冬五味子補中益氣同白芍藥白茯苓車前子桑根白皮治浮腫簡誤中寒者勿服知母味苦寒無毒主消渇熱中除邪氣肢體浮腫下水補不足益氣療傷寒久瘧煩熱脇下邪氣膈中惡及風汗内疸多服令人洩疏知母稟天地至隂之氣故味苦氣寒而無毒藥性論兼平日華子兼甘皆應有之入手太隂足少隂經苦寒能除煩熱至隂能入骨故主消渇熱中除邪氣脾腎俱虚則溼熱客之而成肢體浮腫肺為水之上源腎屬水清熱滋肺金益水臟則水自下矣補不足者清熱以滋金水之隂故補不足熱散隂生故益氣苦寒至隂之性煩熱得之即解故療傷寒久瘧煩熱及脇下邪氣凡言邪者皆熱也膈中惡即邪惡之氣中於膈中也風汗者熱則生風而汗自出也内疸者即女勞色疸也熱火既散隂氣即生故主上來諸證也多服令人洩者隂寒之物其味復苦則必傷脾胃生發之氣故作洩也主治㕘互入白虎湯解傷寒陽明證口渇頭疼煩熱鼻乾不得眠加竹葉麥門冬名竹葉石膏湯治陽明經前證大渇引飲頭疼欲破因作勞而得者加人參名人參白虎湯汗後煩熱不解亦用之同麥門冬石膏貝母橘紅鼈甲青蒿牛膝治久瘧煩熱而渇同貝母天門冬麥門冬沙參甘草桑白皮枇杷葉五味子百部治隂虚欬嗽同黄檗車前子木通天門冬生甘草治强陽不痿簡誤陽痿及易舉易痿洩瀉脾弱飲食不消化胃虚不思食腎虚溏洩等證法並禁用貝母味辛苦平微寒無毒主傷寒煩熱淋瀝邪氣疝瘕喉痺乳難金瘡風痙療腹中結實心下滿洗洗惡風寒目眩項直欬嗽上氣止煩熱渇出汗安五藏利骨髓厚朴白薇為之使畏秦芁反烏頭疏貝母在地則得土金之氣在天則稟清肅之令故味辛平别録兼苦微寒無毒入手太隂少隂隂中微陽可升可降隂也色白象金而主肺肺有熱因而生痰或為熱邪所干喘嗽煩悶必此主之其主傷寒煩熱者辛寒兼苦能解除煩熱故也淋瀝者小腸有熱也心與小腸為表裏清心家之煩熱則小腸之熱亦解矣邪氣者邪熱也辛以散結苦以泄邪寒以折熱故主邪氣也經曰一隂一陽結為喉痺一隂者少隂君火也一陽者少陽相火也解少隂少陽之熱除胸中煩熱則喉痺自愈矣乳難者足厥隂足陽明之氣結滯而不通辛能散結氣通其結滯則乳難自瘳熱解則血涼血涼則不痛故主金瘡熱則生風故主風痙别録又療腹中結實心下滿洗洗惡風寒者肺主皮毛也目眩者熱上攻也項直即風痙也欬嗽上氣氣上逆也煩熱渇邪不解汗不出者邪熱盛也其性専能散結除熱則上來諸證皆自愈矣病去則五臟自安骨髓自利也主治㕘互同知母前胡葛根麥冬甘草治陽明斑疹初發壯熱喘嗽有痰不得眠即本經所謂傷寒煩熱邪氣君橘皮前胡石膏知母麥門冬竹瀝治痰瘧同知母天麥門冬桑白皮枇杷葉百部桔梗甘草治肺熱欬嗽及胸中煩熱同生甘菊紫花地丁金銀花白及白蘞鼠黏子甘草夏枯草治一切熱毒消一切癰疽同鼠黏子𤣥參栝樓根白殭蠶甘草桔梗治風痙同鬱金橘葉連翹栝樓根鼠黏子夏枯草山茨菇山豆根𤣥參消一切結核乳巖瘰癧同百部百合薏苡仁麥冬蘇子鬱金童便竹瀝魚腥草治肺熱吐膿血同番降香鬱金橘紅逺志蘇梗蘓子香附白豆蔲開鬱痰加撫芎神麴并解一切氣鬱簡誤寒溼痰及食積痰火作嗽溼痰在胃惡心欲吐痰飲作寒熱脾胃溼痰作眩暈及痰厥頭痛中惡嘔吐胃寒作泄法應以辛温燥熱之藥如南星半夏天麻蒼白术茯苓之類治之者並禁用白芷味辛温無毒主女人漏下赤白血閉隂腫寒熱風頭侵目淚出長肌膚潤澤可作面脂療風邪久渇宜作瀉嘔吐兩脇滿風痛頭眩目痒可作膏藥面脂潤顔色疏白芷得地之金氣兼感天之陽氣故味辛氣温無毒其氣香烈亦芳草也入手足陽明足太隂走氣分亦走血分升多於降陽也性善袪風能蝕膿故主婦人漏下赤白辛以散之温以和之香氣入脾故主血閉隂腫寒熱風頭侵目淚出辛香散結而入血止痛故長肌膚芬芳而辛故能潤澤辛香温散得金氣故療風邪久瀉風能勝溼也香入脾所以止嘔吐療兩脇風痛頭眩目痒袪風之效也兼可作膏藥面脂潤顔色乃袪風散結之餘事耳主治㕘互同芍藥黄耆當歸地黄續斷杜仲益母草香附白膠主漏下赤白加牛膝主血閉隂腫寒熱同甘菊細辛藁本決明子蒺藜子荆芥穗辛夷治頭風侵目淚出同黄耆甘草地黄麥冬五味子能長肉同黄耆甘草茜草皂角刺金銀花夏枯草地黄赤芍藥排膿止痛消癰腫同升麻柴胡乾葛羌活治溼泄同羌獨活防風荆芥蒺藜胡麻仁甘菊花何首烏治風邪同貝母漏蘆連翹金銀花夏枯草蒲公英紫花地丁橘皮消乳癰結核衍義蝕膿方白芷一兩單葉紅蜀葵根二兩白芍藥白礬燒枯各半兩别研餘俱為細末黄蠟丸如梧子大空腹及飯前米飲下十丸或十五丸俟膿盡仍别以他藥補之同雄黄燒可以辟蛇同白芍藥治痘瘡作痒及皮膚搔痒簡誤白芷性升而温嘔吐因於火者禁用漏下赤白隂虚火熾血熱所致者勿用癰疽已潰宜漸減去淫羊藿味辛寒無毒主隂痿絶陽莖中痛利小便益氣力强志堅筋骨消瘰癧赤癰下部有瘡洗出蟲丈夫久服令人無子薯蕷為之使疏淫羊藿本得金土之氣而上感天之陽氣故其味辛甘其氣温而無毒本經言寒者誤也入手厥隂為補命門之要藥亦入足少隂厥隂可升可降陽也辛以潤腎甘温益陽氣故主隂痿絶陽益氣力强志莖中痛者肝腎虚也補益二經痛自止矣膀胱者州都之官津液藏焉氣化則能出矣辛以潤其燥甘温益陽氣以助其化故利小便也肝主筋腎主骨益腎肝則筋骨自堅矣辛能散結甘能緩中温能通氣行血故主瘰癧赤癰及下部有瘡洗出蟲丈夫久服令人無子者因陽旺則陽道數舉頻御女而精耗散故無子也一名仙靈脾柳文作毘毘者人臍也臍為命蔕故主入命門脩事如雷公法主治㕘互淫羊藿陽草也甘温益陽氣辛則走而能補宜與白蒺藜甘枸杞肉蓯蓉五味子牛膝山茱萸同用為補陽之妙劑漬醇酒飲益丈夫興陽道理腰膝冷亦治偏風不遂大約每藿一斤漬酒十斤如常法勿令過醉脩事時忌雞犬婦人見與五味子等分為末煉蜜丸如梧子大每三十丸薑茶湯下治三焦欬嗽腹滿不飲食氣不順聖濟總録治目昏生翳用仙靈脾生王𤓰即小栝樓紅色者等分為末每服一錢茶下日三服百一選方治病後青盲目日近者可治仙靈脾一兩淡豆䜴一百粒水一碗半煎一碗頓服即愈普濟方治小兒雀盲仙靈脾晚蠶蛾各半兩炙甘草射干各二錢半為末羊肝一枚切開摻藥末二錢紥定以黑豆一合米泔一盞同煮熟分二次食以汁送之痘疹入目用仙靈脾葳靈仙等分為末每服五分米湯下簡誤虚陽易舉夢遺不止便赤口乾强陽不痿並忌之黄芩味苦平大寒無毒主諸熱黄疸腸澼洩痢逐水下血閉惡瘡疽蝕火瘍療痰熱胃中熱小腹絞痛消穀利小腸女子血閉淋露下血小兒腹痛其子主腸澼膿血山茱萸龍骨為之使惡葱實畏丹砂牡丹藜蘆疏黄芩稟天地清寒之氣而兼金之性故味苦平無毒别録益之以大寒味厚氣薄隂中微陽可升可降隂也入手太隂少隂太陽陽明亦入足少陽其性清肅所以除邪味苦所以燥溼隂寒所以勝熱故主諸熱諸熱者邪熱與溼熱也黄疸腸澼洩痢皆溼熱勝之病也折其本則諸病自瘳矣苦寒能除溼熱所以小腸利而水自逐源清則流潔也血閉者實熱在血分即熱入血室令人經閉不通溼熱解則榮氣清而自行也惡瘡疽蝕者血熱則留結而為癰腫潰爛也火瘍者火氣傷血也涼血除熱則自愈也别録消痰熱者熱在胸中則生痰火在少腹則絞痛小兒内熱則腹痛胃中溼熱去則胃安而消穀也淋露下血是熱在隂分也其治往來寒熱者邪在少陽也五淋者溼熱勝所致也苦寒清肅之氣勝則邪氣自解是伐其本也主治㕘互入仲景小柴胡湯治傷寒寒熱邪在少陽亦治少陽瘧往來寒熱傷寒心下痞滿瀉心湯凡四方皆用黄芩以其主諸熱利小腸故也又太陽病下之利不止喘而汗出者有葛根黄芩黄連湯又太陽少陽合病下利黄芩湯成無已言黄芩苦而入心泄痞熱是黄芩能入手少隂陽明手足太隂少陽六經明矣葢以苦入心寒勝熱泄心火去脾溼則胃火不熏蒸於肺乃所以救肺也同芍藥黄連炙甘草車前子防風升麻治溼熱作泄腹痛同芍藥黄連炙甘草滑石升麻治滯下腹痛潔古風熱有痰睂眶作痛酒浸黄芩同白芷天麻等分為末每服二錢茶調下同芍藥麥門冬白术能安胎清熱一味為末酒服治炙瘡血出不止一切火丹為細末雞子清調敷又治驢馬負重傷破洗浄傅之主生肌肉簡誤黄芩為苦寒清肅之藥功在除熱邪而非補益之品當與黄連並列雖能清溼利熱消痰然苦寒能損胃氣而傷脾隂脾肺虚熱者忌之故凡中寒作泄中寒腹痛肝腎虛而少腹痛血虚腹痛脾虚泄瀉腎虚溏瀉脾虚水腫血枯經閉氣虚小水不利肺受寒邪喘欬及血虚胎不安隂虚淋露法並禁用狗脊味苦甘平微温無毒主腰背强機闗緩急周痺寒溼膝痛頗利老人療失溺不節男子脚弱腰痛風邪淋露少氣目闇堅脊利俛仰女子傷中闗節重萆薢為之使惡敗醬疏狗脊稟地中沖陽之氣而兼感乎天之陽氣故其味苦其氣平别録云甘微温無毒兼火化也苦能燥溼甘能益血温能養氣是補而能走之藥也入足少隂腎主骨骨者腎之餘也腎虚則腰背强機闗有緩急之病滋腎益氣血則腰背不强機闗無緩急之患矣周痺寒溼膝痛者腎氣不足而為風寒溼之邪所中也兹得補則邪散痺除而膝亦利矣老人腎氣衰乏肝血亦虚則筋骨不健補腎入骨故利老人也失溺不節腎氣虚脱故也經曰腰者腎之府動揺不能腎將憊矣此腰痛亦指腎虚而為溼邪所乗者言也氣血不足則風邪乗虚客之也淋露者腎氣與帶脈衝任俱虚所致也少氣者陽虚也目得血而能視水旺則瞳子精明肝腎俱虚故目闇女子傷中闗節重者血虚有溼也除溼益腎則諸病自瘳堅脊俯仰利矣主治㕘互得鹿茸白蘞艾茯苓蛇牀子治室女衝任帶脈三經虚寒下白帶得牛膝絲子地黄山茱萸白膠杜仲固精强骨壯腰腎得沈香牛膝石斛木𤓰五加皮白蘚皮菊花澤㵼蒺藜子能通利闗節除五緩六急簡誤腎虚有熱小水不利或短澀赤黄口苦舌乾皆忌之茅根味甘寒無毒主勞傷虚羸補中益氣除瘀血血閉寒熱利小便下五淋除客熱在腸胃止渇堅筋婦人崩中久服利人疏茅根正稟土之沖氣而兼感乎春陽生生之氣以生故其味甘氣寒而無毒入手少隂足太隂陽明勞傷虚羸必内熱甘能補脾甘則雖寒而不犯胃甘寒能除内熱故主勞傷虚羸益脾所以補中除熱所以益氣甘能益血血熱則瘀瘀則閉閉則寒熱作矣寒涼血甘益血熱去則血和和則瘀消而閉通通則寒熱自止也小便不利由於内熱也熱解則便自利淋者血分虚熱所致也涼血益血則淋自愈而腸胃之客熱自解津液生而渇亦止矣肝藏血而主筋補血涼肝則筋堅矣血熱則崩凉血和血崩自愈矣血熱則妄行溢出上竅為吐為咯為鼻衂齒衂涼血和血則諸證自除益脾補中利小便故亦治水腫黄疸而兼理傷寒噦逆也主治㕘互同麥冬生地枸杞子治勞傷内熱同生地麥冬蘇子枇杷葉白芍藥甘草蒲黄童便治諸血同牛膝生地黄童便治血熱經枯而閉同竹茹麥冬石膏人參治傷寒胃熱噦逆同芍藥赤小豆赤白茯苓車前子薏苡仁木𤓰石斛木通治水腫同枇杷葉竹茹麥門冬治火炎内熱反胃上氣同生地天麥門冬車前子牛膝白茯苓黄檗五味子枸杞子童便治溺血簡誤因寒發噦中寒嘔吐溼痰停飲發熱並不得服紫菀味苦辛温無毒主欬逆上氣胸中寒熱結氣去蠱毒痿蹷安五臟療欬唾膿血止喘悸五勞體虚補不足小兒驚癎􅍁冬為之使惡瞿麥雷九逺志畏茵蔯蒿疏紫菀感春夏之氣化而兼得地中之金性故味苦温别録兼辛無毒入手太隂兼入足陽明苦以泄之辛以散之温以行之辛先入肺肺主諸氣故主欬逆上氣胸中寒熱結氣去蠱毒亦辛之力也痿蹷者陽明之溼熱熏蒸於肺則肺熱而津液不能下滴傷其氣化以困水之上源故為痿蹷也肺為五臟之華葢而主諸氣肺安則能朝百脈散精布液於各臟故云安五臟也療欬逆吐膿血止喘悸者散肺家之邪也能安五臟故治五勞及體虚不足小兒驚癎亦虚而有熱故也熱散則驚癎自止得蜜蒸焙良主治㕘互古今傳信方治久嗽紫菀款冬花各一兩百部半兩為末作散每服三錢生薑三片烏梅一枚同煎湯下食後臨卧各一服入噙化丸治隂虚欬嗽千金方治婦人卒不得小便紫菀末以井花水服三撮便通小便血服五撮便止斗門方治纒喉風喉閉飲食不通欲死者返魂草根一莖洗浄納入喉中取惡涎出即瘥神效更以馬牙硝津嚥之即絶根一名紫菀南人呼為夜牽牛全幼心鑒治小兒欬嗽聲不出者紫菀末杏仁泥等分入蜜同研丸芡實大每服一丸五味子湯化下簡誤觀其能開喉痺取惡涎則辛散之功烈矣而其性温肺病欬逆喘嗽皆隂虚肺熱證也不宜専用及多用即用亦須與天門冬百部麥冬桑白皮苦寒之藥㕘用則無害紫草味苦寒無毒主心腹邪氣五疸補中益氣利九竅通水道療腹腫脹滿痛以合膏療小兒瘡及面皶疏紫草稟天地隂寒清和之氣故味苦氣寒而無毒入足少隂厥隂為涼血之聖藥故主心腹邪熱之氣五疸者溼熱在脾胃所成去溼除熱利竅其疸自愈邪熱在内能損中氣邪熱散即能補中益氣矣苦寒性滑故利九竅而通利水道也腹腫脹滿痛者溼熱瘀滯於脾胃則中焦受邪而為是病溼熱解而從小便出則前證自除也合膏藥療小兒痘瘡及面皶皆凉血之效也主治㕘互同紅花子生地黄甘草貝母牡丹皮濃煎加生犀角汁量兒大小以四十九匙至半盞為度治痘瘡深紅色或紫或黑陷乾枯便閉神效若在一朝及二朝内稍有元氣雖危可生痘疔痘毒咸治之惟痘毒須加黄耆金銀花鼠黏子痘瘡夾斑疹者加硬石膏麥冬知母竹葉一二劑即去之簡誤紫草苦寒而能通利九竅痘瘡家氣虚脾胃弱泄瀉不思食小便清利者俱禁用前胡味苦微寒無毒主療痰滿胸脇中痞心腹結氣風頭痛去痰實下氣治傷寒寒熱推陳致新明目益精半夏為之使惡皂莢畏藜蘆疏前胡得土金之氣而感秋冬之令故味苦微寒無毒入手太隂少陽陽中之隂降也應有甘辛平寒而能降所以下氣故除痰滿胸脇中痞心腹結氣痰厥頭風痛去痰下氣治傷寒寒熱推陳致新能去實熱及時氣内外俱熱單煮服之亦治一切氣破痰結及邪熱骨節煩悶氣喘欬嗽兼散風邪也主治㕘互同白前杏仁桑白皮甘草桔梗能豁風熱痰壅喘嗽下氣入青礞石滚痰丸中代黄芩治一切實痰有殊功其用黄芩者誤也同羌活乾葛柴胡黄芩栝樓根治時疫寒熱簡誤前胡苦辛微寒之藥也能散有餘之邪熱實痰而不可施諸氣虚血少之病故凡隂虚火熾煎熬真隂凝結為痰而發欬嗽真氣虚而氣不歸元以致胸脇逆滿頭痛不因於痰而因於隂血虚内熱心煩外現寒熱而非外感者法並禁用明目益精厥理亦謬白鮮味苦鹹寒無毒主頭風黄疸欬逆淋瀝女子隂中腫痛溼痺死肌不可屈伸起止行步療四肢不安時行腹中大熱飲水欲走大呼小兒驚癎婦人産後餘痛惡螵蛸桔梗茯苓萆薢疏白鮮皮稟天地清燥隂寒之氣其味苦寒别録兼鹹無毒降多於升隂也入足太隂陽明兼入手太陽苦能泄熱寒能除熱故主頭風有火證性寒而燥能除溼熱故主五疸欬逆者實火上衝也得寒而散則欬逆止矣淋瀝及女子隂中腫痛亦皆下部溼熱乗虚客腎與膀胱所致也溼痺死肌不可屈伸起止行步者地之溼氣感則害人皮肉筋脈也脾主四肢惡溼而喜燥今為溼邪所干故四肢不安也時行腹中大熱因而飲水大呼欲走者邪熱盛也小兒驚癎亦熱則生風之候也散溼除熱蔑不濟矣婦人産後餘痛應是血虚而熱非所宜也主治㕘互得牛膝石斛薏苡仁黄檗蒼术療足弱頑痺去下部溼熱多加金銀花佐以漢防己治下部一切溼瘡簡誤下部虚寒之人雖有溼證勿用紫參味苦辛寒微寒無毒主心腹積聚寒熱邪氣通九竅利大小便療腸胃大熱唾血衂血腸中聚血癰腫諸瘡止渇益精畏辛夷主甄權主散瘀血婦人血閉不通好古狂瘧􅍠血血利蘇恭主金瘡疏紫參稟地之隂氣兼得天之寒氣故味苦辛氣寒而無毒氣味俱厚隂也降也入足厥隂亦入足太陽陽明専入血分為除熱散結逐血之要藥故主心腹積聚寒熱邪氣通九竅利大小便畧同紫草也苦以燥溼洩熱辛以散結寒以除邪氣故療腸胃大熱唾血衂血腸中聚血亦主癰腫諸瘡者榮氣熱則留瘀而成癰腫血涼而活則自散也能散瘀血故主婦人血閉不通瘧有血蓄則狂陽明熱則鼽血溼熱在腸胃則血瘀滯而成血痢除熱活血故亦主金瘡主治㕘互仲景金匱玉函經滯下純血紫參湯主之聖惠方治吐血不止用紫參阿膠甘草等分為末烏梅湯或糯米湯服一二錢簡誤婦人血枯經閉禁用男子勞傷吐血陽氣虚乏脾胃弱者禁用藁本味辛苦温微温微寒無毒主婦人疝瘕隂中寒腫痛腹中急除風頭痛長肌膚悦顔色辟霧露潤澤療風邪嚲曳金瘡可作沐藥面脂實主風流四肢惡䕡茹疏藁本感天之陽氣兼得地之辛味故味辛氣温别録兼苦從火化也無毒入足太陽經温能通苦能洩大辛則善散氣厚則上升陽也婦人疝瘕隂中寒腫痛腹中急皆太陽經寒溼邪為病也風頭痛者風中於太陽經也此藥正入本經故悉主之凡癰瘡皆血熱壅滯毒氣浸淫於肌肉以致潰爛不收辛散苦洩則毒解滯消肌肉自長矣悦顔色者即去風作面脂之義也辟霧露療風邪者辛温芬芳開發升散之力也嚲曳金瘡及甄權治一百六十種惡風鬼疰流入腰痛冷能化小便通血作沐藥面脂日華子去皮膚疵皯酒齄粉刺元素主太陽經頭痛顛頂痛及大寒犯腦痛連齒頰東垣主頭面身體皮膚風溼皆風邪溼氣干犯太陽經所致也好古主督脈為病脊强而厥者督脈並足太陽經夾脊而上故也主治㕘互同羌活細辛川芎葱白治寒邪鬱於足太陽經頭痛顛頂痛非此不能除與木香同用治霧露療清邪中於上焦與白芷同作面脂治小兒疥癬煎湯浴之并以浣衣治風又治溼各從其類也簡誤温病頭疼發熱口渇或骨疼及傷寒發於春夏陽證頭疼産後血虚火炎頭痛皆不宜服􅒝薢味苦甘平無毒主腰背痛强骨節風寒溼周痺惡瘡不瘳熱氣傷中恚怒隂痿失溺闗節老血老人五緩薏苡為之使畏葵根大黄柴胡前胡疏萆薢得火土之氣而兼稟乎天之陽氣故味苦甘平無毒陽中之隂降也入足陽明少隂厥隂為袪風除溼補益下元之要藥故主腰背痛强骨節風寒溼周痺惡瘡不瘳熱氣傷中恚怒隂痿失溺闗節老血老人五緩正以苦能燥溼甘入脾而益血故悉主之甄權又主冷風􅍙痺腰脚癱緩不遂手足驚掣男子腰痛久冷腎間有溼膀胱宿水日華子主頭旋癎疾補水臟堅筋骨益精明目中風失音海藏主肝虚李氏治白濁莖中痛痔漏壞瘡已上諸證無非陽明溼熱流入下焦客於肝腎所致此藥袪陽明之溼熱以固下焦故能去濁分清而療下元虚冷溼邪為病也主治㕘互得牛膝本𤓰薏苡仁黄檗骨碎補續斷杜仲石斛生地黄狗脊治腰脊痛强骨節加术菖蒲茯苓治周痺同黄耆生地黄金銀花皂角刺皂莢子牛膝木𤓰石斛薏苡仁海風藤白殭蠶胡麻治惡瘡久不瘳同蓮子茯苓車前子木通澤瀉牛膝黄檗甘草可分清除溼楊氏家藏方治真元不足下焦虚寒小便頻數白濁如膏有萆薢分清飲又楊子建萬金護命方云凡人小便頻數不計度數便時莖中痛不可忍者此疾必先大腑不通水液只就小腸大腑愈加乾竭甚則渾身心躁如此即重證也此疾本因貪酒色積有熱毒腐物瘀血之類乗虚流入於小腸故便時作痛也不飲酒者必平生過食辛熱葷膩之物又因色傷而然此乃小便頻數而痛與淋證澀而痛者不同也宜用萆薢一兩水浸少時以鹽半兩同炒去鹽為末每服二三錢水一盞煎八分和滓服之使水道轉入大腸仍以葱湯頻洗穀道令氣得通則小便數及痛自減也簡誤萆薢本除風溼若下部無溼隂虚火熾以致溺有餘瀝莖中痛此真隂不足之候也無溼腎虚腰痛並不宜服菝葜土茯苓與萆薢形雖不同而主治不甚相逺李氏疑為一物數種理或然也總之皆善除溼袪風消水去濁分清固下焦元氣故能興陽道而主諸痺及惡瘡不瘳也主治及簡誤並同前忌茗醋白薇味苦鹹平大寒無毒主暴中風身熱支滿忽忽不知人狂惑邪氣寒熱酸疼温瘧洗洗發作有時療傷中淋露下水氣利隂氣益精久服利人疏白薇全稟天地之隂氣以生本經味苦鹹平别録益之以大寒無毒可知已暴中風身熱支滿者隂虚火旺則内熱熱則生風火氣煩灼故令支滿火旺内熱則痰隨火湧故令神昏忽忽不知人也狂惑邪氣寒熱酸疼皆熱邪所致也隂氣不足則陽獨盛而為熱心腎俱虚則熱收於内而為寒此寒熱之所以交作寒熱作則榮氣不能内榮是以肢體酸疼也先熱而後寒者名曰温瘧瘧必因暑而發隂氣不足則能冬不能夏至夏而為暑邪所傷秋必發為温瘧故知温瘧之成未有不由隂精不守而得者若夫隂精内守則暑不能侵瘧何自而作耶上來諸證皆由熱淫於内之所發經曰熱淫於内治以鹹寒此藥味苦鹹而氣大寒宜其悉主之也别録療傷中淋露者女子榮氣不足則血熱血熱故傷中淋露之侯顯矣除熱益隂則血自涼榮氣調和而前證自瘳也水氣亦必因於溼熱能除熱則水道通利而下矣終之以益精者究其益隂除熱功用之全耳主治㕘互婦人調經種子方中往往用之不孕縁於血少血熱其源必起於真隂不足真隂不足則陽勝而内熱内熱則榮血日枯是以不孕也益隂除熱則血自生旺故令有孕也其方以白薇為君佐以地黄白芍藥當歸蓯蓉白膠黄檗杜仲山茱萸天麥門冬丹參蜜丸久服可使易孕凡温瘧癉瘧久而不解者必屬隂虚除瘧邪藥中多加白薇主之則易瘳凡治似中風證除熱藥中亦宜加而用之良天行熱病得愈或愈後隂虚内熱及餘熱未除者隨證隨經應投藥中宜加之簡誤白薇苦鹹大寒之藥凡傷寒及天行熱病或汗多亡陽或内虚不思食食亦不消或下後内虚腹中覺冷或因下過甚洩瀉不止皆不可服大青味苦大寒無毒主療時氣頭痛大熱口瘡疏大青稟至隂之氣故味苦氣大寒無毒甄權云大青臣味甘能去大熱治温疫寒熱葢大寒兼苦其能解散邪熱明矣經曰大熱之氣寒以取之此之謂也時行熱毒頭痛大熱口瘡為胃家實熱之證此藥乃對病之良藥也主治㕘互千金方小兒口瘡大青十八銖黄連十二銖水三升煮一升日二服以瘥為度肘後方熱病下利因篤者大青湯大青四兩甘草赤石脂各三兩䜴八合水一斗煮三升分三服不過二劑差保幼大全方小兒卒然肚皮青黑乃血氣失養風寒乗之危惡之候也大青犀角水一盞煎八分服之良簡誤大青㣲苦鹹大寒心胃寒者禁用神農本草經疏卷八
