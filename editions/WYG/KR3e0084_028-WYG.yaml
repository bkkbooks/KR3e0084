body:
  text: 神農本草經疏卷二十八明繆希雍撰總一十三種今疏其要者六種移四種入草部中品葱白韭菜葱白辛平可作湯主傷寒寒熱出汗中風面目腫傷寒骨肉痛喉痺不通安胎歸目除肝邪氣安中利五藏益目睛殺百藥毒葱實味辛温無毒主明目補中不足葱根主傷寒頭痛葱汁平温主溺血解藜蘆毒𢎞景云葱有寒熱白冷青熱傷寒湯中不用青也疏葱稟天之陽氣得地之金味中空象肺其味辛平平即凉也而性無毒氣厚味薄升也陽也入手太隂足厥隂足陽明經辛能發散能解肌能通上下陽氣故外來怫鬱諸證悉皆主之傷寒寒熱邪氣并也中風面目腫風熱鬱也傷寒骨肉痛邪始中也喉痺不通君相二火上乘于肺也辛凉發散得汗則火自散而喉痺通也肝開竅于目散肝中邪熱故云歸目除肝邪氣邪氣散則正氣通血自和調而有安胎安中利五藏之功矣其曰益目睛殺百藥毒者則是辛潤利竅而兼解散通氣之力也主治參互活人書治傷寒頭痛如破連鬚葱白半斤生薑二兩水煎温服濟生秘覽時疾頭痛發熱者以連根葱白二十根和米煑粥入醋少許熱食取汗即解數種傷寒一二日初起不能分别者亦用之取汗風濕身痛用生葱搗爛入香油數㸃水煎調川芎鬱金末一錢服取吐楊氏産乳六月孕動困篤難救者葱白一大握水三升煎一升去滓頓服深師方胎動下血病痛搶心用葱白煑濃汁飲之未死即安已死即出未効再服一方加川芎隂毒腹痛厥逆唇青卵縮六脉欲絶者用葱一束去根及青留白二寸烘熱安臍上以熨斗火熨之葱壊則易良久熱氣透入手足温有汗即瘥乃服四逆湯若熨而手足不温不可治華陀救卒病方脫陽危證凡人大吐大泄之後四肢厥冷不省人事或與女子交後少腹堅痛外腎搐縮冷汗出厥逆須􅁷不救先以葱白炒熱熨臍後以葱白三七莖搗爛用酒煑灌之陽氣即囘加人參為要本事方小便閉脹不治殺人葱白三斤剉炒帕盛二個更互熨小腹氣透即通劉禹錫傳信方打撲損見血取葱新折者煻火煨熱剥皮其間有涕便將罨損處仍多煨續續易熱者立愈張氏經騐方金瘡折傷出血用葱白連葉煨熱或鍋烙炒熱搗爛傅之冷即再易神騐簡誤病人表虛易汗者勿食病已得汗勿再進韭味辛微酸温無毒歸心安五藏除胃中熱利病人可久食疏韭稟春初之氣而生兼得金水木之性故其味辛微酸氣温而無毒生則辛而行血熟則甘而補中益肝散滯導瘀是其性也以其微酸故入肝而主血分辛温能散結凡血之凝滯者皆能行之是血中行氣藥也心主血專理血分故曰歸心五藏之結滯去則氣血條暢而自安矣胃中熱乃胃中有瘀滯而發熱也瘀血行熱自除矣病人之氣抑鬱者多凡人氣血惟利通和韭性行而能補故可久食韭子味辛甘温無毒主夢中洩精溺血盖韭乃入足厥隂少隂經腎主閉藏肝主疏洩素問云足厥隂病則遺尿思想無窮入房太甚發為筋痿及為白淫韭子入厥隂而甘温補肝及命門之不足故主洩精溺血主治參互有一貧叟病噎膈食入即吐胸中刺痛或令取韭汁入鹽梅鹵汁少許細呷得入漸加忽吐稠涎數升而愈此亦仲景治胸痺痛用薤白皆取辛温能散胃脘痰飲惡血之義也一人臘月飲酒三盃自後食必屈曲下膈硬濇微痛右脉甚濇關脉沉此瘀血在胃脘之口氣因鬱而成痰隘塞食道也以韭汁半盞細細冷呷盡半斤而愈食療本草胸痺急痛如錐刺不得俛仰自汗出或徹背上不治或至死取生韭及根五斤洗搗汁服之瘥金匱要略風忤邪惡韭根一把烏梅十四個吳茱萸炒半升水一斗煑之仍以病人櫛内入煑三沸櫛浮者生沉者死煑至三升分三服千金方刺傷中水腫痛煑韭熱搨之簡誤韭性辛温通利雖曰補益然多食能令人神昏最為養性所忌胃氣虛而有熱者勿服韭黄未出于土者勿服食之滯氣以其氣尚抑鬱未申故也花食之亦動風神農本草經疏卷二十八
