body:
  text: 神農本草經疏卷九明繆希雍撰草部中品之下總七十八種今疏其要者三十六種又移入木部一種果部一種菜部四種艾葉惡實水萍王瓜地榆大小薊海藻澤蘭地笋昆布防己天麻阿魏髙良薑百部根蘹香子欵冬花紅藍花牡丹京三稜薑黄青黛鬱金蘆薈延胡索肉豆蔲補骨脂縮砂蜜蓬莪茂白前白藥子莎草根胡黄連鱧腸使君子白豆蔲剪草藿香木部移入豆蔲果部移入假蘇蘇香薷薄荷已上菜部移入艾葉味苦微温無毒主灸百病可作煎止下痢吐血下部䘌瘡婦人漏血利隂氣生肌肉辟風寒使人有子煎勿令見風𢎞景搗汁止傷血殺蚘蟲蘇㳟止衂血下血膿血痢主崩血金瘡安胎苦酒作煎治癬大明治婦人帶下霍亂轉筋疏艾葉禀天地之陽氣以生故味苦微温熟則大熱可升可降其氣芳烈純陽之草也故無毒入足太隂厥隂少隂三經燒則熱氣内注通筋入足故灸百病性能通竅辟惡殺鬼精故止鬼擊吐血芳烈之氣必燥故主下部􅉶瘡其治婦人漏血利隂氣生肌肉者皆以之導引凉血補血藥為用者也使人有子盖指氣血兩虚之人風寒乘虚入子宫不孕者設也辟風寒其性辛温也搗汁服止傷血者生寒而兼辛散也殺蚘蟲者辛而苦也主衂血者傷寒邪熱鬱而不汗則發衂也風邪入大腸則下血濕熱傷脾胃則下痢膿血煮則上升故亦止崩漏也理金瘡血熱則行也胎為風寒之氣所犯則不安風寒散則胎自安也苦酒作煎治癬甚良者殺蟲之功也治婦人帶下温中除濕而升也止霍亂轉筋者因寒而得也為治白帶之要藥調經之妙品故婦人方多須之主治參互艾葉能灸百病陳久者良入紅鉛蒸臍補陽虚温脾胃治婦人月事不調血少無熱證者同香附醋浸入四物湯加阿膠枳殻神效金匱要略婦人有漏下者有半産後下血不絶者有妊娠下血者竝以膠艾湯主之阿膠二兩艾葉三兩芎藭甘草各二兩當歸地黄各三兩芍藥四兩水五升清酒五升煮取三升内膠令消盡每温酒一升日三服妊娠産後血虚人作痢下血用膠艾湯蘄艾阿膠白芍藥人參橘皮甘草胎前加黄芩産後入當歸燒烟入管中熏狐惑蟲􅉶良非時不正之氣傷人發為頭痛壯熱因於寒者用乾艾葉三升水一斗煮取一升頓服取汗出肘後方婦人良方治妊娠風寒卒中不省人事狀如中風用熟艾三兩米醋和炒極熱以絹包熨臍下良久即解蚘蟲咬或心痛如刺口吐清水白熟艾一升水三升煮取一升服吐蟲出或取生艾搗汁五更先食香脯一片乃飲一升當下蟲出鵞掌風用蘄艾五兩水四五碗煮五六滚入大口瓶覆以麻布二層熏掌心如冷頓熱再熏如神發背初起急灸瘡頭不痛灸至痛痛灸至不痛奪命神方也縱潰毒氣外洩不致内攻矣若未潰瘡頭用濕紙貼上看先乾處是也即於此灸臁瘡年久口冷不合者用艾烟熏之簡誤艾性純陽善辟風寒濕氣及非時邪氣然性氣芳烈而燥熱凡婦人胎動不安由於熱而不由於寒妊娠下痢膿血由於暑濕腸胃熱甚而非單濕為病崩中由於血虚内熱經事先期由於血熱吐血不由於鬼擊中惡霍亂轉筋不由於寒邪而由於脾胃虚弱停滯或傷暑所致不孕由於血虚而不由於風寒入子宫法竝忌之惡實味辛平主明目補中除風傷疏惡實至秋而成得天地清凉之氣本經言辛平藏器兼苦升多於降陽也入手太隂足陽明經為散風除熱解毒之要藥辛能散結苦能洩熱熱結散則臟氣清明故明目而補中風之所傷衛氣必壅壅則發熱辛凉解散則表氣和風無所留矣故除風傷藏器主風毒腫諸瘻元素主潤肺散結氣利咽膈去皮膚風通十二經者悉此意耳故用以治瘾􅇙痘瘡尤獲竒騐主治參互同赤檉木為􅇙家要藥同浮萍等分為末治風熱瘾􅇙薄荷湯下每服二錢日進二服同紫草犀角生地黄治天行痘瘡血熱乾枯不得出有神痘􅇙要訣治咽喉痘瘡牛旁子二錢桔梗一錢五分粉草節七分水煎服和濟局方治痘瘡出不快時壯熱狂躁咽膈壅塞大便秘澁小兒咽腫不利牛旁子炒一錢二分荆芥穂二分甘草四分水煎温服已出亦可服名必勝散若大便利者勿用延年方治風齲牙疼單用一味煎湯含潄吐去袖珍方治便癰腫痛用牛旁子二錢炒研入蜜一匙朴消一匙空心温酒服劉禹錫傳信方療暴中風用𦂳細牛旁子根取時避風以竹刀或荆刀刮去土用生布拭了搗絞取汁一大升和蜜四大合温分二服得汗出便瘥簡誤惡實性冷而滑利痘瘡家惟宜於血熱便閉之證若氣虚色白大便自利或泄瀉者慎勿服之痧􅇙不忌泄瀉故用之無妨癰疽已潰非便閉不宜服水萍味辛酸寒無毒主暴熱身癢下水氣勝酒長鬚髪主消渇下氣以沐浴生毛髪久服輕身一名水花疏水萍專得水氣之清隂故味辛氣寒别録兼酸無毒盖其體輕浮其性清燥能袪濕熱之藥也熱氣鬱於皮膚則作癢味辛而氣清寒故能散皮膚之濕熱也寒能除熱燥能除濕故下水氣酒性濕熱而萍之質不沉於水其氣味辛寒輕清而散故能勝酒血熱則鬚髪焦枯而易墮凉血則榮氣清而鬚髪自長矣别録主消渇者以濕熱之邪去則津液自生而渇自止也其曰下氣以沐浴生毛髪者亦以寒能除熱凉血之驗也熱邪不干榮氣清旺則能獲輕身矣主治參互蘇頌曰治惡疾癘瘡遍身者濃煮汁浴半日多效聖恵方少年面皰挼浮萍􅝛之亦可飲汁少許千金翼方治小便不利膀胱水氣流滯浮萍日乾為末服方寸匕日二服良子母秘録風熱丹毒浮萍擣汁傅之令遍去風丹採浮萍詩曰天生靈草無根幹不在山間不在岸始因飛絮逐東風汎梗青青飄水面神仙一味去沉疴采時須在七月半選甚癱風與大風些小微風都不算豆淋酒化服三丸鐵幞頭上也出汗其法以紫背浮萍曬乾為細末煉蜜丸彈子大每服一丸以豆淋酒化下治癱瘓三十六種風有騐簡誤表氣虚而自汗者勿用王𤓰味苦寒無毒主消渇内疸瘀血月閉寒熱酸疼益氣愈聾療諸邪氣熱結䑕瘻散癰腫留血婦人帶下不通下乳汁止小便數不禁逐四肢骨節中水療馬骨刺人瘡一名土瓜疏王瓜禀土中清肅隂寒之氣故味苦氣寒而無毒其能除濕熱熱毒大約與栝樓性同故其主治内疸消渇邪氣熱結䑕瘻癰腫等證皆與栝樓相似而此則入血分諸病為多耳簡誤主治與栝樓亦略相似當不復贅地榆味苦甘酸微寒無毒主婦人乳痓痛七傷帶下五漏止痛除惡肉止汗療金瘡止膿血諸瘻惡瘡熱瘡消酒除消渇補絶傷産後内塞可作金瘡膏得髪良惡麥門冬疏地榆禀地中隂氣而兼得乎天之微陽故味苦甘酸氣則微寒而無毒氣薄味厚沉而降隂也入足厥隂少隂手足陽明經婦人乳痓痛者厥隂肝經有熱以致血分熱壅所致也七情傷於帶脉故帶下也五漏者陽明大腸濕熱傷血病也血熱則腫而作痛惡肉者亦血熱極則瘀故腫而成惡肉也傷則出血血出必發熱而作痛金瘡是也膿血不止皆血熱所致諸瘻惡瘡莫不由血熱所生苦寒能凉血洩熱熱散則血活腫消故竝主如上諸疾也性行而帶補味兼甘酸故補絶傷及産後内塞也消酒除渇明目止純血痢疳痢極效治腸風者皆善袪濕熱之功也沉寒入下焦故多主下部濕熱諸病主治參互地榆得金銀花等分佐以芍藥甘草枳殻黄連烏梅治血痢如熱在心經下利純鮮血則加生犀角汁十五匙神驗綿地榆四兩為君加金銀花兩許鯪鯉甲三片土炒研細水酒煎濃空心温熱服治横痃魚口有神雖甚四服無不消者若已成膿更加鹽水炒黄耆五錢白芷二錢主速潰易合去鯪鯉甲并加牛膝木瓜殭蠶黄蘖治下疳隂蝕極效聖惠方治婦人漏下赤白不止令人黄瘦地榆三兩米醋一斤煮十餘沸去滓食前稍熱服一合崔元亮海上方治赤痢骨立者地榆一斤水三升煎一升半去滓再煎如稠餳絞濾空腹時服三合日再服活法機要治久病腸風痛癢不止地榆五錢蒼术一兩水二鍾煎一鍾空心服一日一服肘後方治下血不止二十年者地榆䑕尾草各二兩水二升煮一升頓服若不斷以水漬屋塵飲一小盃投之宣明方治結隂下血腹痛不已地榆四兩炙甘草三兩每服五錢水一盞入縮砂七枚煎半盞分二服肘後方治小兒疳痢地榆煮汁熬如飴糖與服便已千金方治大指腫痛地榆煮汁漬之半日愈簡誤地榆性寒而下行凡脾胃虚寒作泄白痢久而胃弱胎産虚寒泄瀉血崩脾虚作泄法竝禁服大小薊根味甘温主養精保血大薊主女子赤白沃安胎止吐血鼻衂令人肥健疏大薊根禀土之冲氣兼得天之陽氣故味甘氣温而無毒日華子凉當是微寒陶云有毒誤也女子赤白沃血熱所致也胎因熱則不安血熱妄行溢出上竅則吐衂大薊根最能凉血血熱解則諸證自愈矣其性凉而能行行而帶補補血凉血則榮氣和榮氣和故令肥健也主治參互大薊葉得地榆茜草牛膝金銀花治腸癰腹癰少腹癰生搗絞汁入前四味濃汁和童便飲良得炒蒲黄㯶皮灰調汁半升治崩中下血立瘥又治瘀血作暈跌撲損傷作痛俱生取汁入酒并童便服又治惡瘡疥癬同鹽搗罯之藥性論云大薊亦可單用味苦平止崩中下血生取根搗絞汁服半升許立瘥日華子云大薊葉凉治腸癰腹藏瘀血血暈撲損可生研酒并小便任服惡瘡疥癬鹽研罨傅又名刺薊山牛旁小薊根苗氣味甘温微寒無毒其所禀與大薊皆同得土中冲陽之氣而兼得乎春氣者也故主養精保血精屬隂氣血之所生也甘温益血而除大熱故能養精而保血也陳藏器云破宿血生新血暴下血血崩出血嘔血等絞取汁作煎和沙糖合金瘡及蜘蛛蛇蝎毒服之亦佳日華子云小薊根凉無毒治熱毒風并胸膈煩悶開胃下食退熱補虚損苗去煩熱生研汁服小薊力微只可退熱不似大薊能補養下氣食療云小薊根生養氣取生根葉搗取自然汁服一盞亦佳又取葉煮食之除風熱根主崩中又女子月候傷過搗汁半升服之金瘡血不止挼葉封之夏月熱煩悶不止搗葉取汁半升服立瘥聖惠方治心熱吐血口乾用刺薊葉及搗絞取汁每服一小盞頓服又方乳石發動壅熱心悶吐血以生刺薊搗取汁每服三合入蜜少許攪匀服之外臺秘要治鼻塞不通小薊一把水二升煮取一升去滓分服梅師方治卒吐血及瀉鮮血取小薊葉搗汁温服簡要濟衆治九竅出血以刺薊一握絞取汁以酒半盞調和頓服如無鮮汁只擣乾者為末冷水調三錢又方治小兒浸淫瘡痛不可忍發寒熱刺薊末新水調傅瘡上乾即易之簡誤大小薊性下行以其能下氣故主崩衂多効惟不利於胃弱泄瀉及血虚極脾胃弱不思飲食之證海藻味苦鹹寒無毒主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣腹中上下鳴下十二水腫療皮間積聚暴㿉瘤氣熱結利小便疏海藻全禀海中隂氣以生故味苦鹹寒而無毒氣味俱厚純隂沉也苦能洩結寒能除血熱鹹能軟堅潤下故本經主癭瘤氣頸下核破散結氣癰腫癥瘕堅氣及腹中上下鳴下十二水腫療皮間積聚暴㿉瘤氣結熱利小便潔古專消癭瘤馬刀瘰􅊓諸瘡堅而不潰者經云鹹能軟堅榮氣不從外為浮腫隨各引經治之腫無不消反甘草一云有小毒主治參互危氏得効方治蛇盤瘰􅊓頭項交接者海藻菜以蕎麥麵炒過白殭蠶等分為末以白梅泡湯和丸梧子大每服六十丸米飲下必泄出毒氣宜加連翹范汪方海藻酒治癭氣及項下瘰癧用海藻一斤絹袋盛之以清酒二斤浸之春夏二日秋冬三日每服兩合日三酒盡再作其滓曝乾為末每服方寸匕日三服不過兩劑即瘥雷公云凡使須用生烏豆并紫背天葵同蒸一伏時曝乾用宜以淡白酒先洗淨為佳簡誤脾家有濕者勿服澤蘭味苦甘微温無毒主乳婦内衂中風餘疾大腹水腫身面四肢浮腫骨節中水金瘡癰腫瘡膿産後金瘡内塞防己為之使根名地笋疏澤蘭感土澤之氣故味苦甘而入血兼得乎春氣故微温而無毒桐君兼酸故入足厥隂太隂經苦能洩熱甘能和血酸能入肝温通榮血故又主癰腫瘡膿及婦人吹乳乳結止衂血并中風餘疾佐以益脾土之藥而用防己為之使則主大腹水腫身面四肢浮腫骨節中水氣日華子云澤蘭通九竅利闗脉養血氣破宿血消癥瘕産前産後百病通小腸長肉生肌消撲損瘀血治鼻洪吐血頭風目痛婦人勞瘦丈夫面黄又藥性論云澤蘭使味苦辛主産後腹痛頻産血氣衰冷成勞瘦羸又治通身面目大腫主婦人血瀝腰痛總其洩熱和血行而帶補之能也主治參互澤蘭婦人方中最為急用古人治婦人澤蘭丸甚多澤蘭得炒黒豆炮乾薑當歸芎藭乾地黄牛膝益母草赤芍藥蒲黄五靈脂治産後惡露不盡少腹作痛俗名兒枕痛寒月加桂多火及内熱虚勞人去桂加童便去五靈脂加人參鼈甲香附麥門冬治産後諸虚百病肺熱者去人參雷公云凡使須要别識雌雄其形不同大澤蘭莖葉皆圓眼青黄能生血調氣養榮氣與小澤蘭迥别採得後看葉上斑根須尖此藥能破血通久積凡修事大小澤蘭須細剉之用絹袋盛懸於屋南畔角上令乾用子母秘録治小兒蓐瘡嚼澤蘭心封上澤蘭氣味和平除婦人産後他用甚稀故無簡誤昆布味鹹寒無毒主十二種水腫癭瘤聚結氣瘻瘡疏昆布得水氣以生故味鹹氣寒而性無毒鹹能軟堅其性潤下寒能除熱散結故主十二種水腫癭瘤聚結氣瘻瘡東垣云癭堅如石者非此不除正鹹能軟堅之功也詳其氣味性能治療與海藻大略相同故同一簡誤也主治參互外臺秘要項下卒腫其囊漸大欲成癭者昆布海藻等分為末蜜丸杏核大時時含嚥汁聖惠方癭氣結核㿔㿔腫硬以昆布一兩洗去鹹曬乾為散每以一錢綿裹好醋浸過含之嚥汁味盡再易之項下五癭同此廣濟方治膀胱結氣急宜下氣用昆布一斤白米泔浸一宿洗去鹹味以水一斛煮熟劈細入葱白一握寸斷之更煮極爛乃下鹽酢糝薑橘椒末調和食之仍食粱米粳米飯極能下氣防己味辛苦平温無毒主風寒温瘧熱氣諸癎除邪利大小便療水腫風腫去膀胱熱傷寒寒熱邪氣中風手脚攣急止洩散癰腫惡結諸瘑疥癬蟲瘡通腠理利九竅疏防己得土中陽氣而兼感乎秋之燥氣以生故味辛苦平温無毒潔古謂其大苦辛寒為得之然性燥而不淳善走下行長於除濕以辛能走散兼之氣悍故主風寒温瘧熱氣諸癎除邪氣除濕下行故利大小便此本經所載也别録療水腫風腫去膀胱熱通腠理利九竅止泄者皆除濕之功也其曰傷寒寒熱邪氣中風手脚攣急則寒非燥藥可除不宜輕試又曰散癰腫惡結諸瘑疥癬蟲瘡非在下部者亦不宜用治濕風口眼喎邪手足拘痛真由中風濕而病者方可用之留痰非由脾胃中濕熱而得者亦不宜服肺氣喘嗽不因風寒濕所鬱腠理壅滯者勿用惟治下焦濕熱腫洩脚氣行十二經濕為可任耳生漢中内有淡黒紋暈如車輻解者良凡修事以車前草根相對蒸半日曬乾殺雄黄毒惡細辛畏萆薢女菀鹵鹹伏硝石殷孽為之使主治參互凡用防己於下部濕熱藥中亦必以二术茯苓黄蘗甘草萆薢木瓜石斛薏苡仁等補益之藥為主而使防己為使乃無瞑眩之患陶曰防己是療風水要藥潔古曰去下焦濕腫及痛并洩膀胱火邪必用漢防己龍膽草為君黄檗知母甘草佐之防己乃足太陽本經藥也本草十劑云通可去滯通草防己之屬是也夫防己大苦寒能瀉血中濕熱通其滯塞亦能瀉大便補隂瀉陽助秋冬瀉春夏之藥也比之於人則險而健者也幸災樂禍能首為亂階然善用之亦可敵兇突險此瞑眩之藥也故聖人存而不廢大抵聞其臭則可惡下咽則令人身心煩亂飲食減少至於十二經有濕壅塞不通及下注脚氣暨膀胱積熱非此藥不可真行經之仙藥無可代之者若夫飲食勞倦隂虚生内熱元氣穀食已虧以防己洩大便則重亡其血此不可用一也如人大渇引飲是熱在上焦肺經氣分宜滲泄而防己乃下焦血分藥此不可用二也外傷風寒邪傳肺經氣分濕熱而致小便黄赤乃至不通此上焦氣分禁用血藥此不可用三也大抵上焦濕熱者皆不可用下焦濕熱流入十二經致二隂不通者然後審而用之張仲景方治皮水胕腫按之没指不惡風水氣在皮膚中四肢聶聶動者防己茯苓湯主之防己黄耆桂枝各三兩茯苓六兩甘草三兩水一升煎半升日二服又方治風水惡風汗出身重脉浮防己黄耆湯主之防己一兩黄耆二兩二錢半白术七錢半炙甘草半兩剉散每服五錢生薑四片棗一枚水一盞半煎八分温服良久再服腹痛加芍藥又治風濕相摶闗節沉痛微腫惡風方同上簡誤防己固為去下焦血分濕熱之要藥然其性悍其氣猛能走竄决防大苦大寒能傷胃氣凡胃虚隂虚自汗盜汗口苦舌乾腎虚小水不利及胎前産後血虚雖有下焦濕熱慎毋用之犯之為害非細天麻味辛平無毒主諸風濕痺四肢拘攣小兒風癎驚氣利腰膝強筋力久服益氣輕身疏天麻得土之辛味兼感天之陽氣以生故其味辛氣平無毒大明云暖浮而升陽也入足厥隂經厥隂為風水之臟諸風濕痺四肢拘攣小兒風癎驚氣皆肝臟為邪氣所客致病天麻入肝味辛氣暖能逐風濕外邪則肝氣平和前證自瘳矣肝主筋位居於下故能利腰膝強筋力也風濕纒注則身重氣乏能除風濕則身自輕氣自益也凡頭風眩暈與夫痰熱上壅以致頭痛及眩或四肢濕痺麻木小兒風癎驚悸等證所必須之藥主治參互同术半夏黄芩前胡橘皮茯苓治痰厥頭痛同术橘皮茯苓車前治飲在心下作支滿同南星前胡橘皮白前消一切風痰簡誤風藥多燥風能勝濕故也凡病人覺津液衰少口乾舌燥咽乾作痛大便閉濇病火炎頭暈血虚頭痛及南方似中風皆禁用之阿魏味辛平無毒主殺諸小蟲去臭氣破癥積下惡氣除邪鬼蠱毒疏阿魏禀火金之氣而兼得乎天之陽氣故其味辛平温而無毒氣味俱厚陽也入足太隂陽明經其氣臭烈殊常故善殺諸蟲專辟惡氣辛則走而不守温則通而能行故能消積利諸竅除穢惡邪鬼蠱毒也蘇恭曰體性極臭而能止臭亦竒物也主治參互同人參橘紅京三稜蓬莪茂砂仁治一切肉食堅積入膏藥同麝香硫黄蘇合油貼一切痞塊同安息香百部青黛丹砂治尸疰惡氣簡誤阿魏之氣臭烈人之血氣聞香則順聞臭則逆故凡脾胃虚弱之人雖有痞塊堅積不可輕用當先補養胃氣胃氣強則堅積可漸磨而消矣故古人治大積大聚消其大半而止正此謂也髙良薑大温主暴冷胃中冷逆霍亂腹痛疏髙良薑禀地二之氣以生本經大温藏器辛温元素辛熱純陽浮也入足陽明太隂經二經為客寒所犯則逆冷霍亂腹痛諸病生焉辛温煖脾胃而逐寒邪則胃中冷逆自除霍亂腹痛自愈矣甄權治腹内久冷氣痛去風冷痺弱大明主轉筋瀉痢反胃解酒毒消宿食蘇頌治惡心嘔清水皆取其煖胃温中散寒袪冷之功也主治參互外臺秘要霍亂吐利髙良薑炙令香每用五兩以酒一升煮三四沸頓服亦治腹痛中惡普濟方霍亂嘔甚不止用髙良薑生剉二錢大棗一枚水煎冷服立定永類鈐方心脾冷痛用髙良薑三錢五靈脂六錢為末每服三錢醋湯調下簡誤髙良薑辛温大熱惟治客寒犯胃胃冷嘔逆及傷生冷飲食致成霍亂吐瀉之要藥如胃火作嘔傷暑霍亂火熱注瀉心虚作痛法咸忌之百部根微温蜀本云微寒主欬嗽上氣疏百部根正得天地隂寒之氣故蜀本云微寒日華子言苦本經言微温者誤也苦而下洩故善降肺氣升則喘嗽故善治咳嗽上氣能散肺熱故藥性論主潤益肺其性長於殺蟲傳尸骨蒸勞徃往有蟲故亦主之疳熱有蟲及蚘蟲寸白蟲蟯蟲皆能殺之又燒熏樹木蛀蟲觸烟即死亦殺蠅蠓日華子論之詳矣陶云殺蝨濃煎洗牛馬蝨即去陳藏器云火炙酒浸空腹飲去蟲蠶咬兼疥癬瘡主治參互同桑根白皮天麥二冬貝母枇杷葉五味子紫菀治一切虚嗽但不能治食積嗽千金方單用一味熬膏入蜜不時取服可療三十年嗽楊氏經驗方治遍身黄腫取鮮百部根洗擣罨臍上以糯米飯半升拌酒半合揉和盖在藥上用帛包住過一二日後口内作酒氣則水從小便出腫自消矣聖濟總録百蟲入耳百部炒研細末生油調敷耳門上簡誤百部味苦脾虚胃弱人宜兼保脾安胃藥同用庶不傷胃氣蘹香子味辛平無毒主諸瘻霍亂及蛇傷疏蘹香得土金之冲氣而兼禀乎天之陽故其味辛平亦應兼甘無毒辛香發散甘平和胃入足太隂陽明太陽少隂經故主霍亂香氣先入脾脾主肌肉故主諸瘻脾主四肢故主脚氣通腎氣膀胱為腎之腑故主膀胱腎間冷氣及治疝氣胃和則熱解熱解則口臭自除主治參互蘹香酒炒得川楝子荔枝核橘核肉桂蒼术木瓜牛膝治寒濕成疝得炒砂仁食鹽則主中惡腹痛霍亂腹痛吐逆古方惡毒癰腫或連隂髀間疼痛急攣牽入少腹不可忍一宿則殺人者用蘹香苗葉擣取汁一升服之日三四進用其滓以貼腫上冬間根亦可用此外國方永嘉以來用之起死神効簡誤蘹香辛温胃腎多火陽道數舉得熱則嘔者勿服欵冬花味辛甘温無毒主欬逆上氣善喘喉痺諸驚癎寒熱邪氣消渇喘息呼吸疏欵冬花得天地隂寒之氣而兼禀乎金水之性故凌氷雪而獨秀其味辛甘温而無毒隂中含陽降也辛能散而能潤甘能緩而能和温則通行不滯善能降下欬逆上氣善喘喉痺諸驚癎寒熱邪氣消渇喘息呼吸一皆氣升火炎之病也氣降則火自降氣降則陽交於隂水火既濟既濟則火不上炎氣不逆升肺不受邪得清肅之常道而諸證自退矣杏仁為之使得紫菀良主治參互欵冬花雖畏貝母然得貝母桑根白皮紫菀枇杷葉栝樓根百部天麥門冬杏仁治喘逆及咳嗽反良物有相制故也如半夏畏生薑得之則制其毒而愈能奏効也得麻黄杏仁桑根白皮甘草治風寒鬱實熱於上焦肺分作喘其効甚速一味燒烟吸之治喘嗽具如本草註中所載濟生方痰嗽帶血欵冬花百合蒸焙等分為末蜜丸龍眼大每卧時嚼一丸薄荷湯下欵冬花古今方用之為治嗽要藥以其辛温散而能降於肺無迕無分寒熱虚實皆可施用故無簡誤紅藍花味辛温無毒主産後血暈口噤腹内惡血不盡絞痛胎死腹中竝酒煮服亦主蠱毒下血堪作燕脂其苗生搗碎傅遊腫其子吞數顆主天行瘡子不出其燕脂主小兒䁎耳滴耳中疏紅藍花禀土與火之氣潔古海藏皆兼甘苦温隂中之陽故入心海藏以為肝經血分藥也入酒良乃行血之要藥其主産後血暈口噤者縁惡血不下逆上衝心故神昏而暈及口噤入心入肝使惡血下行則暈與口噤自止腹内絞痛由於惡血不盡胎死腹中非行血活血則不下瘀行則血活故能止絞痛下死胎也凡蠱藥之毒必傷血分此藥能行血血活則毒可解子主天行瘡子者痘瘡因血分有毒血行則毒散故主之也小兒聤耳亦血凝也血散則耳腫自消矣主治參互熱病胎死腹中新汲水濃煮紅藍花汁和童便熱飲之立瘥胞衣不下産後血暈竝同此法無不立効同延胡索當歸生地黄牛膝赤芍藥益母草川芎或丸或煎治經阻少腹作痛及結塊良其子主天行痘瘡血熱有功宜同生犀角紫草生地黄用燕脂其汁所造也痘瘡初發時以之抹眼眶及眼角可免瘡子入眼同薄荷金絲荷葉汁入礬末少許滴入耳中治聤耳同氷片真珠細末治痘毒及痘疔剔破令人吮出惡血抹入瘡眼中良簡誤紅藍花本行血藥也血暈解留滯行即止過用能使血行不止而斃世人所不知者牡丹味辛苦寒微寒無毒主寒熱中風瘈瘲痙驚癎邪氣除癥堅瘀血留舎腸胃安五藏療癰瘡除時氣頭痛客熱五勞勞氣頭腰痛風噤癲疾疏牡丹皮禀季春之氣而兼得乎木之性隂中微陽其味苦而微辛其氣寒而無毒其色赤而象火故入手少隂厥隂足厥隂亦入足少隂經辛以散結聚苦寒除血熱入血分凉血熱之要藥也寒熱者隂虚血熱之候也中風瘈瘲痙驚癎皆坐隂虚内熱榮血不足之故熱去則血凉凉則新血生隂氣復隂氣復則火不炎而無因熱生風之證矣故悉主之癰瘡者熱壅血瘀而成也凉血行血故療癰瘡辛能行血苦能泄熱故能除血分邪氣及癥堅瘀血留舎腸胃藏屬隂而藏精喜清而惡熱熱除則五藏自安矣别録并主時氣頭痛客熱五勞勞氣頭腰痛者泄熱凉血之功也甄權又主經脉不通血瀝腰痛此皆血因熱而枯之候也血中伏火非此不除故治骨蒸無汗及小兒天行痘瘡血熱東垣謂心虚腸胃積熱心火熾甚心氣不足者以牡丹皮為君亦此意也忌胡荽赤花者利白花者補主治參互神不足者手少隂志不足者足少隂故仲景腎氣丸用之治神志之不足究竟牡丹皮乃入心經正藥心主血凉血則心不熱而隂氣得寧用之腎經藥中者隂陽之精互藏其宅神志水火藏於心腎即身中坎離也交則隂陽和而百病不生不交則隂陽否而精神離矣欲求弗夭其可得乎入清胃散治陽明胃經血熱齒痛潔古曰葉為陽發生也花為隂成實也丹者赤色火也故能瀉隂胞中之火四物湯加之治婦人骨蒸又曰牡丹皮入手厥隂足少隂故治無汗之骨蒸然須與青蒿子天麥門冬沙參地黄五味子牛膝枸杞之屬同用始得其力簡誤牡丹皮本入血凉血之藥然能行血凡婦人血崩及經行過期不凈竝忌與行血藥同用京三稜味苦平無毒主老癖癥瘕結塊俗傳昔人患癥癖死遺言令開腹取之得病塊堅硬如石文理有五色人謂異物竊取削成刀柄後因以刀刈三稜柄消成水乃知此可療癥癖也黄色體重狀若鯽魚而小者良疏京三稜禀火土之氣故本經味苦平潔古兼甘亦應兼辛兼甘故無毒入足厥隂亦入足太隂從血藥則治血從氣藥則治氣老癖癥瘕積聚結塊未有不由血瘀氣結食停所致苦能泄而辛能散甘能和而入脾血屬隂而有形此所以能治一切凝結停滯有形之堅積也又主産後惡血血結通月水墮胎止痛利氣者亦散血行氣之功用也潔古用以治心膈痛飲食不消海藏用以通肝經積血皆與作者之意合也主治參互同蓬莪茂青皮香附延胡索肉桂牡蠣鼈甲人參則消一切堅癥老癖之積聚同青皮紅藍花當歸川芎生地黄芍藥桂心牛膝延胡索五靈脂則治産後一切惡血停滯留結及月水凝蓄不通少腹作痛不可按同橘皮青皮縮砂蜜紅麯山查麥牙人參肉荳蔲黄連則消一切食積并氣壅塞不利子母秘録治小兒氣癖三稜煮汁作羮粥與奶母食日亦以棗許與兒食小兒百日及十嵗已下癎熱痃癖皆理之合人參彌良簡誤京三稜潔古謂其辛苦甘無毒隂中之陽能瀉真氣真氣虚者勿用此見諦之言也故凡用以消導必資人參芍藥地黄之力而後可以無弊觀東垣五積方皆有人參意可知已何者盖積聚癥癖必由元氣不足不能運化流行致之欲其消也必藉脾胃氣旺能漸漸消磨開散以收平復之功如秪一味專用克削則脾胃之氣愈弱後天之氣益虧將見故者不去新者復至矣戒之哉薑黄味辛苦大寒無毒主心腹結積疰忤下氣破血除風熱消癰腫功力烈於鬱金疏薑黄得火氣多金氣少故其味苦勝辛劣辛香燥烈性不應寒宜其無毒陽中隂也降也入足太隂亦入足厥隂經苦能泄熱辛能散結故主心腹結積之屬血分者兼能治氣故又云下氣總其辛苦之力破血除風熱消癰腫其能事也日華子謂其能治癥瘕血塊又通月經及撲損瘀血蘇頌謂其袪邪辟惡治氣脹及産後敗血攻心方書用以同肉桂枳殻治右脇痛臂痛有効戴元禮云能入手臂治痛何莫非下氣破血辛走苦洩之功歟察其氣味治療乃介乎京三稜鬱金之藥也主治參互得當歸生地黄牛膝延胡索肉桂治一切積血在腹中作痛經驗方治中寒心痛難忍薑黄一兩桂三兩為末醋湯服一錢産寳方治産後血痛有塊用薑黄桂心等分為末酒服方寸匕血下盡即愈簡誤凡病人因血虚臂痛血虚腹痛而非瘀血凝滯氣逆上壅作脹者切勿誤用誤則愈傷血分令病轉劇慎之慎之青黛味鹹寒無毒主解諸藥毒小兒諸熱驚癎發熱天行頭痛寒熱竝水研服之亦磨傅熱瘡惡腫金瘡下血蛇犬等毒染澱亦堪傅熱毒惡腫蛇虺螫毒疏青黛外國藍靛之英華也禀水土隂寒之氣以生故味鹹寒而無毒甄權謂其甘平以其得土氣之厚也故可解諸藥毒及小兒諸熱驚癎發熱天行頭痛寒熱竝水研服之亦磨傅熱瘡惡腫金瘡下血蛇犬等毒波斯國來及太原産者勝如不可得即用染甕上沫之紫碧色者亦可主治參互得蕪荑使君子肉胡黄連蘆㑹殺蟲除熱及小兒一切疳積病醫學正傳治心口熱痛薑汁調一錢服之聖惠方治内熱吐血青黛二錢新汲水下中藏經治肺熱咯血用青黛一兩杏仁以牡蠣粉炒過一兩研匀黄蠟化和作三十餅子方名青餅子每服一餅以乾柿半箇夾定濕紙裹煨香嚼食粥飲送下日三服生生編治小兒夜啼青黛水研服之宫氣方治小兒疳痢歌云孩兒雜病變成疳不問強羸女與男煩熱毛焦鼻口燥皮膚枯槁四肢癱腹中時時更下痢青黄赤白一般般眼澀面黄鼻孔赤榖道開張不可看此方便是青黛散孩兒百病服之安活人書治傷寒赤斑青黛二錢水研服簡誤青黛既禀隂寒之氣而生解毒除熱固其所長古方多有用之於諸血證者使非血分實熱而病生於隂虚内熱陽無所附火氣因空上炎發為吐衂咯唾等證用之非宜血得寒則凝凝則寒熱交作胸膈或痛愈増其病矣醫師宜詳辨之鬱金味辛苦寒無毒主血積下氣生肌止血破惡血血淋尿血金瘡疏鬱金禀天令清凉之氣而兼得土中金火之味故其味辛苦其氣寒而無毒潔古論氣味俱薄隂也降也入手亦能升入手少隂足厥隂兼通足陽明經辛能散苦能洩故善降逆氣入心肝胃三經故治血積氣降而和則血凝者散故主生肌止血其破惡血治血淋尿血主金瘡者調氣行血之功也單用亦治女人宿血氣心痛冷氣結聚温醋磨服之入心凉血故潔古用以凉心入足陽明故治陽毒入胃下血頻痛其性輕揚能開鬱滯故為調逆氣行瘀血之要藥主治參互鬱金同韭菜番降香當歸生地黄童便能治怒氣傷肝吐血又治鼻衂唾血喉中血腥氣及經脉逆行有痰方加竹瀝鬱金七兩同明礬三兩為細末薄米糊為丸梧子大每服五十丸白湯下昔人曽治婦人癲狂十年不愈初服此藥心胸間有物脱去即神氣洒然再服而蘇此驚憂痰血總聚心竅所致此藥入心去惡血明礬化頑痰故也龎安常傷寒論云痘􅇙始有白泡忽搐入腹漸作紫黒色無膿日夜叫亂者鬱金一枚甘草二錢半水半碗煮乾去甘草切片微火烘燥為末入真片腦半錢每用一錢以生猪尾血五七滴新汲水調下不過二服甚者毒氣從手足心出如癰狀乃瘥此乃五死一生之候也又范石湖文集云嶺南有采生之害其術於飲食中行厭勝法致魚肉能反生於人腹中而人已死則隂役其家初得覺胸腹痛次日刺人十日則生在腹中也凡胸膈痛即用升麻或膽礬吐之若膈下痛急以米湯調鬱金末二錢服即瀉出惡物或合升麻鬱金服之不吐則下李巽巖侍郎為雷州推官鞠獄得此方活人甚多簡誤鬱金本入血分之氣藥其治已上諸血證者正謂血之上行皆屬於内熱火炎此藥能降氣氣降即是火降而其性又入血分故能降下火氣則血不妄行丹溪不逹此理乃謂其上行治血則誤矣凡病屬真隂虚極隂分火炎薄血妄行溢出上竅而非氣分拂逆肝氣不平以致傷肝吐血者不宜用也即用之亦無効蘆薈味苦寒無毒主熱風煩悶胸膈間熱氣明目鎮心小兒癲癎驚風療五疳殺三蟲及痔病瘡瘻解巴豆毒俗呼為象膽盖以其味苦如膽故也生波斯國似黒錫疏盧㑹禀天地隂寒之氣故其味苦其氣寒其性無毒寒能除熱苦能泄熱燥濕苦能殺蟲至苦至寒故為除熱殺蟲之要藥其主熱風煩悶胸脇間熱氣明目鎮心小兒癲癎驚風療五疳殺三蟲者熱則生風熱能使人煩悶熱除則風熱煩悶及胸膈間熱氣自解凉肝故明目除煩故鎮心小兒癲癎驚風熱所化也五疳同為内熱脾胃停滯之證三蟲生於腸胃濕熱痔病瘡瘻亦皆濕熱下客腸臟致血凝滯之所生故悉主之能解巴豆毒亦除熱之力也詳其功用是足厥隂足太隂二經藥亦可兼入手少隂經主治參互同厚朴橘紅甘草青黛蕪荑百草霜旋復花為末以砂仁湯吞治小兒諸疳一嵗一分甚効衛生易簡方治脾疳與使君子等分為末每服一二錢米飲調下李恂用以主小兒諸疳熱甄權單用殺疳蚘及吹鼻殺腦疳除鼻癢蘓頌研末傅􅉶齒甚効治濕癬出黄水有神治大便不通真盧㑹研細七錢朱砂研如飛麵五錢滴好酒和丸每服三錢酒吞朝服暮通暮服朝通須天晴時修合為妙簡誤其味至苦其性大寒主消不主補凡兒脾胃虚寒作瀉及不思食者禁用延胡索味辛温無毒主破血産後諸病因血所為者婦人月經不調腹中結塊崩中淋露産後血暈暴血衝上因損下血或酒摩及煮服疏延胡索禀初夏之氣而兼得乎金之辛味故味辛氣温而無毒入足厥隂亦入手少隂經温則能和暢和暢則氣行辛則能潤而走散走散則血活血活氣行故能主破血及産後諸病因血所為者婦人月經之所以不調者無他氣血不和因而凝滯則不能以時至而多後期之證也腹中結塊産後血暈暴血衝上因損下血等證皆須氣血和而後愈故悉主之也崩中淋露利守不利走此則非與補氣血藥同用未見其可主治參互君當歸生地黄牛膝益母草童便則主産後血暈有神得四物湯白膠牛膝香附則主婦人經阻少腹作痛或結塊治人方治小便尿血用延胡索一兩朴硝七錢半為末毎服四錢水煎服非蓄血瘀滯者不可用勝金方治膜外氣疼及氣塊延胡索不限多少為末猪胰一具切作塊子炙熟蘸末頻食之聖惠方治熱厥心痛或發或止久不愈身熱足寒者用延胡索去皮金鈴子肉等分為末每温酒或白滚湯下二錢濟生方治婦女血氣腹中刺痛經候不調用延胡索去皮醋炒當歸酒浸炒各一兩橘紅二兩為末酒煮米糊丸梧子大每服一百丸空心艾醋湯下聖惠方治産後諸病凡産後穢汚不盡腹滿及産後血暈心頭硬或寒熱不禁或心悶手足煩熱氣力欲絶諸病竝用延胡索炒研酒服二錢直指方治疝氣危急用延胡索鹽水炒全蝎去毒生用等分為末空心鹽酒下又方治冷氣腰痛用延胡索當歸桂心等分為末温酒服三四錢隨量頻進以止為度聖惠方治墜落車馬筋骨痛不止延胡索末豆淋酒服二錢日二服簡誤此藥性温味辛能走而不能守故經事先期及一切血熱為病凡崩中淋露皆應補氣血凉血清熱則愈一切辛走之藥法所應禁肉荳蔲味辛温無毒主鬼氣温中治積冷心腹脹痛霍亂中惡冷疰嘔沫冷氣消食止洩小兒乳霍糯米粉裹煨去粉擂碎忌銅鐵器疏肉荳蔲禀火土金之氣故味辛氣温而無毒入足太隂陽明經亦入手陽明大腸辛味能散能消温氣能和中通暢其氣芬芳香氣先入脾脾主消化温和而辛香故開胃胃喜煖故也故為理脾開胃消宿食止洩瀉之要藥香能辟惡除不祥又中氣不虚則邪惡之氣不能入故主鬼氣及温中脾主中焦胃為後天生氣之本脾胃之陽氣旺則積冷心腹脹滿霍亂中惡冷疰嘔沫冷氣食不消洩不止小兒乳霍諸證自除矣主治參互君人參補骨脂吳茱茰五味子砂仁為治腎泄及冷泄之聖藥得縮砂蜜橘皮人參紅麴山查肉霍香麥芽為開胃進飲食消宿食止瀉之上劑獨用修事為末以棗肉和丸或為末縮砂湯下名公子登筵散言服之即可赴席其開胃進食消導之功烈矣百一選方治久瀉不止用肉荳蔲一兩木香二錢五分為末棗肉和丸米飲下四五十丸又方肉荳蔲煨一兩熟附子七錢為末糊丸米飲服四五十丸瑞竹堂方治老人虚瀉肉荳蔲三錢煨研乳香一兩為末全幼心鑑治小兒泄瀉用肉荳蔲五錢乳香二錢半生薑五片同炒黒色去薑研為膏收入宻器旋丸菉豆大每量大小米飲下聖惠方治冷痢腹痛不能食者肉荳蔲一兩去皮醋和麵裹煨擣末每服一錢粥飲調下簡誤大腸素有火熱及中暑熱泄暴注腸風下血胃火齒痛及濕熱積滯方盛滯下初起皆不宜服補骨脂味辛大温無毒主五勞七傷風虚冷骨髓傷敗腎冷精流及婦人血氣墮胎一名破故紙忌羊肉諸血得胡桃良疏補骨脂禀火土之氣而兼得乎天令之陽故其味辛其氣大温性則無毒陽中微隂降多升少入手厥隂心包絡命門足太隂脾經能煖水臟隂中生陽壯火益上之要藥也其主五勞七傷盖縁勞傷之病多起於脾腎兩虚以其能煖水臟補火以生土則腎中真陽之氣得補而上升則能腐熟水榖蒸糟粕而化精微脾氣散精上歸於肺以榮養乎五臟故主五臟之勞七情之傷所生病風虚冷者因陽氣衰敗則風冷乘虚而客之以致骨髓傷敗腎冷精流腎主骨而藏精髓乃精之本真陽之氣不固即前證見矣固其本而陽氣生則前證自除男子以精為主婦人以血為主婦人血氣者亦猶男子陽衰腎冷而為血脱氣陷之病同乎男子之腎冷精流也大温而辛火能消物故能墮胎主治參互三因方治精氣不固用破故紙青鹽等分同炒為末每服二錢米飲下普濟方治小便無度腎氣虚寒用破故紙十兩酒蒸茴香十兩鹽炒為末酒糊丸梧子大每服百丸鹽酒下或以末糝猪腎煨食之嬰童百問治小兒遺尿膀胱冷也夜屬隂故小便不禁用破故紙炒為末每夜熱湯服五分和劑方補骨脂丸治下元虚敗脚手沉重夜多盗汗縱慾所致此藥壯筋骨益元氣補骨脂四兩炒香菟絲子四兩酒蒸胡桃肉一兩去皮沉香研細一錢半煉蜜丸如梧子大每服二三十丸空心鹽湯温酒任下自夏至起冬至止日一服此乃唐宣宗時張壽太尉知廣州得方於南番人有詩云三年時節向邊隅人信方知藥力殊奪得春光來在手青蛾休笑白髭鬚經驗方治虚勞男子女人五勞七傷下元虚冷一切風病四肢疼痛駐顔壯氣烏髭鬚用補骨脂一斤酒浸一宿曬乾却用烏油麻一升和炒令麻子聲絶簸去只用補骨脂為末醋煮麵糊丸如梧子大每服二三十丸空心温酒鹽湯任下又方治腎虚腰痛用破故紙一兩炒為末温酒服三錢神効或加木香一錢和劑局方青娥丸治腎氣虚弱風冷乘之或血氣相摶腰痛如折俛仰不利或因勞役傷骨或濕痺傷腰或墮跌損傷或風寒客摶或氣滯不散皆令腰痛或腰間如物重墜用破故紙酒浸炒一斤杜仲去皮切片薑汁炒一斤胡桃肉去皮三十箇為末以蒜擣膏一兩和丸梧子大每空心温酒服二十丸婦人淡醋湯下常服壯筋骨活血脉烏髭鬚益顔色夏子益竒疾方治玉莖不痿精滑無歇時時如針刺揑之則脆此名腎漏用破故紙韭子各一兩為末每用三錢水二盞煎六分服日三次愈則止二神丸治脾腎虚瀉用破故紙炒半斤肉荳蔲生用四兩為末肥棗研膏和丸梧子大每服五七十丸空心米飲下本事方加木香二兩名三神丸直指方治打墜腰痛瘀血凝滯用破故紙炒茴香炒辣桂等分為末每熱酒服二錢唐鄭相國自叙云予為南海節度年七十五粤地卑濕傷於内外衆疾俱作陽氣衰絶服乳石補藥百端不應元和七年有訶陵國舶主李摩訶知予病狀遂傳此方并藥予初疑而未服摩訶稽首固請遂服之經七八日而覺應驗自爾常服其功神効十年二月罷郡歸京録方傳之用破故紙十兩淨去皮洗過曝乾酒浸蒸再曝搗篩令細胡桃瓤二十兩湯浸去皮細研如泥更以好蜜和令如飴糖瓷器盛之旦日以煖酒二合調藥十匙服之便以飯壓如不飲酒人以煖熟水調之餌久則延年益氣悦心明目補添筋骨但禁芸臺羊肉餘無所忌此物本自外番隨海舶而來非中華所有番人呼為補骨脂語訛傳為破故紙也王紹顔續傳信方載其事頗詳故録之按白飛霞方外竒方云破故紙屬火收斂神明能使心包之火與命門之火相通故元陽堅固骨髓充實濇以治脫也胡桃屬木潤燥養血血屬隂惡燥故油以潤之佐破故紙有木火相生之妙故語云破故紙無胡桃猶水母之無蝦也簡誤補骨脂陽藥也凡病隂虚火動陽道妄舉夢遺尿血小便短濇及目赤口苦舌乾大便燥結内熱作渇火升目赤易饑嘈雜濕熱成痿以致骨乏無力者皆不宜服縮砂蜜味辛温無毒主虚勞冷瀉宿食不消赤白泄痢腹中虚痛下氣疏縮砂蜜禀天地陽和之氣以生故其味辛其氣温其性無毒入足太隂陽明少隂厥隂亦入手太隂陽明厥隂可升可降降多於升陽也辛能散又能潤温能和暢通逹虚勞冷瀉脾腎不足也宿食不消脾胃俱虚也赤白滯下胃與大腸因虚而濕熱與積滯客之所成也辛以潤腎故使氣下行兼温則脾腎之氣皆和和則冷瀉自止宿食自消赤白滯下自愈氣下則氣得歸元故腹中虚痛自已也甄權用以止冷氣痛止休息痢消化水榖温煖肝腎陳藏器用以主上氣奔豚鬼疰邪氣鬼疰必由於脾腎兩虚隂陽乏絶故也日華子用以主一切氣轉筋霍亂轉筋霍亂必由脾胃為邪所干胃氣壅滯閉塞而成楊氏用以止痛安胎氣結則作痛氣逆則胎不安潔古用以治脾胃氣結滯不散皆下氣散結温中和胃入脾入腎入肝入命門入大腸之故耳主治㕘互縮砂蜜氣味辛温而芬芳香氣入脾辛能潤腎故為開脾胃之要藥和中氣之正品若兼腎虚氣不歸元非此為向導不濟殆勝桂附熱毒之害多矣好古謂得人參益智則入脾得黄蘖茯苓則入腎得赤白石脂則入大小腸也得人參橘皮藿香白茯苓白芍藥炙甘草治泄瀉兼嘔吐及不思食得藿香橘皮木𤓰治霍亂轉筋腹痛吐瀉獨用兩許炒為末入食鹽三錢滚湯一碗泡浸冷服治乾霍亂累効藥性論治冷滑下痢不禁虚羸以縮砂仁為末以羊子肝薄切糝之瓦上焙乾為末入乾薑末等分飯丸梧子大每四十丸白湯下日二服直指方治遍身腫滿隂亦腫者用縮砂仁土狗一箇等分研和老酒服之簡便方治痰氣膈脹用砂仁擣碎以蘿蔔汁浸透焙乾為末每服二錢食逺沸湯服簡便方治上氣欬逆用砂仁洗凈炒研生薑連皮等分擣爛熱酒食逺泡服温隐居方治子癎昏冐用砂仁和皮炒黒熱酒調下二錢不飲者米飲下此方安胎止痛其効不可盡述孫尚藥方治妊娠胎動偶因所觸或跌墮傷損致胎不安痛不可忍者用砂仁熨斗炒熱去皮用仁擣碎每服二錢熱酒調下須臾覺腹中胎動極熱即胎已安矣神効婦人良方治婦人血崩用砂仁於新瓦上焙研末米飲服三錢直指方治牙齒疼痛縮砂仁常嚼之良事林廣記治一切食毒用砂仁末水服二錢簡誤縮砂蜜氣味辛温陽藥也凡腹痛屬火泄瀉得之暑熱胎動由於血熱咽痛由於火炎小兒脫肛由於氣虚腫滿由於濕熱上氣欬逆由於火衝迫肺而不由於寒氣所傷皆須詳察簡别難以槩用誤則有損無益勿易視也本非肺經藥今亦有用之於欬逆者通指寒邪鬱肺氣不得舒以致欬逆之證若咳嗽多縁肺熱此藥即不應用矣蓬莪茂味苦辛温無毒主心腹痛中惡疰忤鬼氣霍亂冷氣吐酸水解毒食飲不消酒磨服之又療婦人血氣丈夫奔㹠疏蓬莪茂感夏末秋初之氣而得土金之味故其味苦辛其氣温而無毒陽中隂降也入足厥隂肝經氣分能破氣中之血入氣藥發諸香主積聚諸氣為最要之藥與京三稜同用之良心腹痛者非血氣不得調和即是邪客中焦所致中惡疰忤鬼氣皆由氣不調和臟腑壅滯隂陽乖隔則疫癘疰忤鬼氣得以憑之茂氣香烈能調氣通竅竅利則邪無所容而散矣解毒之義亦同乎是其主霍亂冷氣吐酸水及飲食不消皆行氣之功也故多用酒磨又療婦人血氣結積丈夫奔㹠入肝破血行氣故也多用醋磨鬱金入心亦入肝專主血分亦散肝鬱茂與三稜專能行氣破積薑黄行氣破血入脾為多主治參互得人參橘皮縮砂蜜京三稜肉荳蔲青皮麥蘖榖蘖木香消一切飲食停滯積聚及小兒癥癖甚良楊子建䕶命方治一切冷氣搶心切痛發即欲死久患心腹痛時發者蓬莪茂醋煮二兩木香煨一兩為末淡醋湯下半錢普濟方治婦人血氣遊走作痛及腰痛茂同乾漆等分為末酒服二錢腰痛核桃酒下保幼大全治小兒盤腸内釣痛以茂半兩用阿魏一錢化水浸週時焙研紫蘇湯下一字十全普救方治小兒氣痛以茂炮熟為末熱酒服一錢保幼大全治初生吐乳不止用茂少許鹽二釐乳一合煎三五沸去滓入牛黄二釐服之甚効危氏得効方治渾身燎炮每箇出水有靨一片如指甲大其泡復生抽盡肌肉即不可治用茂同三稜各五錢為末分三服酒調連進愈簡誤蓬莪茂行氣破血散結是其功能之所長若夫婦人小兒氣血兩虚脾胃素弱而無積滯者用之反能損真氣使食愈不消而脾胃益弱即有血氣凝結飲食積滯亦當與健脾開胃補益元氣藥同用乃無損耳白前味甘微温蜀本云微寒無毒主胸脇逆氣咳嗽上氣疏白前感秋之氣而得土之冲味故味甘辛氣微温蘇恭又謂微寒性無毒陽中之隂降也入手太隂肺家之要藥甘能緩辛能散温能下以其長扵下氣故主胸脇逆氣咳嗽上氣二病皆氣升氣逆痰隨氣壅所致氣降則痰自降能降氣則病本立拔矣微温微寒見人參條下主治參互寇宗奭曰白前能保定肺氣治嗽多用以温藥相佐使尤佳仲景金匱要略治嗽而脉浮用澤漆湯中有白前苗似細辛而大根色白亦似白㣲又似牛膝脆而易折不若白微之可彎而不折也苦者非是外臺方治久嗽吐血用白前桔梗桑根白皮各三兩甘草炙一兩水六升煮一升分三服忌猪肉菘菜深師方治久欬上氣體腫短氣晝夜倚壁不得卧常作水雞聲者白前湯主之白前二兩紫菀半夏各三兩大㦸七合以水一斗漬一宿煮取三升分作數十服苐進一服勿相繼以須藥力之行簡誤白前辛温走散下氣之藥性無補益凡欬逆上氣欬嗽氣逆由於氣虚氣不歸元而不由於肺氣因邪客壅實者禁用深師方中所主久欬上氣體腫短氣脹滿當是有停飲水濕濕痰之病乃可用之病不由於此者不得輕施白藥味辛温無毒主金瘡生肌疏白藥禀天地清寒之氣而兼金水之性故味辛經云氣温日華子云冷當是辛寒之藥無疑故無毒而能解毒金瘡出血過多必發熱熱則作痛不得生肌矣凉血清熱則其痛自止肌自生也又藥性論亦可單用味苦能治喉中熱塞噎痺不通胸中隘塞咽中常痛腫脹日華子云性泠消痰止嗽治渇并吐血喉閉消腫毒又云剪草根名白藥詳味二條所主皆解熱散結之功則其為寒明矣入肺入胃不言可知主治參互施州人取白藥子并野猪尾二味洗凈去粗皮焙乾等分為末酒調服二錢許療心氣痛解熱毒甚効又諸瘡癰腫不散者取生根爛擣傅貼乾則易之無生者用細末水調塗之亦可崔元亮海上方治一切天行熱病取白藥研如麵二錢漿水一大盞空腹頓服之便仰卧一食頃候心頭悶亂或惡心腹内如車鳴㽲刺痛良久當有吐利數行勿怪欲服藥時先令煮漿水粥於井中懸着待泠若吐利過度即喫泠粥一碗止之不喫即困人經驗方治妊娠傷寒䕶胎以白藥子為細末雞子清調攤於綿紙上可如碗大自臍貼至臍下胎存生處乾即以濕水潤之衍義又為治馬肺熱藥有効聖惠方治風熱上壅咽喉不利白藥三兩黑牽牛五錢同炒香去牽牛一半為末防風末三兩和匀每一錢水調服又方治吐血不止白藥煆存性糯米飲服三錢又方治吐血不止白藥煆存性糯米飲服三錢又方治咽喉腫痛白藥末一兩龍腦香二分五釐生蜜和丸芡實大每含嚥一丸又方名鐵罩散治胎熱不安用白藥子一兩白芷五錢為末每服二錢紫蘇湯下心煩熱入白砂糖少許經驗良方治衂血不止紅棗肉白藥各煆存性等分為末糯米飲調服二錢許簡誤苦寒辛散之物凡病雖有血熱吐衂等證若脾胃素弱易於作泄者勿服莎草根味甘微寒無毒主除胸中熱充皮毛久服令人益氣長鬚眉疏莎草根禀天地温燥之氣而兼得乎土金之味故其味甘應有苦辛微寒亦應微温無毒入足厥隂氣分亦入手太隂經氣厚於味陽中之隂降也血中之氣藥也能行十二經八脉氣分得童子小便苦酒漬過良芎藭為之使辛主散苦温主降泄肝主怒而苦急肺苦氣上逆而主皮毛怒則氣上逆逆則胸中熱降則肝氣平而胸中熱除肺得安而皮毛自充鬚眉自長矣其云久服益氣者是亦調氣之功也蘇頌又謂治心腹中客熱膀胱間連脇下氣妨常日憂愁不樂心忪少氣東垣治一切氣霍亂吐瀉腹痛腎氣膀胱冷氣世醫專用以治婦人崩漏帶下月經不調者皆降氣調氣散結理滯之所致也盖血不自行隨氣而行氣逆而鬱則血亦凝澀氣順則血亦從之而和暢此女人崩漏帶下月事不調之病所以咸需之耳然須輔之以益血涼血之藥氣虚者兼入補氣藥乃可奏功也海藏云本草不言治崩漏而方中用治崩漏是能益氣而止血也又能逐去瘀血是推陳也凡氣鬱血滯必用之藥童便浸透炒黒能止血治崩漏主治參互香附一斤童子小便浸透砂器中炒炒時不住手灑童便火勿過猛炒三晝夜為度川木耳四兩紙包裹以新瓦兩片夾定繩縳泥固火煆存性覺烟起良久急去火取置冷地候泠取出同香附研極細如麵每五七分淡醋湯調空心服此治血崩秘方累試有驗交感丹凡人中年精耗神衰盖由心血少火不下降腎氣憊水不上升致心腎隔絶榮衛不和上則多驚中則塞痞飲食不下下則虚泠遺精愚醫徒知峻補下田非惟不能生水滋隂而反見衰悴但服此方半年屏去一切煖藥絶嗜欲然後習袐固泝流之術其効不可殫述香附子一斤新水浸一宿炒黄同茯神四兩為末蜜丸彈子大每早細嚼一丸以降氣湯下降氣湯用香附半兩茯神二兩炙甘草一兩半為末㸃沸湯服前藥和劑局方升降諸氣并一切氣病痞脹喘噦噫酸煩悶虚痛走注常服開胃消痰散壅思食早行山行尤宜服之去邪辟瘴香附子炒四百兩沈香十八兩縮砂仁四十八兩炙甘草一百二十兩為末每服一錢鹽湯㸃服又方香附一斤砂仁八兩炙甘草四兩為末鹽湯服治一切氣疾心腹脹滿噎塞噫氣吞酸痰逆嘔惡及宿酒不解又方香附二十兩烏藥十兩甘草炒一兩為末鹽湯服二錢能調中快氣治心腹刺痛集簡方香附二兩蘄艾五錢以醋湯同煮熟去艾炒為末醋糊丸白湯服二錢治心氣痛腹痛少腹痛血氣痛不可忍仁存方香附皂莢水浸半夏各一兩白礬末半兩薑汁麵糊丸薑湯下一二錢治停痰宿飲風氣上攻胸膈不利同南星等分為末薑汁糊丸治老少痃癖往來疼痛集簡方香附末二錢以海藻一錢煎酒空心調下并食海藻治㿗疝脹痛及小腸氣婦人良方香附炒一兩荔枝核燒存性半兩為末每二錢米飲調下治血氣刺痛瑞竹堂方四製香附丸香附一斤分作四分用酒醋鹽水童便各浸春三夏一秋五冬七日淘淨曬搗微焙為末醋糊丸梧子大每酒下七十丸治女人經候不調兼諸病瘦人加澤蘭赤茯苓末二兩氣虚加四君子料血虚加四物料濟生方香附四兩茯苓甘草炙各一兩橘紅二兩為末沸湯下二錢治婦人氣盛血衰變生諸證頭暈腹滿皆宜獨用炒為末極熱酒服二錢立愈下血血崩或五色漏帶竝宜常服滋血調氣乃婦人之仙藥也同赤芍藥為末加鹽一捻煎服治赤白帶下及崩漏不止君縮砂仁炙甘草能臨産順胎九月十月服此永無驚恐獨用為末童溲調下二錢治氣鬱吐血君川芎治氣鬱頭痛獨用為末萊菔子煎湯早夜各服二錢治耳卒聾閉簡誤香附香燥苦温帶辛凡月事先期者血熱也法當涼血禁用此藥誤犯則愈先期矣胡黄連味苦平無毒主久痢成疳傷寒欬嗽温瘧骨熱理腰腎去隂汗小兒驚癎寒熱不下食霍亂下痢唐本云大寒主骨蒸勞熱補肝膽明目治冷熱洩痢益顔色厚腸胃治婦人胎蒸虚驚治三消五痔大人五心煩熱惡菊花𤣥參白鮮皮解巴豆毒服之忌猪肉令人漏精折之塵出如煙者真肉似鸜鵒眼者良疏胡黄連得天地清肅隂寒之氣故其味至苦其氣大寒性則無毒善除濕熱故主久痢成疳及冷熱洩痢厚腸胃傷寒欬嗽者邪熱在手太隂足陽明也温瘧骨蒸者熱在骨間也理腰腎去隂汗者腎虚濕熱下流客之使熱伏腎間也小兒驚癎寒熱不下食者熱則生風故發驚癎熱在胃口故不下食也心主五色脾胃主肌肉二經濕熱去則顔色自佳也三消五痔大人五心煩熱者無非濕熱在腸胃及火在五臟間也大寒至苦極清之性能清熱自腸胃以次於骨一切濕熱邪熱隂分伏熱所生諸病莫不消除主治參互蘇頌圖經治傷寒勞復身熱大小便赤如血色者胡黄連一兩山梔仁二兩入蜜半兩拌和炒令微焦二味搗羅為末用猪膽汁和丸梧子大每服用生薑二片烏梅一枚童便三合浸半日去滓食後煖童便令温下十丸臨卧再服甚効全幼心鑑治小兒疳熱肚脹潮熱髪焦不可用大黄黄芩傷胃之藥恐生别證以胡黄連五錢五靈脂一兩為末雄猪膽汁和丸菉豆大米飲服一二十丸錢乙小兒方訣治脾熱疳疾用胡黄連川黄連各半兩硃砂二錢半為末入猪膽内紥定以杖子釣懸於砂鍋内漿水煮一炊久取出研爛入蘆薈麝香各一分飯和丸麻子大每服五七丸至一二十丸米飲下又方治小兒黄疸胡黄連川黄連各一兩為末用王瓜一箇去瓤留蓋入藥在内合定麵裹煨熟去麵搗丸菉豆大量大小温水下簡誤胡黄連氣味苦寒之至設使隂血太虚真精耗竭而胃氣脾隂俱弱者雖見如上諸證亦勿輕投即欲用之亦須與健脾安胃等藥同用乃可無弊慎之鱧腸味甘酸平無毒主血痢針灸瘡發洪血不可止者傅之立已汁塗髪眉生速而繁疏鱧腸正禀北方坎水之氣故其汁𤣥黒其味甘酸平而無毒純隂之草也入腎入肝亦入胃與大小腸善凉血鬚髪白者血熱也齒不固者腎虚有熱也凉血益血則鬚髪變白而齒亦因之而固矣故古今變白之草當以茲為勝本經主血痢及針灸瘡發洪血不可止者傅之立已塗眉髪生速而繁蕭炳又謂能止血排膿通小腸傅一切瘡膏㸃鼻中添腦者盖以血痢由於血分為濕熱所傷針灸瘡發洪血不止亦縁病人素有血熱及加艾火則益熾矣血凉則不出榮血熱壅則生膿凉血則自散小腸屬丙火有熱則不通榮血熱解則一切瘡自愈腦為髓之海熱則消火能消物故也鼻竅通氣於腦故以膏㸃鼻中使腦中熱散無邪剝蝕則腦自益矣之數者何非凉血益血之功也主治參互孫真人千金月令方有金陵煎能益髭鬚變白為黒金陵草一秤六月後收揀青嫰無泥土者不用洗抹凈摘去黄葉爛搗新布絞取汁以紗絹濾過入通油器鉢盛之日中煎五日又取生薑一斤絞汁白蜜一斤合和日中煎以栁木勿停手攪待如稀餳藥乃成矣每早及午後各服一匙以温酒一盞化下如欲作丸日中再煎令可丸每服三十丸及時多合為佳攝生衆妙用方取旱蓮草根一斤用無灰酒洗凈青鹽四兩淹三宿同汁入油鍋中炒存性研末日用擦牙連津嚥之能烏鬚固齒又方旱蓮一兩半麻篐餅三兩升麻青鹽各一兩半訶子連核二十箇皂角三挺晚蠶沙二兩炒為末薄醋麵糊丸彈子大曬乾入泥瓶中火煆令烟出存性取出研末日用揩牙又方取汁滴鼻中治偏正頭痛同藍葉各一握油一斤入浸密封四十九日每卧時以鐵匙㸃一切眼疾瞖膜遮障凉腦再摩頂上四十九遍久久甚佳亦治頭痛能生髪同車前草等分杵取汁每空心服三盃治小便溺血獨用瓦上焙研每米飲下二錢治腸風臟毒下血不止獨用搗汁衝極熱酒飲治痔漏瘡發外即以滓傅患處重者不過三服同鹽少許揉擦掌心治風牙疼痛簡誤鱧腸性冷隂寒之質雖善凉血不益脾胃病人雖有血熱一見脾胃虚敗飲食難消及易溏薄作泄者勿輕與服孫真人方用薑汁和劑盖防其冷而不利於腸胃故也不用薑汁椒紅相兼修事服之者必腹痛作泄宜詳審之使君子味甘温無毒主小兒五疳小便白濁殺蟲療㵼痢俗傳因潘州郭使君療小兒多是獨用此物後醫家因號為使君子疏使君子得土之冲氣而兼感乎季春之令以生故其味甘其氣温其性無毒甘入脾故入足太隂陽明為補脾健胃之要藥小兒五疳便濁㵼利及腹蟲莫不皆由脾虚胃弱因而乳食停滯濕熱瘀塞而成脾健胃開則乳飲自消濕熱自散水道自利而前證俱除矣不苦不辛而能殺疳蚘此所以為小兒上藥也主治參互得蘆薈蕪荑滑石麥芽厚朴橘皮治一切疳疾神効又方治小兒脾疳使君子蘆薈等分為末米飲每服一錢全幼心鑑治小兒蛔痛口流涎沬使君子為末五更米飲調服一錢簡便方治小兒虚腫頭面隂囊俱浮使君子肉一兩蜜五錢炙盡為末每食後米湯服一錢普濟方治頭􅖟面瘡使君子仁以香油少許浸三五枚臨卧時細嚼香油送下久久自愈集簡方治蟲牙疼痛使君子煎湯頻嗽簡誤小兒泄痢有赤積是暑氣所傷禁與肉豆蔲訶子等澀熱藥同用亦忌食熱物及飲熱茶犯之即泄白豆蔲味辛大温無毒主積冷氣止吐逆反胃消榖下氣入藥去皮微焙用疏白豆蔲感秋燥之令而得乎地之火金故其味辛其氣大温其性無毒好古大辛熱味薄氣厚輕清而升陽也浮也入手太隂亦入足陽明經味大辛也氣大温也宜其主積冷氣及傷冷吐逆因寒反胃也煖能消物故又主消穀温能通行故主下氣東垣用以散肺中滯氣寛膈進食去白睛翳膜散滯之功也主治參互得人參生薑橘皮藿香治胃虚反胃及因寒嘔吐殊驗得半夏橘紅生薑白术茯苓治寒痰停胃作嘔吐似反胃得橘皮白术白蒺藜决明子甘菊花蜜蒙花木賊草穀精草理脾虚白睛生障翳得藿香橘皮木香理上焦滯氣加烏藥香附紫蘇治婦人一切氣逆不和佐參术薑橘治秋深瘧發寒多熱少嘔吐胃弱飲食不進良同扁豆五味子橘紅木𤓰能解酒毒及中酒嘔吐惡心張文仲備急方治胃冷惡心食已即欲吐用白豆蔲三枚擣細好酒一盞温服併飲數服佳肘後方治人忽惡心多嚼白豆蔲子最佳危氏得効方治小兒吐乳胃寒者白豆蔲縮砂蜜各十四個生炙甘草冬二錢為末常摻入兒口中濟生方治脾虚反胃白豆蔲縮砂蜜各二兩丁香一兩陳廩米一升黄土炒焦去土細研薑汁和丸每二三錢薑湯下名太倉丸簡誤白豆蔲辛温其治在因寒嘔吐反胃其不因於寒及陽虚者皆不得入故凡火升作嘔因熱腹痛法咸忌之剪草凉無毒治惡瘡疥癬風瘙根名白藥葉如茗而細疏剪草禀天地清寒至隂之氣以生故藏器云味苦其氣寒凉性應無毒主諸惡瘡疥癬風瘙瘻蝕者以諸痛癢瘡瘍皆屬心火苦寒能降火而凉血清熱故主之也濕熱生蟲苦能殺蟲寒能除熱故有蟲浸酒服主治參互潔古專以主上部血而與牡丹皮天門冬麥門冬同用許學士本事方云剪草治癆瘵吐血肺損及血妄行名神傳膏其法每用一斤洗凈曬為末入生蜜二斤和為膏以器盛之不得犯鐵器九蒸九曝日一蒸曝病人五更起面東坐不得語言以匙抄藥如粥服之每服四兩服已良久以稀粟米飲壓之藥只冷服米飲亦勿太熱或吐或下皆不妨如久病肺損咯血只二服愈尋常咳嗽血妄行每服一匙可也有一貴婦病瘵得此方九日藥成前一夕病者夢人戒令翌日勿亂服藥次日將服之為屋上土墜器中不可服再合既成又將服之為婢覆器又不得服又再合未就而夫人卒矣此藥之異如此若小小血妄行一啜而愈矣此藥妙絶若此而世失傳惜哉中藏經治風蟲牙痛剪草細辛藁本等分煎水熱漱少頃自止和劑局方有滑肌散治風邪客於肌中渾身瘙癢致生瘡疥及脾肺風毒攻衝生瘡乾濕日久不瘥用剪草七兩不見火輕粉一錢為末摻之乾者麻油調搽簡誤剪草大苦大寒之藥雖治血熱妄行神効若脾腎俱虚胃口薄弱見食欲嘔及不思食泄瀉者勿遽投之法當先理脾胃俟能進食而後施治乃可豆蔲味辛温無毒主温中心腹痛嘔吐去口臭氣開寳主下氣止霍亂一切冷氣消酒毒東垣調中補胃健脾消食去客寒心與胃痛自果部移入疏豆蔲得地二之火氣而有金復兼感乎夏末秋初之令以生故别録謂其味辛氣温而性無毒海藏又云大辛熱陽也浮也入足太隂陽明經盖辛能破滯香能入脾温熱能袪寒燥濕故主温中及寒客中焦心腹痛中寒嘔吐也脾開竅於口脾家有積滯則瘀而為熱故發口臭醒脾導滯則口氣不臭矣辛散温行故下氣寒客中焦飲食不消氣因閉滯則霍亂又散一切冷氣消酒毒者亦燥濕破滯行氣健脾開胃之功也産閩之建寧者氣芳烈類白豆蔲善散冷氣療胃脘痛理中焦産滇貴南粤者氣猛而濁俗呼草果者是也善破瘴癘消穀食及一切宿食停滯作脹悶及痛主治參互入人參養胃湯能消一切宿食開拓中焦滯氣藥性論云草豆蔲單用能主一切冷氣千金方治心腹脹滿短氣用草豆蔲一兩去皮為末以木𤓰生薑湯調服半錢聖濟總録治霍亂煩渇草豆蔲黄連各一錢半烏豆五十粒生薑三片水煎服濟生方治氣虚癉瘧熱少寒多或單寒不熱或虚熱不寒用草果仁熟附子等分水一盞薑七片棗一枚煎半盞服名果附湯醫方大成亦用治脾寒瘧大便泄而小便多不能食者百一選方治脾腎不足虚寒泄瀉草果仁一兩以舶上茴香一兩炒香去茴不用吳茱茰一兩湯泡七次同破故紙一兩炒香去故紙不用胡盧巴一兩同山茱萸一兩炒香去茱萸不用三味為末酒糊丸每六七十丸鹽湯下肘後方香口辟臭草豆蔲細辛為末含之直指方治脾痛脹滿草果仁二箇酒煎服之簡誤豆蔲性温熱味大辛本是袪寒破滯消食除瘴之藥凡瘧不由於瘴氣心痛胃脘痛由於火而不由於寒濕熱瘀滯暑氣外侵而成滯下赤白裏急後重及泄瀉暴注口渇濕熱侵脾因作脹滿或小水不利咸屬暑氣濕熱皆不當用犯之増劇藿香微温療風水毒腫去惡氣療霍亂心痛自本部移入疏藿香禀清和芬烈之氣故其味辛其氣微温無毒潔古辛甘又曰甘苦氣厚味薄浮而升陽也東垣可升可降陽也入手足太隂亦入足陽明經風水毒腫病在於脾惡氣内侵亦由脾虚邪入霍亂心腹痛皆中焦不治之證脾主中焦香氣先入脾理脾開胃正氣通暢則前證自除矣蘇頌以為脾胃吐逆為要藥潔古謂其助胃氣開胃口進飲食海藏謂其温中快氣肺虚有寒及寒鬰熱壅於上焦飲酒口臭煎湯飲之皆辛温入肺入脾清上治中之功也主治參互得縮砂蜜炒鹽治霍亂得人參橘皮木𤓰茯苓縮砂蜜治吐瀉轉筋霍亂得木香沉水香乳香縮砂蜜則辟惡氣治中惡心腹㽲痛入順氣烏藥散則補肺入黄耆四君子湯則補脾入桂苓甘露飲治中暑吐瀉得木香丁香紫蘇葉人參生薑治暴中寒邪吐逆不止經效濟世方升降諸氣藿香一兩香附炒五兩為末每以白湯㸃服一錢百一選方治霍亂吐瀉垂死者服之回生用藿香葉陳皮各半兩水煎温服禹師經騐方治暑月吐瀉滑石二兩藿香二錢五分丁香五分為末每服二錢淅米泔調服簡誤藿香雖能止嘔治吐逆若病因隂虚火旺胃弱欲嘔及胃熱作嘔中焦火盛熱極温病熱病陽明胃家邪實作嘔作脹法竝禁用假蘇味辛温無毒主寒熱䑕瘻瘰癧生瘡破結聚氣下瘀血除濕痺自菜部移入疏假蘇荆芥也得春氣善走散故其氣温其味辛其性無毒升也陽也春氣升風性亦升故能上行頭目肝主風木故能通肝氣行血分能入血分之風藥也故能發汗其主寒熱者寒熱必由邪盛而作散邪解肌出汗則寒熱自愈䑕瘻由熱結於足少陽陽明二經火熱鬱結而成瘰癧為病亦屬二經故也生瘡者血熱有濕也凉血燥濕瘡自脫矣破結聚氣者辛温解散之力也下瘀血入血分辛以散之温以行之之功用也痺者風寒濕三邪之所致也袪風燥濕散寒則濕痺自除矣主治參互得白頸蚯蚓同搗取汁解陽明經熱病汗出立已得童子小便調服立蘇血暈千金方治頭項風強八月後取荆芥穂作枕及鋪牀下立春日去之又方治風熱牙疼用荆芥根烏桕根葱根等分煎湯頻含漱之用經騐方治一切偏風口眼喎斜用青荆芥一斤青薄荷一斤同搗汁於甆器中熬成膏留三分之一將二分日乾為末以膏和丸如梧子大每三十丸白湯下早暮各一服忌動風物又方治中風口噤荆芥穂為末酒服二錢立愈名荆芥散賈似道云此方出曽公談録前後用之甚驗其子名順者病已革服之立定真再生丹也華陀愈風散治婦人産後中風口噤手足瘈瘲如角弓或産後血暈不省人事四肢強直或心眼倒築吐瀉欲死用荆芥穂微焙為末每服三錢豆淋酒調服或童便服之口噤則挑齒灌之齦噤則灌入鼻中其効如神大扺産後虚甚則汗出而腠理疎易於中風也戴原禮獨行散治産後血眩暈風虚精神昏冒荆芥穂一兩三錢桃仁去皮尖五錢為末水服三錢若喘加杏仁去皮尖炒甘草炙各三錢婦人良方治産後鼻衂荆芥穂末童便服二錢海上方也簡便方治大便下血用荆芥二兩槐花一兩同炒紫為末每三錢清茶送下活法機要治瘰癧潰爛牽至胸前兩腋塊如茄子大或牽至兩肩上四五年不能療者皆治之其効如神晉陵朱守仁傳云其項不能回顧用此數日減可如瘡爛破者用荆芥根下一叚剪碎煎沸待温洗良久看爛破處紫黒以針一刺去血再洗三四次愈用樟腦雄黄等分為末麻油調掃上出水次日再洗再掃以愈為度普濟方治一切疥瘡荆芥末以地黄自然汁熬膏和丸如梧子大每服三十五丸茶酒任下龍木論治一切眼疾血勞風氣頭痛頭旋目眩用荆芥穂末每酒服三錢普濟方治癃閉不通小便急痛無問久新荆芥大黄為末等分每温水服三錢小便不通大黄減半大便不通荆芥減半名倒換散簡誤荆芥風藥之辛温者也主升主散不能降亦不能收病人表虚有汗者忌之血虚寒熱而不因於風濕風寒者勿用隂虚火炎面赤因而頭痛者慎勿誤入蘇味辛温主下氣除寒中其子尤良忌與鯉魚同食生毒瘡自菜部移入疏蘇紫蘇也得天陽和之氣故温兼地之金味故辛辛則善散温能通氣故主下氣除寒中也子尤良者以其善降氣也入手少隂太隂足陽明經孟詵謂其除寒熱治一切冷氣日華子謂其補中益氣治心腹脹滿止霍亂轉筋開胃下食止脚氣通大小腸蘇頌謂其通心經益脾胃煮飲尤勝與橘皮相宜時珍謂其解肌發表散風寒行氣寛中消痰利肺和血温中止痛定喘安胎解魚蟹毒子味辛温無毒主下氣除寒温中甄權用以治上氣欬逆冷氣及腰脚中濕氣風結氣研汁煮粥常食令人肥白身香日華子謂其能止霍亂嘔吐反胃消五膈消痰止嗽潤心肺冦宗奭用以治肺氣喘急皆辛温能散結而兼潤下之力也主治參互蘇陽草也解肌散寒蘇表辟惡之要藥入參蘇飲治表虚人傷風久不愈入蘇沉九寳湯解利傷風寒咳嗽肘後方治感寒上氣蘇葉三兩橘皮四兩酒四升煮一升半分再服又方治霍亂脹滿未得吐下生蘇擣汁飲之佳乾蘇煮飲亦妙金匱要略療食蟹中毒紫蘇煮汁飲二升普濟方治欬逆上氣蘇莖葉二錢人參一錢水一鍾煎數沸服濟生方順氣利腸紫蘇子麻仁等分研爛水濾取汁同米煮粥食之聖惠方治風順氣利腸寛中用蘇子一升微炒杵以生絹袋盛於三斗清酒中浸三宿少炒食之藥性論治一切冷氣蘇子良薑橘皮等分蜜丸梧子大每服十丸空心酒下又用治風濕脚氣簡便方治上氣欬逆紫蘇子入水研濾汁同粳米煮簡誤蘇葉其氣芬芳其味辛其性温純陽之草也故善發散解肌出汗病屬隂虚因發寒熱或惡寒及頭痛者慎勿投之火升作嘔者亦不宜服惟可用子香薷味辛微温主霍亂腹痛吐下散水腫菜部移入疏香薷丹溪謂其有金與水然亦感夏秋之氣以生者故其味辛其氣微温而無毒可升可降陽也入足陽明太隂手少隂經辛散温通故能解寒欝之暑氣霍亂腹痛吐下轉筋多由暑月過食生冷外邪與内傷相并而作辛温通氣則能和中解表故主之也散水腫者除濕利水之功也孟詵謂其去熱風卒轉筋者煮汁頓服半升即止為末水調服止鼻衂日華子謂其下氣除煩熱療嘔逆冷氣汪穎謂其夏月煮飲代茶可無熱病調中温胃含汁嗽口去臭氣主治參互香薷飲有十味者有六味者有加黄連者雖同為袪暑之藥然脾胃腎俱虚之人當以十味者為凖除有肺熱咳嗽病者去人參白术黄耆治水腫以之為君當同人參术木𤓰茯苓橘皮白芍藥車前子良和劑局方香薷飲治一切傷暑或暑月卧濕當風或生冷不節真邪相干便致吐利或發熱頭痛體痛或心腹痛或轉筋或乾嘔或四肢逆冷或煩悶欲死竝用香薷一斤厚朴薑製扁豆微炒各半斤剉散每用五錢水二盞煎一盞水中沉冷連進二服立効活人書去扁豆入黄連四兩薑汁同炒黄色外臺秘要治水病洪腫氣脹食不消乾香薷五十斤剉入釡中以水淹過三寸煮使氣盡去滓澄之微火煎至可丸丸如梧子大一服五丸日三服漸加之以小便利則愈宜有术同煎外臺秘要薷术丸治暴水風水氣水通身皆腫服至小便利為効用香薷葉一斤熬成膏加白术末七兩和丸梧子大每服十丸米飲下日五夜一服肘後方治心煩脇痛連胸欲死者香薷搗汁二升服聖濟總録治鼻衂不止香薷研末水服一二錢肘後方治舌上出血如鑽孔者香薷煎汁服一升日三進千金方治口臭香薷一把煎汁含之食醫心鏡主心煩去熱取煎湯作羮煮粥及生食亦得子母秘録治小兒白秃髪不生汁出慘痛濃煮陳香薷汁入猪脂少許和胡粉傅之衍義云治霍亂不可缺用之無不効雷公云凡採得去根留葉細剉曝乾勿令犯火服至十兩一生不得食白山桃也簡誤香薷性温不宜熱飲故治乘凉飲冷寒與暑氣相摶激是陽氣為隂邪所遏以致頭疼發熱惡寒煩躁口渇或吐或瀉或霍亂者宜用此藥以發越陽氣散水和脾則愈若夫飲食不節勞役斵䘮之人傷暑熱而病大熱大渇汗泄如雨煩躁喘促或瀉或吐者乃勞倦内傷之證宜從東垣人參白虎湯清暑益氣湯桂苓甘露飲之類以瀉火益元可也然中熱不吐瀉者宜人參白虎湯吐瀉者宜清暑益氣湯桂苓甘露飲設用香薷是重虚其表而又濟之以温則誤矣盖香薷乃夏月解表之藥表無所感而中熱為病何假於此哉誤則損人表氣戒之戒之薄荷味辛苦温無毒主賊風傷寒發汗惡氣心腹脹滿霍亂宿食不消下氣煮汁服亦堪生食飲汁發汗大解勞煩菜部移入疏薄荷感杪春初夏之氣而得乎火金之味金勝火劣故辛多於苦而無毒潔古辛凉浮而升陽也入手太隂少隂經辛合肺肺主皮毛苦合心而從火化主血脉主熱皆陽臟也賊風傷寒其邪在表故發汗則解風藥性升又兼辛温故能散邪辟惡辛香通竅故治腹脹滿霍亂食療以為能去心家熱故為小兒驚風風熱家引經要藥辛香走散以通闗節故逐賊風發汗者風從汗解也本非脾胃家藥安能主宿食不消上升之性亦難主下氣勞乏屬虚非散可解三療俱非明者當自别之主治參互風熱上壅斯為要藥入噙化丸以之為君主隂虚肺熱咳嗽甚良加生乾薑并治傷風寒咳嗽佐漆葉苦參何首烏胡麻仁荆芥穂生地黄蒺藜子石菖蒲蒼术治大麻風去蒼术加赤莖狶薟治紫雲風同貝母荆芥穂𤣥參斑猫佐肥皂能治瘰癧外臺秘要治水入耳中擣汁滴入立驗孫真人用以辟邪毒除勞氣令人口氣香潔煎湯洗漆瘡日華子用以治中風失音吐痰蘇頌主傷風頭腦風通闗節及小兒風涎為要藥東垣用以清頭目除風熱故可療風瘙瘾􅇙及塗蜂螫簡便單方清上化痰利咽膈治風熱上壅以薄荷葉為末煉蜜丸芡實大每噙一丸醫學集成治舌胎語蹇薄荷自然汁和白蜜薑汁少許擦之明目經驗方治眼弦赤爛薄荷以生薑汁浸一宿曬乾為末每用一錢沸湯泡洗濟生方治瘰癧結核或破未破以新薄荷二斤取汁皂莢一挺水浸去皮搗取汁同於銀石器内熬膏入連翹末半兩連白青皮陳皮黒牽牛半生半炒各一兩皂莢仁一兩半同搗和丸梧子大每服三十丸煎連翹湯下張杲醫説療火毒生瘡因炙火火氣入内兩股生瘡汁水淋漓者用薄荷煎汁頻塗立愈簡誤病人新瘥勿服以其發汗虚表氣也咳嗽若因肺虚寒致之而無熱證者勿服以其當補而愈也隂虚人發熱勿服以出汗則愈竭其津液也脚氣類傷寒勿服以其病在下而屬脾故也血虚頭痛非同諸補血藥不可用小兒身熱由於傷食者不可用小兒身熱因於疳積者不可用小兒痘瘡診得氣虚者雖身熱初起亦不可用神農本草經疏卷九
