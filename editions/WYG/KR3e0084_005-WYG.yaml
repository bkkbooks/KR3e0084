body:
  text: 神農本草經疏卷五明繆希雍撰玉石部下品總九十三種今疏其要者二十三種伏龍肝石灰百草霜附砒霜鐺墨􅓀砂鉛丹鉛粉錫東壁土赤銅屑銅青井底泥代赭戎鹽地漿自然銅梁上塵礞石麥飯石花乳石蓬砂鉛霜古文錢伏龍肝味辛微温主婦人崩中吐血止欬逆止血消癰腫毒氣此竈中對釡月下黄土以年乆如赤色石中黄者佳研細水飛用疏伏龍肝得火土之氣而成本經味辛氣微温無毒甄權言鹹其質本土味應有甘以竈有神故古方多以之治顛狂寐魘及卒中邪惡等證本經主婦人崩中吐血止欬逆止血者葢以失血過多中氣必損甘能補中微温能調和血脈故主之也消癰腫毒氣者辛散鹹軟之功也日華子主催生下胞及小兒夜啼者取其土中有神而性本冲和復能鎮重下墜也主治叅互千金方卒中惡氣伏龍肝末一雞子大水服取吐救急方産後血氣攻心痛惡露不下竈中心土研末酒服二錢瀉出惡物立效傷寒類要妊娠熱病伏龍肝末雞子許大水調服之仍以水和塗臍上方寸乾則再上外臺秘要一切癰腫伏龍肝以蒜和作泥貼之乾再易或雞子黄和亦可簡誤陰虚吐血者不宜用以其中有火氣故也癰腫毒盛難消者不得獨用石灰味辛温主疽瘍疥瘙熱氣惡瘡癩疾死肌墮睂殺痔蟲去黒子息肉療髓骨疽疏石灰燒青石而成故其味辛氣温本經不言其毒觀所主皆不入湯其為毒可知矣火氣未散性能灼物故主去黒子息肉及墮睂也其主疽瘍疥瘙熱氣惡瘡癩疾死肌髓骨疽者皆風熱毒氣浸淫於骨肉皮膚之間辛温能散風熱毒氣且能蝕去惡肉而生新肌故為諸瘡腫毒要藥也辛而燥故又能殺痔蟲古方多用合百草團末治金瘡殊勝者以其性能堅物使不腐壊且血見石灰則止而百草又能活血凉血故也古墓中石灰名地龍骨火毒已出燥烈大減故主頑瘡瘻瘡膿水淋漓及斂諸瘡口尤效艌船油灰名水龍骨得油性之潤復得水氣之陰故主金瘡跌撲傷損破皮出血及諸瘡瘻血風臁瘡也主治叅互入三仙膏㸃一切癰疽腫毒輕者可消重者勢亦減普濟方疣痣瘤贅石灰一兩用桑灰淋汁熬成膏刺破㸃之又方去癰疽瘀肉石灰半斤麥稈灰半斤淋汁煎成霜蜜封毎以針劃破塗之自腐落有毒不入湯丸故無簡誤百草霜乃煙氣結成其味辛氣温無毒辛主散故能消化積滯及下食也凡血見灰則止此藥性能止血復能散瘀滯故主上下諸血及崩中帶下胎前産後諸病主治叅互筆峰雜興方胎動下血或胎已死百草霜二錢㯶灰一錢伏龍肝五錢為末每服二錢白湯入酒及童便調下杜壬方治橫生倒逆胎前産後虚損月候不調崩中帶下百草霜白芷等分為末每服二錢童子小便醋各少許調勻熱湯化服不過二服瘥簡誤雖能止血無益腸胃救標則可治本則非故不宜多服砒霜味苦酸有毒主諸瘧風痰在胸膈可作吐藥不可乆服能傷人飛鍊砒黄而成畏菉豆冷水入藥醋煮殺毒用疏砒霜稟火之毒氣復兼煅煉本經雖云味苦酸而其氣則大熱性有大毒也酸苦涌泄故能吐諸瘧風痰在胸膈間大熱大毒之物故不可乆服能傷人也更善落胎及枯痔殺蟲簡誤按砒黄既已有毒見火則毒愈甚而世人多用砒霜以治瘧不知内經云夏傷於暑秋必痎瘧法當清暑益氣徤脾是為正治豈宜用此大熱大毒之藥如果元氣壯實有痰者服之必大吐雖暫獲安而所損真氣實多矣初燒霜時人在上風十餘丈外立下風所近草木皆死以之毒鼠鼠死猫犬食之亦死人服至一錢許則立斃若得酒及燒酒服則腸胃腐爛頃刻殺人雖菉豆冷水亦難解矣其於鈎吻射罔之毒殆又甚焉奈何今人用之治瘧是以必死之藥治必不死之病豈不誤哉除枯痔殺蟲用於外傅之藥此外慎毋服之切戒切戒鐺墨主蠱毒中惡血暈吐血亦塗金瘡生肌止血疏鐺墨釡月中墨也本經無氣味然觀其所主大約與伏龍肝相似而其用則少劣也凡血見灰見黒則止蠱毒惡氣得辛温則散故本經主蠱毒中惡吐血血暈以酒或水細研温服亦塗金瘡生肌止血也慎勿入傅面瘡藥中其黒入肉如黥不能去也血暈宜用米醋研服􅓀作磠砂味鹹苦辛温有毒不宜多服主積聚破結血爛胎止痛下氣療欬𠻳宿冷去惡肉生好肌柔金銀可為銲藥形如牙硝光淨者良凡用水飛去塵穢入甆器中重湯煮乾疏􅓀砂乃鹵液所結秉陰毒之氣含陽毒之精其味極鹹極苦極辛氣温有毒甄權酸鹹有大毒能消五金八石腐壊人腸胃生食之化人心為血其毒之猛烈如此可畏矣其主積聚結血宿冷者以鹹能入血軟堅辛能散結温能除冷故也積聚散則痛自止氣自下因寒以致頑痰壅結則欬嗽作故暫用以散之柔金化石之性故能爛胎及去惡肉也金石見之即化其能生好肌乎此前人之誤耳主治叅互普濟方損目生瘀赤肉弩出不退杏仁百粒蒸熟去皮尖研濾取淨汁入磠砂末一分水煮化日㸃一二次自落白飛霞方鼻中息肉磠砂㸃之即落此方須入明礬牛黄鉛粉象牙末真珠末乃佳集效方面上疣目磠砂少許硼砂鐵鏽麝香等分研搽三次自落急以甘草汁浸洗簡誤按磠砂大熱有毒之物近出於唐世而方書不著古人單服一味伏火作丸子亦有兼硫黄馬牙硝輩合餌者不知方出何時殊非古法此物雖能攻積聚凝結化有形癖塊然多食腐壊人腸胃觀其柔化金銀銅錫及庖人煮硬肉入磠少許即爛可以類推矣惟去惡肉及惡瘡息肉目翳弩肉是其所長亦須與真牛黄龍腦鉛華象牙末等同用其内服諸方雖唐慎微已收附本草末然服必害人命悉不敢載一名狄鹽一名北庭砂一名氣砂一名透骨將軍中其毒者生菉豆研汁一二升飲之畏漿水忌羊血鉛丹味辛微寒主吐逆胃反驚癎癲疾除熱下氣止小便利除毒熱臍攣金瘡溢血鍊化還成九光乆服通神明自炒成者佳市中多雜砂土礬紅不堪用疏鉛丹即熬鉛所作黄丹故其味辛氣微寒性應無毒鉛稟先天壬癸之氣得火成丹則又有靈通變化之神其體重而降胃反吐逆火氣上升也驚癎癲疾心氣虚怯也得潤下鎮重之性則火不上炎熱氣自下心腎得交而前證除矣稟天一所生之氣故能除熱毒及金瘡溢血也止小便利者心與小腸為表裏心神寜斂則小便自有節也臍攣者即小兒臍風也風熱入肝則筋自攣急辛寒鎮重能散風熱金液之性能平肝木故主之也乆服通神明者以其得先天之氣故能鎮心安神也今世又用以解散熱毒長肉去瘀治惡瘡腫毒及入膏藥為外科必用之物主治叅互單用傅瘡能止痛長肉生肌入一切膏藥貼惡瘡腫毒仲景柴胡加龍骨牡蠣湯治傷寒八九日下之胸滿煩驚小便不利譫語身重者鉛丹龍骨柴胡牡蠣黄芩生薑人參桂枝茯苓各一兩半半夏二合半大黄二兩棗六枚以水八升煮取四升内大黄更煮兩沸去查温服一升集騐方治吐逆不止碧霞丹黄丹四兩米醋半升煎乾炭火三秤就銚内煅紅冷定為末粟米飯丸梧子大每服七丸醋湯下劉涓子鬼遺方小兒癉瘧壯熱不寒黄丹二錢蜜水和服冷者酒服名鬼哭丹痘􅇙方痘􅇙生翳黄丹輕粉等分為末吹少許入耳内左患吹右右患吹左子母秘録小兒重舌黄丹一豆大安舌下普濟方小兒口瘡糜爛黄丹一錢生蜜一兩相和蒸黒每以雞毛蘸搽甚效集𤣥方金瘡出血不止以藥速合則内潰傷肉只以黄丹滑石等分為末傅之陸氏積徳堂方血風臁瘡黄丹一兩黄蠟一兩香油五錢熬膏先以葱椒湯洗貼之集效方逺近臁瘡黄丹水飛炒黄補酒浸七日焙各一兩輕粉半兩研細以苦茶洗淨輕粉填滿次用黄丹䕶之外以檗末攤膏貼之勿掲動一七見效簡誤吐逆由於胃虚及因寒發吐者皆不宜服鉛味甘無毒鎮心安神治傷寒毒氣反胃嘔噦蛇蝪所咬炙熨之疏鉛稟先天壬癸之氣以生一者數之始水者物之初故曰天一生水中含生氣為萬物之先金丹之母八石之祖五金之寳壬金為清癸水為濁清為陽氣濁為陰質陽氣為生陰質有毒範以法象招攝陰陽烹煉得宜是成丹藥餌之仙去生氣之初味固應甘潤下之性無毒可知心藏神而法火寜謐則安妄炎則病重而潤下使水火既濟而不妄炎故主鎮心安神傷寒毒氣者即陽證熱毒也先天真水性含生氣而屬至陰故能解之也反胃嘔噦者火氣上浮陰陽將離故氣逆升而發嘔噦也兹得鎮墜以下之則陽火歸元而前病自止矣蛇蜴之毒無非熱氣諸毒得水而解故亦主之也五行萬物之中能解一切毒氣者無過先天生氣土中冲氣鉛兼有之故為解諸毒之首藥也主治叅互黒鉛入養正丹治一切上盛下虚孤陽發越上浮煩躁面赤恍忽驚惕嘔吐反胃等證用此以鎮墜陽氣使火入陰分則上焦得寜而後可以隨證施治入黒錫丹治一切下元虚冷陽氣垂絶陰陽將離及沈寒痼冷諸病聖濟録治小兒驚熱心肺積熱夜卧多驚鉛霜牛黄各半分鐵粉一分研勻每服一字竹瀝調下普濟方驚風癎疾喉閉牙𦂳鉛白霜一字蟾酥少許為末烏梅肉蘸藥於齦上揩之仍吹通關藥良乆便開聖濟録治消渇煩熱鉛白霜枯白礬等分為末蜜丸芡實大綿裹含化嚥汁又方鉛白霜一兩黄消石一兩為末每冷水服一錢喉痺腫痛鉛白霜甘草各半兩青黛一兩為末醋糊丸芡子大每含嚥一丸立效宣明方治口疳齦爛氣臭血出不拘大人小兒鉛白霜銅緑各二錢白礬豆許為末掃之普濟方梳髪令黒鉛霜包梳日日梳之勝於染者簡誤鉛性沈重未經烹煉癸水之陰質尚存多服能損傷心脾葢金石與人身氣血異悟真篇云非類難為巧是已凡脾胃虚寒陽火不足飲食不化下部陰溼諸證法咸忌之粉錫味辛寒無毒主伏尸毒螫殺三蟲去鼈瘕療惡瘡墮胎止小便利一名鉛粉一名胡粉一名官粉疏粉錫陶𨼆居云即化鉛所作胡粉也其味辛氣寒無毒體用與鉛相似性善殺蟲故去伏尸三蟲鼈瘕寒能解熱毒故療惡瘡毒螫重而下降故能墮胎澀而黏膩故止小便利甄權主積聚不消炒焦止小兒疳痢藏器主乆痢成疳和雞子白服以糞黒為度皆為其消積殺蟲止痢也附李時珍云胡粉即鉛之變黒為白者也其用雖與鉛及黄丹同内有豆粉蛤粉雜之止能入氣分不能入血分此為稍異人服食之則大便色黒者此乃還其本質所為色壊還為鉛也亦可入膏藥代黄丹用主治叅互肘後方勞復食復欲死者水調胡粉少許與之子母秘録小兒腹脹或腹皮青色不速治須臾死胡粉鹽熬色變以摩腹上救急方杖瘡腫痛水粉一兩赤石脂生一錢水銀一分以麻油杵成膏攤油紙貼之肉消者填滿𦂳縛備急方陰股常溼胡粉摻之邵真人方黄水膿瘡官粉煅黄松香各三錢黄丹一錢飛礬二錢為末香油二兩熬膏傅之備急方小兒疳瘡熬胡紛猪脂和塗集簡方姤精陰瘡鉛粉二錢銀杏七箇銅銚内炒至銀杏黄去杏取粉出火毒研搽效聖惠方翻花惡瘡胡粉一兩臙脂一兩為末鹽湯洗淨傅之日五次孫氏集效方血風臁瘡官粉四兩水調入碗内以蘄艾燒煙熏乾入乳香少許同研香油調作隔紙膏反覆貼之千金方小兒丹毒唾和胡粉從外至内傅之又方瘡傷水溼胡粉炭灰等分脂和塗孔上水即出也又方蠼螋尿瘡酢和胡粉塗之直指方發背惡瘡諸癰腫好錫粉二兩真麻油三兩慢火熬以栁枝急攪至滴水成珠入白膠末少許入甆器水浸二日油紙攤貼名神應膏簡誤胡粉雖能消疳逐積殺蟲止痢然其性冷走而不守脾胃虚弱者不宜用娠婦忌之東壁土主下部瘡脱肛疏東壁土先得太陽真火之氣其氣温和其味甘無毒脾主四肢而惡溼下部生瘡溼氣侵脾也得陽氣之壯故能燥溼除瘡脱肛亦大腸溼熱所致甘温而燥故亦主之藏器止洩痢霍亂煩悶者取其土能補脾胃温能和中也得太陽初氣能袪暑溼之邪故又主温瘧及猝中暑熱攪土漿與之即解主治叅互甄權法同蜆殻為末傅豌豆瘡肘後方藥毒煩悶欲死者東壁土調水三升頓飲之通變要法解烏頭毒不拘川烏草烏毒用多年陳壁土泡湯服之外臺秘要肛門突出東壁土一升研末傅肛門頭出處以長皂莢炙熟互熨之氣味甘温性無偏至故不著簡誤赤銅屑主賊風反折燒赤銅五斤内酒二斗中百遍服疏赤銅屑日華子云苦平微毒亦能接骨理傷功用與自然銅相等第其性有毒耳本經主賊風反折者風氣通於肝肝屬木金能平之故也藏器曰赤銅屑能銲人骨及六畜有損細研酒服直入骨損處六畜死後取骨視之猶有銲痕可騐朝野僉載云定州崔務墮馬折足醫者取銅末和酒服之遂瘥及亡後十年改葬視其脛骨折處猶有銅束之也打熟銅不堪用銅青平微毒治婦人血氣心痛合金瘡止血明目去膚赤息肉生銅皆有青青則銅之精華淘洗用疏銅稟土中陰氣以生青則其英華秀出於外所結凡銅入地乆或沃以鹹酸之味乃生青其義可見矣本經氣平無毒然觀今人用入吐風痰藥應是酸苦澀之味而氣則微寒也酸入肝而主斂故能止血合金瘡風熱入肝經則目生膚翳息肉或赤爛淚出苦寒能除風熱則所苦去而目自明矣本經又主婦人血氣心痛者葢苦能洩結而平則又兼辛散之義也主治叅互經騐方碧林丹治痰涎潮盛卒中不語及一身風癱用生緑二兩研細水化去石慢火熬乾取辰日辰時辰位上修合再研入麝香一分糯米粉糊丸彈子大陰乾卒中者每丸作二服薄荷酒研下吐出青碧涎㵼下惡物大效又方口鼻疳瘡人中白一錢銅緑三分研傅之衛生易簡方爛弦風眼銅青水調塗碗底以艾熏乾刮下塗爛處簡誤目痛膚翳不由風熱外侵而因於肝虚血少者非所宜用井底砂作泥至冷主治湯火燒瘡用之疏井底砂稟地中至陰之氣味甘而大寒者也故本經主湯火燒瘡用又能療妊娠熱病取傅心下臍及丹田可䕶胎無失肘後方卧忽不寤勿以火照火照之殺人但痛囓其踵及足拇指甲際而多唾其面以井底泥塗其目令人垂頭於井中呼其姓名便甦代赭石味苦甘寒無毒主鬼疰賊風蠱毒殺精物惡鬼腹中毒邪氣女子赤沃漏下帶下百病産難胞衣不出墮胎養血氣除五藏血脈中熱血痺血瘀大人小兒驚氣入腹及陰痿不起入藥煅赤醋淬三次研水飛過用畏天雄附子乾薑為之使疏代赭石稟土中之陰氣以生本經味苦氣寒别録加甘無毒氣薄味厚陰也降也入手少陰足厥陰經少陰為君主之官虚則氣怯而百邪易入或鬼疰邪氣或精物惡鬼或驚氣入腹所自來矣得鎮重之性則心君泰定而幽暗破邪無從著矣其主五臟血脈中熱血痺血瘀賊風及女子赤沃漏下帶下百病皆肝心二經血熱所致甘寒能涼血故主如上諸證也甘寒又能解毒故主蠱毒腹中毒也經曰壯火食氣少火生氣火氣太盛則陰痿反不能起苦寒洩有餘之火所以能起陰痿也重而下墜故又主産難胞不出及墮胎也主治叅互仲景旋覆代赭湯治傷寒汗吐下後心下痞鞕噫氣不除者代赭一兩旋覆花三兩人參二兩生薑五兩大棗十二枚半夏半升甘草三兩水一斗煮取六升去滓再煮取三升温服一升日三直指方急慢驚風弔眼撮口搐搦不定代赭石火燒醋淬七次細研水飛日乾每服一錢或半錢煎真金湯調下連進三服兒脚脛上有赤斑即是驚氣已出病當安也無者不治如漫驚用冬瓜仁煎湯調亦妙普濟方婦人血崩代赭石煅為末白湯服二錢簡誤下部虚寒者不宜用陽虚陰痿者忌之戎鹽味鹹寒無毒主明目目痛益氣堅肌骨去毒蠱心腹痛溺血吐血齒舌血出一名胡鹽一名青鹽疏戎鹽稟水中至陰之氣凝結而成不經煎煉而生於涯埃坂􅀈之陰其味鹹氣寒無毒入手足少陰經經曰熱淫於内制以鹹寒血熱則目痛不明鹹寒能入血除熱故主目痛明目也心腹痛者心虚而邪熱客之也吐血齒舌上出血者火迫血妄行溢出於上也鹹主潤下俾火氣不上炎則有坎離交之象焉故能主諸證也溺血者小腸熱也心與小腸為表裏心火降則小腸熱自除也經曰熱傷氣又曰腎主骨熱則氣散骨消筋緩鹹能入腎寒能除熱故主益氣堅肌骨也鹹為水化諸毒得水則解故又能去毒蠱日華子云助水臟益精氣除五臟癥結心腹積聚者取其入腎及軟堅除熱之功耳主治叅互仲景金匱方戎鹽湯治小便不通用戎鹽彈丸大一枚茯苓半斤白术二兩水煎服之唐氏經騐方風熱牙痛青鹽一斤槐枝半斤水四碗煎汁二碗煮鹽至乾炒研日用揩齒洗目普濟方風眼爛弦戎鹽水化㸃之地漿寒主解中毒煩悶疏地漿𢎞景云此掘地作坎以水沃其中攪令濁俄頃取之以解中諸毒葢取土為萬物之母諸毒遇土則化故也山中有毒蕈人不識煮食之無不死又楓樹蕈食之令人笑不止惟飲地漿皆瘥餘藥不能救也主治叅互聖惠方熱渇煩悶地漿一盞飲之千金方中暑霍亂不吐不利脹痛欲死地漿三五盞服即愈大忌米湯金匱方中閉口椒毒吐白沫身冷欲死者地漿飲之集𤣥方中砒霜毒地漿調𤣥明粉服之立解自然銅味辛平無毒療折傷散血止痛破積聚生邕州山巖中出銅處於坑中及石間採得方圓不定其色青黄如銅不從鑛煉故號自然銅入藥火煅醋淬七次研細水飛過用疏自然銅稟土金之氣以生故其味辛氣平無毒乃入血行血續筋接骨之神藥也凡折傷則血瘀而作痛辛能散瘀滯之血破積聚之氣則痛止而傷自和也大明主消瘀血排膿續筋骨治産後血邪安心止驚悸以酒磨服者可謂悉其用矣冦宗奭云有人以自然銅飼折翅胡雁後遂飛去今人打撲損傷研細水飛過同當歸没藥各半錢以酒調服仍以手摩痛處即時見效主治叅互同乳香没藥䗪蟲五銖古錢麻皮灰血竭胎骨作丸煎當歸地黃續斷牛膝牡丹皮紅花濃湯送下治跌撲損傷或金刃傷骨斷筋皆效簡誤雷公云石髓鉛即自然銅也凡使勿用方金牙其方金牙真似石髓鉛若誤餌吐殺人石髓鉛色似乾銀泥味微甘也凡使中病乃已不可過服以其有火金之毒走散太甚梁上塵主腹痛噎中惡鼻衂小兒軟瘡疏梁上塵乃是空中煙氣結成本經無氣味應是辛苦之物辛能散苦能洩故主腹痛噎膈中惡也體輕而上騰故入肺味辛而清熱故又主鼻衂及小兒軟瘡也一名倒掛塵一名烏龍尾主治叅互孫氏集效方喉痺乳蛾烏龍尾枯礬猪牙皂莢以鹽炒黄等分為末或吹或㸃皆妙一法用燈心以鹽中苦鹵浸過入雞子殻中煅存性取出研細加龍腦香一二分研勻明礬末五分同梁上倒掛塵五分青魚膽調㸃入喉治喉痺咽痛有效礞石治食積不消留滯藏府宿食癥塊乆不瘥及小兒食積羸瘦婦人積年食癥攻刺心腹一名青礞石疏礞石稟石中剛猛之性體重而降能消一切積聚痰結其味辛鹹氣平無毒辛主散結鹹主軟堅重主墜下故本經所主諸證皆出一貫也今世又以之治小兒驚痰喘急入滚痰丸治諸痰怪證主治叅互王𨼆君養生主論滚痰丸通治痰為百病惟水㵼娠婦不宜服礞石焰硝各二兩煅過研飛曬乾一兩大黄酒蒸八兩前胡八兩沈香五錢為末水丸梧子大常服一二十丸欲利大便則服一二百丸温水下簡誤礞石消積滯墜痰涎誠為要藥然而攻擊太過性復沈墜凡積滯癥結脾胃壯實者可用虚弱者忌之小兒驚痰食積實熱初發者可用虚寒乆病者忌之如王𨼆君所製滚痰丸謂百病皆生於痰不論虚實寒熱槩用殊為未妥不知痰有二因因於脾胃不能運化積滯生痰或多食酒麫溼熱之物以致膠固稠黏咯唾難出者用之豁痰利竅除熱泄結應如桴鼓因於陰虚火炎煎熬津液凝結為痰或發熱聲啞痰血雜出者如誤投之則陰氣愈虚陽火反熾痰熱未退而痺胃先為之敗矣可見前人立方不能無敝是在後人善於簡擇耳麥飯石疏麥飯石出自蘇頌圖經附於薑石條内因薑石有疔腫之用故引及之其味氣必與薑石相似但得火煅醋淬之後復有温煖收斂之功昔吕子華秘方麥飯石膏治發背瘡神效取此石碎如棋子炭火燒赤投米醋中浸之良乆又燒又浸如此十次研末極細如飛塵鹿角一具連腦骨者二三寸截之炭火燒令煙盡即止白斂末與石末等分鹿角倍之用三年米醋入銀石器内煎令魚目沸即下前藥不住手攪熬一二時稀稠得所傾出待冷以鵝翎拂膏於腫上四圍赤處中留腫頭洩氣如未膿即内消已作頭即撮小已潰即排膿若病乆肌肉爛落見出筋骨者即塗細布上貼之乾即易逐日瘡口收斂但中膈不穴者即無不瘥已潰者用時先以猪蹄湯洗去膿血挹乾然後上藥其瘡切忌手觸動嫩肉仍不可以口氣吹風及腋氣月經孕婦見之合藥時亦忌此等初時一日一換十日後二日一換此藥要極細方有效若不細塗之即痛也煅乆亦無效臨用方煅煅過即研若飛塵一二兩可治一癰疽矣花乳石主金瘡止血又療産婦血暈惡血出陜華諸郡色正黄形之大小方圓無定欲服者當以大火燒之金瘡止血刮末傅之即合仍不作膿潰或名花蕊石疏花乳石本經無氣味詳其所主應是酸辛温之藥其功專於止血能使血化為水婦人血暈惡血上薄也消化惡血則暈自止矣以酸斂之氣復能化瘀血故傅金瘡即合仍不作膿也主治叅互葛可乆十藥神書花乳石散治五内崩損噴血出升斗用此治之花蕊石煅存性研如粉以童子小便一鍾男入酒一半女入醋一半令温食後調服三錢甚者五錢能使瘀血化為黄水後以獨參湯補之按此石性温味辛又加火煅虚勞吐血多是火炎迫血上行於藥性非宜除是膈上原有瘀血停凝者乃可暫用亦須多服童便獨參湯乃肺熱咳𠻳所忌尤不宜於虚勞内熱火炎之人戒之戒之和劑局方花蕊石散治一切金刃箭鏃傷及打撲傷損狗咬至死者急以藥摻傷處其血化為黄水再摻便活更不疼痛如内損血入臟腑熱童便入酒少許熱調一錢服立效婦人産後敗血不盡血暈惡血奔心胎死腹中胞衣不下至死但心頭温煖者急以童便調服一錢取下惡物愈若膈上有血化為黄水即時吐出或隨小便出甚效用硫黄四兩花蕊石一兩並為粗末以膠泥固濟日乾瓦礶一箇盛之泥封口烘乾安在四方磚上磚上書八卦五行字炭一秤簇匝從巳午時自下生火煅至炭消冷定取出為細末甆瓶收貯封固取用無時簡誤無瘀血停留者不宜内服不由内傷血凝胸膈板痛而因火炎血溢以致吐血者忌之蓬砂味苦辛煖無毒消痰止𠻳破癥結喉痺及銲金銀用一名鵬砂疏蓬砂出於西南番採取煎淋而結亦如硝石磠砂之類本經味苦辛氣煖無毒然詳其用味應有鹹氣亦微煖色白而體輕能解上焦胸膈肺分之痰熱辛能散苦能洩鹹能軟故主消痰止𠻳喉痺及破癥結也冦宗奭云含化嚥津治喉中腫痛膈上痰熱初覺便治不能成喉痺也兼能去口氣消障翳除噎膈反胃積塊瘀肉陰㿉骨硬惡瘡折傷及口齒諸病主治叅互同龍腦香人中白青黛為末傅口舌瘡效經騐方咽喉腫痛破棺丹用蓬砂白梅等分搗丸芡子大每噙化一丸集𤣥方小兒陰㿉腫大不消硼砂一分水研塗之大效直指方弩肉瘀突南硼砂黄色者一錢龍腦香少許研末燈草蘸㸃之簡誤蓬砂其性能柔五金去垢膩尅削為用消散為能宜攻有餘難施不足此蹔用之藥非乆服之劑鉛霜冷無毒消痰止驚悸解酒毒療胸膈煩悶中風痰實止渇一名鉛白霜用鉛雜水銀十五分之一合鍊作片置醋甕中密封經乆成霜疏鉛霜乃鉛假汞氣交感因醋以拔其英華所結道家謂之神符白雪其味甘酸氣大寒無毒凡中風驚悸未有不因痰熱所生胸膈煩悶多渇亦火熱炎灼所致甘寒能除熱生津則痰結消驚悸平風自愈也其主解酒毒者亦取其除熱生津之意耳并治吐逆鎮驚去怯黒鬚髮主治叅互諸方俱見鉛條下簡要濟衆治室女月露滯澀心煩恍忽鉛白霜細研為散每服一錢地黄汁一合調下十全普救方治鼻衂鉛白霜為末取新汲水調服一字簡誤鉛霜墜痰去熱定驚癎止吐逆皆有竒效然其性極冷非乆服常用之物病已即去之胃弱脾虚腸滑者不宜用風寒咳𠻳多痰者并忌之古文錢平治翳障明目療風赤眼鹽鹵浸用婦人横逆産心腹痛月隔五淋燒以醋淬用疏古文錢其金毒火毒悉去性應平無毒而冦宗奭云古錢其銅焦赤有毒不知本草内赤銅之毒已微况古錢又多於古穴坑塹中得之歴年既乆毒性必失甚則有但存形質者其味辛氣平平即涼也目赤翳障肝經風熱也辛涼能散風熱則翳障赤痛除目自明矣婦人生産横逆者血氣壅塞道路不開也心腹痛者亦氣血結聚也月隔者月事不來胞脈閉也五淋者衝任熱壅也此藥能走下焦陰分散凝滯之氣血開壅塞之道路則諸證無不除矣又能主跌撲損傷其為散凝滯之藥無疑主治叅互同自然銅胎骨䗪蟲血竭無名異黄荆子没藥乳香狗骨治跌撲損傷及金刃傷神效青囊録跌撲損傷半兩錢五箇火煅醋淬四十九次甜瓜子五錢真珠二錢研末每服一字好酒調隨上下食前後古方麥斗散治一切傷損自然銅煅一兩古文錢煅一兩麝香五分為末每服五分酒下簡誤其味辛涼但能治風熱眼有佐以薑汁㸃眼者即從治之意借其熱以拔出火毒也如肝胃虚而内障生花者必不宜用神農本草經疏卷五
