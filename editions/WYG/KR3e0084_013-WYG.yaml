body:
  text: 神農本草經疏卷十三明繆希雍撰總九十二種今疏其要者二十六種桑根白皮葉耳椹灰枝黄附竹葉茹瀝附吳茱萸檳榔梔子騏驎竭龍腦香蕪荑枳殼枳實厚朴茗苦􅟒山茱萸紫葳胡桐淚猪苓烏藥没藥安息香仙人杖海桐皮大腹合歡五倍子天竺黄蜜蒙花桑根白皮味甘寒無毒主傷中五勞六極羸瘦崩中脈絶補虚益氣去肺中水氣唾血熱渴水腫腹滿臚脹利水道去寸白可以縫金瘡出土上者殺人疏桑根白皮得土金之氣故味甘氣寒而無毒東垣海藏俱云兼辛然甘厚辛薄降多升少陽中隂也入手太隂經甘以固元氣而補不足辛以瀉肺邪之有餘故能止嗽也凡肺中有水氣及肺火有餘者宜之傷中者中氣傷也五勞者五臟勞傷也六極者六腑之中氣極也羸瘦者肌肉脫也崩中者血脫也脈絶者氣血兩虚之至故脈不來也之數者皆由隂不足則陽有餘陽有餘則火盛而内熱火與元氣不兩立火能消物造化自然也惟甘也可以補元氣惟寒也可以除内熱熱除矣元氣生矣則上來諸證自瘳故本經終之以補虚益氣焉别錄去肺中水氣者即十劑中云燥可去溼桑白皮之屬是已吐血熱渴者熱傷肺火炎迫血妄行溢出上竅而兼發熱作渴也其主水腫腹滿臚脹者即利水道除溼補虚之功也溼熱盛則寸白生消除溼熱則蟲自不能留也縫金瘡者甘寒補益宜於傷損也主治參互得天麥二冬款冬花百部薄荷甘草沙參貝母枇杷葉五味子為治嗽要藥得芍藥薏苡仁木瓜茯苓橘皮赤小豆為治水腫之神劑經騐方治咳嗽吐血甚者鮮桑根白皮一斤米泔浸三宿刮去黄皮剉細入糯米四兩焙乾為末每服一錢米飲下肘後方治消渴尿多入地三尺桑根剝取白皮炙黄黑剉以水煑濃汁隨意飲之亦可少入米勿用鹽肘後方治產後下血炙桑白皮煑水飲之經驗方治墜馬抝損桑根白皮五斤為末以水五升煎膏敷之便止已後亦無宿血終不發動子母秘方治小兒重舌桑根白皮煑汁塗乳上飲之聖惠方治小兒流涎脾熱也胸膈有痰新桑根白皮搗自然汁飲之甚效煎飲亦良聖惠方治小兒天吊驚癎取家桑東行根研汁服千金方治石癰堅硬不作膿者桑白皮隂乾為末烊膠和酒調傅以軟為度蘇頌取皮中白汁主治小兒口瘡白漫拭淨塗之便愈又塗金刄所傷􅏫痛須臾血止仍以白皮裹之甚良時珍取汁塗蛇蜈蚣蜘蛛傷有驗取枝燒瀝治大風瘡疥生睂髮子母秘錄治小兒鵝口桑皮汁和胡粉塗之聖惠方治小兒唇腫桑木汁塗之即愈摘𤣥方治破傷中風桑瀝好酒對和溫服以醉為度醒服消風散簡誤肺虚無火因寒襲之而發咳嗽者勿服桑葉主除寒熱出汗汁解蜈蚣毒疏葉本經無氣味詳其主治應是味甘氣寒性無毒甘所以益血寒所以涼血甘寒相合故下氣而益隂是以能主隂虚寒熱及因内熱出汗其性兼燥故又能除脚氣水腫利大小腸原稟金氣故又能除風經霜則兼得天地之清肅故又能明目而止渴髮者血之餘也益血故又能長髪涼血故又止吐血合癰口罨穿掌療湯火皆清涼補血之功也主治參互四月採桑葉酒拌九蒸九曝為末胡麻或黑芝麻去殼九蒸九曝另磨如泥各等分煉蜜和為丸每五六錢空心饑時白湯下能益氣血袪風仙家餌之為引年止饑之要藥普濟方治青盲洗法昔武勝軍宋仲孚患此二十年用此法二年目明如故摘青桑葉曬乾逐月按日就地上燒存性每以一合於甆器内煎減二分傾出澄清溫熱洗目至百度屢試有驗正月初八二月初八三月初六四月初四五月初六六月初二七月初七八月二十九九月十二十月十三十一月初二十二月三十集簡方治風眼下淚臘月不落桑葉煎湯日日溫洗或入芒硝千金方治頭髮不長用桑葉麻葉煮泔水沐之七日可長數尺聖濟總錄治吐血不止晚桑葉焙乾研涼茶服三錢只一服止後用補肝肺藥直指方治癰口不斂經霜黄桑葉為末傅之通𤣥論治穿掌腫毒新桑葉研爛罨之即愈醫學正傳治湯火傷瘡經霜桑葉燒存性為末油和敷之三日愈桑耳味甘有毒黑者主女子漏下赤白沃血病癥瘕積聚隂痛隂陽寒熱無子療月水不調其黄熟陳白者止久洩益氣不饑其金色者治癖飲積聚腹痛金瘡桑耳煅存性研細香附童便炒黑研細每用桑耳灰二分香附末三分淡醋湯空心調服治血崩奇效過於他木耳桑椹味甘寒無毒單食止消渴陳藏器利五藏闗節通血氣久服不饑安魂鎮神令人聰明變白不老多收暴乾為末蜜丸日服時珍搗汁飲解中酒毒釀酒服利水氣消腫一名文武實疏桑椹者桑之精華所結也其味甘其氣寒其色初丹後紫味厚於氣合而論之甘寒益血而除熱其為涼血補血益隂之藥無疑矣消渴由於内熱津液不足生津故止渴五臟皆屬隂益隂故利五臟隂不足則闗節之血氣不通血生津滿隂氣長盛則不饑而血氣自通矣熱退隂生則肝心無火故魂安而神自清寧神清則聰明内發隂復則變白不老甘寒除熱故解中酒毒性寒而下行利水故利水氣而消腫皆自然之道也主治參互冦宗奭曰本經言桑甚詳獨遺烏椹然桑之精英盡在於此採摘微研以布濾汁石器熬成稀膏量入多少蜜熬稠貯甆器中每抄一二錢食後夜臥以沸湯點服治服金石藥發熱口渴生精神及小腸熱甚僊方日乾為末蜜和丸酒服亦良四時月令云四月宜飲桑椹酒能理百種風熱其法用桑椹汁三斗重湯煑至一斗半入白蜜二合酥油一兩生薑汁一合煑令得所瓶收每服一合和酒飲之亦可以汁熬燒酒藏之經年味愈佳普濟方治水腫脹滿水不下則滿溢水下則虚竭還脹十無一活宜用桑椹酒治之桑白皮切以水二斗煑汁一斗入桑椹再煑取五升以糯米飯五升釀酒飲保命集治瘰癧結核文武膏用文武實即桑椹子二斗黑熟者以布取汁銀石器熬成膏每白湯調服一匙日三服千金方治小兒赤秃桑椹子取汁頻服聖濟錄治小兒白秃黑椹入罌中曝三七日化為水洗之三七日神效集簡方治隂證腹痛桑椹絹包風乾過伏天為細末每服三錢熱酒下取汗簡誤甘寒𢃄滑故潤而下行脾胃虚寒作泄者勿服桑柴灰味辛寒有小毒淋取汁與冬灰等分同滅痣疵黑子蝕惡肉煑赤小豆食大下水脹傅金瘡止血生肌桑霜即灰汁以桑皮綿紙襯淘籮底用滾水淋下甆器盛之重湯煑乾别名木磠能鑽筋透骨為傅癰疽拔疔引諸散毒藥攻毒之要品得丹砂雄黄乳香没藥牛黄龍腦香紅白藥子白及白斂傅一切腫毒止痛追毒有奇效得鐵鏽蟾酥可拔疔枝味苦平性不冷不熱主遍體風癢乾燥火氣脚氣風氣四肢拘攣上氣眼暈肺氣欬嗽消食利小便療癰疽後渴嫰條細搗一升熬香煎飲亦無禁忌久服終身不患偏風聖惠方治紫白癜風桑枝十斤益母草三斤水五斗慢煑至五升去滓再煎成膏每臥時溫酒調服半合以愈為度桑黄氣味與白皮同其除肺熱之功殆又過之山家老桑樹多生湖桑少見同天門冬百部山梔枇杷葉治赤鼻有神竹葉味辛平大寒無毒主胸中痰熱欬逆上氣疏竹葉稟隂氣以生本經味辛平氣大寒無毒甄權言甘寒氣薄味厚隂中微陽降也入足陽明手少隂經陽明客熱則胸中生痰痰熱壅滯則欬逆上氣辛寒能解陽明之熱結則痰自消氣自下而欬逆止矣仲景治傷寒發熱大渴有竹葉石膏湯無非假其辛寒散陽明之邪熱也主治參互煎湯調酸棗仁炒熟末五錢臨臥服治心虚不得眠同麥門冬酸棗仁逺志丹參茯神丹砂犀角治心經蘊熱虚煩不眠入白虎湯治傷寒煩熱大渴引飲肘後方治時行發黄竹葉五升小麥七升石膏三兩水一斗半煑取七升細服盡劑愈淡竹茹味甘微寒無毒主嘔啘溫氣寒熱吐血崩中疏竹茹雖與竹葉同本然竹茹得土氣多故味帶甘氣微寒無毒入足陽明經經曰諸嘔吐酸水皆屬於熱陽明有熱則為嘔啘溫氣寒熱亦邪客陽明所致甘寒解陽明之熱則邪氣退而嘔啘止矣甘寒又能涼血清熱故主吐血崩中及女勞復也主治參互同木瓜橘皮麥門冬枇杷葉人參蘆根汁石斛治胃虚有熱嘔啘不止活人書治傷寒愈後交接女勞復頭痛身熱耳鳴口渴腰骨痛男子卵腫股痛竹皮一升水三升煑五沸服汁又方治婦人大病初愈有所動勞致熱氣衝胸手足搐搦拘急如中風狀淡竹青茹半斤栝樓二兩水二升分二服簡誤胃寒嘔吐及感寒挾食作吐忌用淡竹瀝味甘大寒無毒療暴中風痺胸中大熱止煩悶消渴勞復疏竹瀝竹之津液也經云大寒亦言其本性耳得火之後寒氣應減性滑流利走竅逐痰故為中風家要藥凡中風之證莫不由於隂虚火旺煎熬津液結而為痰壅塞氣道不得升降熱極生風以致猝然僵仆或偏痺不仁此藥能遍走經絡摉剔一切痰結兼之甘寒能益隂而除熱痰熱既袪則氣道通利經脈流轉外證自除矣其主胸中大熱止煩悶者取其甘寒清熱益隂之功耳觀古人以竹瀝治中風則知中風未有不因隂虚痰熱所致不然如果外來風邪安得復用此甘寒滑利之藥治之哉主治參互同貝母栝樓仁霞天膏白芥子蘇子橘紅鬱金童便麥門冬治似中風口眼喎斜語言蹇澀或半身不遂等證千金方治中風口噤竹瀝加薑汁日日飲之梅師方治產後中風口噤身直面青手足反張以竹瀝飲一二升即甦外臺秘要治破傷中風凡閃脫折骨諸瘡慎不可當風用扇中風則發痙口噤項急殺人亟飲竹瀝二三升忌飲食及酒千金方小兒傷寒淡竹瀝葛根汁各六合細細與服至寳方小兒狂語夜後便發竹瀝夜服二合產寳方婦人胎動妊娠因夫所動困絶以竹瀝飲一升立愈梅師方孕婦子煩茯苓二兩竹瀝一升水四升煎二升分三服千金方時氣煩躁五六日不解青竹瀝半盞煎熱數數飲之覆取微汗李絳兵部手集欬嗽肺痿大人小兒欬逆短氣胸中吸吸欬出涕唾嗽出臭膿用淡竹瀝一合服之日三五次以愈為度簡誤寒痰溼痰及飲食生痰不宜用吳茱萸味辛温大熱有小毒主溫中下氣止痛欬逆寒熱除溼血痺逐風邪開腠理去痰冷腹内絞痛諸冷實不消中惡心腹痛逆氣利五藏疏吳茱萸稟火氣以生故其味辛氣溫有小毒甄權辛苦大熱氣味俱厚陽也入足陽明太隂兼入足少隂厥隂經凡脾胃之氣喜溫而惡寒寒則中氣不能運化或為冷實不消或為腹内絞痛或寒痰停積以致氣逆發欬五臟不利辛溫煖脾胃而散寒邪則中自溫氣自下而諸證悉除其主除溼血痺逐風邪者蓋以風寒溼之邪多從脾胃而入脾胃主肌肉為邪所侵則腠理閉密而寒熱諸痺所從來矣辛溫走散開發故能使風寒溼之邪從腠理而出中惡腹痛亦邪惡之氣干犯脾胃所致入脾散邪則腹痛自止矣主治參互仲景吳茱萸湯治少隂病吐利手足逆冷煩躁欲死者吳茱萸一斤人參二兩生薑六兩大棗十二枚劈四味以水七升煑二升去滓溫服七合日三服厥隂乾嘔吐涎沬頭痛者同此方又當歸四逆加吳茱萸湯治厥隂證手足厥冷脈細欲絶其人内有久寒者當歸三兩芍藥三兩炙甘草二兩通草二兩桂枝三兩細辛三兩生薑半斤吳茱萸二升大棗二十五枚以水六升清酒六升同煑取五升去滓分五服食療治冬月感寒吳茱萸五錢煎湯服之取汗聖惠方治隂毒傷寒四肢逆冷用吳茱萸一升酒拌溼絹袋二箇包蒸極熱更互熨足心候氣透痛亦即止累有效肘後方治寒疝往來吳茱萸一兩生薑半兩清酒一升煎分溫服聖惠方治食已吞酸胃虚冷者吳茱萸湯泡七次焙乾薑等分為末湯服一錢孫氏存仁方治多年脾泄老人多此謂之水土同化吳茱萸三錢泡入水煎汁入鹽少許通口服蓋茱萸能煖膀胱水道既清大腸自固他藥雖熱不能分解清濁也和劑局方戊巳丸治脾胃受溼下痢赤白腹痛米穀不化用吳茱萸黄連白芍藥各一兩同炒為末蒸餅丸梧子大每服二三丸米飲下簡誤陽厥似隂手足雖逆冷而口多渴喜飲水大小便秘結小便或通亦赤澀短少此火極似水守真所謂禁慄如喪神守皆屬於火之謂耳此與桂附乾薑之類同忌嘔吐吞酸屬胃火者不宜用欬逆上氣非風寒外邪及冷痰宿水所致不宜用腹痛屬血虚有火者不宜用赤白下痢病名滯下因暑邪入於腸胃而非酒食生冷停滯積垢者不宜用小腸疝氣非驟感寒邪及初發一二次者不宜用霍亂轉筋由於脾胃虚弱冒暑所致而非寒溼生冷干犯腸胃者不宜用一切隂虚之證及五臟六腑有熱無寒之人法所咸忌檳榔味辛溫無毒主消穀逐水除痰癖殺三蟲伏尸療寸白疏檳榔得天之陽氣地之金味故味辛氣溫無毒大明言澀元素言苦以其感盛夏之火氣耳氣薄味厚陽中微隂降也入手足陽明經夫足陽明為水穀之海手陽明為傳道之官二經相為貫輸以運化精微者也二經病則水穀不能以時消化覊留而成痰癖或溼熱停久則變生諸蟲此藥辛能散結破滯苦能下泄殺蟲故主如上諸證也甄權宣利五臟六腑壅滯破胸中氣下水腫治心痛積聚日華子下一切氣通闗節利九竅徤脾調中破癥結李珣主賁豚氣五膈氣風冷氣脚氣宿食不消皆取其辛溫走散破氣墜積能下腸胃有形之物耳主治參互同草果枳實橘皮治食瘧加三稜蓬茂礬紅紅麯山查麥糵消一切堅硬肉食及諸米麫生冷食積成塊作痛同黄連藊豆蓮肉橘紅白芍藥紅麯烏梅葛根枳殼治滯下後重同雷丸使君子白蕪荑蘆薈肉豆蔲胡黄連治小兒疳蚘同楝根鶴蝨錫灰薏苡根貫衆烏梅治一切寸白蟲同蒼术草果青皮甘草治山嵐瘴氣發瘧直指方心脾作痛雞心檳榔髙良薑各一錢半陳米百粒同以水煎服之廣利方脚氣衝心悶亂不識人用白檳榔十二分為末分二服空心煖小便調下日二服十便良方蟲痔裏急檳榔為末每日空心以白湯調二錢千金方寸白蟲病檳榔二七枚為末先以水二升半煑檳榔片取一升空心調末方寸匕服之經日蟲盡出未盡再服以盡為度簡誤檳榔性能墜諸氣至於下極病屬氣虚者忌之脾胃虚雖有積滯者不宜用下利非後重者不宜用心腹痛無留結及非蟲攻咬者不宜用瘧非山嵐瘴氣者不宜用凡病屬隂陽兩虚中氣不足而非腸胃壅滯宿食脹滿者悉在所忌梔子味苦寒大寒無毒主五内邪氣胃中熱氣面赤酒皰皶鼻白癩赤癩瘡瘍療目熱赤痛胸心大小腸大熱心中煩悶疏梔子感天之清氣得地之苦味故其性無毒氣薄而味厚氣浮而味沉陽中隂也入手太隂手少隂足陽明經少隂為君主之官邪熱客之則五臟皆失所主清少隂之熱則五内邪氣自去胃中熱氣亦除面赤酒皰皶鼻者肺熱之候也肺主清肅酒熱客之即見是證於開竅之所延及於面也肺得苦寒之氣則酒熱自除而面鼻赤色皆退矣其主赤白癩瘡瘍者即諸痛痒瘡瘍皆屬心火之謂療目赤熱痛及胸心大小腸大熱心中煩悶者總除心肺二經之火熱也此藥味苦氣寒瀉一切有餘之火故能主如上諸證主治參互仲景治傷寒汗吐下後虚煩不得眠及心中懊憹者有梔子豉湯用梔子十四枚香豉四合水煎服入茵陳大黄湯治傷寒溼熱發黄腹脹梔子十四枚茵陳六兩大黄三兩水一斗先煑茵陳減六升内二味煑取三升分三服小便當利尿如皂角汁狀正赤一宿腹減黄從小便出也同甘草黄檗為梔子檗皮湯亦治發黄身熱同厚朴枳實為梔子厚朴湯治傷寒下後心煩腹滿臥起不安者得吐即愈同䑕矢作湯治大病後勞復小便不利者小便利即愈已上皆仲景法同連翹麥門冬竹葉燈心草生甘草黄連能瀉心經有餘之火加赤茯苓木通滑石澤瀉瀉小腸火同桑黄或桑白皮黄芩甘草桔梗五味子乾葛治酒熱傷肺發出鼻皶同茵陳蒿滑石車前子秦艽黄連連錢草苜蓿治酒熱發黄梅師方治熱病後勞復及因交接後發動欲死不能語者梔子三十枚水三升煎一升服令微汗救急方治湯盪火傷梔子末和雞子清濃塗之丹溪方治胃脘火痛山梔七枚炒水一盞煎七分入生薑汁飲之立止簡誤梔子稟至苦大寒之氣苦寒損胃而傷血凡脾胃虚弱者忌之血虚發熱者忌之性能瀉有餘之火心肺無邪熱者不宜用小便不通由於膀胱虚無氣以化而非熱結小腸者不宜用瘡瘍因氣血虚不能收斂則為久冷敗瘡非溫煖補益之劑則不愈此所謂既潰之後一毫寒藥不可用是也世人又以治諸血證不知血得熱則行得寒則凝瘀血凝結於中則反致寒熱或發熱勞嗽飲食減少為難療之病凡治吐血法當以順氣為先蓋血隨氣而行氣降則火降火降則血自歸經不求其止而止矣此治療之要法不可違也騏驎竭味甘鹹平有小毒主五藏邪氣帶下止痛破積血金瘡生肉舊與紫同條今分出疏騏驎竭稟土氣而兼水化故味甘鹹氣平無毒丹房鑑源云稟於熒惑之氣生於湯石之隂其色赤象火而味鹹則得隂氣也氣薄味厚隂也降也入足厥隂手少隂經甘主補鹹主消散瘀血生新血之要藥故主破積血金瘡止痛生肉主五臟邪氣者即邪熱氣也帶下者溼熱傷血分所致也甘鹹能涼血除熱故悉主之蘇恭主心腹卒痛李珣以之治傷折打損一切疼痛血氣攪刺内傷血聚者誠為此耳此藥產外國極難得真者理傷折有奪命之功主治參互同乳香没藥自然銅麻皮灰狗頭骨煅存性䗪蟲黄荆子骨碎補治一切打撲損傷同髮灰乳香没藥片腦輕粉象牙末紅粉霜為細末摻一切金瘡及腫毒生肌止痛廣利方金瘡出血騏驎竭末傅之立愈醫林集要產後血衝心胸喘滿命在須臾用血竭没藥各一錢研童便和酒調服究原方收斂瘡口血竭末一字龍腦少許大棗燒灰半錢同研津調塗之摘𤣥方胸中血塊血竭没藥各一兩滑石牡丹皮各一兩同煑過為末醋糊丸梧子大空心服之醫林集要嵌甲疼痛血竭末傅之簡誤凡使勿用海母血真相似只是味鹹并腥氣騏驎竭味微鹹甘似梔子氣也又云嚼之不爛如蠟者為上凡血病無瘀積者不必用日華子云此藥性急不可多使却引膿用時勿與衆藥同研化作飛塵也龍腦香味辛苦微寒一云溫平無毒主心腹邪氣風溼積聚耳聾明目去目赤膚翳疏龍腦香稟火金之氣以生本經味辛苦氣微寒無毒其香為百藥之冠凡香氣之甚者其性必溫熱李珣言溫元素言熱是矣氣芳烈味大辛陽中之陽升也散也性善走竄開竅無往不達芳香之氣能辟一切邪惡辛熱之性能散一切風溼故主心腹邪氣及風溼積聚也耳聾者竅閉也開竅則耳自聰目赤膚翳者火熱甚也辛溫主散能引火熱之氣自外而出則目自明赤痛膚翳自去此從治之法也别錄又主婦人難產者取其善走開通闗竅之力耳主治參互同乳香没藥雄黄紅藥子烏雞骨白及白斂桑磠堿牛黄傅一切疔腫癰疽神效聖濟總錄目生膚翳龍腦為末日㸃三五度御醫院方頭目風熱上攻用龍腦末半兩南蓬砂末一兩頻㗜兩鼻瀕湖集簡方風熱喉痺燈心一錢黄檗五分並燒存性白礬七分煅過片腦三分為末每以一二分吹患處此陸一峰家傳絶妙方也又方鼻中息肉垂下者用片腦㸃之自入夷堅志傷寒舌出過寸者梅花片腦半分為末摻之隨手而愈又方中風牙噤無門下藥者開闗散揩之五月五日午時用龍腦天南星等分為末每以一字揩齒二三十遍其口自開經驗方痘瘡狂躁心煩氣喘妄語或見鬼神瘡色赤未透者用龍腦一錢細研旋以猪心血丸芡子大每服一丸紫草湯下少時心神便定得睡發瘡總微論用獖猪第二番血清半杯紫草汁半杯和勻入龍腦一分溫服良久下瘀血一二行瘡即紅活此治痘瘡黑黶候醫所不治者百發百中簡誤宗奭云此物大通利闗膈熱塞大人小兒風涎閉塞及暴得驚熱甚為濟用然非常服之藥震亨云龍腦屬火世知其寒而通利未達其熱而輕浮飛越喜其香而貴重動輒與麝同為桂附之助然人之陽易動隂易虧不可不思杲曰龍腦入骨風病在骨髓者宜用之為引經若風在血脈肌肉輒用腦麝反引風入骨髓如油入麫莫之能出也觀三公之言則龍腦之為害可知凡中風非外來之風邪乃因氣血虚而病者忌之小兒吐瀉後成驚者為慢脾風切不可服急驚屬實熱可用慢驚屬虛寒不可用眼目昏暗屬肝腎虚者不宜入㸃藥設誤㸃之必致昏暗難療蕪荑味辛平無毒主五内邪氣散皮膚骨節中淫淫溫行毒去三蟲化食逐寸白散腸中嗢嗢喘息疏蕪荑稟金氣而生於春陽之令本經味辛氣平無毒甄權加苦李珣加溫詳其功用應是苦辛溫平之藥非辛溫則不能散五臟皮膚骨節中邪毒氣非苦平則不能去三蟲化食逐寸白療腸中嗢嗢喘息然察其所主雖能除風邪淫氣之為害而其功則長於走腸胃殺諸蟲消食積也故小兒疳瀉冷痢為必資之藥主治參互同肉豆蔲胡黄連盧㑹使君子青黛五穀蟲雷丸檳榔橘皮治小兒疳熱瀉痢及腹大羸瘦面黄好喫泥土本事方制殺諸蟲生蕪荑生檳榔各四兩為末蒸餅丸如梧子每服二十丸白湯下錢氏小兒直訣疳熱有蟲瘦悴久服充肌用蕪荑一兩黄連一兩為末猪膽汁七枚和入盌内飯上蒸之一日蒸一次九蒸乃入麝香半錢湯浸蒸餅和丸菉豆大每服五七丸至二十丸米飲下危氏得效方蟲牙作痛以蕪荑仁安蛀孔中及縫中甚效入藥用大者小者即榆莢不堪入藥除疳證殺蟲外他用甚稀故不著簡誤枳殼味苦酸微寒無毒主風痒麻痺通利闗節勞氣欬嗽背膞悶倦散留結胸膈痰滯逐水消脹滿大腸風安胃止風痛疏枳殼氣味所主與枳實大畧相同但枳實形小其氣全其性烈故善下達如少年猛悍之將勇往直前而一無回顧者也枳殼形大其氣散其性緩故其行稍遲是以能入胸膈肺胃之分及入大腸也其主風痒麻痺通利闗節止風痛者蓋肺主皮毛胃主肌肉風寒溼入於二經則皮膚瘙痒或作痛或麻木此藥有苦泄辛散之功兼能引諸風藥入於二臟故為治風所需風邪既散則闗節自然通利矣其療勞氣咳嗽背膊悶倦者蓋亦指風寒鬱於上焦則肺氣滯而為悶倦咳嗽經曰肺苦氣上逆急食苦以泄之枳殼味苦能泄至髙之氣故主之也又肺與大腸為表裏風邪入肺則并入大腸風熱相搏而為腸風下血苦寒下泄之氣則血熱清而風自除矣其主散留結胸膈痰滯逐水消脹滿安胃諸證悉與枳實相同苐其氣稍緩耳主治參互同蘇子橘皮桔梗木香白豆蔲香附治上焦壅氣脹滿因於寒同黄連槐花乾葛防風荆芥芍藥黄芩當歸生地黄地榆側柏葉治腸風下血初起者神效同荆芥苦參防風蒼耳草敗蒲煎湯沐浴治風疹作痒同檳榔芍藥黄連升麻葛根甘草紅麯滑石治滯下裏急後重得人參麥冬治氣虚大便不快同肉桂治右脇痛簡誤枳殼泄肺能損至髙之氣肺氣虚弱者忌之脾胃虚中氣不運而痰壅喘急者忌之咳嗽不因於風寒入肺氣壅者服之反能作劇咳嗽隂虚火炎者服之立致危殆一槩胎前產後咸不宜服今世多用以治婦人胎氣不安或至八九月為易產之劑動輒資用殊不知婦人懐孕全賴氣血以養胎氣血充足則胎自易產且娠婦至八九月精神困倦四肢軟弱飲食減少動息喘促何莫非虚弱之證而更用此耗散之藥耶正經所謂損不足而虚其虚豈不大謬哉古方有瘦胎飲者為湖陽公主而設以彼奉養太過其氣必實故用此以耗其有餘之氣則胎易產今人不知古人立方之意一概濫施誤甚誤甚枳實味苦酸寒微寒無毒主大風在皮膚中如麻豆苦痒除寒熱結止痢長肌肉利五藏益氣輕身除胸脇痰癖逐停水破結實消脹滿心下急痞痛逆氣脇風痛安胃氣止溏洩明目疏枳實感天地苦寒之氣以生故其味苦氣寒無毒别錄雷公加酸甄權加辛察其功用必是苦為最而酸辛次之氣味俱厚隂也入足陽明太隂經細詳神農主治與本藥氣味大不相侔究其所因必是枳殼所主蓋二物古文原同一條後人分出時誤入耳其别錄所主除胸脇痰癖逐停水破結實消脹滿心下急痞痛逆氣脇風痛安胃氣止溏洩者是其本分内事皆足陽明太隂受病二經氣滯則不能運化精微而痰癖停水結實脹滿所自來矣胃之上口名曰賁門賁門與心相連胃氣壅則心下亦自急痞痛邪塞中焦則升降不舒而氣上逆肝木鬱於地下則不能條達而脇痛得其破散衝走之力則諸證悉除所以仲景下傷寒腹脹實結者有承氣湯胸中痞痛者有陷胸湯潔古療心下痞滿者有枳术丸壅滯既去則胃氣自安而溏洩亦止矣末云明目者經曰目得血而能視氣旺乃能生血損氣破散之性豈能明目哉無是理也主治參互同三稜蓬茂青皮檳榔為消磨堅積之劑然須能食脾胃徤者宜之同白术橘皮厚朴甘草砂仁為枳术丸治心下痞滿因於食入陷胸湯治傷寒寒熱結胸入大小承氣湯治傷寒熱邪入裏結實脹滿痛不可當數日不更衣者簡誤此藥性専消導破氣損真觀朱震亨云瀉痰有衝牆倒壁之力其為勇悍之氣可知凡中氣虚弱勞倦傷脾發為痞滿者當用補中益氣湯補其不足則痞自除此法所當忌也脹滿非實邪結於中下焦手不可按七八日不更衣者必不可用挾熱下痢亦非燥糞留結者必不可用傷食停積多因脾胃虚不能運化所致慎勿輕餌如元氣壯實有積滯者不得已用一二劑病已即去之即潔古所製枳术丸亦為脾胃有積滯者設積滯去則脾胃自徤故謂之益脾胃之藥非消導之外復有補益之功也時醫不識病之虚實藥之補瀉往往概施損人真氣為厲不淺設誤投之雖多服參耆補劑亦難挽其刻削之害也世人多蹈其弊故特表以為戒厚朴味苦溫大溫無毒主中風傷寒頭痛寒熱驚悸氣血痺死肌去三蟲溫中益氣消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止洩痢淋露除驚去留熱心煩滿厚腸胃疏厚朴稟地二之氣以生兼得乎春陽之氣而成故其味苦其氣溫甄權苦辛大熱應是辛熱苦溫之藥辛熱太過則其性宜有毒以其得陽氣之正故無毒耳氣味俱厚陽中之隂降也入足太隂手足陽明經其主中風傷寒頭痛寒熱氣血痺死肌者蓋以風寒外邪傷於陽分則為寒熱頭痛風寒溼入腠理則氣血凝澀而成痺甚則肌肉不仁此藥辛能散結苦能燥溼溫熱能袪風寒故悉主之也别錄又主溫中消痰下氣療霍亂及腹痛脹滿胃中冷逆胸中嘔不止洩痢心煩滿者何莫非脹胃氣逆壅滯及痰飲留結飲食生冷所致得此下洩開通溫熱煖胃則諸證不求其止而止矣至於淋露雖屬下焦為病然多因胃家溼熱下流三蟲亦腸胃溼熱所生苦能燥溼殺蟲故亦主之也本經又主驚悸及别錄除驚去留熱者皆非其所宜驚悸屬心虚於脾胃絶無相干氣味大溫之藥又豈能去留熱哉至益氣厚腸胃蓋亦指邪氣去正氣自益之謂積滯消腸胃自厚之意耳非消散之外復有補益之功也用者詳之主治參互同陳皮枳殼麥糵草果山查砂仁礬紅治傷食腹脹同橘皮黄連甘草蒼白术葛根治溼熱作瀉同檳榔木香黄連滑石橘皮甘草白芍藥治滯下初起同白术人參白芍藥茯苓消腹脹佐生薑橘皮藿香砂仁半夏止胃寒嘔吐同三稜蓬茂檳榔人參青皮治積年冷癖堅塊同蒼术橘皮甘草為平胃散治胸中敦厚之氣使飲食倍增聖惠方治痰壅嘔逆心胸滿悶不下飲食用厚朴一兩薑汁炙黄為末米飲調下二錢匕張仲景金匱方治腹脹脈數厚朴三物湯用厚朴半斤枳實五枚以水一斗二升煎取五升入大黄四兩再煎取三升溫服一升轉動更服不動勿服又七物厚朴湯治腹痛脹滿用厚朴半斤甘草大黄各三兩棗十枚枳實五枚桂二兩生薑五兩以水一斗煎取四升溫服八合日三嘔者加半夏五合簡誤厚朴氣味辛温性復大熱其功長於泄結散滿溫煖脾胃一切飲食停積氣壅暴脹與夫冷氣逆氣積年冷氣入腹腸鳴虚吼痰飲吐沬胃冷嘔逆腹痛泄瀉及脾胃壯實之人偶感風寒氣實人誤服參耆致成喘脹誠為要藥然而性専消導散而不收畧無補益之功故凡嘔吐不因寒痰冷積而由於胃虚火氣炎上腹痛因於血虚脾隂不足而非停滯所致泄瀉因於火熱暴注而非積寒傷冷腹滿因於中氣不足氣不歸元而非氣實壅滯中風由於隂虚火炎猝致僵仆而非西北真中寒邪傷寒發熱頭疼而無痞塞脹滿之候小兒吐瀉乳食將成慢驚大人氣虚血槁見發膈證老人脾虚不能運化偶有停積娠婦惡阻水穀不入娠婦胎升眩暈娠婦傷食停冷娠婦腹痛瀉利娠婦傷寒傷風產後血虚腹痛產後中滿作喘產後洩瀉反胃已上諸證法所咸忌若誤投之輕病變重重病必危世人不究其原一概濫用雖或一時未見其害而清純沖和之氣默為之耗矣可不慎哉茗苦􅟒茗味甘苦微寒無毒主瘻瘡利小便去痰熱渴令人少睡苦􅟒主下氣消食疏茗稟土中之清氣兼得春初生發之意本經味甘氣微寒無毒藏器言苦然亦有不苦者氣薄味厚隂中微陽降也入手太隂少隂經太隂為清肅之臟喜涼而惡熱熱則生痰而津液竭故作渴也瘻瘡者大腸積熱也小便不利者小腸熱結也甘寒入心肺而除熱則津液生痰熱解臟氣既清腑病不求其止而止矣令人少睡者蓋心藏神神昏則多睡清心經之熱則神常自惺寂故不寐也下氣消食者苦能下泄故氣下火降而兼滌除腸胃則食自消矣主治參互同黄連酸棗仁生用通草蓮實治多睡好眠同當歸川芎烏梅黑豆生地黄土茯苓甘菊花治頭痛因於血虚有火者直指方熱毒下痢蠟茶為末密水煎服白痢以薑汁同水煎服兩三服即愈簡誤凡茶之種類極多方宜大異要皆以味甘不澀氣芬如蘭摘於夏前者為良夫茶禀天地至清之氣生於山谷磽瘠砂土之中不受纖芥穢滓専感雲露之氣以為滋培故能滌腸胃一切垢膩寧非木中清貴之品哉昔人多以其苦寒不利脾胃及多食發黄消瘦之說此皆語其粗惡苦澀品類最下者言之耳昔雅州蒙山出一種茶服四兩即為地僊豈有味甘氣芬者飲之反致疾耶但苦澀野氣葉痿莖枯非道地所產者服之不利心脾故不宜飲酒後不宜用能成飲證山茱萸味酸平微溫無毒主心下邪氣寒熱溫中逐寒溼痺去三蟲腸胃風邪寒熱疝瘕頭風風氣去來鼻塞目黄耳聾面皰溫中下氣出汗强隂益精安五藏通九竅止小便利久服輕身明目强力長年疏山茱萸感天地春生之氣兼得木之酸味神農氣平别錄微溫總言其得春氣之正耳岐伯甄權加辛然嘗其味必是酸多辛少入足厥隂足少隂經陽中之隂降也其治心下邪氣寒熱腸胃風邪寒熱頭風風氣去來鼻塞面皰者皆肝腎二經所主二經虚熱故見前證肝為風木之位經曰諸風掉眩屬肝木此藥溫能通行辛能走散酸能入肝而斂虚熱風邪消散則心下腸胃寒熱自除頭目亦清利而鼻塞面皰悉愈也逐寒溼痺者經曰邪之所湊其氣必虚總藉其辛溫散結行而能補也至於三蟲亦腸胃溼熱所生溼去則蟲自除能溫中則氣自下汗自出矣凡四時之令春氣煖而生秋氣涼而殺萬物之性喜溫而惡寒人身精氣亦賴溫煖而後充足況肝腎在下居至隂之位非得溫煖之氣則孤隂無以生此藥正入二經氣溫而主補味酸而主斂故精氣益而隂强也精益則五臟自安九竅自利又腎與膀胱為表裏膀胱虚寒則小便不禁耳為腎之外竅腎虚則耳聾肝開竅於目肝虚則邪熱客之而目黄二經受寒邪則為疝瘕二臟得補則諸證無不瘳矣輕身强力長年者益精安五臟之驗也主治參互同菟絲子肉蓯蓉巴㦸天鹿茸牛膝白膠車前子枸杞子生地黄沙苑蒺藜麥門冬能添精固髓煖腰膝益陽道令人有子同人參五味子牡蠣益智子治老人小便淋瀝及遺尿同人乳沙苑蒺藜熟地黄人參麥門冬牛膝甘菊花治腦骨痛腦為髓之海髓足則腦痛自除同石菖蒲甘菊花地黄黄檗五味子治腎虚耳聾同杜仲牛膝地黄白膠山藥治腎虚腰痛入六味地黄丸為腎虚而有溼熱者所須簡誤命門火熾强陽不痿者忌之膀胱熱結小便不利者法當清利此藥味酸主斂不宜用隂虚血熱不宜用即用當與黄檗同加紫葳味酸微寒無毒主婦產乳餘疾崩中癥瘕血閉寒熱羸瘦養胎疏紫葳即凌霄花也稟春氣以生故其味酸氣微寒無毒花開於夏而色赤味應帶苦入肝行血之峻藥故主婦人產乳餘疾及崩中癥瘕血閉寒熱羸瘦諸證至於養胎決非其性所宜用者慎之主治參互同當歸紅花川芎牛膝地黄延胡索桃仁蘇方木五靈脂治壯實婦人經閉普濟方嬰兒百日内無故口青不飲乳用凌霄花大藍葉芒硝大黄等分為末以羊髓和丸梧子大每研一丸乳送下便能喫乳熱者可服寒者忌之簡誤紫葳長於破血消瘀凡婦人血氣虚者一概勿施胎前㫁不宜用胡桐涙味鹹苦大寒無毒主大毒熱心腹煩滿水和服之取吐又主牛馬急黄黑汗水研三二兩灌之立瘥疏胡桐淚稟地中至隂之氣而兼水化故味鹹苦氣大寒無毒氣味俱厚隂中之隂也入足陽明經經曰熱淫於内治以鹹寒又曰在髙者因而越之苦以湧吐寒以勝熱故主大毒熱心腹煩滿取吐而效也牛馬性熱而又犯熱病所以急黄黑汗也鹹寒能除大熱故亦主之日華子以之治風蟲牙齒痛李珣謂其能治骨槽風齒䘌元素言瘰癧非此不能除皆資其苦能殺蟲鹹能入骨軟堅大寒能除極熱之用耳主治參互聖惠方牙疼出血胡桐淚半兩研入麝香少許夜夜貼之又方牙疳宣露膿血臭氣者胡桐淚一兩枸杞根一升每用五錢煎水熱嗽聖濟總錄牙齒蠧黑乃腎虚也胡桐淚一兩丹砂半兩麝香一分為末摻之除口齒藥外他用甚稀故不著簡誤猪苓味甘苦平無毒主痎瘧解毒蠱疰不祥利水道久服輕身耐老疏猪苓稟戊土之陽氣得風木之隂氣本經謂其味甘應兼淡苦其氣平而無毒氣味俱薄降也陽中隂也入足太陽足少隂經其主痎瘧者瘧必由暑暑必兼溼淡以利竅引暑溼之氣從小便出所以分消之也淡滲之性故利水道溼勝則身重溼去則身輕利竅之藥必能走泄精氣其曰久服耐老必無是理矣解蠱毒疰不祥義將安出亦未可盡信也主治參互入五苓散為除溼之要藥佐白芍藥白茯苓人參橘皮术澤瀉治水腫之屬陽分者佐白芍藥生地黄桑寄生桑根白皮茯苓澤瀉琥珀石斛薏苡仁肉桂治水腫之屬隂分者均為要藥其功長於利水故善除溼簡誤冦宗奭曰猪苓利水之功多久服必損腎氣昏人目潔古曰淡滲太燥能亡津液無溼證勿服皆確論也有溼尚宜暫用久服㫁乎不可烏藥味辛溫無毒主中惡心腹痛蠱毒疰忤鬼氣宿食不消天行疫瘴膀胱腎間冷氣攻衝背膂婦人血氣小兒腹中諸蟲疏烏藥稟地二之氣以生故味辛氣溫無毒然嘗其味亦帶微苦氣亦微香氣厚於味陽也入足陽明少隂經其主中惡心腹痛疰忤鬼氣天行疫瘴者皆足陽明受病陽明開竅於口鼻凡邪惡鬼忤與夫疫瘴之氣侵人悉從口鼻而入此藥辛溫煖胃辟惡散邪故能主諸證也胃煖則宿食自消辛散則蠱毒亦解又腎與膀胱為表裏虚則寒客之而冷氣攻衝背膂辛溫能散寒邪其性又善下走則冷氣攻衝自止也性溫走泄故復能散婦人血凝氣滯微苦而辛故又能療小兒腹中諸蟲也主治參互同沉香木香白豆蔲香附橘皮檳榔治婦人氣實暴氣壅脹濟生方治七情鬱結上氣喘急用四磨湯降中兼升瀉中帶補其方以人參烏藥沉香檳榔各磨濃汁七分煎細細嚥之和劑局方烏沉湯治一切氣一切冷補五臟調中壯陽煖腰膝去邪氣冷風麻痺膀胱腎間冷氣攻衝背膂俛仰不利風水毒腫吐瀉轉筋癥癖刺痛中惡心腹痛鬼氣疰忤天行疫瘴婦人血氣痛用天台烏藥一百兩沉香五十兩人參三兩炙甘草四兩為末每服半錢薑鹽湯空心㸃服簡誤烏藥辛溫散氣病屬氣虚者忌之世人多以香附同用治女人一切氣病不知氣有虚有實有寒有熱冷氣暴氣用之固宜氣虚氣熱用之能無貽害耶以故婦人月事先期小便短赤及咳嗽内熱口渴口乾舌苦不得眠一切隂虚内熱之病皆不宜服没藥味苦平無毒主破血止痛療金瘡杖瘡諸惡瘡痔漏卒下血目中翳暈痛膚赤疏没藥稟金水之氣以生故味苦平無毒然平應作辛氣應微寒氣薄味厚隂也降也入足厥隂經凡惡瘡痔漏皆因血熱瘀滯而成外受金刃及杖傷作瘡亦皆血肉受病血肉傷則瘀而發熱作痛此藥苦能泄辛能散寒能除熱水屬隂血亦屬隂以類相從故能入血分散瘀血治血熱諸瘡及卒然下血證也肝開竅於目目得血而能視肝經血熱則目為赤痛膚翳散肝經之血熱則目病除矣主治參互同延胡索乳香乾漆鼈甲琥珀為末治產後血暈有神效加人參澤蘭生地益母草蘇木作湯送前藥治兒枕痛及惡露未盡膓痛寒熱等證立效同乳香白及白斂紫花地丁半枝蓮夏枯草忍冬藤連翹甘菊貝母治一切癰疽疔腫同乳香當歸牡丹皮牛膝續㫁川芎番降香穿山甲治内傷胸脇骨痛入一切膏藥能消毒止痛長肉御藥院方筋骨損傷米粉四兩炒黄入没藥乳香末各半兩酒調成膏攤貼之奇效良方金刃所傷未透膜者乳香没藥各一錢以童子小便半盞酒半盞溫化服之圖經本草婦人腹痛内傷㽲刺没藥末一錢酒服便止又治婦人血暈方同婦人良方產後惡血没藥血竭末各一錢童便溫酒各半盞煎沸服良危氏得效方女人異疾月事退出皆作禽獸之形欲來傷人先將綿塞隂户乃頓服没藥末一兩白湯調下即愈簡誤孕婦不宜服凡骨節痛與夫胸腹脇肋痛非瘀血停留而因於血虚者不宜用產後惡露去多腹中虚痛者不宜用癰疽已潰不宜用目赤膚翳非血熱甚者不宜用大概其功長於通滯血血滯則氣亦壅氣血壅滯則經絡滿急經絡滿急故發腫作痛打撲踠跌亦傷經絡血分血氣不行故壅滯作腫痛也没藥善通壅滯之血血行則氣亦行氣血流通則腫痛自止矣故為諸瘡癰及金瘡杖瘡跌撲傷損腹中血結作痛之要藥而不主諸虚也安息香味辛苦平無毒主心腹惡氣鬼疰疏安息香稟火金之氣而有水故味辛苦氣平而芬香性無毒氣厚味薄陽也入手少隂經少隂主藏神神昏則邪惡鬼氣易侵芬香通神明而辟諸邪故能主鬼疰惡氣也主治參互同鬼臼犀角牛黄丹砂乳香蘇合香龍齒雄黄麝香治鬼疰尸疰殺癆蟲寐魘暴亡及大人小兒卒中邪惡氣奇效良方小兒驚邪安息香一豆許燒之自除簡誤病非闗邪惡氣侵犯者不宜服仙人杖味鹹平一云冷無毒主噦氣嘔逆辟痁小兒吐乳大人吐食並水煑服小兒驚癎及夜啼安身伴睡良又主痔病燒為末服方寸匕疏仙人杖此笋之將成竹時立死者得笋之氣已過稟竹之性未全故味鹹氣平無毒其功用在竹茹竹黄之間所主噦氣嘔逆小兒吐乳辟痁大人吐食痔瘡者竹茹之用也療小兒驚癎及夜啼者竹黄之用也雖其形已痿而其性尚存故能療諸證也又秘方用此蘸麻油於空室中燃之取滴下油塗癰疽已潰長肉如神他用甚稀故無主治簡誤海桐皮味苦平無毒主霍亂中惡赤白久痢除疽䘌疥癬牙齒蟲痛並煑服及含之水浸洗目除膚赤疏海桐皮稟木中之隂氣以生本經味苦氣平無毒然詳其用味應帶辛氣薄味厚隂中陽也入足太隂陽明經二經虚則外邪易入為霍亂中惡辛以散之溼熱内侵為疳䘌久痢苦以泄之又脾胃主肌肉溼熱浸淫則生蟲而為疥癬苦能殺蟲平即微寒溼熱去而疥癬除矣其主漱齒洗目者亦取其苦寒殺蟲辛平散風熱之意耳李珣以之治腰脚不遂血脈頑痺腿膝疼痛之證其為辛苦之劑無疑矣主治參互續傳信方治腰膝痛不可忍用海桐皮二兩牛膝芎藭羌活地骨皮五加皮各一兩甘草半兩薏苡仁二兩生地黄十兩煎浸洗焙乾剉細以綿包裹入無灰酒二斗浸之冬二七日夏一七日空心飲一盞每日早午晚各飲一盞長令醺醺合時不得添減禁毒食此藥治因風溼溼熱流注下焦腰膝為病若因隂虚血少火熾而得者勿服同真川槿皮輕粉蛇牀子山大黄為末傅癬疥簡誤腰痛非風溼者不宜用大腹微溫無毒主冷熱氣攻心腹大腸壅毒痰膈醋心並以薑鹽同煎入疏氣藥良疏大腹皮即檳榔皮也其氣味所主與檳榔大畧相同苐檳榔性烈破氣最捷腹皮性緩下氣稍遲入足陽明太隂經二經虚則寒熱不調逆氣攻走或痰滯中焦結成膈證或溼熱鬱積酸味醋心辛溫煖胃豁痰通行下氣則諸證除矣大腸壅毒以其辛散破氣而走陽明故亦主之也主治參互同白术茯苓車前子木瓜桑白皮五加皮猪苓澤瀉薏苡仁蠡魚治水腫有效虚者加人參簡誤鴆鳥多集檳榔樹上凡用檳榔皮宜先洗去黑水復以酒洗後以大豆汁再洗過曬乾入灰火煨用性與檳榔相似病涉虚弱者概勿施用合歡味甘平無毒主安五藏利心志令人歡樂無憂久服輕身明目得所欲疏合歡稟土氣以生故味甘氣平無毒入手少隂足太隂經土為萬物之母主養五臟心為君主之官本自調和脾虚則五臟不安心氣躁急則遇事拂鬱多憂甘主益脾脾實則五臟自安甘可以緩心氣舒緩則神明自暢而歡樂無憂神明暢達則覺照圓通所欲咸遂矣嵇叔夜養生論云合歡觸忿正此之謂歟其主輕身明目及大明主消癰疽續筋骨者皆取其能補心脾生血脈之功耳主治參互與白蠟同入膏能長肌肉續筋骨甚捷獨行方肺癰唾濁心胸甲錯取夜合皮一掌大水三升煎取一半分二服百一選方撲損折骨夜合樹皮去粗皮炒黑色四兩芥菜子炒一兩為末每服二錢溫酒臥時服以滓外傅接骨神妙子合橘核木瓜牛膝能治疝溼熱者加黄檗寒溼者加茴香子氣味和平與病無忤故不著簡誤五倍子味苦酸平無毒療齒宣疳䘌肺藏風毒流溢皮膚作風溼癬瘡瘙癢膿水五痔下血不止小兒面鼻疳瘡疏五倍子得木氣而兼金水之性其味苦酸澀氣平無毒氣薄味厚斂也隂也入手太隂足陽明經本經主齒宣疳􅉶風溼癬瘡及小兒面鼻疳瘡者皆從外治取其苦能殺蟲酸平能斂浮熱性燥能主風溼瘡癢膿水五痔下血者大腸積熱也大腸與肺為表裏肺得斂肅則大腸亦自清寧也藏器療腸虚泄利日華子主生津液消酒毒時珍謂其斂肺降火化痰飲止咳嗽消渴盜汗歛潰瘡金瘡收脫肛子腸墜下者悉假其入肺清金收斂固脫之功耳主治參互同地骨皮小薊皮硝甘草苦參葱頭煎湯洗楊梅結毒集靈方自汗盜汗用五倍子研末津調填臍中縛定一夜即止化痰生津噙化丸用五倍子安大缽頭内用煑糯米粥湯浸蓋好安靜處七日後常看待發芽黄金色又出黑毛然後將箸試之若透内無硬即收入細瓦缽中擂如醬連缽日中曬至上皮乾了又擂勻又曬曬至可丸方丸彈子大曬乾收用其味甘酸能化一切膠痰又方脾泄久利五倍子炒半斤陳倉米炒一升丁香細辛木香各三錢川椒五錢為末每服一錢蜜湯下日二服忌生冷魚肉和劑局方玉鎖丹治腎經虚損心氣不足思慮太過真陽不固溺有餘瀝小便白濁如膏夢中頻遺盜汗虚煩食減乏力此方性溫不熱極有神效五倍子一斤白茯苓四兩龍骨二兩為末水糊丸梧子大每服七十丸食前鹽湯送下日三服百一選方臟毒下血五倍子不拘多少為末大鯽魚一枚去腸胃鱗腮填藥令滿入瓶内煅存性為末每服一錢溫酒下直指方大腸痔疾五倍子煎湯薫洗或燒煙薫之自然收縮三因方脫肛不收用五倍子末三錢入白礬少許水一椀煎湯洗之立效婦人良方產後腸脫五倍子末摻之博濟方風毒攻眼腫癢澀痛不可忍者或上下臉赤爛或浮翳瘀肉侵睛神效驅風散五倍子一兩蔓荆子一兩半為末每用二錢水二盞銅石器内煎汁去滓乗熱洗大能明目去澀楊子建護命方牙齦腫痛五倍子兩許瓦焙研末以半錢傅痛處片時唾去涎内服去風熱藥端效方白口惡瘡狀似木耳不拘大人小兒並用五倍子青黛等分為末以筒吹之儒門事親赴筵散治口舌生瘡五倍子蜜陀僧等分為末漿水漱過乾貼之院方加晚蠶蛾杏林摘要魚口瘡毒初起未成膿者用五倍子炒黄研入百草霜等分以臘醋調塗患處一日一夜即消拔萃方一切金瘡五倍子降真香等分炒研末傅之皮肉自痊簡誤五倍子性燥急而専收斂咳嗽由於風寒外觸者忌之瀉利非腸虚脫者忌之咳嗽由於肺火實甚者忌之若誤服之反致壅塞喘滿以其酸斂太驟火氣無從泄越故耳天竺黄味甘寒無毒主小兒驚風天吊鎮心明目去諸風熱療金瘡止血滋養五藏疏天竺黄竹之津氣結成其氣味功用與竹瀝大同小異苐竹黄氣微寒而性亦稍緩故為小兒家要藥入手少隂經小兒驚風天吊諸風熱者亦猶大人熱極生風之候也此藥能除熱養心豁痰利竅心家熱清而驚自平主君安而五臟咸得滋養故諸證悉除也明目療金瘡者總取其甘寒涼血清熱之功耳主治參互同牛黄犀角丹砂茯神琥珀酸棗仁逺志鈎藤鈎治小兒驚癎癲疾有痰者加牛膽南星貝母竹瀝屬虚者去南星加人參錢一方小兒驚熱天竺黄二錢雄黄牽牛末各一錢研勻麫糊丸粟米大每服三五丸薄荷湯下除小兒驚癎痰熱外無别用故不著簡誤蜜蒙花味甘平微寒無毒主青盲膚翳赤澀多眵淚消目中赤脈小兒麩豆及疳氣攻眼疏蜜蒙花稟土氣以生其蕋萌於冬而開於春故氣平微寒味甘而無毒為厥隂肝家正藥觀本經所主無非肝虚有熱所致蓋肝開竅於目目得血而能視肝血虚則為青盲膚翳肝熱甚則為赤腫眵淚赤脈及小兒豆瘡餘毒疳氣攻眼此藥甘以補血寒以除熱肝血足而諸證無不愈矣好古謂其潤肝燥守真以之治畏日羞明誠謂此也形與芫花相似但芫花狹小而蜜蒙花差大為異用者宜詳辨之主治參互同空青木賊生地黄蟬蛻白蒺藜穀精草決明子羚羊角治青盲翳障同甘菊花枸杞子生地黄白蒺藜穀精草治肝腎虚目不能逺視同黄連赤芍藥防風荆芥穗黄檗甘菊花甘草龍膽草治風熱溼熱眼赤痛同胡黄連白蕪荑使君子蟬蛻木賊蘆㑹治小兒疳積眼目不明療眼疾外無他用故不著簡誤神農本草經疏卷十三
