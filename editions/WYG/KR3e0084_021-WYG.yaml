body:
  text: 神農本草經疏卷二十一明繆希雍撰蟲魚部中品總五十六種今疏其要者一十七種蝟皮露蜂房龞甲蟹蟬蛻烏賊魚骨原蠶蛾蠶沙附蠶退白殭蠶鰻鱺魚蛞蝓蝸牛并入蜚䖟䗪蟲青魚膽石首魚鱸魚蝟皮味苦平無毒主五痔隂蝕下血赤白五色血汁不止隂腫痛引腰背酒煮殺之又療腹痛疝積亦燒為灰酒服之得酒良畏桔梗麥門冬疏蝟䑕類屬木其皮毛㦸刺如鍼屬金故味苦平平即兼辛大腸屬金以類相從故能治大腸溼熱血熱為病及五痔隂蝕下血赤白五色血汁不止也隂腫痛引腰背腹痛疝積皆下焦溼熱邪氣㽞結所致辛以散之苦以泄之故主之也肉味甘平能開胃氣止反胃亦主痔瘻腸風主治叅互同象牙末等治通腸漏見象牙條下衍義五痔下血用蝟皮穿山甲等分燒存性入肉豆蔲一半空心米飲下一錢妙楊氏家藏方腸風下血蝟皮一枚木賊草半兩炒黒為末每二錢熱酒調下簡誤凡食其肉當去骨誤食令人痩劣諸節漸小也露蜂房味苦鹹平有毒主驚癎瘈瘲寒熱邪氣癲疾鬼精蠱毒腸痔火熬之良又療蜂毒毒腫疏蜂性有毒螫人則痛極以其得火氣之甚也故蜂房味苦氣平性亦有毒别録言鹹當作辛鹹辛散苦泄鹹可軟堅故主驚癎瘈瘲寒熱邪氣癲疾鬼精蠱毒腸痔等證也療蜂毒毒腫者取其氣類相從以毒攻毒之義也蘇恭以亂髮蛇皮三物合燒灰酒服方寸匕治惡疽附骨癰根在臟腑歴節腫出丁腫惡脉諸毒大明煎水潄齒止風蟲疼痛洗乳癰蜂疔惡瘡皆取其攻毒散邪殺蟲之功耳主治參互子母秘録臍風溼瘡久不瘥者蜂房燒末傅之効䄂珍方風蟲牙疼蜂房一枚鹽實孔内燒過硏末擦之鹽湯潄去一方同細辛煎水漱之又方喉痺腫痛露蜂房灰白殭蠶等分為末吹入喉内或用乳香湯服半錢濟衆方女人妬乳乳癰汁不出内結成腫名妬乳用蜂房燒灰研末每服二錢水一盞煎六分去滓温服經騐方治漏痔蜂房燒存性研細摻之乾則菜油調傅簡誤蜂房主驚癎瘈瘲及諸癰疽惡毒正取其攻散邪惡以毒攻毒之意若病屬氣血虚無外邪者與夫癰疽潰後元氣乏竭者皆不宜服龞甲味鹹平無毒主心腹癥瘕堅積寒熱去痞息肉隂蝕痔惡肉療温瘧血瘕腰痛小兒脇下堅肉味甘主傷中益氣補不足惡􅈨石疏龞甲全稟天地至隂之氣故其味鹹平無毒潤下作鹹象水明矣本乎地者親下益隂何疑甲主消散者以其味兼乎平平亦辛也鹹能軟堅辛能走散故本經主癥瘕堅積寒熱去痞疾息肉隂蝕痔核惡肉别錄療温瘧者以瘧必暑邪為病類多隂虚水衰之人乃為暑所深中邪入隂分故出併於陽而熱甚入倂於隂而寒甚元氣虚羸則邪陷而中焦不治甚則結為瘧母甲能益隂除熱而消散故為治瘧之要藥亦是退勞熱在骨及隂虚徃來寒熱之上品血瘕腰痛小兒脇下堅皆隂分血病冝其悉主之矣勞復女勞復為必需之藥勞痩骨蒸非此不除産後隂脱資之尤急主治㕘互仲景龞甲煎丸治瘧母之要藥得牛膝當歸歸佐以橘皮何首烏知母麥門冬治久瘧同知母石膏麥門冬貝母竹葉治温瘧熱甚渇甚無肺熱病者加人參若瘧發熱甚渇甚又寒甚汗多發時指甲黯狀若欲死并加桂枝有神去桂枝治癉瘧良得青蒿麥門冬五味子地黄枸杞牛膝治骨蒸勞熱甚則加銀柴胡地骨皮胡黄連肉主傷中益氣補不足腹中結熱婦人漏下隂虚羸痩性冷補一切隂虚人冝常服之簡誤龞甲妊娠禁用凡隂虚胃弱隂虚泄瀉産後泄瀉産後飲食不消不思食及嘔惡等證咸忌之蟹味鹹寒有毒主胸中邪氣熱結痛喎僻面腫敗漆燒之致䑕觧結散血愈漆瘡養筋益氣爪主治破胞墮胎疏蟹稟水氣以生故其味鹹氣寒本經雖云有毒然今人多食之卒無害其有毒者大抵形質怪異如後文所載諸種始有大毒耳外骨内肉隂包陽也入足陽明足厥隂經經曰熱淫于内治以鹹寒故主胸中邪氣熱結痛也喎僻者厥隂風熱也面腫者陽明熱壅也解二經之熱則筋得養而氣自益喎僻面腫俱除矣鹹走血而軟堅故能解結散血漆得蟹而化為水燒之可集䑕于庭此物性之相感相制莫能究其義也愈漆瘡者以其能解漆毒故也爪性迅利故能破胞墮胎也主治㕘互日華子産後肚痛血不下者以酒食之筋骨折傷者生搗炒罯之陳藏噐續斷絶筋骨去殻同黄搗爛微炒納入瘡中筋即連也寇宗奭小兒解顱不合以蟹螯同白及末搗塗以合為度唐瑶經驗方骨節脫離生蟹搗爛以熱酒傾入連飲數碗其查塗半日内骨肉谷谷有聲即好董炳驗方中鱓魚毒食蟹即解胡洽方治孕婦僵仆胎上搶心有蟹爪湯千金方神造湯治子死腹中或雙胎一􅂮一生服之令死者出生者安神驗用蟹爪一升甘草二尺東流水一斗以葦薪煮至二升攄去滓入真阿膠三兩令烊頓服或分二服若人困不能服者灌入即活簡誤蟹性冷能散血熱為病故跌撲損傷血熱瘀滯者宜之若血因寒凝結與夫脾胃寒滑腹痛喜熱惡寒之人咸不宜食有獨螯獨目兩目相向六足四足腹下有毛腹中有骨頭背有星㸃足斑目赤者竝有毒不可食能害人被其毒者冬瓜汁紫蘇蒜䜴蘆根汁皆可解之不可與柿及荆芥食發霍亂動風木香汁可解蟬殻味鹹甘寒無毒主小兒癎女人生子不出灰服之主久痢一名枯蟬一名金牛兒凡用洗去泥并去翅足漿水煮晒乾用疏蟬稟水土之餘氣化而成形其飛鳴又得風露之清氣故能入肝祛風散熱如藥性論主小兒壯熱驚癎是矣其主婦人生子不下者取其蛻脫之義治久痢者以其有甘寒之功也其鳴清響能發音聲其性善蛻能脫翳障其體輕浮能發瘡􅇙其味甘寒能除風熱故陳藏噐主啞病寇宗奭主目昏障翳小兒瘡􅇙出不快及今人治頭風眩暈皮膚風熱痘􅇙作痒疔腫毒瘡大人失音小兒噤風天弔驚哭夜啼等證皆以其有如上諸功能也主治㕘互同羚羊角宻䝉花白蒺藜草决明木賊草穀精草甘菊花夜明沙生地黄黄連女貞實治目盲障翳同丹砂茯神珍珠牛黄殭蠶天竺黄鈎藤鈎犀角琥珀全蝎治小兒風熱急驚癎病同犀角生地黄紫草麥門冬連翹金銀花治痘瘡血熱出不快同石膏䑕黏子赤檉木薄荷元參甘草葛根栝樓根麥門冬治大人小兒痧􅇙普濟方治小兒夜啼不出狀若鬼祟以蟬蛻下半截為末每一字鈎藤湯調下或入辰砂少許亦可半治天弔驚啼全㓜心鑑痘瘡作癢蟬蛻三七枚炙甘草各一錢水煎服錢氏方痘後目翳蟬蛻為末每一錢羊肝煎湯下日二服和劑局方蟬花散治肝經蘊熱風毒之氣内摶上攻眼目赤腫瞖膜疼痛昏濇内外障翳咸治之用蟬蛻榖精草刺蒺藜甘菊花防風草决朙蜜䝉花甘草羗活黄芩蔓荆子川芎木賊草荆芥等分為末每二錢茶清調食後臨臥各一服簡誤痘疹虚寒證不得服烏賊魚骨味鹹微温無毒主女子漏下赤白經汁血閉隂蝕腫痛寒熱癥瘕無子驚氣入腹腹痛環臍隂中寒腫令人有子又止瘡多膿汁不燥一名海螵蛸一名烏鰂骨一名墨魚疏烏賊魚骨稟水中之陽氣以生故其味鹹氣微温無毒入足厥隂少隂經厥隂為藏血之臟女人以血為主虚則漏下赤白或經汁血閉寒熱癥瘕少隂為藏精之臟主隠曲之地虚而有溼則隂蝕腫痛虚而寒客之則隂中寒腫男子腎虚則精竭無子女子肝傷則血枯無孕鹹温入肝腎通血脉而去寒溼則諸證除精血足令人有子也其主驚氣入腹腹痛環臍者蓋肝屬木主驚驚入肝膽則榮氣不和故腹痛環臍也入肝膽舒榮氣故亦主之温能燥溼故又主瘡多膿汁也按素問云有病胸脇支滿者妨于食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名曰血枯得之年少時有所大脫血或醉入房中氣竭肝傷故月事衰少不來治之以四烏鰂骨一藘茹為末丸以雀卵大如小豆每服五丸飲以鮑魚汁所以利腸中及傷肝也觀此則其入厥隂血分為女人崩漏下血之要藥可知矣主治㕘互聖惠方赤白目翳用烏鰂骨一兩去皮為末入片腦少許㸃之澹寮方底耳出膿海螵蛸半錢麝香一字為末以緜杖絞凈吹入聖惠方小兒臍瘡出血及膿海螵蛸乾臙肢為末油調搽之聖濟總録骨鯁在喉烏賊魚骨橘紅焙等分為末寒食麫和􅄳丸芡子大每一丸含化簡便單方舌腫出血不止烏賊骨蒲黄各等分炒為末塗之簡誤其氣味鹹温血病多熱者勿用原蠶蛾雄者有小毒主益精氣强隂道交接不倦亦止精疏原蠶蛾乃是晚蠶第一畨出者其子再復出者為二蠶此二蠶之種其蛾性最淫出繭便媾味鹹氣温熱故能强隂益精令交接不倦也日蕐子主壯陽事止泄精尿血暖水臓葢取其性淫助陽鹹温入腎之功耳主治㕘互千金方丈夫隂痿不起未連蠶蛾二升去頭翅足炒為末蜜丸梧子大每夜服一丸可御十女以菖蒲酒止之聖濟總録玉枕生瘡生枕骨上如癰破後如筋頭用原蠶蛾炒石葦等分為末乾貼瘥簡誤少年隂痿由于失志者不宜用隂虚有火者咸忌之蠶屎温無毒主腸鳴熱中消渇風痺􅐊􅇙即原蠶沙疏原蠶沙即晚蠶所出屎也其味辛甘氣温無毒腸鳴者水火相觸也甘以和之消渇者中氣燥熱也辛以潤之蠶屬火其性燥燥能勝溼去風故其沙主療風溼之病如陳藏噐以之炒黄袋盛浸酒去風緩諸節不随皮膚頑痺腹内宿冷瘀血腰脚冷疼炒熱熨偏風筋骨癱緩手足不随等證主治㕘互寇氏法治諸風冷用醇酒三升拌蠶沙五斗甑蒸于煖室中鋪油單上令患風冷氣痺及近感癱風人就以患處一邊卧沙上厚葢取汗若虚人須防大熱昏悶令露頭面如未全愈間日再作聖惠方風瘙􅐊􅇙作痒成瘡用蠶沙一升水五斗煮取二斗去滓洗浴避風儒門事親婦人血崩蠶沙為末酒服三五錢簡誤癱緩筋骨不隨由于血虚不能榮養經絡而無風溼外邪侵犯者不宜服蠶退主血風病益婦人一名馬明退近世醫家多用初出蠶子殻在紙上者東方諸醫用老蠶眠起所蛻皮功用雖相近當以蛻皮為正用之微炒疏蠶退如蟬蛻蛇蛻之類各因其本質以為用蠶退得蠶氣之餘故能治血風病血熱則生風婦人以血為主故尤益婦人也近世以之療痘􅇙去目中翳障其義猶蟬蛻也主治㕘互集驗方走馬牙疳用蠶退紙灰入麝香少許并治口瘡又方治纒喉風蠶蛻紙燒存性蜜丸芡實大含化嚥津蠶巳出蛾取退煅存性為末服之能排膿穿毒瘡口簡誤婦人血虚無風溼者不宜用白殭蠶味鹹辛平無毒主小兒驚癎夜啼去三蟲滅黒䵟令人面色好男子隂痬作瘡病女子崩中赤白産後餘痛滅諸瘡瘢痕疏蠶屬陽而殭者又兼金木之化本經味鹹别録辛平無毒然詳其用應是辛勝鹹劣氣微温之藥也氣味俱薄浮而升陽也入足厥隂手太隂少陽經厥隂為風木之位主藏血小兒驚癎夜啼女子崩中赤白風熱乘肝臟也産後餘痛風寒入血分也辛能祛散風寒温能通行血脉故主如上諸證也肺主皮毛而風邪客之則面色不光潤辛温入肺去皮膚諸風故能滅黒䵟及諸瘡瘢痕令人面色好也男子隂瘍風溼浸淫也辛平能散風熱兼能燥溼是以主之三蟲亦溼熱所化故又能去三蟲也藥性論治口噤發汗日華子主中風失音一切風疰小兒客忤男子隂痒痛女子帶下蘇頌治風㗋痺欲絶元素主皮膚諸風如蟲行皆取其性屬陽風熱為陽邪能入皮膚經絡發散諸邪熱氣也主治㕘互同丹砂牛黄膽星全蝎麝香鈎藤鈎犀角金箔天竺黄蟬蛻治小兒急驚客忤仁存方開關散治急㗋風痺用白殭蠶炒白􅈨半生半炒等分為末每以一錢用竹瀝加姜汁調灌得吐頑痰立効小兒加薄荷一方用白梅和丸綿裹含之聖惠方小兒嘬口噤風面黄赤氣喘啼聲不出由胎氣挾熱流毒心脾故令舌强唇青撮口發噤用白殭蠶二枚去嘴略炒為末蜜調傅唇中甚効普濟方治大人頭風及小兒驚風並用大蒜七個先燒紅地以蒜逐個于地上磨成膏却以殭蠶一兩去頭足安蒜上碗覆一夜勿令泄氣只取殭蠶研水每用㗜鼻口内含水有効又方治腹内龜病詩云人間龜病不堪言肚裏生成硬似磚自􅂮殭蠶白馬溺不過時刻軟如綿藥性論滅諸瘡瘢痕白殭蠶衣魚鷹屎白等分傅之聖惠方􅐊􅇙風瘡疼痛白殭蠶焙研酒服一錢立瘥小兒宫氣方小兒口瘡通白者白殭蠶炒為末蜜和傅之効兼治風疳蝕瘡簡誤殭蠶性辛温辛能散其功長於祛風化痰散有餘之邪凡中風口噤小兒驚癎夜啼由於心虚神魂不寧血虚經絡勁急所致而無外邪為病者忌之女子崩中産後餘痛非風寒客入者亦不宜用今世治小兒驚風不問虚實一概混施誤甚誤甚鰻鱺魚味甘有毒主五痔瘡瘻殺諸蟲疏鰻鱺魚稟土中之隂氣故其味甘其氣寒其形類蛇常與水蛇同穴故其性有小毒甘寒而善能殺蟲故骨蒸勞瘵及五痔瘡瘻人常食之有大益也燒烟辟蚊熏屋舎竹木斷蛀蟲置骨于衣箱中斷蠧其殺諸蟲之驗可證矣腹下有黒斑背上有白㸃者毒甚不可食重三四斤及水行昂頭者不可食妊娠食之令胎有疾脾胃薄弱易泄者勿食蛞蝓味鹹寒無毒主賊風喎僻軼筋及脫肛驚癎孿縮蝸牛味鹹寒無毒主賊風喎僻腕跌大腸下脫肛筋急及驚癎蛞蝓蝸牛本經分二條今按其氣味相同主療無别惟形質稍異故併為一蝸牛負殻蛞蝓無殻耳疏蛞蝓蝸牛稟隂溼之氣而生故味鹹氣寒無毒經曰清靜則肉腠閉拒雖大風苛毒弗能害也如隂血虧竭陽氣躁擾則凑理不宻賊風乘虚而入風主揺動中于經絡故喎僻孿縮軼筋筋急所自來矣又風為陽邪筋脉得之皆燥急鹹寒能益隂潤燥軟堅則筋脉舒緩經絡通逹而諸證除矣驚癎者風熱也脫肛者大腸熱也腕跌者血脉傷必發熱也鹹寒總除諸熱所以主之蜈蚣性畏二物不敢過其所行之路觸其身即􅂮故人取以治蜈蚣毒主治㕘互聖惠方治大腸因熱脫肛用蝸牛一兩燒灰猪脂和傳立縮濟生方痔瘡腫痛用蝸牛一枚入麝香少許以碗盛次日取水塗之丹溪方用蝸牛浸油塗之或燒灰傅亦可集騐方發背初起活蝸牛二百箇以新汲水一盞瓶内封一㝛取涎水入真蛤粉旋調掃傅瘡上日十餘度大全良方痔熱腫痛用大蛞蝓一箇研泥入片腦一字燕脂坯子半錢同傳之簡誤其氣大寒非直有風熱者不宜用小兒薄弱多泄者不宜用蜚䖟味苦微寒有毒主逐瘀血破下血積堅痞癥瘕寒熱通利血脉及九竅女子月水不通積聚除賊血在胸腹五臟者及㗋痺結塞一名䖟蟲疏蜚䖟其用大略與䗪蟲相似而此則苦勝苦能泄結性善囓牛馬諸畜血味應有鹹鹹能走血完素云䖟飲血而用以治血故主積聚癥瘕一切血結為病如經所言也苦寒又能泄三焦火邪迫而上壅閉塞咽㗋故主㗋痺結寒也今人以其有毒多不用然仲景抵當湯丸大黄䗪蟲丸中咸入之以其散臟腑㝛血結積有神効也凡毒藥之治病如刑罰之治盗賊不如是不足以祛邪反正書曰若藥不瞑眩厥疾不瘳正此謂也其與病相乖不宜用者詳著簡誤中主治㕘互入大黄䗪蟲丸治虚勞羸痩腹内有乾血肌膚甲錯兩目黯黒入抵當湯治太陽病身黄脉沈結少腹鞭小便自利其人如狂者備急方撲墜瘀血䖟蟲二十枚牡丹皮一兩為末酒服方寸匕血化為水也簡誤傷寒發黄脉沈結少腹鞭如小便不利者為無血證非畜血也不宜用瘀血未審的者不宜用女子月水不通由于脾胃薄弱肝血枯竭而非血結閉塞者不宜用孕婦腹中有癥瘕積聚不宜用凡病氣血虚甚形質痩損者忌之䗪蟲味鹹寒有毒主心腹寒熱洗洗血積癥瘕破堅下血閉生子大良一名地鼈疏䗪蟲生於下溼土壤之中故其味鹹氣寒得幽暗之氣故其性有小毒以刀斷之中有白汁如漿凑接即連復能行走故今人以之治跌撲損傷續筋骨有竒効乃足厥隂經藥也夫血者身中之真隂也灌漑百骸周流經絡者也血若凝滯則經絡不通隂陽之用互乖而寒熱洗洗生焉鹹寒能入血軟堅故主心腹血積癥瘕血閉諸證血和而榮衛通暢寒熱自除經脉調勻月事時至而令婦人生子也又治瘧母為必用之藥主治㕘互同自然銅血竭乳香沒藥五銖錢黄荆子麻皮灰狗頭骨治跌撲損傷神効仲景方大黄䗪蟲丸治産婦腹痛有乾血用䗪蟲二十枚去足桃仁二十枚大黄二兩為末鍊蜜杵和分為四丸每以一丸酒一升煮取二合温服當下血也仲景鼈甲煎丸治久瘧成癖董炳集騐方治跌撲閃挫用土龞隂乾一個臨時旋研入乳香沒藥自然銅龍骨各等分麝香少許為末每服三分入土龞末以酒調下須先整定骨乃服否則接挫也又可代杖簡誤無瘀血停畱者不宜用青魚膽主目暗滴汁目中并塗惡瘡疏青魚膽色青象木氣通于肝肝開竅於目故能能治目暗味苦氣寒能凉血熱故又主塗惡瘡也主治㕘互龔氏易簡方治赤目障翳用黄連熬膏入大青魚膽汁和就再入片腦少許瓶収宻封每日㸃之甚妙龍木論一切障翳魚膽丸用青魚膽鯉魚膽羊膽牛膽各半兩熊膽二錢龍腦香少許石决明一兩為末蜜丸梧子大每空心茶下十丸萬氏家抄乳蛾㗋痺用膽􅈨盛青魚膽中隂乾每用少許吹㗋取吐簡誤目病非風熱盛而由于血虚昏暗者不宜用服术人不可食青魚肉石首魚味甘無毒頭中有石如碁子主下石淋磨石服之亦燒為灰末服和蓴菜作羮開胃益氣候乾食之名為鮝炙食之主消𤓰成水亦主卒腹脹食不消􅍊下痢疏石首魚得海中水土之氣故其味甘氣平無毒胃屬土甘為上化故能開胃胃氣開則飲食増五臟皆得所養而氣自益矣乾鮝其性疎利故能入腸胃寛中消食止痢頭中石堅重下走故主下石淋也凡泄痢腹痛與夫腸胃諸疾惟忌油膩魚腥惟白鮝不忌蓋鮝飲鹹水而性平不熱且無脂膩不惟少熱中之患更有消食理脾實腸胃之功也鱸魚平補五臟益筋骨和腸胃治水氣多食宜人疏鱸魚秋月方美其得水中之清氣者乎味甘淡氣平雖有小毒不至發病乃與脾胃相宜之物也腎主骨肝主筋滋味屬隂總歸於臟益二臟之隂氣故能益筋骨脾胃有病則五臟無所滋養而積漸流於虚弱則水氣泛濫益脾胃則諸證自除矣神農本草經疏卷二十一
