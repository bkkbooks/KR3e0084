  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0084_WYG_019-1a, image: WYG0775/WYG0775-0754c.png}
body:
  text: 神農本草經疏卷十九明繆希雍撰禽部三品總五十六種今疏其要者四種雞烏骨鷄屎白雞冠血雞子肝出卵殻抱肶胵裏黄皮雀卵雄雀屎附天䑕屎白鴿諸雞疏按雞為陽禽屬木而外應乎風故在卦為巽其色雖有丹白黄烏其種復有烏骨之異總之性熱補陽起隂兼有風火之義惟烏骨者别是一種獨得水木之精故主隂虚發熱蓐勞崩中等證也簡誤雞性熱動風凢熱病初愈癰疽未潰素有風病人咸忌之𢎞景云小兒五嵗以下食雞生蚘蟲雞肉不可合葫芥李食不可合犬肝犬腎並令人洩痢同兔食成痢同魚汁食成心瘕同鯉魚食成癰癤同獺肉食成遁尸同生葱食成蟲痔同糯米食生蚘蟲年乆老雞腦有大毒食之能發疔中其毒發疔者以玉樞丹丸可解烏骨鷄味甘平無毒主補虚勞羸弱消渴中惡鬼繫心腹痛益産婦治女人崩中帶下一切虚損諸疾疏烏骨雞得水木之精氣其性屬隂能走肝腎血分補血益隂則虚勞羸弱可除隂回熱去則津液自生渴自止矣隂平陽祕表裏固宻邪惡之氣不得入心腹和而痛自止鬼亦不能犯矣益隂則衝任帶三脈俱旺故能除崩中帶下一切虚損諸疾也古方烏骨鷄丸治婦人百病者以其有補虚益隂入血分之功也主治㕘互古方烏骨雞丸治婦人産後蓐勞及隂虚等證方中半夏人參乃立方者之誤宜去之用骨一具煅存性同紅藥子白及白斂氷片雄黄朱砂乳香没藥醋蜜調傅一切癰疽腫毒神効治中惡心腹痛欲死但殺白烏骨鷄乘熱薄心即瘥如鬼擊卒死用其熱血塗心下亦妙鷄冠血主乳難用三年老雄者取其陽氣充溢也凡風中血脈則口角僻喎冠血鹹而走血透肌肉故以之治中風口喎不正塗頰上効丹雄鷄為陽禽冠血乃諸陽之所聚故能治中惡客忤邪氣高武痘疹正宗云雞冠血和酒服發痘最佳雞屬巽屬風頂血至清至髙故也主治㕘互皆効方對口毒瘡熱鷄冠血頻塗之取散青囊􅇎纂中蜈蚣毒舌脹出口是也雄雞冠血浸舌并咽之勝金方諸蟲入耳鷄冠血滴入即出簡誤痘瘡須分寒熱鷄血性温天行瘡子虚寒者得之固可資其起發倘因血熱而乾枯焦黑者誤用之能更轉劇世人類用雞血桑蠧蟲闕發痘而不分寒熱誤也肝主起隂氣疏肝本經主起隂氣性温可知味甘㣲苦入足厥隂少隂經今人用以治小兒疳積眼目不明者取其導引入肝氣類相感之用也主治㕘互同蕪荑使君子胡黄連青黛五榖蟲榖精草蘆薈治小兒疳熱目生障翳千金方隂痿不起用雄雞肝三具兔絲子一升為末雀卵和丸小豆大每五六十丸酒下日二服屎白㣲寒主消渴傷寒寒熱破石淋及轉筋利小便止遺溺滅瘢痕雄鷄屎乃有白臘月収之白鷄烏骨者更良素問作雞矢疏雞屎白㣲寒乃腸胃所出之物故復能走腸胃治病素問云心腹滿旦食不能暮食名為鼓脹治之以雞矢醴一劑知二劑已王太僕註云本草雞矢並不治蠱脹但能利小便葢蠱脹皆生于溼熱溼熱脹滿則小便不利雞屎能通利下泄則溼熱從小便而出蠱脹自愈故曰治溼不利小便非其治也本經主石淋利小便止遺溺者正此意耳轉筋者血熱也傷寒寒熱及消渴者熱在陽明也瘢痕者血熱壅滯肌肉也寒能總除諸熱故主之也日華子炒服治中風失音痰迷陳藏器和黑豆炒酒浸服治賊風風痺葢風為陽邪因熱而生雞屎寒能除熱雞本與風木之氣相通取其治本從類之義也主治㕘互普濟方雞矢醴治鼓脹旦食不能暮食用臘月乾雞矢白半斤袋盛以酒醅一斗漬七日溫服三盃日三或為末服二錢亦得積善堂經驗方治一切肚腹四肢腫脹不拘鼓脹氣脹溼脹水脹等用乾雞矢一升炒黄以酒醅三碗煑一碗濾汁飲之少頃腹中氣大轉動利下即自脚下皮皺消也未盡隔日再作雞子主除熱火瘡癎痙卵白微寒療目熱赤痛除心下復熱止煩滿欬逆小兒下洩婦人産難胞衣不出醯漬之一宿療黄疸破大煩熱疏雞子稟生化最初之氣如混沌未分之形故卵白象天其氣清其性微寒卵黄象地其氣濁其性微温卵則兼清濁而為體其味甘氣平無毒凡癎痙皆火熱為病雞子之甘能緩火之標平即兼涼能除熱故主癎痙及火瘡并治傷寒少隂咽痛神効主治㕘互醫方集成年深哮喘雞子略敲損浸尿缸中三四日煑食能去風痰又方用頭生雞卵七枚童便浸七日取出煑熟每日食一枚永不出痘仲景苦酒湯治少隂病咽中傷生瘡痛不能語言聲不出者用半夏十四枚碎鷄子一枚去黄内入半夏苦酒令滿置刀環中安火上令三沸去滓少少含嚥之不瘥更作此方有神効普濟方咽塞生瘡乾嘔頭痛食不下法同上無半夏經驗祕方湯火燒灼雞子清和酒調洗勤洗止痛生肌普濟方塗面駐顔雞子一枚開孔去黄留白入金華臙脂及桑磠少許紙封與雞抱之俟别卵抱出以塗面洗之不落半年尚紅也仲景方治少隂病得之二三日以上心中煩不得卧者用黄連黄岑芍藥阿膠雞子黄先煎三物成去滓膠烊盡小冷雞子黄攪匀溫服劉禹錫傳信方亂髮雞子膏治孩子熱瘡効見髮髲條下抱出卵殻研末磨障翳取其蜕脱之義也蘇頌又主傷寒勞復熬令黄黑為末熱湯和一合服取汗出即愈炒研細傅下疳亦妙卵中白皮主乆欬氣結得麻黄紫菀和服之立止肶胵裏黄皮微寒主洩利小便利遺溺除熱止煩疏此即肫内黄皮一名雞内金是也肫是雞之脾乃消化水榖之所其氣通達大腸膀胱二經有熱則洩痢遺溺得微寒之氣則熱除而洩痢遺溺自愈矣煩因熱而生熱去故煩自止也今世又以之治諸疳瘡多効主治㕘互醫林集要小便淋瀝痛不可忍雞肫内黄皮五錢隂乾燒存性作一服白湯下立愈子母祕錄鵝口白瘡雞肫内黄皮為末乳服半錢并可傅之經驗方走馬牙疳雞肫内黄皮不落水者五枚焙存性枯􅈨一錢研細搽并治隂頭疳蝕雀卵味酸温無毒主下氣男子隂痿不起强之令熱多精有子疏雀屬陽其氣温味酸其性淫故能入下焦隂分能補煖兩腎夫人身兩腎左為腎右為命門左屬水為隂右屬火為陽天非此火不能生物人非此火不能有生又云陽生則隂長可見命門真陽之氣乃人身生化之本也故命門衰敗則隂痿精寒絶化育之道雀卵性温補煖命門之陽氣則隂自熱而强精自足而有子也温主通行性又走下故主下氣也𢎞景云術家和天雄服之令莖大不衰孟詵云和天雄兔絲子末為丸空心酒下五丸治男子隂痿女子帶下便溺不利除疝瘕以其有温煖命門之功也肉味甘溫功用不及卵雄雀屎療目痛決癰癤女子帶下溺不利除疝瘕一名白丁香一頭尖者是雄兩頭圓者是雌凢用研細甘草水浸一宿焙乾用疏雀屎本經無氣味察其所主應是辛苦温之物性善消散故外用療目痛決癰癤内服治帶下溺不利疝瘕也蘇恭以首生男子乳研雀屎成泥㸃目中弩肉赤脈貫瞳子者即消神効葢取其辛散拔出火毒之義也主治㕘互子母祕録小兒中風口噤乳不下雀屎丸如麻子大服二丸即愈梅師方諸癰癤已成膿不肯決懼鍼者塗雀屎瘡頭即易決普濟方喉痺乳蛾白丁香二十箇以沙糖和作三丸每以一丸綿裹含嚥即時遂愈甚者不過二丸極有奇効簡誤雀肉及卵隂虚火盛者忌之不可合李食妊婦食雀肉飲酒令子多淫凡服术人忌之雀屎療目痛非風熱外邪者不宜用女子帶下溺不利屬腎虚有火者並忌之古方同天雄服此藥性極熱有大毒非隂臟及真陽虚憊者慎勿輕餌天䑕屎味辛寒無毒主面癰腫皮膚洗洗時痛腹中血氣破寒熱積聚除驚悸去面䵟一名夜明沙疏天鼠夜出喜食蚊蚋故其屎中淘出細沙皆未化蚊蚋眼也所以今人主明目治目盲障翳取其氣類相從也其味辛寒乃入足厥隂經藥本經所主諸證總屬是經所發取其辛能散内外結滯寒能除血熱氣壅故也然主療雖多性有専屬明目之外餘皆可略主治㕘互聖惠方青盲障翳夜明沙一兩栢葉炙一兩為末牛膽汁和丸梧子大每夜卧時竹葉湯下二十丸又方五瘧不止夜明沙末每冷茶服一錢立効並治胎前瘧除目疾外他用甚稀故不立簡誤白鴿味鹹平無毒肉主辟諸藥毒及人馬乆患疥又云煖無毒調精益氣治惡瘡疥并風瘙白癜癧瘍風疏白鴿稟水金之氣故其味鹹氣平無毒腎藏精腎納氣肺主皮毛鹹入腎故能調精益氣平則兼辛入肺故能主惡瘡疥及白癜癧瘍風凡毒藥之性多熱鴿得金水之氣故又能辟諸藥毒也其屎名左盤龍亦能主人馬疥瘡主治㕘互食毉心鏡治消渴飲水不知足用白花鴿切作小片以土蘇煎含之嚥汁􅈞江方預辟痘毒用白鴿卵一對入竹筒封置厠中半月取出以卵白和辰砂三錢丸菉豆大每服三十丸豆子飲送下毒從大小便出也保命集破傷中風病傳入裏用左盤龍白殭蠶各炒半錢雄黄一錢為末蒸餅丸梧子大每服十五丸温酒下取效聖惠方頭痒生瘡白鴿屎五合醋煮三沸杵傅之日三上又方頭瘡白秃鴿糞研末先以醋米泔洗淨敷之簡誤鴿本經雖云調精益氣其用止長於去風解毒然而未必益人故孟詵云食多減藥力今世勞怯人多畜養及煑食之殊未當也神農本草經疏卷十九
