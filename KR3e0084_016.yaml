body:
  text: 神農本草經疏卷十六明繆希雍撰獸部上品總二十種今疏其要者十種龍骨齒附麝香牛黃熊脂膽掌附象牙膽皮附白膠阿膠牛乳酥乳腐龍骨味甘平微寒無毒主心腹鬼疰精物老魅咳逆泄痢膿血女子漏下癥瘕堅結小兒熱氣驚癎療心腹煩滿四肢枯痿汗出夜卧自驚恚怒伏氣在心下不得喘息腸癰內疽隂蝕止汗縮小便溺血養精神定魂魄安五藏白龍骨療夢寐泄精小便泄精齒主小兒大人驚癎癲疾狂走心下結氣不能喘息諸痙殺精物小兒五驚十二癎身熱不可近大人骨間寒熱又殺蠱毒得牛黃人參良畏石膏忌魚及鐵疏龍稟陽氣以生而伏於隂為東方之神乃隂中之陽鱗蟲之長神靈之物也故其骨味甘平氣微寒無毒內應乎肝入足厥隂少陽少隂兼入手少隂陽明經神也者兩精相合隂陽不測之謂也神則靈靈則能辟邪惡蠱毒魘魅之氣及心腹鬼疰精物老魅遇之則散也咳逆者陽虛而氣不歸元也氣得斂攝而歸元則咳逆自止其性澀以止脫故能止泄痢膿血因於大腸虛而久不得止及女子漏下也小兒心肝二臟虛則發熱熱則發驚癎驚氣入腹則心腹煩滿斂攝二經之神氣而平之以清其熱則熱氣散而驚癎及心腹煩滿皆自除也肝氣賊脾脾主四肢故四肢痿枯肝寧則熱退而脾亦獲安故主之也汗者心之液也心氣不收則汗出肝心腎三經虛則神魂不安而自驚收斂三經之神氣則神魂自安氣得歸元升降利而喘息自平汗自止也肝主怒肝氣獨盛則善恚怒魂返乎肝則恚怒自除小腸為心之腑膀胱為腎之腑二經之氣虛脫則小便多而不禁臟氣斂則腑亦隨之故能縮小便及止夢寐泄精小便泄精兼主溺血也其主養精神定魂魄安五臟者乃收攝神魂閉澀精氣之極功也又主癥瘕堅結腸癰內疽隂蝕者以其能引所治之藥黏著於所患之處也按龍骨入心腎腸胃龍齒單入肝心故骨兼有止㵼澀精之用齒惟鎮驚安魂魄而已凡用龍骨先煎香草湯洗二度搗粉絹袋盛之用燕子一隻去腸肚安袋於內懸井上面一宿取出研粉入補腎藥中其效如神又法酒浸一宿焙乾研粉水飛三度用如急用以酒煮焙乾或云凡入藥須水飛過曬乾每斤用黑豆一斗煮一伏時曬乾用否則著人腸胃晚年作熱也主治參互仲景方同牡蠣入柴胡桂枝各湯內取其收斂浮越之正氣固脫而鎮驚同逺志等分為末煉蜜丸如梧子大硃砂為衣每服三十丸蓮心湯下治勞心夢遺梅師方睡即泄精白龍骨四分韭子五合為散空心酒服方寸匕又方泄㵼不止白龍骨白石脂等分為末水丸梧子大紫蘇木瓜湯下量大人小兒用亦治久痢休息姚和衆方久痢脫肛白龍骨粉撲之龍齒同荆芥澤蘭牡丹皮蘇木人參牛膝紅花蒲黃當歸童便治産後惡血撲心妄語顛狂如傷寒發狂者切不可認作傷寒治誤則殺人同牛黃犀角鈎藤鈎丹砂生地黃茯神琥珀金箔竹瀝天竹黃蘇合香治大人小兒驚癎癲疾簡誤龍骨味澀而主收斂凡泄痢腸澼及女子漏下崩中溺血等證皆血熱積滯為患法當通利疏泄不可便用止澀之劑恐積滯瘀血在內反能為害也惟久病虛脫者不在所忌麝香味辛溫無毒主辟惡氣殺鬼精物溫瘧蠱毒癎痙去三蟲療諸凶邪鬼氣中惡心腹暴痛脹急痞滿風毒婦人難産墮胎去面䵴音孕目中膚翳久服除邪不夢寤魘寐通神仙忌大蒜疏陶𢎞景云麝常食柏葉又噉蛇豫以為其香必非因噉蛇而結蘇頌乃云夏月食蛇多至寒則香滿入春臍內急痛自以瓜剔出陶云五月得香往往有蛇皮骨豈有食蛇逾一年而皮骨尚不化者乎不知麝乃山獸好食香木芳草如柏葉之類故其氣聚於臍而結成是香或遇蛇亦噉但不結香耳如必噉蛇多而後有香則此藥必大毒難近之物安得味辛氣溫無毒耶甄權言苦辛其香芳烈為通關利竅之上藥凡邪氣著人淹伏不起則關竅閉塞辛香走竄自內達外則毫毛骨節俱開邪從此而出故主辟惡氣殺鬼精物凶邪蠱毒溫瘧中惡心腹暴痛脹急痞滿風毒諸證也其主癎痙者借其氣以達於病所也苦辛能殺蠱故主去三蟲辛溫主散故能去面䵴及目中膚翳性能開竅故主難産墮胎也走竄之性而云久服除邪不夢寤魘寐通神仙者凡香皆能辟除惡氣而通神明故有是功能也日華子云納子宮暖水臟止冷帶疾藥性論主小兒驚癎客忤蝕一切癰疽膿水今人又用以治中風中氣中惡痰厥猝仆兼入膏藥傅藥皆取其通竅開經路透肌骨之功耳主治參互同犀角牛黃琥珀龍齒逺志丹砂鉛丹金箔菖蒲真珠茯神天竺黃治心氣虛怯驚邪癲癎或夢寐紛紜鬼交鬼疰及小兒急驚大人中惡等證同白及白斂紅白藥子雄黃烏雞骨煅乳香沒藥氷片為末傅一切癰疽疔腫有神濟生方中風不省麝香二錢研末入清油二兩和勻灌之即蘇又方食諸果成積傷脾作脹氣急用麝香一錢生桂末一兩飯和丸菉豆大大人十五丸小兒七丸白湯下蓋果得麝即落水得桂即枯故也夏子益奇疾方口內肉毬根如線五寸餘如叉股吐出乃能食物捻之則痛徹心者麝香一錢研水服之日三自消續千金方催生易産麝香一錢水研服經驗方鼠咬成瘡麝香封之妙并治蠶咬成瘡簡誤麝香走竄飛揚內透骨竅臟腑外徹皮肉及筋其性能射故善穿透開散東垣云凡風病在骨髓者用之使風邪得出若在肌肉用之反引風入骨丹溪云五臟之風不可用麝香以㵼衛氣二公之言誠得其㫖矣凡似中風小兒慢脾風與夫隂陽虛竭發熱吐血盜汗自汗氣虛眩暈氣虛痰熱血虛痿弱血虛目翳心虛驚悸肝虛癎痙産后血暈胎前氣厥諸證之屬於虛者法當補益槩勿施用即如不得己欲借其開通關竅於一時亦宜少少用之勿令過劑蘇省開通之後不可復用矣孕婦不宜佩帶勞怯人亦忌之李廷飛云不可近鼻有白蟲入腦患癩久帶其香透關令人成異疾牛黃味苦平有小毒主驚癎寒熱熱盛狂痙除邪逐鬼療小兒百病諸癎熱口不開大人狂癲又墮胎久服輕身增年令人不忘人參為之使惡常山畏牛膝乾漆疏牛為土畜其性甘平惟食百草其精華凝結為黃猶人身之有內丹也故能解百毒而消痰熱散心火而療驚癎為世神物諸藥莫及也凡牛生黃則夜視其身有光皮毛潤澤眼如血色蓋得氣之精而形質變化自有異也或云牛病乃生黃者非也本經味苦氣平别録有小毒吳普云無毒然必無毒者為是入足厥隂少陽手少隂經其主小兒驚癎寒熱熱盛口不能開及大人癲狂癎痙者皆肝心二經邪熱膠痰為病心熱則火自生焰肝熱則木自生風風火相搏故發如上等證此藥味苦氣涼入二經而能除熱消痰則風火息神魂清諸證自瘳矣鬼邪侵著因心虛所致小兒百病多屬胎熱入心養神除熱解毒故悉主之也性善通竅故能墮胎善除熱益心故能令人不忘非久服多服之藥其云輕身延年者蓋指病去則身自輕安而得盡其天年也主治參互同犀角琥珀天竺黃鈎藤鈎茯神真珠金箔麝香丹砂治小兒驚癎百病入外科內服藥能解疔腫癰疽毒並可入傅藥止痛散毒如神同犀角生地黃牡丹皮竹葉麥門冬治小兒五色丹毒同鍾乳石珍珠猪牙皂角象牙末白殭蠶紅鉛片腦明礬沒藥蛀竹屑天靈蓋為丸土茯苓湯下治結毒有神姚和衆方小兒初生三日去驚邪辟惡氣以牛黃一豆許以蜜少許研勻綿蘸令兒吮之一日令盡外臺祕要小兒七日口噤牛黃為末以淡竹瀝化一字灌之更以猪乳滴之錢氏小兒方初生胎熱或身體黃者以真牛黃一豆大入蜜調膏乳汁化開時時滴兒口中兼治腹痛夜啼總微録小兒熱驚或驚癎嚼舌迷悶仰目牛黃一杏仁大竹瀝薑汁各一合和勻與服又方小兒積熱毛焦睡語欲發驚者牛黃六分硃砂五錢同研以犀角磨汁調服一錢王氏痘疹方痘瘡黑陷牛黃二粒朱砂一分研末蜜浸胭脂取汁調搽并可內服簡誤牛黃治小兒百病之聖藥蓋小兒禀純陽之氣其病皆胎毒痰熱所生肝心二經所發此藥能化痰除熱清心養肝有起死回生之力惟傷乳作㵼脾胃虛寒者不當用熊脂味甘微寒微溫無毒主風痺不仁筋急五藏腹中積聚寒熱羸瘦頭瘍白秃面皯皰食飲吐嘔久服强志不饑輕身長年疏詩云惟熊惟羆男子之祥取其為陽獸而强力壯毅也本經味甘氣微寒别録微溫無毒其主風痺不仁筋急者蓋風為陽邪熊為陽獸其氣溫能通行經絡其性潤能滋養肝脾故主之也滑澤而通行故主五藏腹中積聚及食飲吐嘔甘寒而强力故能主寒熱羸瘦輕身性潤而疏風故能主頭瘍白秃面皯皰也久服强志不饑長年甚言其補虛壯筋骨之功耳熊掌乃八珍之一食之可禦風寒益氣力肉與脂同功河間云熊肉振羸是因其氣有餘以補不足者也熊膽味苦寒無毒療時氣熱盛變為黃疸暑月久痢疳䘌心痛疰忤藥性論小兒五疳殺蟲治惡瘡疏熊膽氣味與象膽同其所主亦相似時氣熱盛變為黃疸熱邪在足太隂也久痢疳䘌濕熱在手陽明也心痛疰忤熱邪在手少隂也入三經而除熱邪故能療諸證也極苦而寒故又能殺蟲治惡瘡點痔主治參互齊東野語赤目障翳熊膽丸以膽少許化開入片腦一二釐研勻㸃上絶妙聖惠方小兒鼻蝕熊膽半分湯化抹之外臺祕要十年痔瘡熊膽塗之神效一切方不及也或加入片腦少許以猪膽汁和塗亦妙保幼大全諸疳羸瘦熊膽使君子末等分研勻瓷器蒸溶蒸餅丸麻子大每米飲下二十丸簡誤凡膽皆極苦寒而能走肝膽二經㵼有餘之熱蓋以類相從也小兒疳積多致目內生翳障者以肝脾二臟邪熱壅滯則二臟之氣血日虛閉塞日甚故也用此㵼肝膽脾家之熱則內邪清而外障去矣如不因疳證而目生翳障及痘後蒙閉者多因肝腎兩虛宜滋隂養血清熱為急諸膽皆不得用有痼疾者不可食熊肉令終身不愈象牙無毒主諸鐵及雜物入肉刮取屑細研和水傅瘡上立出疏象牙本經無氣味日華子云平海藥云寒應是甘寒無毒之物象性勇猛而牙善蛻故能出一切皮肉間有形滯物如經所言也又能治邪魅驚悸風癎及惡瘡拔毒長肉生肌去漏等用主治參互同明礬黃蠟牛角䚡鉛花金頭蜈蚣蝟皮猪懸蹄治通腸漏能去漏管治楊梅結毒載牛黃條內王氏痘疹方痘疹不收象牙屑銅銚炒黃紅色為末每服七八分白湯下又方針箭入肉象牙末水和傅之即出也日華子治小便不通象牙生煎服之小便過多燒灰飲下象膽主明目及治疳治瘡腫以水化塗之治口臭以綿裹少許貼牙根平旦漱去數度即瘥疏象膽苦寒之物也入肝脾二經肝熱則目不明脾家鬱熱則成疳積或口臭苦寒除二經之熱故能主諸證苦寒涼血解毒故又能主瘡腫也今世治疳證癆瘵傳尸多用之總取其苦寒能殺疳蟲癆蟲兼除臟腑一切熱結也主治參互同獺肝蘆㑹乾漆胡黃連青黛鬼臼丹砂入滋腎藥內治傳尸癆瘵聖濟總録內障目翳用象膽半兩鯉魚膽七枚熊膽一分牛膽半兩麝香一分石決明一兩為末糊丸菉豆大每茶下十丸日二象皮其性最易收斂人以鈎刺插入皮中拔出半日其瘡即合故入膏散為長肉合金瘡之要藥簡誤象膽苦寒之極不利脾胃凡疳證脾弱者目病血虛者咸不宜多服象牙及皮氣味和平於臟腑無忤故不著簡誤白膠味甘平溫無毒主傷中勞絶腰痛羸瘦補中益氣婦人血閉無子止痛安胎療吐血下血崩中不止四肢酸疼多汗淋露折跌傷損久服輕身延年一名鹿角膠得火良畏大黃疏白膠是熬鹿角而成故其味甘氣平别録溫無毒氣薄味厚降多升少陽中之隂也入足厥隂少隂手少隂厥隂經經曰勞則喘且汗出內外皆越中氣耗矣故凡作勞之人中氣傷絶四肢作痛多汗或吐血下血皆肝心受病此藥味甘氣溫入二經而能補益中氣則絶傷和四肢利血自止汗自斂也折跌傷損則血瘀而成病甘溫入血通行又兼補益故折跌傷損自愈婦人血閉無子及崩中淋露胎痛不安腰痛羸瘦者皆血虛肝腎不足之候溫肝補腎益血則諸證自退而胎自得所養也血氣生真陽足故久服能輕身延年耳更治尿血溺精瘡瘍腫毒及漏下赤白婦人久服能令有子主治參互同牛膝牡丹皮麥門冬地黃真蘇子鬱金白芍藥當歸童便續斷治勞傷吐血同山茱萸枸杞子鹿茸地黃麥冬杜仲補骨脂懷山藥車前子五味子巴㦸天蓮鬚治腎虛陽痿精寒無子加入當歸紫石英治婦人血閉子宫冷服之受孕外臺祕要虛勞尿精及尿血白膠二兩炙酒二升頓和溫服肘后方妊娠卒下血以酒煮膠二兩消盡頓服簡誤鹿乃仙獸純陽之物也其治勞傷羸瘦益腎添精暖腰膝養血脈强筋骨助陽道之聖藥也然而腎虛有火者不宜用以其偏於補陽也上焦有痰熱及胃家有火者不宜用以其性熱復膩滯難化也凡吐血下血係隂虛火熾者槩不得服阿膠味甘平微溫無毒主心腹內崩勞極灑灑如瘧狀腰腹痛四肢酸疼女子下血安胎丈夫小腹痛虛勞羸瘦隂氣不足腳酸不能久立養肝氣久服輕身益氣一名傅致膠得火良薯蕷為之使畏大黃凡用以蛤粉炒或酒化成膏亦得疏阿膠舊云煮牛皮作之藏器與蘇頌皆云是烏驢皮其說為的其功専在於水按阿井在山東兖州府東阿縣乃濟水之伏者所注其水清而重其色正緑其性趨下而純隂與衆水大别本經味甘氣平别録微溫無毒元素云性平味淡氣味俱薄可升可降陽中隂也入手太隂足少隂厥隂經其主女子下血腹內崩勞極灑灑如瘧狀腰腹痛四肢酸疼胎不安及丈夫少腹痛虛勞羸瘦隂氣不足腳酸不能久立等證皆由於精血虛肝腎不足法當補肝益血經曰精不足者補之以味味者隂也補精以隂求其屬也此藥得水氣之隂具補隂之味俾入二經而得所養故能療如上諸證也血虛則肝無以養益隂補血故能養肝氣入肺腎補不足故又能益氣以肺主氣腎納氣也氣血兩足所以能輕身也今世以之療吐血衄血血淋尿血腸風下血血痢女子血氣痛血枯崩中帶下胎前産後諸疾及虛勞咳嗽肺痿肺癰膿血雜出等證神效者皆取其入肺入腎益隂滋水補血清熱之功也主治參互同天麥門冬栝樓根白藥子五味子桑白皮剪草生地黃枸杞子百部蘇子白芍藥治肺腎俱虛咳嗽吐血同杜仲枸杞子白芍藥山藥麥門冬地黃黃耆人參青蒿續斷黃蘖治婦人崩中漏血同白芍藥炙甘草麥冬地黃白膠當歸枸杞子杜仲續斷治婦人胎痛或胎漏下血直指方老人虛祕阿膠炒二錢葱白三根水煎化入蜜二匙溫服仲景方黃連阿膠湯治少隂病得之二三日以上心中煩不得卧者用阿膠三兩黃連四兩黃芩一兩芍藥二兩雞子黃二枚以水五升先煮三物取二升去滓內膠煬盡小冷內雞子黃攪令相得溫服七合日三和劑局方治腸胃氣虛冷熱不調下痢赤白裏急後重腹痛小便不利用阿膠二兩炒黃連三兩茯苓二兩為末搗丸梧子大每服五十丸米湯下日三千金翼吐血不止阿膠炒二兩蒲黃六合生地黃三兩水五升煮三升分服兼治衄血梅師方妊娠下血不止阿膠三兩炙為末酒一升煎化服即愈産寶方膠艾湯妊娠胎動阿膠艾葉各二兩葱白一升水四升煮一升分服簡誤此藥多僞造皆雜以牛馬皮舊革鞍靴之類其氣濁穢不堪入藥當以光如醫漆色帶油緑者為真真者折之即斷亦不作臭氣夏月亦不甚濕軟如入調經丸藥中宜入醋重湯頓化和藥其氣味雖和平然性黏膩胃弱作嘔吐者勿服脾虛食不消者亦忌之牛乳微寒補虛羸止渴乳腐味甘微寒無毒主潤五藏利大小便益十二經脈疏牛乳乃牛之血液所化其味甘其氣微寒無毒甘寒能養血脈滋潤五藏故主補虛羸止渴及乳腐所主皆同也日華子主養心肺解熱毒潤皮膚者亦此意耳肝味苦甘氣和平食之能補肝治雀盲主治參互同人乳羊乳梨汁蘆根汁蔗漿熬膏治反胃噎膈大便燥結宜時時飲之兼能止消渴夏子益奇疾方肉人怪病人頂生瘡五色如櫻桃狀破則自頂分裂連皮剝脫至足名曰肉人常飲牛乳自消簡誤患冷氣人忌之與酸物相反令人腹中癥結脾胃作泄者亦不得服酥微寒補五藏利大腸主口瘡疏酥乃牛乳所出乳之精華也其味甘氣微寒無毒性滑澤五臟皆屬隂酥乃隂血之精華故能補五藏血枯火盛大腸燥結及口舌生瘡甘寒除熱補血故主利大腸口瘡也按酥酪醍醐總成於牛乳但有精粗之别耳其性大抵皆滋潤滑澤宜於血熱枯燥之人其功不甚相逺故二物不復載主治參互凡一切藥用酥炙者取其潤燥兼能益精髓補血脈又有滲入骨肉使骨易糜之功外臺祕要一切肺病咳嗽膿血不止用好酥五十斤煉三遍當出醍醐每服一合日三服以瘥為度神效簡誤性能利竅驟食之使人遺精神農本草經疏卷十六
