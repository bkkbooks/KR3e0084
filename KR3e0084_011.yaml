body:
  text: 神農本草經疏卷十一明繆希雍撰草部下品之下總百五種今疏其要者三十五種何首烏威靈仙牽牛子蓖麻子天南星狶薟馬鞭草苧根白頭翁甘蕉根蘆根笋附鬼臼馬兜鈴根附仙茅劉寄奴骨碎補連翹續隨子山豆根白附子鹿藿預知子木賊蒲公草穀精草夏枯草山慈菰燈心草馬勃水蓼海金沙草三稜鹿藥草石蠶漆姑草何首烏味苦澀㣲温無毒主瘰癧消癰腫療頭面風瘡五痔主心痛益血氣黑髭鬢恱顔色久服長筋骨益精髓延年不老亦治婦人産後及帶下諸疾茯苓為之使與白萊菔相惡犯之令人髭髮早白疏何首烏本文味苦澀㣲温傳言味甘氣温其稟春深生氣無疑春為木化入通於肝外合於風升也陽也入足厥隂兼入足少隂經故為益血袪風之上藥雌雄二種遇夜則交有隂陽交合之象故能令人有子肝主血腎主精益二經則精血盛髮者血之餘也故烏髭鬢其主瘰癧者肝膽氣鬱結則内熱榮氣壅逆發為是病十一臟皆取決於膽與肝為表裏為少陽之經不可出入氣血俱少乃風木所主行膽氣益肝血則瘰癧自消矣調榮氣則癰腫消治風先治血血活則風散故療頭面風瘡腸澼為痔痔者濕熱下流傷血分而無所施洩則逼近肛門肉分迸出成形為種種矣風能勝濕濕熱解則痔將自平心血虚則内熱熱則心搖搖而作痛益血則熱解而痛除益血氣黑髭鬢恱顔色久服長筋骨益精氣延年不老者皆補肝腎益精血之極功也亦治婦人産後及帶下諸疾者婦人以血為主月事通後厥隂主之帶下本於血虚而兼濕熱行濕益血靡不除矣主治叅互君甘菊花枸杞子地黄牛膝天門冬赤白茯苓桑椹南燭子則益精血烏鬚髮駐顔延年得牛膝鼈甲橘紅青皮治瘧邪在隂分久而不解如表氣已虚脾胃已弱則加人參三五錢肺熱者去人參換入當歸如其數得刺蒺藜甘菊花天門冬胡麻仁漆葉白芷荆芥穗苦參地黄百部治頭面諸風及大麻風得金銀花地榆犀角草石蠶山豆根黄連芍藥乾葛升麻甘草滑石治毒痢下純血諸藥不效有神經驗方治骨軟風腰膝疼行履不得遍身瘙痒何首烏大而有花紋者同牛膝剉各一斤以好酒一升浸一宿曝乾於木臼内搗末蜜丸每日空心食前酒吞三五十丸兼可治風痰久瘧不愈斗門方治瘰癧或破或不破下至胸前者皆治之用何首烏根洗浄日日生嚼并取葉搗塗之數服即止其藥久服延年黑髮用之神效何首烏傳何首烏味甘氣温性則無毒茯苓為之使治五痔腰膝之病冷氣心痛積年勞瘦痰癖風虚敗劣長筋力益精髓壯氣駐顔黑髪延年婦人惡血痿黄産後諸疾赤白帶下毒氣入腹久痢不止其功不可具述一名野苗二名交藤三名夜合四名地精五名首烏本出䖍州江南諸道皆有之苗葉有光澤者又如桃李葉雄者苗色黄白雌者黄赤根逺不過三尺春秋可採日乾去皮為末酒下最良有疾即用茯苓煎湯為使常杵末新甆器盛用偶日服之忌猪肉血無鱗魚觸藥無力其根形大如拳連珠其有形如鳥獸山嶽之狀者珍也掘得去皮生喫得味甘甜可休糧讚曰神妙勝道著在仙書雌雄相交夜合晝疎服之去榖日居月諸返老還少變安病軀有緣者遇勗爾自知明州刺史李逺傳錄云何首烏所出順州南河縣及韶州潮州恩州賀州廣州四會縣潘州者為上邕州桂州康州春州高州勒州循州晉興縣出者次之真仙草也五十年者如拳大號山奴服之一年髭鬢青黒一百年者如盌大號山哥服之一年顔色紅恱一百五十年者如盆大號山伯服之一年齒落更生二百年如斗栲栳大號山翁服之一年顔如童子行及奔馬三百年者如三斗栲栳大號山精純陽之體久服之成地仙也衍義曰何首烏兼黑髭鬢與蘿蔔相惡令人髭鬢早白治腸風熱多用簡誤何首烏為益血之藥忌與天雄烏頭附子仙茅薑桂等諸燥熱藥同用修事以苦竹刀切片米泔浸經宿曝乾蒸用勿令犯鐵威靈仙味苦温無毒主諸風宣通五藏去腹内冷滯心膈痰水久積癥瘕痃癖氣塊膀胱宿膿惡水腰膝冷疼及療折傷一名能消久服之無疫瘧忌茗疏威靈仙感春夏之氣故其味苦其氣温其性無毒升也陽也入足太陽經春為風木之化故主諸風而為風藥之宣導善走者也腹内冷滯多由於寒濕心膈痰水乃飲停於上中二焦也風能勝濕濕病喜燥故主之也膀胱宿膿惡水靡不由濕所成腰膝冷疼亦緣濕流下部侵筋致之袪風除濕病隨去矣其曰久積癥瘕痃癖氣塊及折傷則病千血分者多氣分者少而又未必皆由於濕施之恐亦無當取節焉可也主治叅互簡便方治脚氣入腹脹悶喘急用末二錢酒下痛減一分則藥亦減一分千金方治腰脚諸痛用末空心温酒服一錢逐日以㣲利為度集驗方治腎臟風壅腰膝沉重用威靈仙末蜜丸梧子大温酒吞八十丸平明㣲利惡物如青膿膠即是風毒積滯如未利再服百丸取下後食粥補之一月仍常服温補藥孫兆方名放杖丸衛生易簡方治破傷風威靈仙半兩獨蒜一箇香油一錢同搗爛熱酒衝服汗出即愈又方治停痰宿飲喘欬嘔逆全不入食威靈仙焙半夏薑汁浸焙為末用皂角水熬膏丸菉豆大每服七丸至十丸薑湯下日三服一月驗忌茶麫又方治諸骨鯁威靈仙一兩二錢縮砂蜜一兩沙糖一盞水二鍾煎一鍾温服李樓怪證方治飛絲纒隂腫痛欲斷以威靈仙搗汁浸洗效簡誤風藥性升而燥走而不守凡病非風濕及陽盛火升血虚有熱表虚有汗痎瘧口渇身熱者並忌用之牽牛子味苦寒有毒主下氣療脚滿水腫除風毒利小便疏牽牛子本經不載乃名醫續註本草謂為苦寒有毒東垣以為感南方熱火之化所生應是辛熱有毒之藥其主下氣者乃損削真氣之謂療脚滿水腫除風毒利小便皆相似語況前病多屬脾胃氣虚此是瀉藥今反用之為害滋大主治叅互黑牽牛得白木香檳榔使君子能追蟲取積普濟方治氣築奔衝不可忍牛郎丸用黑牽牛半兩檳榔二錢半為末每服一錢紫蘇湯下追蟲取積亦可用摘𤣥方治面上風刺黑牽牛酒浸三宿為末先以薑汁擦面後用藥塗之聖惠方治面上粉刺㿔子如米粉黑牽牛末對入面粉藥中日日洗之簡誤牽牛子辛熱有毒之藥性又迅急其所主治多是脾胃與肺家濕熱之病理應屬虚何資瀉藥況諸證應用藥物尋檢本經所載良藥不乏何至舍其萬全而就不可必不可保之毒物哉宜東垣之諄復其辭以戒後人之勿輕用也兹并附錄其論以詔後世云附錄東垣云牽牛非神農藥也名醫續註云味苦寒能除濕氣利小便治下注脚氣此說氣味主治俱誤矣何也凡用牽牛少則動大便多則泄下如水乃瀉氣之藥其味辛辣久嚼猛烈雄壯所謂苦寒安在哉夫濕者水之别稱有形者也若肺先受濕濕氣不得施化致大小便不通則宜暫用之蓋牽牛感南方熱火之化所生火能平金而泄肺濕去則氣得周流所謂五臟有邪更相平也今不問有濕無濕但傷食或有熱證俱用牽牛尅伐之藥豈不誤哉況牽牛止能泄氣中之濕熱不能除血中之濕熱濕從下受之下焦主血血中之濕宜苦寒之味反以辛藥泄之傷人元氣且牽牛辛烈比之諸辛藥泄氣尤甚其傷人必矣經云辛泄氣辛走氣辛泄肺肺病者無多食辛況飲食失節勞役所傷是胃氣不行心火乗之腸胃受火邪名曰熱中脾胃主血當血中泄火以黄芩之苦寒泄火當歸身之辛温和血生地黄之苦寒涼血益血少加紅花之辛温以泄血絡桃仁之辛温除燥潤腸仍不可專用須於補中益氣泄隂火之藥内加而用之何則上焦元氣已自虚弱若反用牽牛大辛熱氣味俱陽之藥以泄水泄元氣利其小便竭其津液是謂重虚重則必死輕則夭人故張文懿云牽牛不可耽嗜脱人元氣見人有酒食病痞者多服牽牛丸散取快一時藥過仍痞隨服隨效效後復痞以致久服脱人元氣猶不知悔也張仲景治七種濕熱小便不利無一藥犯牽牛者仲景豈不知牽牛能泄濕利小便乎為濕病之根在下焦是血分中氣病不可用辛辣之藥泄上焦太隂之氣是血病瀉氣使氣血俱損也經云毋實實毋虚虚毋絶人長命此之謂也用者戒之牽牛自宋以後北人常用取快及劉守真張子和出又倡為通用下藥李明之目擊其事故著此說極力闢之牽牛治水氣在肺喘滿腫脹下焦鬱遏腰背脹重及大腸風秘氣秘卓有殊功但病在血分及脾胃虚弱而痞滿者則不可取快一時及常服暗傷元氣也蓖麻子味甘辛平有小毒主水癥水研二十枚服之吐惡沫加至三十枚三日一服差則止又主風虚寒熱身體瘡痒浮腫尸疰惡氣榨取油塗之葉主脚氣風腫不仁搗蒸傅之疏蓖麻得土金之氣故其味甘辛而其氣則平性有小毒其力長於收吸故能拔病氣出外其性善收故能追膿取毒能出有形之滯物又能通利闗竅故主水癥又主風虚寒熱身體瘡痒浮腫尸疰惡氣榨取油塗之研塗手足心催生冦氏主瘰癧李氏主偏風半身不遂口眼喎斜頭風脚氣毒腫丹癅火傷鍼刺入肉女人胞衣不下及子腸挺出皆從外治不經内服良有見也子無刺者良子有刺者毒雷公云凡使勿用黑天赤利子緣在地蔞上是顆兩頭尖有毒其蓖麻子節節有黄黑斑凡使以鹽湯煮半日去皮取子研用時珍云取蓖麻油法用蓖麻仁五升搗爛以水一斗煮之沫浮於湯面即撇起待沫盡乃止去水以沫煎至點燈不泎滴水不散為度李氏曰凡服蓖麻子者一生不得食豆犯之必脹死其油能伏丹砂輕粉主治叅互蓖麻子去殻同紫背天葵等分清水入砂器中煮半日空腹時與病人嚼下自十五枚至廿一枚瘰癧久久自消李氏云一人病偏風手足不舉用此油同羊脂麝香鯪鯉甲等藥煎作摩膏日摩數次一月餘漸復兼服搜風養血化痰之劑三月而愈又一人病手臂一塊腫痛亦用蓖麻搗膏貼之一夜而愈又一人病氣鬱偏頭痛用此同乳香食鹽搗㶸太陽穴一夜痛止又一婦産後子腸不收搗仁貼其丹田一夜而上此藥外用累奏竒功但内服不可輕率耳或言搗膏以筋點於鵝馬六畜舌根下即不能食或點肛内即下血死其毒可知矣又方治口眼喎斜蓖麻子仁搗膏左貼右右貼左即正又婦人良方亦治前證用蓖麻子仁七七粒研作餅右喎安在左手心左喎安在右手心却以銅盂盛熱水坐藥上冷即換五六次即正也治風氣頭痛不可忍者乳香蓖麻仁等分搗餅隨左右貼太陽穴解髮出氣甚驗又方蓖麻仁半兩棗肉十五枚搗塗紙上捲筒揷入鼻中下清水涕頭痛即止聖濟錄治鼻塞不通用蓖麻仁三十粒大棗去皮一枚搗匀綿裹塞之一日一易三十日聞香臭也摘𤣥方治舌上出血用蓖麻子油紙撚燒煙熏鼻中自止經驗良方治舌脹塞口用蓖麻子仁四十粒去殻研油塗紙上作撚燒煙熏之未退再熏以愈為度有人舌腫出口外一村人用此法而愈治急喉痺牙闗𦂳急不通用此即破以蓖麻子仁硏爛紙卷作筒燒煙熏吸即通或只取油作撚尤妙名聖煙筒崔元亮海上集驗方治催生下胞用蓖麻子七粒去殻硏膏塗脚心若胎及衣下便速洗去不爾則子腸出即以此膏塗頂腸自入也肘後方産難取蓖麻子十四枚每手各把七枚須臾立下也摘𤣥治子宫脫下用蓖麻仁枯礬等分為末安紙上托入仍以蓖麻仁十四枚硏膏塗頂心即入又治盤腸生産塗頂方同上肘後方治一切腫毒痛不可忍用蓖麻子搗敷即止也簡誤蓖麻子能吸氣又能通竅體質多油而又有毒脾胃薄弱大腸不固之人慎勿輕用服餌天南星味苦辛有毒主中風除痰麻痺下氣破堅積消癰腫利胸膈散血墮胎畏附子乾薑生薑疏南星得火金之氣故其味苦辛火金相搏故性烈而有毒隂中之陽可升可降入手太隂經為風寒鬱於肺家以致風痰壅盛之要藥也炎上作苦苦則善燥從革作辛辛則善散温則開通故主麻痺下氣破堅積消癰腫利胸膈散血墮胎主治叅互南星得牛膽則燥氣減得火炮則毒性緩得薑桂附主破傷風口噤身强得牛膽皂角川烏茯神牛黄天竺黄丹砂治驚癎加天麻治一切風痰壅盛同半夏搗細末入降真香末傅金瘡折傷瘀血同桂枝乾薑甘草細辛治西北邊人真中風風痰猝壅僵仆簡誤南星味既辛苦氣復大温而燥烈正與半夏之性同而毒則過之故亦善墮胎也半夏治濕痰多南星主風痰多是其異矣二藥大都相類故其所忌亦同非西北人真中風者勿用詳載半夏條下兹不重出狶薟味苦寒有小毒主熱䘌煩滿不能食生搗汁服三四合多則令人吐疏狶薟陽草也感少陽生發之氣以生故其味苦寒不應有毒乃入血分袪風除濕兼活血之要藥也濕熱盛則生䘌濕則煩滿不能食春生之藥本合風化風能勝濕苦寒除熱故主之也經曰地之濕氣感則害人皮肉筋脈故蘇頌治肝腎風氣四肢麻痺骨間疼痛腰膝無力及行大腸氣成訥用以療中風張詠用以輕身駐顔效己著於曩代功復見於今時妙在走而不洩香可開脾邪去身安功力斯倍矣主治叅互狶薟如法修事一斤入漆葉四兩亦以蜜酒潤過九蒸九曬蜜和丸如梧子大每五錢空心饑時白湯吞日三服治紫雲風爛麻風有神江陵府節度使成訥進狶薟丸方表畧云臣有弟訮年三十一中風伏枕五年百醫不差有道人鍾針者因覩此患曰可餌狶薟丸必愈其藥多生沃壤高三尺許節葉相對其葉當夏五月已來收每去地五寸翦刈以温水洗去泥土摘其葉及枝頭凡九蒸九曝不必太燥但取蒸足數為度仍熬搗為末煉蜜丸如梧子大空心温酒或米飲下二三十丸服至二千丸所患愈加不得憂慮是藥攻之力服至四千丸必得復故五千丸當復丁壯臣依法修合令訮服之果如其言鍾針又言此藥與本草所述功效相異蓋出處盛在江東彼土人呼猪薟緣此藥如猪薟氣故以為名但經蒸曝薟氣自泯每當服後須喫飯三五匙壓之五月五日采者佳奉敕宜付醫院詳錄知益州張詠進狶薟丸表畧云此草金稜銀線素應是赤字莖紫荄對節而生蜀號火杴莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自喫至百服眼目清明積至千服髭鬚烏黑筋力輕徤效驗多端臣本州有都押衙羅守一曾因中風墜馬失音不語臣與十服其病立瘥又和尚知嚴年七十忽患偏風口眼喎斜時時吐涎臣與十服亦便得瘥今合一百劑差職員史元奏進簡誤凡病人患四肢麻痺骨間疼腰膝無力由於脾腎兩虚隂血不足不因風濕所中而得者不宜服之予少年時晤金壇令公劉蓉川論及此藥劉太夫人平居常服在金壇令𨽻卒取此草太夫人見之輒曰非是乃知張益公表中所云金稜銀線素莖紫荄與吳地所産者有異物隨土變固其性也馬鞭草主下部䘌瘡疏馬鞭草圖經謂之龍牙别錄味苦氣寒無毒保昇日華子咸謂辛涼應有之也本是涼血破血之藥下部䘌瘡者血熱之極兼之濕熱故血汚濁而成瘡且有蟲也血涼熱解汚濁者破而行之靡不瘥矣陳藏器謂其破血殺蟲亦此意耳主治叅互集驗方治男子隂腫大如升核痛人所不能治者馬鞭草搗塗之太平聖惠方治白癩風用馬鞭草為末每服一錢食前荆芥薄荷湯下日三服忌鐵蕭炳集驗方治人疥馬疥馬鞭草搗自然汁半盞飲盡十日内愈神效醫方摘要治赤白下痢龍牙草五錢陳茶一撮煎服神效陳嘉謨本草蒙筌治楊梅惡瘡馬鞭草煎湯先熏後洗氣到便爽毒腫隨減簡誤病人雖有濕熱血熱證脾隂虚而胃氣弱者勿服苧根寒主小兒赤丹其漬苧汁療渇疏苧根得土之沖氣而兼隂寒故味甘氣寒而無毒别錄專主小兒赤丹為其寒能涼血也漬苧汁療渇者除熱之功也日華子用以治心膈熱漏胎下血胎前産後心煩天行熱疾大渇發狂及服金石藥人心熱罯毒箭蛇蟲咬皆以其性寒能解熱涼血故也主治叅互同生地黄汁能涼血安胎聖惠方治小便血淋苧根煎湯頻服大妙亦治諸淋斗門方治五種淋疾苧根兩莖打碎以水一碗半煎半碗頓服即通梅師方治妊娠胎動忽下黄汁如膠或如小豆汁腹痛不可忍者苧根去黑皮切二升以銀一斤水九升煎四升每服入酒半升或一升分作二服聖惠方同瀕湖集簡方治肛門腫痛生苧根搗爛坐之良聖惠方治脫肛不收苧根搗爛煎湯熏洗之外臺秘要治五色丹毒苧根煮濃汁日三浴之簡誤病人胃弱泄瀉者勿服諸病不由血熱者亦不宜用白頭翁味苦温無毒主温瘧狂昜音羊寒熱癥瘕積聚癭氣逐血止痛療金瘡鼻䘐疏白頭翁本經味苦温無毒吳綬益以辛寒詳其所主似為得之東垣謂其氣厚味薄既能入血主血應云氣味俱厚可升可降隂中陽也入手足陽明經血分暑伏足陽明經則發温瘧伏手陽明經則病毒痢滯下純血狂昜鼻䘐者血熱也寒熱者血瘀也癥瘕積聚癭氣靡不由血凝而成積滯停畱則腹痛金瘡血涼則痛自止苦能下泄辛能解散寒能除熱涼血具諸功能故悉主之殆散熱涼血行瘀之要藥歟前人所謂腎欲堅急食苦以堅之痢則下焦虚故以純苦之劑堅之男子隂疝偏墜小兒頭秃腥羶鼻䘐無此不效毒痢有此獲功熱毒下痢紫血鮮血者宜之主治叅互仲景金匱玉函方白頭翁湯治熱痢下重用白頭翁二兩黄連黄檗秦皮各三兩水七升煎二升每服一升不愈更服婦人産後痢虚極者加甘草阿膠各二兩聖惠方治下痢咽腫春夏病此宜用白頭翁黄連各一兩木香半兩水五升煎一升半分三服外臺秘要治隂㿗偏腫用根生搗傅腫處一宿當作瘡廿日愈衛生方治外痔腫痛用白頭翁草一名野丈人以根搗塗之逐血止痛肘後方治小兒秃瘡白頭翁根搗傅一宿作瘡半月愈簡誤白頭翁苦寒滯下胃虚不思食及下利完穀不化泄瀉由於虚寒寒濕而不由於濕毒者忌之甘焦根大寒主癰腫結熱疏甘焦稟地中至隂之氣以生其味應甘氣大寒性無毒入足陽明經膏粱之變發為癰腫甘寒解陽明之結熱則癰腫自除蘇恭搗傅癰腫去熱毒搗汁服治産後血脹悶大明治天行熱狂煩悶消渇患癰毒幷金石發動燥熱口乾竝絞汁服之又治頭風遊風等證皆取其甘寒涼血除熱之功也主治叅互肘後方發背欲死芭焦根搗爛傅之子母秘錄小兒赤遊行於上下至心即死搗芭焦汁煎塗之聖惠方血淋澀痛芭焦根旱蓮草各等分水煎服日二簡誤焦性大寒癰腫隂證不掀腫不發熱者忌之天行病非陽明熱甚者忌之産後血脹悶當以行血補血為主焦雖味甘然性大寒尤非所宜蘆根味甘寒無毒主消渇客熱止小便利逆水者良蘇恭療反胃嘔逆不下食胃中熱傷食内熱悶甄權解大熱開胃治噎噦不止大明主時疾煩瀉利人渇孕婦心熱疏蘆根稟土之沖氣而有水之隂氣故味甘氣寒而無毒消渇者中焦有熱則脾胃乾燥津液不生而然也甘能益胃和中寒能除熱降火熱解胃和則津液流通而渇止矣客熱者邪熱也甘寒除邪熱則客熱自解肺為水之上源脾氣散精上歸於肺始能通調水道下輸膀胱腎為水臟而主二便三家有熱則小便頻數甚至不能少忍火性急速故也肺腎脾三家之熱解則小便復其常道矣火升胃熱則反胃嘔逆不下食及噎噦不止傷寒時疾熱甚則煩悶下多亡隂故瀉利人多渇孕婦血不足則心熱甘寒除熱安胃亦能下氣故悉主之也筍亦能除熱利小便解河魨魚蟹毒主治叅互逆水蘆根得竹茹枇杷葉麥門冬烏梅木瓜能止因熱嘔吐得竹茹麥門冬大青青黛能除傷寒熱病煩悶嘔吐藥性論云蘆根能解大熱開胃治噎噦不止皆由甘寒除熱之力也外臺秘要治骨蒸肺痿不能食者蘇遊蘆根飲主之蘆根麥門冬地骨皮生薑各十兩橘皮茯苓各五兩水二斗煮八升去滓分五服取汗乃瘥肘後方治勞復食復欲死竝以蘆根煮濃汁飲又方治嘔噦不止厥逆者蘆根三斤切水煮濃汁頻飲二升必效若以童子小便煮服不過三升愈金匱玉函方治五噎吐逆心膈氣滯煩悶不下食蘆根五兩剉以水三大盞煎取二盞温服千金方治反胃上氣蘆根茅根各二兩水四升煮二升分服太平聖惠方治霍亂煩悶蘆根三兩麥門冬一兩煎服梅師方治食狗肉中毒心下堅或腹脹口乾忽發熱妄語蘆根煮汁服又聖惠方治中馬肉毒千金方治鯸鮧魚毒幷食蟹中毒方俱同簡誤因寒霍亂作脹因寒嘔吐勿服鬼臼味辛温㣲温有毒主殺蠱毒鬼疰精物辟惡氣不祥逐邪解百毒療欬嗽喉結風邪煩惑失魂妄見去目中膚翳殺大毒不入湯疏鬼臼得地之金氣而性復隂沉是以辛温有毒乃隂草中之散結辟邪者也故能入隂分以辟不祥及諸蠱毒鬼疰精物尸疰傳尸煩感失魂妄見然此諸病何莫非隂邪尸鬼之所為凡物以類相從故惟隂草之異品乃能治乎隂鬼之賊害也其去目中膚翳及欬嗽喉結風邪則辛散之功耳其藥有二種味甘者勝苦者稍劣主治叅互鬼臼得丹砂雄黄雲母生犀角丹參逺志射千百部菖蒲天門冬能治一切怪惑不祥及諸尸疰傳尸隂邪為祟諸異證婦人良方治子死腹中胞破不生用鬼臼不拘多少黄者去毛為細末不用篩籮只撚之如粉為度每服一錢無灰酒一盞同煎八分通口服立生如神名一字散千金方治射工中人寒熱發瘡鬼臼葉一把苦酒漬搗取汁服一升日二次三十六黄方治黑黄急病其證面黑黄身如土色不妨食脈沉若青脈入口者死宜烙口中黑脈耳會玉泉章門心俞用生鬼臼搗汁一小盞服乾者為末水服簡誤凡病屬陽陽盛熱極有似鬼魅為祟及煩惑失魂妄見者不可用馬兜鈴味苦寒無毒主肺熱欬嗽痰結喘促血痔瘻瘡疏馬兜鈴感冬氣而生故味苦氣寒而無毒亦應有辛兼金氣也入手太隂經苦善下洩辛則善散寒能除熱其性輕揚厥狀類肺故能入肺除熱而使氣下降欬嗽者氣升之病也氣降熱除嗽自平矣痰結喘促亦肺熱病也宜并主之血痔瘻瘡無非血熱況痔病屬大腸大腸與肺為表裏清臟熱則腑熱亦清矣故亦主之甄權用以治肺氣上急坐息不得欬逆連連不止潔古用以清肺氣補肺去肺中濕熱者皆除熱降氣散結之力也獨行根一名青木香治鬼疰積聚諸毒熱腫蛇毒水磨為泥封之日三四易立瘥水煮一二兩取汁服吐蠱毒又搗末水調塗丁腫大效主治叅互馬兜鈴得桑根白皮百部天門冬桔梗蘇子枇杷葉貝母紫菀能治一切喘嗽聖惠方治五種蠱毒馬兜鈴根三兩為末分為三貼以水一盞煎五分去滓頓服當吐蠱出未快再服以快為度又方草蠱術在西涼之西及嶺南人中此毒入咽刺痛欲死者用馬兜鈴苗一兩為末以温水調下一錢匕即消化蠱出神效外臺秘要解蛇蠱毒飲食中得之咽中如有物嚥不下吐不出心下熱悶馬兜鈴一兩煎服即吐出又服麝香一錢匕即吐蠱毒盡簡要濟衆治肺氣喘嗽馬兜鈴二兩酥炒甘草一兩水炙為末每服一錢水煎温呷或以藥末含嚥津亦得雷公云凡采得實去葉及蔓用生絹袋盛於東屋角畔懸令乾劈作片取向裏子去革膜取浄子焙用簡誤肺虚寒作欬嗽或寒痰作喘者勿服仙茅味辛温有毒主心腹冷氣不能食腰脚風冷攣痺不能行丈夫虚勞老人失溺無子益陽道久服通神强記助筋骨益肌膚長精神明目疏仙茅稟火金之氣然必是火勝金㣲雖云辛温其實辛熱有毒之藥也氣味俱厚可升可降隂中陽也入手足厥隂經命門真陽之火即先天祖氣天非此火不能生物人非此火不能有生故真火一衰則虚勞無子陽道痿弱老人失溺風冷外侵為腰脚不利攣痺不能行幷不能生土以致脾虚腹冷不能食此藥味辛氣熱正入命門補火之不足則諸證自除筋骨自利皮膚自益也命門之系上通於心相火得補則君火益自振攝故久服能通神强記也長精神明目者言真陽足隂翳消肝腎俱補之極功耳主治叅互聖濟總錄仙茅丸壯筋骨益精神明目黒髭鬚仙茅二斤糯米泔浸五日去赤水夏月浸三日銅刀刮剉隂乾取一斤枸杞子一斤車前子十二兩白茯苓去皮茴香炒柏子仁去殻各八兩生地黄焙熟地黄焙各四兩為末酒煮糊丸如梧子大每服五十丸食前温酒下日二服簡誤凡味之毒者必辛氣之毒者必熱仙茅味辛氣大熱其為毒可知矣雖能補命門益陽道助筋骨除風痺然而病因不同寒熱迥别施之一悞禍如反掌況世之人火旺致病者十居八九火衰成疾者百無二三辛温大熱之藥其可常御乎凡一概陰虚發熱欬嗽吐血䘐血齒血溺血血淋遺精白濁夢與鬼交腎虚腰痛脚膝無力虚火上炎口乾咽痛失志陽痿水涸精竭不能孕育老人孤陽無隂遺溺失精血虚不能養筋以致偏枯痿痺胃家邪熱不能殺榖胃家虚火嘈雜易饑三消五疸隂虚内熱外寒陽厥火極似水等證法竝禁用劉寄奴草味苦温無毒主破血下脹多服令人痢疏劉寄奴草其味苦其氣温揉之有香氣故應兼辛苦能降下辛温通行血得熱則行故能主破血下脹然善走之性又在血分故多服則令人痢矣昔人謂為金瘡要藥又治産後餘疾下血止痛者正以其行血迅速故也主治叅互集簡方治大小便血劉寄奴為末茶調空心服二錢即止千金方治折傷瘀血在腹内者劉寄奴骨碎補延胡索各一兩水二升煎七合入酒及童子小便各一合頓温服本事方治湯火灼傷劉寄奴搗末先以糯米漿雞翎掃上後乃摻末竝不痛亦無痕大驗此方凡湯火傷先以鹽末摻之䕶肉不壞後乃摻藥為妙聖惠方治風入瘡口腫痛劉寄奴為末摻之即止簡誤劉寄奴草通行走散之性專入血分病人氣血虚脾胃弱易作泄者勿服骨碎補味苦温無毒主破血止血補折傷疏骨碎補得金氣兼得石氣石者水之母也味苦氣温亦應有辛好生隂處故得隂氣為多宜其入足少隂而主骨開耳入血行傷也開元命名其義可思矣甄權用以主骨中毒氣風血疼痛五勞六極手足不收上熱下冷雷公用以治耳鳴戴元禮用以治痢風足痿軟皆入腎强骨之驗也主治叅互骨碎補得青鹽槐角炒研細擦牙能固齒靈苑方治虚氣攻牙齒痛血出或時痒痛骨碎補二兩銅刀細剉瓦鍋慢火炒黑為末如常揩齒良久吐之嚥下亦可劉松石云此方不獨治牙痛極能堅骨固牙益精髓去骨中毒氣疼痛牙動將落者數擦立住再不復動經用有神聖濟總錄治風蟲牙痛骨碎補乳香等分為末糊丸塞孔中名金針丸蘇氏圖經治耳鳴耳閉骨碎補削作細條火炮乗熱塞之又方病後髮落胡孫薑野薔薇嫰枝煎汁刷之仁存方治腸風失血胡孫薑燒存性五錢或酒或米飲服時珍云骨碎補足少隂藥也故能入骨治牙及久泄痢昔魏刺史子久泄諸醫不效垂殆用此藥末入猪腎中煨熟與食頓住蓋腎主大小便久泄屬腎虚不可專責脾胃也雷公用治耳鳴耳亦腎之竅也戴元禮治痢後下虚不善調養或逺行或房勞或外感致兩足痿軟或痛或痺遂成痢風宜用獨活寄生湯吞虎骨四斤丸仍以骨碎補三分之一同研取汁酒和服之外用杜牛膝杉木節萆薢白芷南星煎湯頻頻熏洗此亦從腎虚骨痿而治也雷公云凡采得銅刀刮去黄赤毛細切蜜拌蒸曝用簡誤不宜與風燥藥同用連翹味苦平無毒主寒熱鼠瘻瘰癧癰腫惡瘡癭癅結熱蠱毒去白蟲疏連翹感清涼之氣得金水之性本經雖云味苦平無毒平應作辛乃為得之潔古謂其性涼味苦氣味俱薄輕清而浮升也陽也海藏以為隂中陽也入手足少陽手陽明經亦入手少隂心經其主寒熱鼠瘻瘰癧癭癅結熱者以上來諸證皆從足少陽膽經氣鬱有熱而成此藥正清膽經之熱其輕揚芬芳之氣又足以解足少陽之鬱氣清其熱散其鬱靡不瘳矣癰腫惡瘡無非榮氣壅遏衛氣鬱滯而成清涼以除瘀熱芬芳輕揚以散鬱結則榮衛通和而瘡腫消矣蠱毒非熱非辛則不成熱解則蠱自消濕熱盛則生蟲清其熱而苦能洩蟲得苦即伏故去白蟲甄權用以通利五淋小便不通除心家客熱日華子用以通小腸排膿治瘡癤止痛通月經東垣用以散諸經血結氣聚消腫丹溪用以瀉心火除脾胃濕熱及治中部血證以為使海藏用以治氣秘火炎之耳聾一皆清熱散結下氣燥濕之功也主治叅互得貝母白芷甘草金銀花𤣥參薄荷夏枯草白及能消瘰癧加牡鼠糞人爪山豆根蒲公英消乳癰乳巖簡便方治瘰癧結核連翹脂麻等分為末時時食之潔古治項邊馬刀屬少陽經連翹二斤瞿麥一斤大黄三兩甘草半兩每用一兩煎食後熱服十餘日後炙臨泣穴二七壯六十日決效集驗方治痔瘡腫痛連翹煎湯熏洗後以刀上飛過綠礬入麝香貼之簡誤連翹清而無補之藥也癰疽已潰勿服火熱由於虚者勿服脾胃薄弱易於作泄者勿服續隨子味辛温有毒主婦人血結月閉癥瘕痃癖瘀血蠱毒鬼疰心腹痛冷氣脹滿利大小腸除痰飲積聚下惡滯物莖中白汁剝人面皮去䵟􅍍苗如大㦸一名拒冬一名千金子疏續隨子味辛氣温而其性有毒實攻擊尅伐之藥也長於解蠱毒鬼疰以致腹痛脹滿攻積聚下惡滯物及散痰飲至於婦人月閉癥瘕痃癖瘀血大小腸不利諸病則各有成病之由當求其本而治不宜槩施蓋此藥之為用乃以毒攻毒之功也主治叅互聖濟錄治小便不通臍腹脹痛不可忍用續隨子一兩鉛丹半兩同少蜜搗作團瓶盛埋隂處臘月至春末取出研蜜丸梧子大每服二三十丸木通湯下又方治涎積癥塊續隨子三十枚膩粉二錢青黛炒一錢研匀糯米飯丸芡子大每服一丸打碎以大棗一枚燒熟去皮核同嚼冷茶送下半夜後取下積聚惡物為效崔元亮海上方治蛇咬腫悶欲死用重臺六分續隨仁七粒搗篩為散酒服方寸匕兼唾和少許塗咬處立效普濟方治黑子疣贅續隨子於熟時塗之自落簡誤病人元氣虚脾胃弱大便不固者禁用山豆根味甘寒無毒主解諸藥毒止痛消瘡腫毒人及馬急黄發熱欬嗽殺小蟲生劎南山谷蔓如豆疏山豆根得土之沖氣而兼感冬寒之令以生故其味甘苦其氣寒其性無毒甘所以和毒寒所以除熱凡毒必熱必辛得清寒之味甘苦之味則諸毒自解譬大人盛徳與物無競即隂毒忮害遇之不起矣故為解毒清熱之上藥凡痛必因於熱毒解熱散則痛自止瘡腫自消人馬急黄乃血熱極所發故必發熱熱氣上熏則發欬嗽諸蟲亦濕熱所化故悉主之而多獲竒效也主治叅互山豆根入散乳毒藥中能消乳巖備急方解中蠱毒密取山豆根水研服少許未定再服已禁聲者亦愈又方治五般急黄山豆根末水服二錢若帶蠱氣以酒下又方治赤白滯下山豆根末蜜丸梧子大每服二十丸空腹白湯下三服當自止又方治頭風熱痛山豆根末油調塗兩太陽又方治牙齦腫痛山豆根一片含於痛所永類方治喉癰山豆根磨醋噙之追涎即愈勢重不能言者頻以雞翎掃入喉中即引涎出立能言語經驗方治麮豆諸瘡煩熱甚者水研山豆根汁服少許備急方治疥癬山豆根末臘猪脂調塗楊清叟外科治喉風急證牙闗𦂳閉水穀不入山豆根白藥子等分水煎噙之嚥下二三口即愈簡誤病人虚寒者勿服白附子主心痛血痺面上百病行藥勢疏白附子感陽氣而生故其味應辛㣲甘氣大温有小毒性燥而升風藥中之陽草也東垣謂其純陽引藥勢上行是己其主心痛血痺者風寒之邪觸心以致痰壅心經則作痛寒濕邪傷血分則成血痺風能勝濕辛温散寒故主之也風性升騰辛温善散故能主面上百病而行藥勢也日華子用以治中風失音一切冷風氣面皯瘢疵李珣用以治諸風冷氣足弱無力疥癬風瘡隂下濕痒頭面斑痕入面脂用丹溪用以治風痰皆袪風燥濕散結之功也主治叅互白附子得南星半夏能豁風痰暴壅而有寒邪者為要藥同膽星全蝎白殭蠶釣藤天竺黄白檀香牛黄能治小兒急驚濟生方治痰厥頭痛同天麻半夏南星等分生薑汁浸蒸餅丸菉豆大每服四十丸食後薑湯下簡便方治赤白汗斑白附子硫黄等分為末薑汁調稀茄蔕蘸擦日數次衛生易簡方治面上皯􅍍白附子為末卧時漿水洗面以白蜜和塗紙上貼之久久自落簡誤白附子燥藥也似中風證雖痰壅禁用小兒慢驚不宜服鹿藿味苦平無毒主蠱毒女子腰腹痛不樂腸癰瘰癧瘍氣疏鹿藿稟地中之隂氣以生故其味苦氣平無毒入足陽明太隂厥隂經解毒涼血之藥也惟其解毒故主蠱毒惟其涼血故主腸癰瘰癧瘍氣女人以血為主血虚有熱則腰腹痛不樂得苦涼之氣則熱退而血得所養故主女人腰腹痛不樂也方藥不復用人亦罕識故不著叅互及簡誤預知子味苦寒無毒殺蟲療蠱治諸毒傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之有皮殻其實如皂莢子去皮研服之有效疏預知子感隂寒之氣以生故其味苦其氣寒其性無毒凡蠱毒多辛熱之物所造故宜苦寒以泄其熱毒熱毒既解則蠱不靈矣凡蟲皆濕熱所生蟲得苦則伏故殺蟲之藥多苦多寒也此草中之有靈性者故其命名如此又名仙詔子聖知子聖先子蜀人貴重云亦難得采無時其根味苦性極冷其效愈於子山民目為聖無憂冬月采隂乾石曰内搗末篩細凡中蠱毒則水煎三錢匕温服立巳日華子又云盍合子温治一切風補五勞七傷其功不可備述并治痃癖氣塊天行温疾消宿食止煩悶利小便催生解毒藥中惡失音髮落傅一切蛇蟲蠶咬主治叅互和劑局方預知子丸治心氣不足精神恍忽言語錯妄忪悸煩鬱憂愁慘慽善怒多恐健忘少睡夜多異夢寤即驚魘或發狂眩暴不知人竝宜服此預知子去皮白茯苓枸杞子石菖蒲茯神栢實人參地骨皮逺志山藥黄精丹砂等分為末煉蜜丸芡實大每嚼一丸人參湯下聖惠方治耳卒聾八月取石橊開一孔畱蓋入米醋滿中蓋定麫裹􅀈火中煨熟取出入仙詔子黑李子末取水滴耳中腦痛勿驚如此二夜又點一耳簡誤預知子苦寒能利凡病人脾虚作泄瀉者勿服木賊味甘㣲苦無毒主目疾退翳膜又消積塊益肝膽明目療腸風止痢及婦人月水不斷得牛角䚡麝香治休息痢歴久不差得禹餘糧當歸芎藭療崩中赤白得槐鵝桑耳腸風下血服之效又與槐子枳實相宜主痔疾出血疏木賊草感春升之氣故應味甘㣲苦而性則無毒入足厥隂少陽二經血分故首主目疾及退翳膜益肝膽而明目也又療腸風止痢及婦人月水不斷則消之中又有止之義矣其主積塊療腸風止痢及婦人月水不斷崩中赤白痔疾出血者皆入血益肝膽之功肝藏血故也主治叅互木賊得穀精草決明子白蒺藜蟬蛻生地黄甘菊花蜜蒙花治目疾久不愈消翳障有竒功得槐角子桑耳煅存性地榆茜草根治腸痔下血多效廣利方治瀉血不止木賊十二分切以水二升煎取八合去滓空心温二分服如人行五里再服衍義云治小腸膀胱氣木賊細剉㣲焙搗為末沸湯點二錢食前服必效簡誤目疾由於怒氣及暑熱傷血暴赤腫痛者非其所任蒲公草味甘平無毒主婦人乳癰腫水煮汁飲之又封之立消疏蒲公草得水之沖氣故其味甘平其性無毒當是入肝入胃解熱涼血之要藥乳癰屬肝經婦人經行後肝經主事故主婦人乳癰腫乳毒竝宜生噉之良主治叅互蒲公草得夏枯草貝母連翹白芷栝樓根橘葉甘草頭垢牡鼠糞山豆根山慈菰治一切乳癰毒腫痛及治乳巖為上藥圖經治惡刺及狐尿刺摘取根莖白汗塗之惟多塗立差此方出孫思邈千金方其序云余以貞觀五年七月十五日夜以左手中指背觸著庭木至曉遂患痛不可忍經十日痛日深瘡日高大色如熟小豆色嘗聞長者之論有此方遂依治之手下即愈痛亦除瘡亦即瘥未十日而平復如故楊炎南行方亦著其效云梅師方治産後不自乳兒畜積乳汁結作癰取蒲公草搗傅腫上日三四度易之此草單治乳癰及腫毒性既甘平無毒又乏他用故無簡誤穀精草味辛温無毒主療喉痺齒風痛及諸瘡疥飼馬主蟲顙毛焦等病疏穀精草得金氣故味辛所言氣温者應曰㣲温故其性無毒入足厥隂經又入足陽明經補肝氣之要藥也辛能散結㣲温能通氣喉痺者手少隂心火與足少陽相火相扇上壅而成散二經之火則氣通而無所結滯矣齒風痛者陽明胃家風火熱盛上衝之所致也熱則生風風火相搏故發齒風痛也諸瘡疥之生皆由於血熱諸痛痒瘡瘍皆屬心火藥宜辛散故悉主之其用以飼馬主蟲顙毛焦等病者以馬性多熱又為風熱所傷故主之也以其入肝補益肝氣故為治目散翳之上藥而本經不載是謂闕文主治叅互穀精草得決明子木賊草甘菊花蜜蒙花生地黄專除目病障翳集驗方治偏正頭痛用穀精草一兩為末以白麫糊調攤油紙上貼痛處乾換聖惠方治鼻衂不止穀精草為末熟麫湯服二錢明目方治目中翳膜穀精草防風等分為末米飲服之甚驗邵真人濟急方治痘後目翳隠澀淚出久而不退用穀精草為末以肺或猪肝片蘸食一方加蛤粉等分同入猪肝内煮熟日食之衛生家寶方治小兒雀盲至晚或不見物用羯羊肝一具不用水洗竹刀剖開入穀精草一撮瓦礶煮熟日食之屢效忌鐵器如不肯食炙熟搗作丸菉豆大每服三十丸茶下保幼大全治小兒中暑吐瀉煩渇穀精草燒存性用器覆之放冷為末每冷米飲服半錢此藥味淡性無毒喉痺齒痛目翳之外無他用故不著簡誤夏枯草味苦辛寒無毒主寒熱瘰癧鼠瘻頭瘡破癥散癭結氣脚腫濕痺輕身土𤓰為之使疏夏枯草得金水之氣故其味苦辛而性寒無毒為治瘰癧鼠瘻之要藥入足厥隂少陽經丹溪謂其補厥隂肝家之血又辛能散結苦寒能下泄除熱故治一切寒熱及消瘰癧鼠瘻破癥散癭結氣頭瘡皆由於熱脚腫濕痺無非濕熱所成熱消結散濕去則三證自除而身亦輕矣主治叅互夏枯草得連翹忍冬藤貝母𤣥參薄荷栝樓根紫背天葵蓖麻子仁甘草治一切瘰癧有效得蒲公草治一切乳癰乳巖方具蒲公草條下單取數兩水煮濃汁入生甘菊紫花地丁忍冬藤連翹白及白歛甘草生地黄白芷半枝蓮消一切癰疽腫毒止痛有神此複方也簡要濟衆方治肝虚目睛疼冷淚不止血脈痛羞明怕日夏枯草半兩香附子一兩為末每服一錢茶調下衍義云古方用以燒灰合潔面藥初生嫰時作菜食之須浸洗淘去苦水此草無毒除治瘰癧鼠瘻及散癭結氣消癰腫乳毒之外無别用故不著簡誤山慈菰根有小毒主癰腫瘡瘻瘰癧結核等醋磨傅之亦剝人面皮除皯䵴疏山慈菰味辛氣寒善散熱消結故主癰腫瘡瘻瘰癧結核等昔人用醋磨傅今人亦入服藥中産處州邃昌縣實非金燈花與鹿蹄草葉似車前主治叅互入玉樞丹紫金錠大内觀音救苦錠磨傅并服消一切疔腫癰疽解一切蛇蟲毒有神方中有大㦸用此不得服甘草誤則殺人亦入乳巖乳毒方用相宜因無别用故不著簡誤燈心草味甘寒無毒根及苗主五淋生煮服之敗席煮服更良入藥宜用生草疏燈心草氣味甘寒則無毒可知入心小腸藥也其質輕通其性寒味甘淡故能通利小腸熱氣下行從小便出小腸為心之腑故亦除心經熱也主治叅互燈心草以鹹滷浸透入雞子殻中封固煅存性研細加梁上倒掛塵及青魚膽明礬銅青點咽喉生乳蛾有神效經驗方治小兒夜啼用燈心燒灰塗乳上與喫勝金方治破傷多用燈心草爛嚼和唾貼之用帛裹血立止又方治小蟲蟻入耳挑不出者以燈心浸油釣出蟲簡誤性專通利虚脫人不宜用馬勃味辛平無毒主惡瘡馬疥一名馬庀疏馬勃感土金之氣而生故味辛氣平而無毒宜其主惡瘡馬疥及止凍瘡也衍義曰去膜以蜜揉拌少以水調呷治喉痺痛則辛散之功也主治叅互經驗良方治走馬喉痺馬屁勃即灰菰熖硝各一兩為末每吹一字吐涎血即愈普濟方治久嗽不止馬勃為末蜜丸梧子大每服二十丸白湯下即愈斑瘡入眼馬屁勃蛇皮各五錢皂角子十四箇為末入礶内鹽泥固濟煅存性研每温酒服一錢此閻孝忠集效方也因無别用故不著簡誤水蓼主蛇毒搗傅之絞汁服止蛇毒入内心悶煮漬捋脚消氣腫疏水蓼感金水之氣而兼有土故味辛性冷而無毒隂中㣲陽冷而辛所以能解蛇毒入内心悶及水煮漬捋脚消氣腫也主治叅互集驗方治脚痛成瘡先剉水蓼煮湯令温熱得所頻頻淋洗瘡乾自安衍義治瘰癧水紅子不拘多少微炒一半生用一半同為末好酒調二錢日三服食後夜卧各一服破者亦治海金沙主通利小腸得梔子馬牙硝蓬砂共療傷寒熱狂疏海金沙味甘淡氣寒性無毒甘寒淡滲之藥故主通利小腸得牙硝梔子皆鹹寒苦寒之極又得蓬砂之辛所以能治傷寒熱狂大熱當利小便此釡底抽薪之義也淡能利竅故治熱淋血淋膏淋等病乃手太陽小腸經藥也主治叅互夷堅志治熱淋急痛海金沙草日中曝之令小乾紙襯以杖擊之有細沙落紙上旋收之且曝且擊以沙盡為度研細煎生甘草湯調服二錢圖經本草治小便不通臍下滿悶海金沙一兩臘南茶半兩搗碎每服三錢生薑甘草煎湯下日二服仁存方治膏淋如油海金沙滑石各一兩甘草梢二錢半為末每服二錢麥門冬煎湯服日二次普濟方治血淋痛澀但利水道則清濁自分海金沙末新汲水或沙糖水服一錢蘭臺秘藏治脾濕腫滿腹脹如鼓喘不得卧海金沙散用海金沙三錢白术四兩甘草半兩牽牛子一兩半為末每服一錢煎倒流水調下得利為妙元氣虚人禁服此方簡誤海金沙性淡滲而無補益小便不利及諸淋由於腎水真隂不足者勿服草三稜根味甘平温無毒療産後惡血通月水血結墮胎破積聚癥瘕止痛利氣一名雞爪三稜疏草三稜即雞爪三稜與京三稜其實一類但以所産之地與形質不同為别耳破散尅削之性一同乎京三稜故叅互簡誤亦同兹不復贅鹿藥味甘温無毒主風血去諸冷益老起陽浸酒服之生姑臧巴西根苗竝似黄精根鹿好食俗呼鹿跑草又名延壽果疏鹿藥得土中陽和之氣以生故其味甘其氣温其性無毒甘能益血甘能入脾甘温益陽氣故能主風血去諸冷而益老起陽也當與黄精萎㽔枸杞之類同科氣味和平性本無毒補益之外無别治療故不著主治簡誤草石蠶生髙山石上根如箸上有毛節如蠶葉似卷柏山人取浸酒除風破血主溪毒煮食之疏按草石蠶本經無氣味予見明州好事者以水漬羊肚石種之盤生石上儼類蠶形得水石之氣性必清寒故能解毒予少時見一老醫治毒痢下血久不愈方中有之後予按其法試用良驗主治叅互草石蠶同川黄連白芍藥各酒浸炒肉豆蔲糯粉裹煨蓮肉白藊豆俱炒橘皮炙甘草升麻山查和為末蜜湯調服治久痢不止往往獲效當是涼血破瘀血消積滯之功也無别用故不著簡誤漆姑草氣辛烈主漆瘡挼研傅之熱更易亦主溪毒瘡疏漆姑草藏器云氣辛烈然觀其多生石間及堦墀隂處必是辛苦寒之藥辛能散苦能泄故主漆瘡溪毒瘡及大人小兒丹毒總之其氣味辛涼治一切血熱為病之要藥也神農本草經疏卷十一
