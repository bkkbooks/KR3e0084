  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0084_WYG_018-1a, image: WYG0775/WYG0775-0748c.png}
body:
  text: 神農本草經疏卷十八明繆希雍撰獸部下品總二十一種今疏其要者四種猪懸蹄足腎膽膚肚肪膏􅏬附麋角茸附獺肝膃肭臍猪懸蹄主五痔伏熱在腸腸癰内蝕疏猪水畜也在辰屬亥在卦屬坎其肉氣味雖寒然而多食令人暴肥性能作濕生痰易惹風熱殊無利益耳其懸蹄乃蹄甲之懸起不著地者本經無氣味然為鹹寒無毒之物入手足陽明經藥也濕熱下注則為五痔内蝕熱壅血滯則為腸癰鹹寒能除腸胃之熱故主之也主治參互得牛角䚡槐角子猬皮象牙末金頭蜈蚣蛀竹屑明礬地榆青黛白蠟治通腸漏令漏管自出錢氏小兒方痘後目翳半年已上者一月取効用猪懸蹄三兩瓦瓶固濟煅蟬蜕一兩羚羊角三錢為末每嵗一字三嵗已上三錢温水服日三猪四足小寒主傷撻諸敗瘡下乳汁疏乳屬陽明陽明脈弱則乳汁不通能益陽明經氣血故能下乳傷撻敗瘡必血熱作痛氣寒而味甘鹹故涼血止痛也又煑湯為洗潰瘍之要藥主治參互廣濟方婦人乳無汁者以猪蹄四枚水二斗煑一斗去蹄入土𤓰根通草漏蘆各三兩再煑六升去滓内葱白豉作粥或羮食之身體㣲熱有少汗出佳未通再作梅師方癰疽發背乳發初起母猪蹄一隻通草六分綿褁煑羮食之外科精要洗癰疽有猪蹄湯腎冷和理腎氣通利膀胱疏猪腎味鹹氣冷能㵼腎氣腎虚寒者不宜食本經主理腎氣乃借其同氣以引導之耳不言補而言理其意有在矣腎與膀胱為表裏故復能利膀胱也今人誤認以為補腎恣意食之大為差謬不覩日華子云乆食令人無子孟詵云乆食令人傷腎其非補腎之物明矣膽主傷寒熱渴疏膽味苦氣寒經曰熱淫於内寒以勝之苦以泄之故主傷寒熱渴也主治參互仲景膽導法以猪膽汁和醋少許灌穀道中通大便神効入猪牙皂角細末二分攪匀更速葢酸苦益隂潤燥而㵼便也又治少隂下利不止厥逆無脈乾嘔煩者以白通湯加猪膽汁主之使其氣相從無拒格之患此寒因熱用熱因寒用之義也葱白四莖乾薑一兩生附子一枚水三升煑一升入人尿五合猪膽汁一合分服入雄黄末三四分蜈蚣末二分套指縳𦂳治天蛇毒有効梅師方熱病䘌蝕上下用猪膽汁一枚醋一合煎沸服蟲立死外臺祕要湯火傷瘡猪膽調黄蘖末塗之膚仲景治足少隂下利咽痛胸滿心煩者有猪膚湯用猪膚一斤水一斗煑五升取汁入白蜜一升白粉五合熬香分服成無已註云猪水畜也其氣先入腎解少隂客熱加白蜜以潤燥除煩白粉以益氣斷利也肚主補中益氣止渴利疏猪肚屬土故其味必甘氣㣲温無毒乃猪一身無害之物為補脾胃之要品脾胃得補則中氣益利自止矣日華子主補虚損蘇頌主骨蒸勞熱血脈不行皆取其補益脾胃則精血自生虚勞自愈根本固而五臟皆安也主治㕘互普濟方水㵼不止用猪肚一枚煑爛入平胃散搗丸服効仲景方猪肚黄連丸治消渴用雄猪肚一枚入黄連末五兩栝樓根白粱米各四兩知母三兩麥門冬二兩縫定蒸熟搗丸梧子大每服三十丸米飲下千金方温養胎氣胎至九月消息用猪肚一枚如常著五味煑食至盡又猪肚丸黄連一味為細末量肚大小實之煑令極爛搗匀為丸梧子大治臟毒下血又方治腹脹大用烏芋去皮入雄肚線縫砂器煑糜食之勿入鹽肪膏主煎諸膏藥解班猫芫青毒疏肪膏即脂油也味甘寒性滑澤能涼血解毒潤燥故主煎諸膏藥及解班猫芫青毒也又能利腸胃通大小便能散風熱療惡瘡主治㕘互肘後方膏髮煎治女勞黄疸見髮髲條兼能治五疸萬氏方肺熱暴瘖猪脂油一斤煉過入白蜜一斤再煉少頃濾淨冷定不時挑服一匙即愈􅏬一名腎脂生兩腎中間似脂非脂似肉非肉乃人物之命門三焦發原處也陳藏器主肺痿咳𠻳和棗肉浸酒服亦能主痃癖羸痩蘇頌主肺氣乾脹喘急潤五藏去皴皰䵟􅍍等證葢是甘寒滑澤之物甘寒則津液生滑澤則垢膩去故主如上諸證也男子多食損陽薄大腸其能専在去垢膩可用以浣垢衣俗名猪胰子按猪為食味中常用之物臟腑腸胃咸無棄焉然其一身除肚膏外餘皆有毒發病人習之而不察也壯實者或暫食無害有疾者不可不知其忌故列其害於後肉多食令人虚肥生痰熱熱病後食之復發不宜與薑同食食則發大風病頭肉有病者食之生風發疾腦食之損男子陽道臨房不能行事酒後尤不可食血能敗血損陽服地黄何首烏諸補藥者尤忌之多食耗心氣不可合呉茱茰食肝餌藥人不可食合魚鱠食生癰疽合鯉魚腸子食傷人神延夀書云猪臨宰驚氣入心絶氣歸肝俱不可多食必傷人脾孫思邈云凡六畜脾人一生莫食之肺不可與白花菜合食令人氣滯發霍亂八月和飴食至冬發疽腎乆食令人傷腎少子冬月不可食損人真氣兼發虚壅􅏬男子多食損陽腸多食動冷氣鼻唇多食動風舌多食損心麋角甘無毒主痺止血益氣力疏麋屬隂好遊澤畔其角冬至解者陽長則隂消之義也為補左腎真隂不足虚損勞乏筋骨腰膝酸痛一切血液衰少為病故主止血益氣力及除痺也痺雖風寒濕合而成疾然外邪易入者由氣血先虚經絡因之壅滯血脈不通故也麋角入血益隂榮養經絡故主之也茸功用相同而補隂之力更勝主治參互千金方麋角丸補心神安五臟填骨髓理腰脚能乆立聰明耳目髮白更黑返老還少麋角取當年新角連腦頂者不論具數去尖一大寸截斷於淨盆中水浸每夜換易軟即將出削去皺皮以鎊鎊取白處至心即止以清米泔浸兩宿取出曝乾以無灰酒於大甆器中浸兩宿其藥及酒俱入淨釡中初用武火煎一食頃後以文火微煎如蟹眼栁木不住手攪時時添酒以成膏為度煎時皆須平旦下手不得經宿仍看屑如稀膠即以牛乳五升酥一升以次漸下後項藥另以麋角炙令黄為末㯽榔通草秦艽肉蓯容人參兔絲子甘草各一兩為末將膠再煎一食頃似稀粥即止火投諸藥末和匀約稠黏堪作丸頃出衆手一時丸梧子大空腹酒下三十丸日加一丸至五十丸為度日二服至一百日忌房事服經一月腹内諸疾自相驅逐有㣲利勿怪服至二百日面皺光澤一年齒落更生强記身輕二年令人肥飽少食不老神仙合時須在淨室勿令隂人雞犬孝子等見楊氏家藏方二至丸補虚損生精血去風溼壯筋骨用鹿角鎊細以真酥一兩無灰酒一升慢火炒乾取四兩麋角鎊細以真酥二兩米醋一升慢火炒乾取四兩蒼耳子酒浸一宿焙半斤山藥白茯苓黄耆蜜炙各四兩當歸五兩肉蓯容酒浸焙逺志人參沈香各二兩五味子一兩通為末酒煑糯米糊丸梧子大每服五十丸温酒鹽湯任下日二服簡誤陽氣衰少虚羸畏寒者勿用肉多食令人弱房獺肝味甘有毒主鬼疰蠱毒却魚鯁止乆嗽燒服之疏獺水中之獸也本經味甘有毒藥性論鹹微熱無毒詳其功用應是鹹勝甘劣微温小毒之物入肝入腎之藥也經曰邪之所凑其氣必虚虚損勞極則五臟之神俱不安鬼邪相挾而為病乆嗽者亦勞極所致水不勝火火氣上炎肺為賊邪所干也鹹味潤下俾火氣下降則肺自清總之此藥能益隂氣補虚損保勞極故主如上諸證也甘鹹善於解毒故又主蠱毒獺性嗜魚故能却魚鯁也大抵其功長於治傳尸勞及鬼疰邪惡有效故張仲景治冷勞有獺肝丸崔氏治九十種蠱疰傳尸骨蒸伏連殗殜諸鬼毒癘疾有獺肝丸皆妙主治㕘互同蘆會乾漆象膽青黛胡黄連啄木鳥頭狐脾虎胃丹砂天靈葢治傳尸勞能殺勞蟲孟詵尸疰一門悉患者獺肝一具燒水服方寸匕日再葛洪尸疰鬼疰乃是五尸之一又挾諸鬼邪為害其病變動乃有三十六種至九十種大略使人寒熱沈沈黙黙不知病之所苦而無處不惡積月累年淹滯至死死後傳人乃至滅門覺有此候惟以獺肝散服之有效法如上除傳尸勞證外無他用故不著簡誤膃肭臍味鹹無毒主鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣宿血結塊痃癖羸痩一名海狗腎雷云此物多偽者真者有一對則兩重薄皮裏丸核其皮上有肉黄毛三莖共一穴溼潤常如新或置睡犬旁其犬忽驚跳若狂者真也與水烏龍似以此别之凡用酒浸一宿紙裹炙香剉或酒煎熟合藥疏膃肭海獸也得水中之陽氣故其味鹹無毒藥性論大熱李珣甘香美大温其味與獺肝相似第其氣倍熱耳所主鬼氣尸疰夢與鬼交鬼魅狐魅心腹痛中惡邪氣者葢因真陽虚則神明不振幽暗易侵故諸邪惡纒疰為病此藥専補陽氣則隂邪自辟所以能療如上等證也鹹能入血軟堅温熱能通行消散故又主宿血結塊及痃癖羸痩也近世房術中多用之以其鹹温入腎補虚煖腰膝固精氣壯陽道也主治㕘互同陽起石肉蓯蓉巴㦸天兔絲子山茱茰鹿茸能壯陽道益精和劑局方有腽肭臍丸治諸虚勞損鬼疰邪惡夢與鬼交精氣乏絶等證簡誤膃肭臍性熱助陽為腎氣衰竭精寒痿弱之要藥然而隂虚火熾强陽不倒或陽事易舉及骨蒸勞嗽等候咸在所忌神農本草經疏卷十八
